# ============================================================================
# Dynamic Climate · DC · Testing/Simulator (optional)
# ----------------------------------------------------------------------------
# version: 4.2
# changelog: v4.2 (compaction)
# ============================================================================

input_boolean:
  dc_zone01_sim_enabled:
    name: dc_zone01_sim_enabled
    icon: mdi:test-tube
  dc_zone01_sim_armed:
    name: dc_zone01_sim_armed
    icon: mdi:shield-key
  dc_zone01_sim_show_deltas:
    name: dc_zone01_sim_show_deltas
    icon: mdi:delta
  dc_zone01_sim_vacaciones:
    name: dc_zone01_sim_vacaciones
    icon: mdi:beach
  dc_zone01_sim_f1_in_sun:
    name: dc_zone01_sim_f1_in_sun
    icon: mdi:white-balance-sunny
  dc_zone01_sim_f2_in_sun:
    name: dc_zone01_sim_f2_in_sun
    icon: mdi:white-balance-sunny
  dc_zone01_sim_f3_in_sun:
    name: dc_zone01_sim_f3_in_sun
    icon: mdi:white-balance-sunny
  dc_zone01_test_force_missing_t_int:
    name: dc_zone01_test_force_missing_t_int
    icon: mdi:thermometer-off
    initial: false
input_select:
  dc_zone01_sim_hvac_mode:
    name: dc_zone01_sim_hvac_mode
    options:
    - heat
    - cool
    - 'off'
    icon: mdi:thermostat
  dc_zone01_sim_scenario:
    name: dc_zone01_sim_scenario
    options:
    - none
    - ola_frio_extremo
    - ola_calor_extremo
    - noche_lluviosa_persianas_abiertas
    - noche_lluviosa_persianas_cerradas
    - cambio_frio_en_2h
    - cambio_calor_en_2h
    - viento_fuerte_sin_sol
    - sol_invernal_fachada_1_persianas_abiertas
    icon: mdi:playlist-play
timer:
  dc_zone01_sim_arm_ttl:
    name: dc_zone01_sim_arm_ttl
    duration: 01:00:00
input_text:
  dc_zone01_sim_last_action:
    name: dc_zone01_sim_last_action
    max: 255
  dc_zone01_sim_golden_json:
    name: dc_zone01_sim_golden_json
    max: 4096
input_number:
  dc_zone01_sim_last_action_ts:
    name: dc_zone01_sim_last_action_ts
    min: 0
    max: 4102444800
    step: 1
  dc_zone01_sim_sun_elevation:
    name: dc_zone01_sim_sun_elevation
    min: -90
    max: 90
    step: 0.1
    unit_of_measurement: °
  dc_zone01_sim_t_int:
    name: dc_zone01_sim_t_int
    min: -5
    max: 45
    step: 0.1
    unit_of_measurement: °C
  dc_zone01_sim_t_ext:
    name: dc_zone01_sim_t_ext
    min: -30
    max: 50
    step: 0.1
    unit_of_measurement: °C
  dc_zone01_sim_wind_speed:
    name: dc_zone01_sim_wind_speed
    min: 0
    max: 40
    step: 0.1
    unit_of_measurement: m/s
  dc_zone01_sim_vmc_speed:
    name: dc_zone01_sim_vmc_speed
    min: 0
    max: 3
    step: 1
  dc_zone01_sim_tendencia_cph_ema:
    name: dc_zone01_sim_tendencia_cph_ema
    min: -10
    max: 10
    step: 0.01
    unit_of_measurement: °C/h
  dc_zone01_sim_lux_trend:
    name: dc_zone01_sim_lux_trend
    min: -50000
    max: 50000
    step: 1
  dc_zone01_sim_forecast_peak_temp:
    name: dc_zone01_sim_forecast_peak_temp
    min: -30
    max: 50
    step: 0.1
    unit_of_measurement: °C
  dc_zone01_sim_f1_cover_pos:
    name: dc_zone01_sim_f1_cover_pos
    min: 0
    max: 100
    step: 1
    unit_of_measurement: '%'
  dc_zone01_sim_f2_cover_pos:
    name: dc_zone01_sim_f2_cover_pos
    min: 0
    max: 100
    step: 1
    unit_of_measurement: '%'
  dc_zone01_sim_f3_cover_pos:
    name: dc_zone01_sim_f3_cover_pos
    min: 0
    max: 100
    step: 1
    unit_of_measurement: '%'
  dc_zone01_sim_f1_lux:
    name: dc_zone01_sim_f1_lux
    min: 0
    max: 200000
    step: 1
    unit_of_measurement: lx
  dc_zone01_sim_f2_lux:
    name: dc_zone01_sim_f2_lux
    min: 0
    max: 200000
    step: 1
    unit_of_measurement: lx
  dc_zone01_sim_f3_lux:
    name: dc_zone01_sim_f3_lux
    min: 0
    max: 200000
    step: 1
    unit_of_measurement: lx
  dc_zone01_sim_f1_t_ext:
    name: dc_zone01_sim_f1_t_ext
    min: -30
    max: 50
    step: 0.1
    unit_of_measurement: °C
  dc_zone01_sim_f2_t_ext:
    name: dc_zone01_sim_f2_t_ext
    min: -30
    max: 50
    step: 0.1
    unit_of_measurement: °C
  dc_zone01_sim_f3_t_ext:
    name: dc_zone01_sim_f3_t_ext
    min: -30
    max: 50
    step: 0.1
    unit_of_measurement: °C
  dc_sim_arm_ttl_min:
    name: dc_sim_arm_ttl_min
    min: 1
    max: 240
    step: 1
    unit_of_measurement: min
    initial: 30
  dc_zone01_sim_golden_tol_c:
    name: dc_zone01_sim_golden_tol_c
    min: 0.0
    max: 5.0
    step: 0.05
    mode: box
    unit_of_measurement: °C
    initial: 0.25
template:
- sensor:
  - name: dc_zone01_addon_simulator_version
    unique_id: dc_zone01_addon_simulator_version
    icon: mdi:tag
    state: '4.2'
    attributes:
      module: dc_zone01_addon_simulator
      tier: optional
- sensor:
  - name: dc_zone01_sim_hvac_mode
    unique_id: dc_zone01_sim_hvac_mode
    icon: mdi:thermostat
    state: '{{ states(''input_select.dc_zone01_sim_hvac_mode'') }}'
  - name: dc_zone01_sim_base_activa
    unique_id: dc_zone01_sim_base_activa
    unit_of_measurement: °C
    state: "{% set hvac = states('sensor.dc_zone01_sim_hvac_mode') %} {% set vac =\
      \ is_state('input_boolean.dc_zone01_sim_vacaciones','on') %} {% set elev = states('input_number.dc_zone01_sim_sun_elevation')\
      \ | float(-90) %} {% set es_noche = (elev <= -3) %}\n{% if vac %}\n  {% set\
      \ bh = states('input_number.dc_zone01_vac_base_heat_day')|float(17) %}\n  {%\
      \ set bc = states('input_number.dc_zone01_vac_base_cool_day')|float(30) %}\n\
      \  {{ (bh if hvac == 'heat' else bc) | round(2) }}\n{% else %}\n  {% set bh\
      \ = states('input_number.dc_zone01_base_heat_day')|float(22.5) %}\n  {% set\
      \ bc = states('input_number.dc_zone01_base_cool_day')|float(26.5) %}\n  {% set\
      \ dn = states('input_number.dc_zone01_delta_noche')|float(0.5) %}\n  {% set\
      \ base_day = (bh if hvac == 'heat' else bc) %}\n  {% set base_n = (base_day\
      \ - dn) if hvac == 'heat' else (base_day + dn) %}\n  {{ (base_n if es_noche\
      \ else base_day) | round(2) }}\n{% endif %}\n"
  - name: dc_zone01_sim_tendencia_derivada
    unique_id: dc_zone01_sim_tendencia_derivada
    unit_of_measurement: °C/h
    state: '{% set cph = states(''input_number.dc_zone01_sim_tendencia_cph_ema'')
      | float(0) %} {% set th = states(''input_number.dc_zone01_tendencia_umbral_estable'')
      | float(0) %} {{ (0 if (cph | abs) < th else cph) | round(3) }}

      '
  - name: dc_zone01_sim_lead_bias_h
    unique_id: dc_zone01_sim_lead_bias_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    state: "{% set hvac = states('sensor.dc_zone01_sim_hvac_mode') %} {% set cph_abs\
      \ = (states('input_number.dc_zone01_sim_tendencia_cph_ema')|float(0)) | abs\
      \ %} {% set dead = states('input_number.dc_zone01_lead_cph_deadband')|float(0)\
      \ %} {% set scale = states('input_number.dc_zone01_lead_cph_scale')|float(1)\
      \ %} {% set tr_max = states('input_number.dc_zone01_lead_cph_max_h')|float(0)\
      \ %} {% set cph_eff = [0.0, (cph_abs - dead)]|max %} {% set tr = (cph_eff /\
      \ scale * tr_max) if scale > 0 else 0.0 %} {% set tr = [0, [tr, tr_max]|min]|max\
      \ %}\n{# Solar lead por lux + trend (SIM) #} {% set lux = states('input_number.dc_zone01_sim_f1_lux')\
      \ | float(0) %} {% set lux_min = states('input_number.dc_zone01_lead_lux_min')|float(0)\
      \ %} {% set lux_span = states('input_number.dc_zone01_lead_lux_span')|float(0)\
      \ %} {% set sr_max = states('input_number.dc_zone01_lead_solar_max_h')|float(0)\
      \ %} {% set rise_scale = states('input_number.dc_zone01_lead_lux_rise_scale')|float(0)\
      \ %}\n{% set nivel_lux = ((lux - lux_min) / lux_span) if lux_span > 0 else 0.0\
      \ %} {% set nivel_lux = [0, [nivel_lux, 1.0]|min]|max %}\n{% set lux_tr = states('input_number.dc_zone01_sim_lux_trend')\
      \ | float(0) %} {% set factor_rise = (lux_tr / rise_scale) if rise_scale > 0\
      \ else 1.0 %} {% set factor_rise = [0, [factor_rise, 1.0]|min]|max %} {% set\
      \ sr = (nivel_lux * factor_rise * sr_max) if hvac in ['heat','cool'] else 0.0\
      \ %}\n{# ENV lead: si persiana abierta (pos>0) suma por fachada enabled #} {%\
      \ set env = 0.0 %} {% if is_state('input_boolean.dc_zone01_f1_enabled','on')\
      \ and (states('input_number.dc_zone01_sim_f1_cover_pos')|float(0)) > 0 %}\n\
      \  {% set env = env + (states('input_number.dc_zone01_lead_env_f1_h')|float(0))\
      \ %}\n{% endif %} {% if is_state('input_boolean.dc_zone01_f2_enabled','on')\
      \ and (states('input_number.dc_zone01_sim_f2_cover_pos')|float(0)) > 0 %}\n\
      \  {% set env = env + (states('input_number.dc_zone01_lead_env_f2_h')|float(0))\
      \ %}\n{% endif %} {% if is_state('input_boolean.dc_zone01_f3_enabled','on')\
      \ and (states('input_number.dc_zone01_sim_f3_cover_pos')|float(0)) > 0 %}\n\
      \  {% set env = env + (states('input_number.dc_zone01_lead_env_f3_h')|float(0))\
      \ %}\n{% endif %}\n{# WIND lead (SIM) #} {% set wind = states('input_number.dc_zone01_sim_wind_speed')|float(0)\
      \ %} {% set w0 = states('input_number.dc_zone01_lead_wind_start')|float(0) %}\
      \ {% set ws = states('input_number.dc_zone01_lead_wind_span')|float(1) %} {%\
      \ set wmax = states('input_number.dc_zone01_lead_wind_max_h')|float(0) %} {%\
      \ set wf = ((wind - w0) / ws) if ws > 0 else 0 %} {% set wf = [0, [wf, 1.0]|min]|max\
      \ %} {% set wind_boost = wf * wmax %}\n{{ (tr + sr + env + wind_boost) | round(2)\
      \ }}\n"
  - name: dc_zone01_sim_lead_base_h
    unique_id: dc_zone01_sim_lead_base_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    state: "{% if is_state('input_boolean.dc_zone01_adaptive_lead_enabled','on') %}\n\
      \  {{ states('input_number.dc_zone01_lead_gain_adaptive') | float(0) | round(2)\
      \ }}\n{% else %}\n  {{ states('input_number.dc_zone01_tendencia_lead_gain')\
      \ | float(0) | round(2) }}\n{% endif %}\n"
  - name: dc_zone01_sim_lead_final_h
    unique_id: dc_zone01_sim_lead_final_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    state: "{% set base = states('sensor.dc_zone01_sim_lead_base_h')|float(0) %} {%\
      \ set bias = states('sensor.dc_zone01_sim_lead_bias_h')|float(0) %} {% set mn\
      \ = states('input_number.dc_zone01_lead_min_h')|float(0) %} {% set mx = states('input_number.dc_zone01_lead_max_h')|float(0)\
      \ %} {% set lead = base + bias %} {% if mx > 0 %}\n  {{ [mn, [lead, mx]|min]|max\
      \ | round(2) }}\n{% else %}\n  {{ [mn, lead]|max | round(2) }}\n{% endif %}\n"
  - name: dc_zone01_sim_tendencia_efectiva
    unique_id: dc_zone01_sim_tendencia_efectiva
    unit_of_measurement: °C
    state: '{% set base = states(''input_number.dc_zone01_tendencia_lead_gain'') |
      float(0) %} {% set mn = states(''input_number.dc_zone01_lead_min_h'') | float(base)
      %} {% set lead_h = states(''sensor.dc_zone01_sim_lead_final_h'') | float(mn)
      %} {% set max_shift = states(''input_number.dc_zone01_tendencia_max_shift'')
      | float(0.25) %} {% set cph = states(''sensor.dc_zone01_sim_tendencia_derivada'')
      | float(0) %} {% set shift = (-cph * lead_h) %} {{ [ -max_shift, [ shift, max_shift
      ] | min ] | max | round(3) }}

      '
  - name: dc_zone01_sim_freno_tendencia
    unique_id: dc_zone01_sim_freno_tendencia
    unit_of_measurement: °C
    state: "{% set hvac = states('sensor.dc_zone01_sim_hvac_mode') %} {% set cph =\
      \ states('sensor.dc_zone01_sim_tendencia_derivada') | float(0) %} {% set th1\
      \ = states('input_number.dc_zone01_freno_tend_th1_cph') | float(0) %} {% set\
      \ th2 = states('input_number.dc_zone01_freno_tend_th2_cph') | float(0) %} {%\
      \ set th3 = states('input_number.dc_zone01_freno_tend_th3_cph') | float(0) %}\
      \ {% set b1 = states('input_number.dc_zone01_freno_tend_bias1') | float(0) %}\
      \ {% set b2 = states('input_number.dc_zone01_freno_tend_bias2') | float(0) %}\
      \ {% set b3 = states('input_number.dc_zone01_freno_tend_bias3') | float(0) %}\n\
      {% if hvac == 'heat' and cph > 0 %}\n  {% set abs_cph = cph %}\n  {% set sign\
      \ = -1 %}\n{% elif hvac == 'cool' and cph < 0 %}\n  {% set abs_cph = -cph %}\n\
      \  {% set sign = 1 %}\n{% else %}\n  {% set abs_cph = 0 %}\n  {% set sign =\
      \ 0 %}\n{% endif %}\n{% set mag = 0 %} {% if abs_cph >= th3 %}\n  {% set mag\
      \ = b3 %}\n{% elif abs_cph >= th2 %}\n  {% set mag = b2 %}\n{% elif abs_cph\
      \ >= th1 %}\n  {% set mag = b1 %}\n{% endif %}\n{{ (sign * mag) | round(3) }}\n"
  - name: dc_zone01_sim_bias_exterior_raw
    unique_id: dc_zone01_sim_bias_exterior_raw
    unit_of_measurement: °C
    state: "{% set hvac = states('sensor.dc_zone01_sim_hvac_mode') %} {% set t_ext\
      \ = states('input_number.dc_zone01_sim_t_ext') | float(none) %} {% if t_ext\
      \ is none %}\n  {{ none }}\n{% else %}\n  {% set u_frio = states('input_number.dc_zone01_umbral_frio_exterior')\
      \ | float(0) %}\n  {% set u_calor = states('input_number.dc_zone01_umbral_calor_exterior')\
      \ | float(30) %}\n\n  {% set h_f = states('input_number.dc_zone01_bias_ext_heat_fuerte')\
      \ | float(0) %}\n  {% set h_l = states('input_number.dc_zone01_bias_ext_heat_leve')\
      \ | float(0) %}\n  {% set c_f = states('input_number.dc_zone01_bias_ext_cool_fuerte')\
      \ | float(0) %}\n  {% set c_l = states('input_number.dc_zone01_bias_ext_cool_leve')\
      \ | float(0) %}\n\n  {% set ais = states('input_number.dc_zone01_aislamiento_bias_exterior')\
      \ | float(1) %}\n\n  {% if hvac == 'heat' %}\n    {% if t_ext <= u_frio %}\n\
      \      {{ (h_f * ais) | round(2) }}\n    {% elif t_ext <= (u_frio + 5) %}\n\
      \      {{ (h_l * ais) | round(2) }}\n    {% else %}\n      0\n    {% endif %}\n\
      \  {% elif hvac == 'cool' %}\n    {% if t_ext >= u_calor %}\n      {{ (c_f *\
      \ ais) | round(2) }}\n    {% elif t_ext >= (u_calor - 5) %}\n      {{ (c_l *\
      \ ais) | round(2) }}\n    {% else %}\n      0\n    {% endif %}\n  {% else %}\n\
      \    0\n  {% endif %}\n{% endif %}\n"
  - name: dc_zone01_sim_bias_vmc
    unique_id: dc_zone01_sim_bias_vmc
    unit_of_measurement: °C
    state: "{% if not is_state('input_boolean.dc_zone01_vmc_enabled','on') %}\n  0\n\
      {% else %}\n  {% set hvac = states('sensor.dc_zone01_sim_hvac_mode') %}\n  {%\
      \ set v = states('input_number.dc_zone01_sim_vmc_speed') | int(0) %}\n  {% set\
      \ t_int = states('input_number.dc_zone01_sim_t_int') | float(none) %}\n  {%\
      \ set t_ext = states('input_number.dc_zone01_sim_t_ext') | float(none) %}\n\
      \  {% if v not in [1,2,3] or t_int is none or t_ext is none %}\n    0\n  {%\
      \ else %}\n    {% set delta = (t_ext - t_int) | float(0) %}\n    {% if delta\
      \ | abs < 0.2 %}\n      0\n    {% else %}\n      {% if hvac == 'heat' %}\n \
      \       {% set b1 = states('input_number.dc_zone01_vmc_bias_heat_v1') | float(0)\
      \ | abs %}\n        {% set b2 = states('input_number.dc_zone01_vmc_bias_heat_v2')\
      \ | float(0) | abs %}\n        {% set b3 = states('input_number.dc_zone01_vmc_bias_heat_v3')\
      \ | float(0) | abs %}\n        {% set b = (b1 if v==1 else (b2 if v==2 else\
      \ (b3 if v==3 else 0))) %}\n        {{ (b if delta < 0 else 0) | round(2) }}\n\
      \      {% elif hvac == 'cool' %}\n        {% set b1 = states('input_number.dc_zone01_vmc_bias_cool_v1')\
      \ | float(0) | abs %}\n        {% set b2 = states('input_number.dc_zone01_vmc_bias_cool_v2')\
      \ | float(0) | abs %}\n        {% set b3 = states('input_number.dc_zone01_vmc_bias_cool_v3')\
      \ | float(0) | abs %}\n        {% set b = (b1 if v==1 else (b2 if v==2 else\
      \ (b3 if v==3 else 0))) %}\n        {{ ((-b) if delta > 0 else b) | round(2)\
      \ }}\n      {% else %}\n        0\n      {% endif %}\n    {% endif %}\n  {%\
      \ endif %}\n{% endif %}\n"
  - name: dc_zone01_sim_bias_fachadas_raw
    unique_id: dc_zone01_sim_bias_fachadas_raw
    unit_of_measurement: °C
    state: "{% set hvac = states('sensor.dc_zone01_sim_hvac_mode') %} {% set base\
      \ = states('sensor.dc_zone01_sim_base_activa') | float(none) %} {% set t_int\
      \ = states('input_number.dc_zone01_sim_t_int') | float(none) %} {% if base is\
      \ none or t_int is none %}\n  {{ none }}\n{% else %}\n  {% set lux_low = states('input_number.dc_zone01_fachada_lux_low')\
      \ | float(300) %}\n  {% set lux_high = states('input_number.dc_zone01_fachada_lux_high')\
      \ | float(2800) %}\n  {% set margin_heat = states('input_number.dc_zone01_fachada_solar_margin_heat')\
      \ | float(0.5) %}\n  {% set gain_heat = states('input_number.dc_zone01_fachada_gain_heat_max')\
      \ | float(0.15) %}\n  {% set freno_heat = states('input_number.dc_zone01_fachada_freno_heat_max')\
      \ | float(0.15) %}\n  {% set freno_cool = states('input_number.dc_zone01_fachada_freno_cool_max')\
      \ | float(0.15) %}\n  {% set w_low = states('input_number.dc_zone01_fachada_w_poco_abierta')\
      \ | float(0.35) %}\n  {% set w_mid = states('input_number.dc_zone01_fachada_w_entreabierta')\
      \ | float(0.7) %}\n  {% set w_open = states('input_number.dc_zone01_fachada_w_abierta')\
      \ | float(1.0) %}\n\n  {% macro w_from_pos(pos) -%}\n    {%- set p = pos | float(none)\
      \ -%}\n    {%- if p is none -%}0\n    {%- elif p == 0 -%}0.1\n    {%- elif p\
      \ <= 20 -%}{{ w_low }}\n    {%- elif p <= 80 -%}{{ w_mid }}\n    {%- else -%}{{\
      \ w_open }}\n    {%- endif -%}\n  {%- endmacro %}\n\n  {% macro lux_norm(lx)\
      \ -%}\n    {%- set v = lx | float(none) -%}\n    {%- if v is none or lux_high\
      \ <= lux_low -%}0\n    {%- else -%}\n      {%- set n = (v - lux_low) / (lux_high\
      \ - lux_low) -%}\n      {{ 0 if n < 0 else (1 if n > 1 else n) }}\n    {%- endif\
      \ -%}\n  {%- endmacro %}\n\n  {% macro fachada(idx) -%}\n    {%- set en = is_state('input_boolean.dc_zone01_f'\
      \ ~ idx ~ '_enabled','on') -%}\n    {%- if not en -%}0\n    {%- else -%}\n \
      \     {%- set pos = states('input_number.dc_zone01_sim_f' ~ idx ~ '_cover_pos')\
      \ -%}\n      {%- set w = w_from_pos(pos) | float(0) -%}\n      {%- if w == 0\
      \ -%}0\n      {%- else -%}\n        {%- set is_sun = is_state('input_boolean.dc_zone01_sim_f'\
      \ ~ idx ~ '_in_sun','on') -%}\n        {%- set lx = states('input_number.dc_zone01_sim_f'\
      \ ~ idx ~ '_lux') -%}\n        {%- set ln = lux_norm(lx) | float(0) -%}\n  \
      \      {%- set solar = (1 if is_sun else 0) * ln -%}\n        {%- set t_ext\
      \ = states('input_number.dc_zone01_sim_f' ~ idx ~ '_t_ext') | float(none) -%}\n\
      \        {%- if t_ext is none -%}0\n        {%- else -%}\n          {%- set\
      \ d = t_ext - t_int -%}\n          {%- set temp_term = 0 -%}\n          {%-\
      \ if hvac in ['heat','cool'] -%}\n            {%- if d > 0 -%}{%- set temp_term\
      \ = (-0.10 * w) -%}\n            {%- elif d < 0 -%}{%- set temp_term = (0.10\
      \ * w) -%}\n            {%- endif -%}\n          {%- endif -%}\n          {%-\
      \ set solar_term = 0 -%}\n          {%- if solar > 0 -%}\n            {%- if\
      \ hvac == 'heat' -%}\n              {%- if t_int >= (base - margin_heat) -%}\n\
      \                {%- set solar_term = (-freno_heat * solar * w) -%}\n      \
      \        {%- else -%}\n                {%- set solar_term = (gain_heat * solar\
      \ * w) -%}\n              {%- endif -%}\n            {%- elif hvac == 'cool'\
      \ -%}\n              {%- set solar_term = (-freno_cool * solar * w) -%}\n  \
      \          {%- endif -%}\n          {%- endif -%}\n          {{ (temp_term +\
      \ solar_term) | round(3) }}\n        {%- endif -%}\n      {%- endif -%}\n  \
      \  {%- endif -%}\n  {%- endmacro %}\n\n  {% set b1 = fachada(1) | float(0) %}\n\
      \  {% set b2 = fachada(2) | float(0) %}\n  {% set b3 = fachada(3) | float(0)\
      \ %}\n  {{ (b1 + b2 + b3) | round(3) }}\n{% endif %}\n"
  - name: dc_zone01_sim_forecast_window_h_raw
    unique_id: dc_zone01_sim_forecast_window_h_raw
    unit_of_measurement: h
    state_class: measurement
    state: "{% set auto = is_state('input_boolean.dc_zone01_forecast_window_auto','on')\
      \ %} {% set man  = states('input_number.dc_zone01_forecast_window_h') | float(none)\
      \ %} {% set lag  = states('input_number.dc_zone01_learned_thermal_lag_h') |\
      \ float(none) %} {% set k    = states('input_number.dc_zone01_forecast_window_k')\
      \ | float(1.0) %} {% set wmin = states('input_number.dc_zone01_forecast_window_min_h')\
      \ | float(2.0) %} {% set wmax = states('input_number.dc_zone01_forecast_window_max_h')\
      \ | float(8.0) %} {% if not auto or lag is none or lag <= 0 or man is none %}\n\
      \  {{ man | float(0) | round(2) }}\n{% else %}\n  {% set w = (lag * k) %}\n\
      \  {{ [wmin, [w, wmax] | min] | max | round(2) }}\n{% endif %}\n"
  - name: dc_zone01_sim_bias_forecast_raw
    unique_id: dc_zone01_sim_bias_forecast_raw
    unit_of_measurement: °C
    state: "{% if is_state('input_boolean.dc_zone01_forecast_enabled','off') %}\n\
      \  {{ 0 }}\n{% else %}\n  {% set hv = states('sensor.dc_zone01_sim_hvac_mode')\
      \ %}\n  {% if hv not in ['heat','cool'] %}\n    {{ 0 }}\n  {% else %}\n    {%\
      \ set t_ext = states('input_number.dc_zone01_sim_t_ext') | float(none) %}\n\
      \    {% set peak = states('input_number.dc_zone01_sim_forecast_peak_temp') |\
      \ float(none) %}\n    {% if t_ext is none or peak is none %}\n      {{ 0 }}\n\
      \    {% else %}\n      {% set gain = states('input_number.dc_zone01_bias_forecast_gain')\
      \ | float(none) %}\n      {% set cap  = states('input_number.dc_zone01_bias_forecast_cap')\
      \  | float(none) %}\n      {% if gain is none or cap is none %}\n        {{\
      \ 0 }}\n      {% else %}\n        {% set dT = (peak - t_ext) %}\n        {%\
      \ if (hv == 'heat' and dT <= 0) %}\n          {{ 0 }}\n        {% elif (hv ==\
      \ 'cool' and dT >= 0) %}\n          {{ 0 }}\n        {% else %}\n          {%\
      \ set raw = 0 - (dT * gain) %}\n          {% set out = [raw, cap] | min | max(0\
      \ - cap) %}\n          {{ out | round(2) }}\n        {% endif %}\n      {% endif\
      \ %}\n    {% endif %}\n  {% endif %}\n{% endif %}\n"
- trigger:
  - platform: state
    entity_id: sensor.dc_zone01_sim_bias_forecast_raw
  sensor:
  - name: dc_zone01_sim_bias_forecast_ema
    unique_id: dc_zone01_sim_bias_forecast_ema
    unit_of_measurement: °C
    state: '{% set alpha = states(''input_number.dc_zone01_bias_forecast_ema_alpha'')
      | float(0.30) %} {% set raw = states(''sensor.dc_zone01_sim_bias_forecast_raw'')
      | float(0) %} {% set prev = this.state | float(0) %} {{ (alpha*raw + (1-alpha)*prev)
      | round(2) }}

      '
- sensor:
  - name: dc_zone01_sim_mods_total_raw
    unique_id: dc_zone01_sim_mods_total_raw
    unit_of_measurement: °C
    state: '{% set b_ext = states(''sensor.dc_zone01_sim_bias_exterior_raw'') | float(0)
      %} {% set b_fac = states(''sensor.dc_zone01_sim_bias_fachadas_raw'') | float(0)
      %} {% set b_vmc = states(''sensor.dc_zone01_sim_bias_vmc'') | float(0) %} {%
      set b_for = states(''sensor.dc_zone01_sim_bias_forecast_ema'') | float(0) %}
      {% set t_lead = states(''sensor.dc_zone01_sim_tendencia_efectiva'') | float(0)
      %} {% set fr_t  = states(''sensor.dc_zone01_sim_freno_tendencia'') | float(0)
      %} {{ (b_ext + b_fac + b_vmc + b_for + t_lead + fr_t) | float(0) | round(2)
      }}

      '
  - name: dc_zone01_sim_mods_total_limited
    unique_id: dc_zone01_sim_mods_total_limited
    unit_of_measurement: °C
    state: '{% set hvac = states(''sensor.dc_zone01_sim_hvac_mode'') %} {% set raw  =
      states(''sensor.dc_zone01_sim_mods_total_raw'') | float(0) %} {% set lim_h =
      states(''input_number.dc_zone01_max_mods_total_heat'') | float(0.8) %} {% set
      lim_c = states(''input_number.dc_zone01_max_mods_total_cool'') | float(0.8)
      %} {% set lim = lim_h if hvac == ''heat'' else lim_c %} {{ [ -lim, [ raw, lim
      ] | min ] | max | round(2) }}

      '
  - name: dc_zone01_sim_target_raw
    unique_id: dc_zone01_sim_target_raw
    unit_of_measurement: °C
    state: '{% set base = states(''sensor.dc_zone01_sim_base_activa'') | float(0)
      %} {% set mods = states(''sensor.dc_zone01_sim_mods_total_raw'') | float(0)
      %} {{ (base + mods) | round(2) }}

      '
  - name: dc_zone01_sim_target_limitado
    unique_id: dc_zone01_sim_target_limitado
    unit_of_measurement: °C
    state: '{% set base = states(''sensor.dc_zone01_sim_base_activa'') | float(0)
      %} {% set mods = states(''sensor.dc_zone01_sim_mods_total_limited'') | float(0)
      %} {{ (base + mods) | round(2) }}

      '
  - name: dc_zone01_sim_target_final
    unique_id: dc_zone01_sim_target_final
    unit_of_measurement: °C
    state: "{% set hvac = states('sensor.dc_zone01_sim_hvac_mode') %} {% set vac =\
      \ is_state('input_boolean.dc_zone01_sim_vacaciones','on') %} {% set t = states('sensor.dc_zone01_sim_target_limitado')\
      \ | float(none) %} {% if t is none %}\n  {{ none }}\n{% else %}\n  {% if vac\
      \ %}\n    {% set min_h = states('input_number.dc_zone01_vac_target_min_heat')\
      \ | float(18) %}\n    {% set max_h = states('input_number.dc_zone01_vac_target_max_heat')\
      \ | float(26) %}\n    {% set min_c = states('input_number.dc_zone01_vac_target_min_cool')\
      \ | float(22) %}\n    {% set max_c = states('input_number.dc_zone01_vac_target_max_cool')\
      \ | float(29) %}\n  {% else %}\n    {% set min_h = states('input_number.dc_zone01_target_min_heat')\
      \ | float(18) %}\n    {% set max_h = states('input_number.dc_zone01_target_max_heat')\
      \ | float(26) %}\n    {% set min_c = states('input_number.dc_zone01_target_min_cool')\
      \ | float(22) %}\n    {% set max_c = states('input_number.dc_zone01_target_max_cool')\
      \ | float(29) %}\n  {% endif %}\n  {% set step = states('input_number.dc_zone01_target_step')\
      \ | float(0.5) %}\n  {% set step = [step, 0.1] | max %}\n  {% set lo = min_h\
      \ if hvac == 'heat' else min_c %}\n  {% set hi = max_h if hvac == 'heat' else\
      \ max_c %}\n  {% set clamped = [ lo, [ t, hi ] | min ] | max %}\n  {% set q_i = none %}
  {# Quantización robusta (evita errores float con step fino) #}
  {% set step_s = step | string %}
  {% set decimals = (step_s.split('.')[1] | length) if ('.' in step_s) else 0 %}
  {% set scale = (10 ** decimals) | int %}
  {% set step_i = (step * scale) | round(0) | int %}
  {% set val_i = (clamped * scale) | round(0) | int %}
  {% set q_i = ((val_i + (step_i // 2)) // step_i) * step_i %}
  {% set quant = (q_i / scale) %}
  {{ quant | round(decimals) }}\n{% endif %}\n"
- binary_sensor:
  - name: dc_sim_allowed
    unique_id: dc_sim_allowed
    state: "{% set armed = is_state('input_boolean.dc_sim_armed','on') %} {% set until\
      \ = states('input_datetime.dc_sim_armed_until') %} {% set ttl_ok = false %}\
      \ {% if until not in ['unknown','unavailable','none',''] %}\n  {% set ttl_ok\
      \ = (as_timestamp(until, default=0) > as_timestamp(now(), default=0)) %}\n{%\
      \ endif %} {% set ov = is_state('binary_sensor.dc_zone01_override_activo','on')\
      \ if has_value('binary_sensor.dc_zone01_override_activo') else false %} {{ armed\
      \ and ttl_ok and (not ov) }}"
- sensor:
  - name: dc_zone01_addon_test_version
    unique_id: dc_zone01_addon_test_version
    icon: mdi:tag
    state: '4.2'
    attributes:
      module: dc_zone01_addon_test
      tier: recommended
script:
  dc_zone01_sim_load_current_values:
    alias: dc_zone01_sim_cargar_valores_actuales
    mode: single
    sequence:
    - variables:
        hvac_real: '{{ states(''sensor.dc_zone01_hvac_mode'') }}'
        valve_open: '{{ is_state(''binary_sensor.dc_zone01_valve_open'',''on'') }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ hvac_real in [''heat'',''cool''] or valve_open }}'
        sequence:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.dc_zone01_sim_enabled
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.dc_zone01_sim_armed
        - service: timer.cancel
          target:
            entity_id: timer.dc_zone01_sim_arm_ttl
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_zone01_sim_last_action
          data:
            value: blocked_hvac_active
        - service: input_number.set_value
          target:
            entity_id: input_number.dc_zone01_sim_last_action_ts
          data:
            value: '{{ now().timestamp() | int }}'
        - stop: 'SIM blocked: HVAC active'
      - conditions:
        - condition: state
          entity_id: input_boolean.dc_zone01_sim_armed
          state: 'off'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_zone01_sim_last_action
          data:
            value: blocked_not_armed
        - service: input_number.set_value
          target:
            entity_id: input_number.dc_zone01_sim_last_action_ts
          data:
            value: '{{ now().timestamp() | int }}'
        - stop: 'SIM blocked: not armed'
      default: []
    - variables:
        m: sensor.dc_zone01_hw_map
        clim: '{{ state_attr(''sensor.dc_zone01_hw_map'',''climate'') }}'
        sun: '{{ state_attr(''sensor.dc_zone01_hw_map'',''sun'') }}'
        hv: '{{ states(''sensor.dc_zone01_hvac_mode'') }}'
        vac_ent: '{{ state_attr(''sensor.dc_zone01_hw_map'',''modo_vacaciones'') }}'
        vac: '{{ is_state(vac_ent,''on'') if vac_ent else false }}'
        elev: '{{ state_attr(sun,''elevation'') | float(-90) if sun else -90 }}'
        t_int_ent: '{{ state_attr(m,''t_int'') }}'
        t_ext_ent: '{{ state_attr(m,''t_ext'') }}'
        wind_ent: '{{ state_attr(m,''wind_speed'') }}'
        vmc_ent: '{{ state_attr(m,''vmc_velocidad_real'') }}'
        lux_tr: '{{ states(''sensor.dc_exterior_lux_tendencia'') if states(''sensor.dc_exterior_lux_tendencia'')
          not in [''unknown'',''unavailable'',''none'',''''] else 0 }}'
        fp: '{{ states(''sensor.dc_zone01_forecast_peak_temp'') | float(0) }}'
    - service: input_select.select_option
      target:
        entity_id: input_select.dc_zone01_sim_hvac_mode
      data:
        option: '{{ hv if hv in [''heat'',''cool'',''off''] else ''off'' }}'
    - service: input_boolean.turn_{{ 'on' if vac else 'off' }}
      target:
        entity_id: input_boolean.dc_zone01_sim_vacaciones
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_sun_elevation
      data:
        value: '{{ elev }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_t_int
      data:
        value: '{{ states(t_int_ent) | float(0) if t_int_ent else 0 }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_t_ext
      data:
        value: '{{ states(t_ext_ent) | float(0) if t_ext_ent else 0 }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_wind_speed
      data:
        value: '{{ states(wind_ent) | float(0) if wind_ent else 0 }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_vmc_speed
      data:
        value: '{{ states(vmc_ent) | int(0) if vmc_ent else 0 }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_tendencia_cph_ema
      data:
        value: '{{ states(''input_number.dc_zone01_tendencia_cph_ema'') | float(0)
          }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_lux_trend
      data:
        value: '{{ lux_tr | float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_forecast_peak_temp
      data:
        value: '{{ fp | float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_f1_cover_pos
      data:
        value: '{{ state_attr(state_attr(m,''f1_cover''),''current_position'') | float(0)
          }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_f2_cover_pos
      data:
        value: '{{ state_attr(state_attr(m,''f2_cover''),''current_position'') | float(0)
          }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_f3_cover_pos
      data:
        value: '{{ state_attr(state_attr(m,''f3_cover''),''current_position'') | float(0)
          }}'
    - service: input_boolean.turn_{{ 'on' if is_state(state_attr(m,'f1_is_in_sun'),'on')
        else 'off' }}
      target:
        entity_id: input_boolean.dc_zone01_sim_f1_in_sun
    - service: input_boolean.turn_{{ 'on' if is_state(state_attr(m,'f2_is_in_sun'),'on')
        else 'off' }}
      target:
        entity_id: input_boolean.dc_zone01_sim_f2_in_sun
    - service: input_boolean.turn_{{ 'on' if is_state(state_attr(m,'f3_is_in_sun'),'on')
        else 'off' }}
      target:
        entity_id: input_boolean.dc_zone01_sim_f3_in_sun
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_f1_lux
      data:
        value: '{{ states(state_attr(m,''f1_lux'')) | float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_f2_lux
      data:
        value: '{{ states(state_attr(m,''f2_lux'')) | float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_f3_lux
      data:
        value: '{{ states(state_attr(m,''f3_lux'')) | float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_f1_t_ext
      data:
        value: '{{ states(state_attr(m,''f1_t_ext'')) | float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_f2_t_ext
      data:
        value: '{{ states(state_attr(m,''f2_t_ext'')) | float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_f3_t_ext
      data:
        value: '{{ states(state_attr(m,''f3_t_ext'')) | float(0) }}'
    - service: input_text.set_value
      target:
        entity_id: input_text.dc_zone01_sim_last_action
      data:
        value: load_current_values_ok
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_sim_last_action_ts
      data:
        value: '{{ now().timestamp() | int }}'
  dc_zone01_sim_apply_scenario:
    alias: dc_zone01_sim_apply_scenario
    mode: single
    sequence:
    - choose:
      - conditions:
        - condition: state
          entity_id: binary_sensor.dc_sim_allowed
          state: 'on'
        sequence: []
      default:
      - service: persistent_notification.create
        data:
          title: dc_sim_blocked
          message: Simulator blocked (dc_sim_allowed=off).
      - stop: blocked
    - variables:
        hvac_real: '{{ states(''sensor.dc_zone01_hvac_mode'') }}'
        valve_open: '{{ is_state(''binary_sensor.dc_zone01_valve_open'',''on'') }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ hvac_real in [''heat'',''cool''] or valve_open }}'
        sequence:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.dc_zone01_sim_enabled
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.dc_zone01_sim_armed
        - service: timer.cancel
          target:
            entity_id: timer.dc_zone01_sim_arm_ttl
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_zone01_sim_last_action
          data:
            value: blocked_hvac_active
        - service: input_number.set_value
          target:
            entity_id: input_number.dc_zone01_sim_last_action_ts
          data:
            value: '{{ now().timestamp() | int }}'
        - stop: 'SIM blocked: HVAC active'
      - conditions:
        - condition: state
          entity_id: input_boolean.dc_zone01_sim_armed
          state: 'off'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_zone01_sim_last_action
          data:
            value: blocked_not_armed
        - service: input_number.set_value
          target:
            entity_id: input_number.dc_zone01_sim_last_action_ts
          data:
            value: '{{ now().timestamp() | int }}'
        - stop: 'SIM blocked: not armed'
      default: []
    - variables:
        sc: '{{ states(''input_select.dc_zone01_sim_scenario'') }}'
        presets:
          none: {}
          ola_frio_extremo:
            selects:
              input_select.dc_zone01_sim_hvac_mode: heat
            numbers:
              input_number.dc_zone01_sim_t_int: 21.0
              input_number.dc_zone01_sim_t_ext: -8.0
              input_number.dc_zone01_sim_sun_elevation: -5.0
              input_number.dc_zone01_sim_wind_speed: 20.0
              input_number.dc_zone01_sim_vmc_speed: 1
              input_number.dc_zone01_sim_tendencia_cph_ema: -0.4
              input_number.dc_zone01_sim_forecast_peak_temp: -6.0
              input_number.dc_zone01_sim_lux_trend: 0.0
              input_number.dc_zone01_sim_f1_lux: 30.0
              input_number.dc_zone01_sim_f2_lux: 20.0
              input_number.dc_zone01_sim_f3_lux: 10.0
              input_number.dc_zone01_sim_f1_t_ext: -8.0
              input_number.dc_zone01_sim_f2_t_ext: -8.0
              input_number.dc_zone01_sim_f3_t_ext: -8.0
              input_number.dc_zone01_sim_f1_cover_pos: 0.0
              input_number.dc_zone01_sim_f2_cover_pos: 0.0
              input_number.dc_zone01_sim_f3_cover_pos: 0.0
            booleans:
              input_boolean.dc_zone01_sim_f1_in_sun: false
              input_boolean.dc_zone01_sim_f2_in_sun: false
              input_boolean.dc_zone01_sim_f3_in_sun: false
          ola_calor_extremo:
            selects:
              input_select.dc_zone01_sim_hvac_mode: cool
            numbers:
              input_number.dc_zone01_sim_t_int: 26.5
              input_number.dc_zone01_sim_t_ext: 41.0
              input_number.dc_zone01_sim_sun_elevation: 55.0
              input_number.dc_zone01_sim_wind_speed: 10.0
              input_number.dc_zone01_sim_vmc_speed: 2
              input_number.dc_zone01_sim_tendencia_cph_ema: 0.3
              input_number.dc_zone01_sim_forecast_peak_temp: 43.0
              input_number.dc_zone01_sim_lux_trend: 2500.0
              input_number.dc_zone01_sim_f1_lux: 3000.0
              input_number.dc_zone01_sim_f2_lux: 1200.0
              input_number.dc_zone01_sim_f3_lux: 800.0
              input_number.dc_zone01_sim_f1_t_ext: 41.0
              input_number.dc_zone01_sim_f2_t_ext: 40.0
              input_number.dc_zone01_sim_f3_t_ext: 39.0
              input_number.dc_zone01_sim_f1_cover_pos: 80.0
              input_number.dc_zone01_sim_f2_cover_pos: 60.0
              input_number.dc_zone01_sim_f3_cover_pos: 50.0
            booleans:
              input_boolean.dc_zone01_sim_f1_in_sun: true
              input_boolean.dc_zone01_sim_f2_in_sun: false
              input_boolean.dc_zone01_sim_f3_in_sun: false
          noche_lluviosa_persianas_abiertas:
            selects:
              input_select.dc_zone01_sim_hvac_mode: heat
            numbers:
              input_number.dc_zone01_sim_t_int: 21.0
              input_number.dc_zone01_sim_t_ext: 7.0
              input_number.dc_zone01_sim_sun_elevation: -12.0
