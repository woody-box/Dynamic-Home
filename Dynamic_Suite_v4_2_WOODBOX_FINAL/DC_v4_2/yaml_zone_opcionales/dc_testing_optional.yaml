  dc_sim_arm:
    alias: dc_sim_arm
    mode: single
    sequence:
    - variables:
        ttl: '{{ states(''input_number.dc_sim_arm_ttl_min'') | int(30) }}'
        until_ts: '{{ as_timestamp(now()) + (ttl|int(0) * 60) }}'
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.dc_sim_armed_until
      data:
        timestamp: '{{ until_ts | int(0) }}'
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.dc_sim_armed
  dc_zone01_run_basic_tests:
    alias: dc_zone01_run_basic_tests
    mode: single
    sequence:
    - variables:
        fails: []
        tol: 0.01
        sev: '{% set s = states(''input_select.dc_zone01_test_severity'') %} {{ ''warn''
          if s in [''unknown'',''unavailable'',''none'',''''] else s }}'
        must_exist:
        - sensor.dc_zone01_t_int_safe
        - sensor.dc_zone01_t_ext_safe
        - sensor.dc_zone01_hvac_mode
        - sensor.dc_zone01_base_activa
        - sensor.dc_zone01_target_raw
        - sensor.dc_zone01_target_limitado
        - sensor.dc_zone01_target_final
        - sensor.dc_zone01_bias_exterior_raw
        - sensor.dc_zone01_bias_fachadas_raw
        - sensor.dc_zone01_lead_final_h
        - binary_sensor.dc_zone01_override_activo
        - sensor.dc_zone01_mods_total_raw
        - sensor.dc_zone01_mods_total_limited
        - sensor.dc_zone01_bias_forecast_ema
        - sensor.dc_zone01_bias_vmc
        - sensor.dc_zone01_tendencia_efectiva
        - sensor.dc_zone01_freno_tendencia
        - input_boolean.dc_zone01_forecast_enabled
        - input_boolean.dc_zone01_vmc_enabled
        - input_boolean.dc_zone01_f1_enabled
        - input_boolean.dc_zone01_f2_enabled
        - input_boolean.dc_zone01_f3_enabled
        - input_number.dc_zone01_target_step
    - repeat:
        for_each: '{{ must_exist }}'
        sequence:
        - variables:
            eid: '{{ repeat.item }}'
            st: '{{ states(eid) }}'
        - choose:
          - conditions: '{{ st in [''unknown'',''unavailable'',''none'',''''] }}'
            sequence:
            - variables:
                fails: '{{ fails + [''T1 missing/unavailable: '' ~ eid ~ '' state=''
                  ~ st] }}'
    - variables:
        hvac: '{{ states(''sensor.dc_zone01_hvac_mode'') }}'
        tf: '{{ states(''sensor.dc_zone01_target_final'') | float(none) }}'
    - choose:
      - conditions: '{{ hvac in [''heat'',''cool''] and tf is none }}'
        sequence:
        - variables:
            fails: '{{ fails + [''T2 target_final not numeric (hvac='' ~ hvac ~ '')'']
              }}'
    - variables:
        min_h: '{{ states(''input_number.dc_zone01_target_min_heat'') | float(none)
          }}'
        max_h: '{{ states(''input_number.dc_zone01_target_max_heat'') | float(none)
          }}'
        min_c: '{{ states(''input_number.dc_zone01_target_min_cool'') | float(none)
          }}'
        max_c: '{{ states(''input_number.dc_zone01_target_max_cool'') | float(none)
          }}'
    - choose:
      - conditions: "{{ hvac == 'heat' and tf is not none and\n   (min_h is none or\
          \ max_h is none or tf < (min_h - tol) or tf > (max_h + tol)) }}\n"
        sequence:
        - variables:
            fails: '{{ fails + [''T3 heat bounds: tf='' ~ tf ~ '' min='' ~ min_h ~
              '' max='' ~ max_h] }}'
      - conditions: "{{ hvac == 'cool' and tf is not none and\n   (min_c is none or\
          \ max_c is none or tf < (min_c - tol) or tf > (max_c + tol)) }}\n"
        sequence:
        - variables:
            fails: '{{ fails + [''T3 cool bounds: tf='' ~ tf ~ '' min='' ~ min_c ~
              '' max='' ~ max_c] }}'
    - variables:
        step: '{{ states(''input_number.dc_zone01_target_step'') | float(0) }}'
        q: '{{ (tf / step) if (tf is not none and step > 0) else none }}'
        nearest: '{{ (q | round(0)) if q is not none else none }}'
        rem: '{{ (q - nearest) | abs if (q is not none and nearest is not none) else
          none }}'
    - choose:
      - conditions: '{{ hvac in [''heat'',''cool''] and (step <= 0 or q is none or
          rem is none) }}'
        sequence:
        - variables:
            fails: '{{ fails + [''T4 step invalid: step='' ~ step ~ '' tf='' ~ tf]
              }}'
      - conditions: '{{ hvac in [''heat'',''cool''] and rem is not none and rem >
          tol }}'
        sequence:
        - variables:
            fails: '{{ fails + [''T4 step quantization: tf='' ~ tf ~ '' step='' ~
              step ~ '' rem='' ~ rem] }}'
    - variables:
        step2: '{{ states(''input_number.dc_zone01_target_step'') | float(0) }}'
        eps: '{{ [0.05, (step2 / 2), tol] | max }}'
        hvac: '{{ states(''sensor.dc_zone01_hvac_mode'') }}'
        b_ext: '{{ states(''sensor.dc_zone01_bias_exterior_raw'') | float(0) }}'
        b_fac: '{{ states(''sensor.dc_zone01_bias_fachadas_raw'') | float(0) }}'
        b_vmc: '{{ states(''sensor.dc_zone01_bias_vmc'') | float(0) }}'
        b_for: '{{ states(''sensor.dc_zone01_bias_forecast_ema'') | float(0) }}'
        t_lead: '{{ states(''sensor.dc_zone01_tendencia_efectiva'') | float(0) }}'
        fr_t: '{{ states(''sensor.dc_zone01_freno_tendencia'') | float(0) }}'
        mods: '{{ states(''sensor.dc_zone01_mods_total_raw'') | float(0) }}'
        sum_mods: "{{\n  (states('sensor.dc_zone01_bias_exterior_raw') | float(0))\n\
          \  + (states('sensor.dc_zone01_bias_fachadas_raw') | float(0))\n  + (states('sensor.dc_zone01_bias_vmc')\
          \ | float(0))\n  + (states('sensor.dc_zone01_bias_forecast_ema') | float(0))\n\
          \  + (states('sensor.dc_zone01_tendencia_efectiva') | float(0))\n  + (states('sensor.dc_zone01_freno_tendencia')\
          \ | float(0))\n}}\n"
        delta_mods: '{{ (mods - sum_mods) | float(0) }}'
        forecast_enabled: '{{ is_state(''input_boolean.dc_zone01_forecast_enabled'',''on'')
          }}'
        vmc_enabled: '{{ is_state(''input_boolean.dc_zone01_vmc_enabled'',''on'')
          }}'
        f1_enabled: '{{ is_state(''input_boolean.dc_zone01_f1_enabled'',''on'') }}'
        f2_enabled: '{{ is_state(''input_boolean.dc_zone01_f2_enabled'',''on'') }}'
        f3_enabled: '{{ is_state(''input_boolean.dc_zone01_f3_enabled'',''on'') }}'
    - choose:
      - conditions: '{{ hvac in [''heat'',''cool''] and (delta_mods | abs) > eps }}'
        sequence:
        - variables:
            fails: '{{ fails + [''T5 mods_total mismatch: mods='' ~ mods ~ '' sum=''
              ~ sum_mods ~ '' delta='' ~ delta_mods ~ '' eps='' ~ eps] }}'
    - choose:
      - conditions: '{{ hvac in [''heat'',''cool''] and (not forecast_enabled) and
          (b_for | abs) > eps }}'
        sequence:
        - variables:
            fails: '{{ fails + [''T6 forecast disabled but bias_forecast_ema != 0:
              '' ~ b_for] }}'
      - conditions: '{{ hvac in [''heat'',''cool''] and (not vmc_enabled) and (b_vmc
          | abs) > eps }}'
        sequence:
        - variables:
            fails: '{{ fails + [''T6 vmc disabled but bias_vmc != 0: '' ~ b_vmc] }}'
      - conditions: '{{ hvac in [''heat'',''cool''] and (not f1_enabled) and (not
          f2_enabled) and (not f3_enabled) and (b_fac | abs) > eps }}'
        sequence:
        - variables:
            fails: '{{ fails + [''T6 fachadas disabled (f1/f2/f3) but bias_fachadas_raw
              != 0: '' ~ b_fac] }}'
    - choose:
      - conditions: '{{ fails | length == 0 }}'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_zone01_last_tests_result
          data:
            value: ok
        - service: persistent_notification.create
          data:
            title: Dynamic Climate · Tests
            message: OK — dc_zone01_run_basic_tests (real pipeline)
      - conditions: '{{ fails | length > 0 }}'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_zone01_last_tests_result
          data:
            value: '{{ sev }}'
        - service: persistent_notification.create
          data:
            title: Dynamic Climate · Tests
            message: '{{ sev | upper }} ({{ fails | length }}) — dc_zone01_run_basic_tests:
              {{ fails | join(''\n'') }}'
  dc_zone01_sim_update_golden:
    alias: dc_zone01_sim_update_golden
    mode: single
    sequence:
    - variables:
        bad:
        - unknown
        - unavailable
        - none
        - ''
        scenarios: "{% set opts = state_attr('input_select.dc_zone01_sim_scenario','options')\
          \ %} {% if opts is iterable %}\n  {{ opts | reject('equalto','none') | list\
          \ }}\n{% else %}\n  {{ ['ola_frio_extremo','ola_calor_extremo','noche_lluviosa_persianas_abiertas','noche_lluviosa_persianas_cerradas','cambio_frio_en_2h','cambio_calor_en_2h','viento_fuerte_sin_sol','sol_invernal_fachada_1_persianas_abiertas']\
          \ }}\n{% endif %}"
        out: {}
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(''input_select.dc_zone01_sim_scenario'') in bad
            }}'
        sequence:
        - service: persistent_notification.create
          data:
            title: dc_zone01_sim_update_golden
            message: 'SIM missing: input_select.dc_zone01_sim_scenario not found.
              Install dc_zone01_addon_simulator.'
        - stop: sim missing
    - repeat:
        for_each: '{{ scenarios }}'
        sequence:
        - service: input_select.select_option
          target:
            entity_id: input_select.dc_zone01_sim_scenario
          data:
            option: '{{ repeat.item }}'
        - service: script.dc_zone01_sim_apply_scenario
        - delay: 00:00:02
        - variables:
            tf: '{{ states(''sensor.dc_zone01_target_final'') | float(none) }}'
            tr: '{{ states(''sensor.dc_zone01_target_raw'') | float(none) }}'
            tl: '{{ states(''sensor.dc_zone01_target_limitado'') | float(none) }}'
            mt: '{{ states(''sensor.dc_zone01_mods_total_raw'') | float(none) }}'
        - variables:
            out: "{% set cur = out %} {% set cur = dict(cur, **{ repeat.item: {\n\
              \  'target_final': tf,\n  'target_raw': tr,\n  'target_limitado': tl,\n\
              \  'mods_total_raw': mt\n}}) %} {{ cur }}"
    - service: input_text.set_value
      target:
        entity_id: input_text.dc_zone01_sim_golden_json
      data:
        value: '{{ out | to_json }}'
  dc_zone01_run_sim_regression_tests:
    alias: dc_zone01_run_sim_regression_tests
    mode: single
    sequence:
    - variables:
        bad:
        - unknown
        - unavailable
        - none
        - ''
        sev: '{% set s = states(''input_select.dc_zone01_test_severity'') %} {{ s
          if s not in bad else ''warn'' }}'
        tol: '{{ states(''input_number.dc_zone01_sim_golden_tol_c'') | float(0.25)
          }}'
        golden: '{% set j = states(''input_text.dc_zone01_sim_golden_json'') %} {%
          if j in bad %} {{ dict() }} {% else %} {{ j | from_json }} {% endif %}'
        scenarios: "{% set opts = state_attr('input_select.dc_zone01_sim_scenario','options')\
          \ %} {% if opts is iterable %}\n  {{ opts | reject('equalto','none') | list\
          \ }}\n{% else %}\n  {{ ['ola_frio_extremo','ola_calor_extremo','noche_lluviosa_persianas_abiertas','noche_lluviosa_persianas_cerradas','cambio_frio_en_2h','cambio_calor_en_2h','viento_fuerte_sin_sol','sol_invernal_fachada_1_persianas_abiertas']\
          \ }}\n{% endif %}"
        ranges: '{{ dict() }}'
        heat_range_fallback:
          min: 19.0
          max: 26.0
        cool_range_fallback:
          min: 24.0
          max: 31.0
        range_pad_c: 1.0
        fails: []
        warns: []
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(''input_select.dc_zone01_sim_scenario'') in bad
            }}'
        sequence:
        - service: persistent_notification.create
          data:
            title: dc_zone01_run_sim_regression_tests
            message: 'SIM missing: input_select.dc_zone01_sim_scenario not found.
              Install dc_zone01_addon_simulator.'
        - stop: sim missing
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ golden | count == 0 }}'
        sequence:
        - service: persistent_notification.create
          data:
            title: dc_zone01_run_sim_regression_tests
            message: Golden missing/empty. Run script.dc_zone01_sim_update_golden
              first.
        - stop: golden missing
    - repeat:
        for_each: '{{ scenarios }}'
        sequence:
        - service: input_select.select_option
          target:
            entity_id: input_select.dc_zone01_sim_scenario
          data:
            option: '{{ repeat.item }}'
        - service: script.dc_zone01_sim_apply_scenario
        - delay: 00:00:02
        - variables:
            cur: "{{\n  {\n    'target_final': states('sensor.dc_zone01_target_final')|float(none),\n\
              \    'target_raw': states('sensor.dc_zone01_target_raw')|float(none),\n\
              \    'target_limitado': states('sensor.dc_zone01_target_limitado')|float(none),\n\
              \    'mods_total_raw': states('sensor.dc_zone01_mods_total_raw')|float(none),\n\
              \    'hvac_mode': states('sensor.dc_zone01_hvac_mode')\n  }\n}}"
            ref: '{{ golden[repeat.item] if repeat.item in golden else dict() }}'
        - variables:
            diffs: "{% set out = [] %} {% for k, rv in ref.items() %}\n  {% set cv\
              \ = cur.get(k) %}\n  {% if rv is number and cv is number %}\n    {%\
              \ if (cv - rv) | abs > tol %}\n      {% set out = out + [k ~ ': cur='\
              \ ~ (cv|string) ~ ' ref=' ~ (rv|string)] %}\n    {% endif %}\n  {% endif\
              \ %}\n{% endfor %} {{ out }}"
        - variables:
            fails: "{% set out = fails %} {% if diffs|count > 0 %}\n  {% set out =\
              \ out + ['FAIL ' ~ repeat.item ~ ' (tol=' ~ tol ~ '): ' ~ (diffs|join(',\
              \ '))] %}\n{% endif %} {{ out }}"
        - variables:
            tf: '{{ cur.target_final }}'
            hvac: '{{ cur.hvac_mode }}'
            dyn_r: "{% set pad = range_pad_c | float(1.0) %} {% if hvac == 'heat'\
              \ %}\n  {% set mn = states('input_number.dc_zone01_target_min_heat')\
              \ | float(none) %}\n  {% set mx = states('input_number.dc_zone01_target_max_heat')\
              \ | float(none) %}\n  {% if mn is number and mx is number %}\n    {{\
              \ {'min': (mn - pad), 'max': (mx + pad)} }}\n  {% else %}\n    {{ heat_range_fallback\
              \ }}\n  {% endif %}\n{% elif hvac == 'cool' %}\n  {% set mn = states('input_number.dc_zone01_target_min_cool')\
              \ | float(none) %}\n  {% set mx = states('input_number.dc_zone01_target_max_cool')\
              \ | float(none) %}\n  {% if mn is number and mx is number %}\n    {{\
              \ {'min': (mn - pad), 'max': (mx + pad)} }}\n  {% else %}\n    {{ cool_range_fallback\
              \ }}\n  {% endif %}\n{% else %}\n  {{ none }}\n{% endif %}"
            r: "{% if repeat.item in ranges and (ranges[repeat.item] is mapping) %}\n\
              \  {{ ranges[repeat.item] }}\n{% else %}\n  {{ dyn_r }}\n{% endif %}"
        - variables:
            warns: "{% set out = warns %} {% if r is mapping and tf is number %}\n\
              \  {% if tf < (r.min|float) or tf > (r.max|float) %}\n    {% set out\
              \ = out + ['WARN ' ~ repeat.item ~ ': target_final=' ~ tf ~ ' fuera\
              \ de [' ~ r.min ~ ',' ~ r.max ~ ']'] %}\n  {% endif %}\n{% endif %}\
              \ {{ out }}"
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_last_tests_ts
      data:
        value: '{{ as_timestamp(now())|int(0) }}'
    - choose:
      - conditions: '{{ fails|count == 0 }}'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_zone01_last_tests_result
          data:
            value: ok
      - conditions: '{{ fails|count > 0 }}'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_zone01_last_tests_result
          data:
            value: '{{ sev }}'
    - service: persistent_notification.create
      data:
        title: dc_zone01_run_sim_regression_tests
        message: 'SIM REGRESSION (sev={{ sev }}) fails={{ fails|count }} warns={{
          warns|count }}

          {% if fails|count > 0 %}{{ fails|join(''\n'') }}{% else %}OK: golden within
          tol={{ tol }}{% endif %}

          {% if warns|count > 0 %} ── WARN (rangos por escenario) {{ warns|join(''\n'')
          }} {% endif %}'
  dc_zone01_run_degradation_tests:
    alias: dc_zone01_run_degradation_tests
    mode: single
    sequence:
    - variables:
        fails: []
        tol: 0.05
        expected_reason: t_int_missing
        pre_target: '{{ states(''sensor.dc_zone01_target_final'') | float(none) }}'
    - choose:
      - conditions: '{{ pre_target is none }}'
        sequence:
        - variables:
            fails: '{{ fails + [''pre_target_final_none''] }}'
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.dc_zone01_test_force_missing_t_int
    - delay: 00:00:03
    - variables:
        reason: '{{ states(''sensor.dc_zone01_degraded_reason'') }}'
        post_target: '{{ states(''sensor.dc_zone01_target_final'') | float(none) }}'
    - choose:
      - conditions: '{{ reason != expected_reason }}'
        sequence:
        - variables:
            fails: '{{ fails + [''reason_expected_'' ~ expected_reason ~ ''_got_''
              ~ reason] }}'
    - choose:
      - conditions: '{{ post_target is none }}'
        sequence:
        - variables:
            fails: '{{ fails + [''post_target_final_none''] }}'
    - choose:
      - conditions: '{{ (pre_target is not none) and (post_target is not none) and
          ((post_target - pre_target) | abs > tol) }}'
        sequence:
        - variables:
            fails: '{{ fails + [''target_changed_pre_'' ~ pre_target ~ ''_post_''
              ~ post_target] }}'
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.dc_zone01_test_force_missing_t_int
    - delay: 00:00:03
    - variables:
        reason2: '{{ states(''sensor.dc_zone01_degraded_reason'') }}'
    - choose:
      - conditions: '{{ reason2 != ''ok'' }}'
        sequence:
        - variables:
            fails: '{{ fails + [''recover_reason_not_ok_got_'' ~ reason2] }}'
    - variables:
        ok: '{{ fails | length == 0 }}'
        title: DC Degradation Tests · {{ 'PASS' if ok else 'FAIL' }}
        msg: '{% if ok %} Degradation tests OK. - forced: t_int_safe -> unavailable
          (via input_boolean.dc_zone01_test_force_missing_t_int) - expected degraded_reason:
          {{ expected_reason }} - target_final held: {{ pre_target }} {% else %} Degradation
          tests FAIL: {% for f in fails %}- {{ f }} {% endfor %} {% endif %}'
    - service: persistent_notification.create
      data:
        title: '{{ title }}'
        message: '{{ msg }}'
automation:
- id: dc_zone01_sim_disarm_on_startup
  alias: dc_zone01_sim_disarm_on_startup
  mode: single
  trigger:
  - platform: homeassistant
    event: start
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.dc_zone01_sim_armed
  - service: timer.cancel
    target:
      entity_id: timer.dc_zone01_sim_arm_ttl
  - service: input_text.set_value
    target:
      entity_id: input_text.dc_zone01_sim_last_action
    data:
      value: startup_disarm
  - service: input_number.set_value
    target:
      entity_id: input_number.dc_zone01_sim_last_action_ts
    data:
      value: '{{ now().timestamp() | int }}'
- id: dc_zone01_sim_arm_starts_ttl
  alias: dc_zone01_sim_arm_starts_ttl
  mode: restart
  trigger:
  - platform: state
    entity_id: input_boolean.dc_zone01_sim_armed
    to: 'on'
  action:
  - service: timer.start
    target:
      entity_id: timer.dc_zone01_sim_arm_ttl
  - service: input_text.set_value
    target:
      entity_id: input_text.dc_zone01_sim_last_action
    data:
      value: armed_ttl_started
  - service: input_number.set_value
    target:
      entity_id: input_number.dc_zone01_sim_last_action_ts
    data:
      value: '{{ now().timestamp() | int }}'
- id: dc_zone01_sim_disarm_on_ttl_finished
  alias: dc_zone01_sim_disarm_on_ttl_finished
  mode: single
  trigger:
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.dc_zone01_sim_arm_ttl
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.dc_zone01_sim_armed
  - service: input_text.set_value
    target:
      entity_id: input_text.dc_zone01_sim_last_action
    data:
      value: ttl_expired_disarm
  - service: input_number.set_value
    target:
      entity_id: input_number.dc_zone01_sim_last_action_ts
    data:
      value: '{{ now().timestamp() | int }}'
- id: dc_zone01_sim_disarm_on_hvac_active
  alias: dc_zone01_sim_disarm_on_hvac_active
  mode: restart
  trigger:
  - platform: state
    entity_id: sensor.dc_zone01_hvac_mode
  - platform: state
    entity_id: binary_sensor.dc_zone01_valve_open
  condition:
  - condition: template
    value_template: "{{ states('sensor.dc_zone01_hvac_mode') in ['heat','cool']\n\
      \   or is_state('binary_sensor.dc_zone01_valve_open','on') }}\n"
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.dc_zone01_sim_enabled
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.dc_zone01_sim_armed
  - service: timer.cancel
    target:
      entity_id: timer.dc_zone01_sim_arm_ttl
  - service: input_text.set_value
    target:
      entity_id: input_text.dc_zone01_sim_last_action
    data:
      value: hvac_active_disarm
  - service: input_number.set_value
    target:
      entity_id: input_number.dc_zone01_sim_last_action_ts
    data:
      value: '{{ now().timestamp() | int }}'
input_datetime:
  dc_sim_armed_until:
    name: dc_sim_armed_until
    has_date: true
    has_time: true