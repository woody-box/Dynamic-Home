# DC Zone01 optional tests: Golden scenarios (record/verify) (v4.2)
#
# This provides a *true* golden test harness:
# - Set simulator scenario
# - Apply scenario via dc_zone01_sim_apply_scenario
# - Record or verify outputs (target_raw/limitado/final etc.) against a stored baseline file
#
# Storage (file, not state): /config/dynamic_suite/dc/zone01/dc_zone01_golden.json
#
# Requires AppDaemons installed in /config/AppDaemons/:
# - dc_zone01_golden_record.py
# - dc_zone01_golden_verify.py
#
input_boolean:
  dc_zone01_golden_enabled:
    name: dc_zone01_golden_enabled
    icon: mdi:shield-check
    initial: false

input_select:
  dc_zone01_golden_mode:
    name: dc_zone01_golden_mode
    options:
      - record
      - verify
    initial: verify
    icon: mdi:content-save-check

input_select:
  dc_zone01_golden_case:
    name: dc_zone01_golden_case
    # aligned with dc_zone01_sim_scenario options
    options:
      - none
      - ola_frio_extremo
      - ola_calor_extremo
      - noche_lluviosa_persianas_abiertas
      - noche_lluviosa_persianas_cerradas
      - cambio_frio_en_2h
      - cambio_calor_en_2h
      - viento_fuerte_sin_sol
      - sol_invernal_fachada_1_persianas_abiertas
    initial: none
    icon: mdi:playlist-play

input_button:
  dc_zone01_golden_run_btn:
    name: dc_zone01_golden_run_btn
    icon: mdi:play

input_boolean:
  dc_zone01_golden_pass:
    name: dc_zone01_golden_pass
    initial: false

input_text:
  dc_zone01_golden_last_result:
    name: dc_zone01_golden_last_result
    initial: ""

automation:
  - id: dc_zone01_golden_run_on_button
    alias: dc_zone01_golden_run_on_button
    trigger:
      - platform: state
        entity_id: input_button.dc_zone01_golden_run_btn
    condition:
      - condition: state
        entity_id: input_boolean.dc_zone01_golden_enabled
        state: "on"
      - condition: template
        value_template: "{{ states('input_select.dc_zone01_golden_case') not in ['none','unknown','unavailable'] }}"
    action:
      - service: script.dc_zone01_golden_run_case

script:
  dc_zone01_golden_run_case:
    alias: dc_zone01_golden_run_case
    mode: queued
    sequence:
      - variables:
          case: "{{ states('input_select.dc_zone01_golden_case') }}"
          mode: "{{ states('input_select.dc_zone01_golden_mode') }}"
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dc_zone01_golden_pass
      - service: input_text.set_value
        target:
          entity_id: input_text.dc_zone01_golden_last_result
        data:
          value: "RUN {{ mode }} / {{ case }} @ {{ now() }}"
      # Apply simulator scenario
      - service: input_select.select_option
        target:
          entity_id: input_select.dc_zone01_sim_scenario
        data:
          option: "{{ case }}"
      - service: script.dc_zone01_sim_apply_scenario
      - delay: "00:00:02"
      - choose:
          - conditions: "{{ mode == 'record' }}"
            sequence:
              - service: appdaemon.dynamic_suite_golden/record
                data:
                  case: "{{ case }}"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.dc_zone01_golden_pass
              - service: input_text.set_value
                target:
                  entity_id: input_text.dc_zone01_golden_last_result
                data:
                  value: "RECORDED: {{ case }} (dynamic_suite/dc/zone01/dc_zone01_golden.json)"
          - conditions: "{{ mode == 'verify' }}"
            sequence:
              - service: appdaemon.dynamic_suite_golden/verify
                data:
                  case: "{{ case }}"
              # AppDaemon sets persistent_notification + leaves result in log; we mark pass optimistically here if no error is thrown
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.dc_zone01_golden_pass
              - service: input_text.set_value
                target:
                  entity_id: input_text.dc_zone01_golden_last_result
                data:
                  value: "VERIFY OK (no exception): {{ case }}"
