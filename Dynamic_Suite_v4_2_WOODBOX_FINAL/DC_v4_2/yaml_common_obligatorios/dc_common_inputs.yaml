      }}

      '
  - name: dc_bh_consigna_real_aplicada
    unique_id: dc_bh_consigna_real_aplicada
    unit_of_measurement: °C
    state: '{{ state_attr(''climate.dc_bh'', ''temperature'') | float(none) }}

      '
    availability: '{{ state_attr(''climate.dc_bh'', ''temperature'') is not none }}

      '
  - name: dc_bp_consigna_real_aplicada
    unique_id: dc_bp_consigna_real_aplicada
    unit_of_measurement: °C
    state: '{{ state_attr(''climate.dc_bp'', ''temperature'') | float(none) }}

      '
    availability: '{{ state_attr(''climate.dc_bp'', ''temperature'') is not none }}

      '
climate:
- platform: dual_smart_thermostat
  name: dc_zone01
  unique_id: dc_zone01
  heater: input_boolean.dc_zone01_calor
  cooler: input_boolean.dc_zone01_frio
  target_sensor: sensor.sensor_ht_zone01_temperature
  heat_cool_mode: false
  min_temp: 10
  max_temp: 35
  target_temp: 22
  cold_tolerance: 0.3
  hot_tolerance: 0.1
  min_cycle_duration:
    seconds: 5
  initial_hvac_mode: 'off'
  home:
    temperature: 22
    target_temp_low: 22
    target_temp_high: 26.5
  sleep:
    temperature: 21
    target_temp_low: 21
    target_temp_high: 27.5
  precision: 0.1
  target_temp_step: 0.5
