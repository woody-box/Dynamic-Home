      }}

      '
  - name: dc_zone04_consigna_real_aplicada
    unique_id: dc_zone04_consigna_real_aplicada
    unit_of_measurement: °C
    state: '{{ state_attr(''climate.dc_zone04'', ''temperature'') | float(none) }}

      '
    availability: '{{ state_attr(''climate.dc_zone04'', ''temperature'') is not none
      }}

      '
  - name: dc_zone03_consigna_real_aplicada
    unique_id: dc_zone03_consigna_real_aplicada
    unit_of_measurement: °C
    state: '{{ state_attr(''climate.dc_zone03'', ''temperature'') | float(none) }}

      '
