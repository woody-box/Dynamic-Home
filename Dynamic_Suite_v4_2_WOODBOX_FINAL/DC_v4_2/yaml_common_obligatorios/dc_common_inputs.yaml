template:
- sensor:
  - name: dc_common_climate_version
    unique_id: dc_common_climate_version
    icon: mdi:tag
    state: '4.2'
    attributes:
      module: dc_common_climate
      tier: core
- sensor:
  - name: dc_zone01_consigna_real_aplicada
    unique_id: dc_zone01_consigna_real_aplicada
    unit_of_measurement: °C
    state: '{{ state_attr(''climate.dc_zone01'', ''temperature'') | float(none) }}

      '
    availability: '{{ state_attr(''climate.dc_zone01'', ''temperature'') is not none
      }}

      '
  - name: dc_zone02_consigna_real_aplicada
    unique_id: dc_zone02_consigna_real_aplicada
