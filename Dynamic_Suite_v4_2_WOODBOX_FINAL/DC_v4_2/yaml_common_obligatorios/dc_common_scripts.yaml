script:
  dc_init_fabrica_common:
    alias: dc_init_fabrica_common
    mode: single
    sequence:
    - variables:
        fab: sensor.dc_fabrica_common
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(''input_number.dc_zones_total'') != ''unknown''
            }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dc_zones_total
          data:
            value: '{{ state_attr(fab, ''dc_zones_total'') | int(4) }}'
    - repeat:
        for_each:
        - dc_zone01_label
        - dc_zone02_label
        - dc_zone03_label
        - dc_zone04_label
        - dc_zone05_label
        - dc_zone06_label
        - dc_zone07_label
        - dc_zone08_label
        sequence:
        - variables:
            k: '{{ repeat.item }}'
            e: input_text.{{ repeat.item }}
            v: '{{ state_attr(fab, k) }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ states(e) != ''unknown'' and v is not none }}'
            sequence:
            - service: input_text.set_value
              target:
                entity_id: '{{ e }}'
              data:
                value: '{{ v }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(''input_text.dc_ds_facade_groups_json'') != ''unknown'' }}'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_ds_facade_groups_json
          data:
            value: '{}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(''input_text.dc_zones_enabled'') != ''unknown'' }}'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_zones_enabled
          data:
            value: 'zone01'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(''input_text.dc_hwmap_check_zones_csv'') != ''unknown'' }}'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_hwmap_check_zones_csv
          data:
            value: 'zone01'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(''input_text.dc_notify_target'') != ''unknown'' }}'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_notify_target
          data:
            value: 'notify.notify'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(''input_boolean.dc_modo_vacaciones'') != ''unknown'' }}'
        sequence:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.dc_modo_vacaciones
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(''input_boolean.dc_modo_ayuda'') != ''unknown'' }}'
        sequence:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.dc_modo_ayuda
  dc_common_backup_save:
    alias: dc_common_backup_save
    mode: single
    sequence:
      - variables:
          backup_path: "dynamic_suite/dc/common/dc_common_backup.json"
          entities:
            - input_number.dc_zones_total
            - input_text.dc_zone01_label
            - input_text.dc_zone02_label
            - input_text.dc_zone03_label
            - input_text.dc_zone04_label
            - input_text.dc_zone05_label
            - input_text.dc_zone06_label
            - input_text.dc_zone07_label
            - input_text.dc_zone08_label
            - input_text.dc_ds_facade_groups_json
            - input_text.dc_zones_enabled
            - input_text.dc_hwmap_check_zones_csv
            - input_text.dc_notify_target
            - input_boolean.dc_modo_vacaciones
            - input_boolean.dc_modo_ayuda
          payload: >-
            {% set out = namespace(d={}) %}
            {% for e in entities %}
              {% set s = states(e) %}
              {% if s not in ['unknown','unavailable','none',''] %}
                {% set out.d = dict(out.d, **{e: s}) %}
              {% endif %}
            {% endfor %}
            {{ out.d | tojson }}
          saved_count: >-
            {% set d = payload | from_json if payload not in ['unknown','unavailable','none',''] else {} %}
            {{ d | count }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ saved_count | int(0) == 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: DC Common · Backup
                  message: "⚠️ Backup no guardado

No había ningún valor válido para guardar (0 elementos).
Esto puede ocurrir tras reinicio si algunos helpers están en unknown/unavailable.

Reintenta en unos segundos."
                  notification_id: dc_common_backup_save_empty
              - stop: "Backup vacío: no se guarda."
      - service: appdaemon.dynamic_suite_backup/save
        data:
          path: "{{ backup_path }}"
          payload: "{{ payload }}"

  dc_common_backup_restore:
    alias: dc_common_backup_restore
    mode: single
    sequence:
      - variables:
          backup_path: "dynamic_suite/dc/common/dc_common_backup.json"
      - service: appdaemon.dynamic_suite_backup/restore
        data:
          path: "{{ backup_path }}"

  dc_init_fabrica_all:
    alias: dc_init_fabrica_all
    mode: single
    sequence:
    - service: script.dc_init_fabrica_common
    - choose:
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 1 }}'
        sequence:
        - service: script.dc_zone01_init_fabrica
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 2 }}'
        sequence:
        - service: script.dc_zone02_init_fabrica
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 3 }}'
        sequence:
        - service: script.dc_zone03_init_fabrica
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 4 }}'
        sequence:
        - service: script.dc_zone04_init_fabrica
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 5 }}'
        sequence:
        - service: script.dc_zone05_init_fabrica
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 6 }}'
        sequence:
        - service: script.dc_zone06_init_fabrica
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 7 }}'
        sequence:
        - service: script.dc_zone07_init_fabrica
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 8 }}'
        sequence:
        - service: script.dc_zone08_init_fabrica
  dc_backup_all_save:
    alias: dc_backup_all_save
    mode: single
    sequence:
    - service: script.dc_common_backup_save
    - choose:
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 1 }}'
        sequence:
        - service: script.dc_zone01_backup_inputs_save
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 2 }}'
        sequence:
        - service: script.dc_zone02_backup_inputs_save
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 3 }}'
        sequence:
        - service: script.dc_zone03_backup_inputs_save
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 4 }}'
        sequence:
        - service: script.dc_zone04_backup_inputs_save
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 5 }}'
        sequence:
        - service: script.dc_zone05_backup_inputs_save
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 6 }}'
        sequence:
        - service: script.dc_zone06_backup_inputs_save
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 7 }}'
        sequence:
        - service: script.dc_zone07_backup_inputs_save
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 8 }}'
        sequence:
        - service: script.dc_zone08_backup_inputs_save
  dc_backup_all_restore:
    alias: dc_backup_all_restore
    mode: single
    sequence:
    - service: script.dc_common_backup_restore
    - choose:
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 1 }}'
        sequence:
        - service: script.dc_zone01_backup_inputs_restore
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 2 }}'
        sequence:
        - service: script.dc_zone02_backup_inputs_restore
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 3 }}'
        sequence:
        - service: script.dc_zone03_backup_inputs_restore
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 4 }}'
        sequence:
        - service: script.dc_zone04_backup_inputs_restore
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 5 }}'
        sequence:
        - service: script.dc_zone05_backup_inputs_restore
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 6 }}'
        sequence:
        - service: script.dc_zone06_backup_inputs_restore
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 7 }}'
        sequence:
        - service: script.dc_zone07_backup_inputs_restore
      - conditions: '{{ (states(''input_number.dc_zones_total'') | int(1)) >= 8 }}'
        sequence:
