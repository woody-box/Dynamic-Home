# ============================================================================
# Dynamic Climate · DC · Common logic/contracts/startup
# ----------------------------------------------------------------------------
# version: 4.2
# changelog: v4.2 (compaction)
# ============================================================================
input_text:
  dc_onboarding_zone:
    name: dc_onboarding_zone
    max: 16
    initial: zone02
  dc_zones_enabled:
    name: dc_zones_enabled
    max: 255
    initial: zone01
  dc_hwmap_check_zones_csv:
    name: dc_hwmap_check_zones_csv
    max: 128
    initial: zone01
script:
  dc_onboarding_check_zona:
    alias: dc_onboarding_check_zona
    mode: single
    fields:
      zone:
        description: zone slug without prefix (e.g. "zone02", "zone03", "zone01")
        example: zone02
    sequence:
    - variables:
        z: '{% set f = zone if zone is defined and zone|string|length > 0 else states(''input_text.dc_onboarding_zone'')
          %} {{ (f|string)|lower|trim }}'
        bad:
        - unknown
        - unavailable
        - none
        - ''
        core_entities:
        - sensor.dc_{{ z }}_hw_map
        - sensor.dc_{{ z }}_target_final
        - sensor.dc_{{ z }}_target_raw
        - sensor.dc_{{ z }}_t_int_safe
        - sensor.dc_{{ z }}_t_ext_safe
        - binary_sensor.dc_{{ z }}_degraded
        - sensor.dc_{{ z }}_hvac_mode
        climate_entity: climate.dc_{{ z }}
        demand_entities:
        - input_boolean.dc_{{ z }}_calor
        - input_boolean.dc_{{ z }}_frio
        stats_entities:
        - input_datetime.dc_{{ z }}_ultima_hora_encendido_calor
        - input_datetime.dc_{{ z }}_ultima_hora_encendido_frio
        - input_number.dc_{{ z }}_duracion_ultimo_ciclo_calor
        - input_number.dc_{{ z }}_duracion_ultimo_ciclo_frio
        - sensor.dc_{{ z }}_last_tiempo_encendido_calor
        - sensor.dc_{{ z }}_last_tiempo_encendido_frio
        bus_entities:
        - input_text.sdhb_dc_{{ z }}_target
        - input_text.sdhb_dc_{{ z }}_payload
        - input_boolean.sdhb_dc_{{ z }}_enabled
        - input_number.sdhb_dc_{{ z }}_priority
        - input_number.sdhb_dc_{{ z }}_ttl_s
        - input_number.sdhb_dc_{{ z }}_last_seen_ts
        - sensor.sdhb_winner_dc_{{ z }}
        exists: "{% macro ok(e) -%}\n  {% set s = states(e) %}\n  {{ s not in bad\
          \ }}\n{%- endmacro %} {{ ok }}"
    - service: persistent_notification.create
      data:
        title: dc_onboarding_check_zona · {{ z }}
        message: "{% set ok = namespace(lines=[]) %} {% set miss = namespace(lines=[])\
          \ %} {% macro add_line(group, e) -%}\n  {% if (states(e) not in bad) %}\n\
          \    {% set ok.lines = ok.lines + ['✅ ' ~ group ~ ': ' ~ e] %}\n  {% else\
          \ %}\n    {% set miss.lines = miss.lines + ['❌ ' ~ group ~ ': ' ~ e] %}\n\
          \  {% endif %}\n{%- endmacro %}\n{# --- CORE --- #} {% for e in core_entities\
          \ %}\n  {{ add_line('core', e) }}\n{% endfor %}\n{# --- CLIMATE --- #} {{\
          \ add_line('climate', climate_entity) }}\n{# --- DEMAND --- #} {% for e\
          \ in demand_entities %}\n  {{ add_line('demand', e) }}\n{% endfor %}\n{#\
          \ --- STATS --- #} {% for e in stats_entities %}\n  {{ add_line('stats',\
          \ e) }}\n{% endfor %}\n{# --- BUS --- #} {% for e in bus_entities %}\n \
          \ {{ add_line('bus', e) }}\n{% endfor %}\n─────────────────────────────────────────────\
          \ RESULTADO OK={{ ok.lines|count }}  MISSING={{ miss.lines|count }}\n{%\
          \ if miss.lines|count == 0 %} ✅ Zona {{ z }}: onboarding completo. {% else\
          \ %} ⚠️ Zona {{ z }}: faltan elementos. Detalle: {{ miss.lines | join('\\\
          n') }}\n─────────────────────────────────────────────\
          \ SUGERENCIAS / BLOQUES A COPIAR (YAML EXACTO)\nNota (importante): - dc_common_stats\
          \ es hardcodeado porque HA no permite generar utility_meter/history_stats\
          \ dinámicos con Jinja.\n  Por eso, al clonar una zona hay que copiar/pegar\
          \ un bloque por zona.\n\n1) dc_common_climate (termóstato virtual + flags\
          \ demanda) - Si falta climate.dc_{{ z }} o input_boolean.dc_{{ z }}_calor/frio,\
          \ copia este bloque:\n```yaml # --- ZONA dc_{{ z }} --- climate:\n  - platform:\
          \ thermostat\n    name: dc_{{ z }}\n    unique_id: dc_{{ z }}\n    heater:\
          \ {{ state_attr('sensor.dc_{{ z }}_hw_map','valve_switch') | default('switch.REPLACE_ME')\
          \ }}\n    target_sensor: sensor.dc_{{ z }}_t_int_safe\n    min_temp: 10\n\
          \    max_temp: 35\n\ninput_boolean:\n  dc_{{ z }}_calor:\n    name: dc_{{\
          \ z }}_calor\n  dc_{{ z }}_frio:\n    name: dc_{{ z }}_frio\n```\n2) dc_common_stats\
          \ (inputs + history_stats por zona) - Si falta cualquiera de estos:\n  input_datetime.dc_{{\
          \ z }}_ultima_hora_encendido_calor/frio\n  input_number.dc_{{ z }}_duracion_ultimo_ciclo_calor/frio\n\
          \  sensor.dc_{{ z }}_last_tiempo_encendido_calor/frio\n  copia este bloque\
          \ (ajusta entidades source si tu instalación difiere):\n\n```yaml # ---\
          \ ZONA dc_{{ z }} --- input_datetime:\n  dc_{{ z }}_ultima_hora_encendido_calor:\n\
          \    name: dc_{{ z }}_ultima_hora_encendido_calor\n    has_date: true\n\
          \    has_time: true\n  dc_{{ z }}_ultima_hora_encendido_frio:\n    name:\
          \ dc_{{ z }}_ultima_hora_encendido_frio\n    has_date: true\n    has_time:\
          \ true\n\ninput_number:\n  dc_{{ z }}_duracion_ultimo_ciclo_calor:\n   \
          \ name: dc_{{ z }}_duracion_ultimo_ciclo_calor\n    min: 0\n    max: 24\n\
          \    step: 0.01\n    unit_of_measurement: \"h\"\n  dc_{{ z }}_duracion_ultimo_ciclo_frio:\n\
          \    name: dc_{{ z }}_duracion_ultimo_ciclo_frio\n    min: 0\n    max: 24\n\
          \    step: 0.01\n    unit_of_measurement: \"h\"\n\nsensor:\n  - platform:\
          \ history_stats\n    name: dc_{{ z }}_last_tiempo_encendido_calor\n    entity_id:\
          \ input_boolean.dc_{{ z }}_calor\n    state: \"on\"\n    type: time\n  \
          \  start: \"{{ '{{' }} states('input_datetime.dc_{{ z }}_ultima_hora_encendido_calor')\
          \ {{ '}}' }}\"\n    end: \"{{ now() }}\"\n  - platform: history_stats\n\
          \    name: dc_{{ z }}_last_tiempo_encendido_frio\n    entity_id: input_boolean.dc_{{\
          \ z }}_frio\n    state: \"on\"\n    type: time\n    start: \"{{ '{{' }}\
          \ states('input_datetime.dc_{{ z }}_ultima_hora_encendido_frio') {{ '}}'\
          \ }}\"\n    end: \"{{ now() }}\"\n```\n3) suite_dynamic_home_bus (registro\
          \ DC de zona) - Si faltan helpers sdhb_dc_{{ z }}_* / sensor.sdhb_winner_dc_{{\
          \ z }}, duplica una slot del bus para {'{ z }'}.\n  Plantilla mínima (ajusta\
          \ si tu bus tiene más campos):\n\n```yaml # --- BUS SLOT dc_{{ z }} ---\
          \ input_boolean:\n  sdhb_dc_{{ z }}_enabled:\n    name: sdhb_dc_{{ z }}_enabled\n\
          \ninput_number:\n  sdhb_dc_{{ z }}_priority:\n    name: sdhb_dc_{{ z }}_priority\n\
          \    min: 0\n    max: 100\n    step: 1\n  sdhb_dc_{{ z }}_ttl_s:\n    name:\
          \ sdhb_dc_{{ z }}_ttl_s\n    min: 0\n    max: 86400\n    step: 1\n  sdhb_dc_{{\
          \ z }}_last_seen_ts:\n    name: sdhb_dc_{{ z }}_last_seen_ts\n    min: 0\n\
          \    max: 9999999999\n    step: 1\n\ninput_text:\n  sdhb_dc_{{ z }}_target:\n\
          \    name: sdhb_dc_{{ z }}_target\n  sdhb_dc_{{ z }}_payload:\n    name:\
          \ sdhb_dc_{{ z }}_payload\n\ntemplate:\n  - sensor:\n      - name: sdhb_winner_dc_{{\
          \ z }}\n        unique_id: sdhb_winner_dc_{{ z }}\n        state: >-\n \
          \         {{ states('sensor.dc_{{ z }}_target_final') }}\n``` \n{% endif\
          \ %}\nOKs (resumen): {{ ok.lines | join('\\n') }}"
  dc_install_report:
    alias: dc_install_report
    sequence:
    - service: persistent_notification.create
      data:
        title: Dynamic Climate · Install report
        message: '{% set zones = states(''input_text.dc_zones_enabled'') | lower %}
          {% set zs = zones.split('','') | map(''trim'') | reject(''equalto'','''')
          | list %} **dh_bus** - suite_dynamic_home_bus_version: {{ states(''sensor.suite_dynamic_home_bus_version'')
          }}

          **dc_common** - dc_common_climate_version: {{ states(''sensor.dc_common_climate_version'')
          }} - dc_common_stats_version: {{ states(''sensor.dc_common_stats_version'')
          }}

          **dc_addon_common** - dc_addon_onboarding_version: {{ states(''sensor.dc_addon_onboarding_version'')
          }} - dc_addon_hwmap_startup_check_version: {{ states(''sensor.dc_addon_hwmap_startup_check_version'')
          }}

          {% for z in zs %} **dc_{{ z }}_main** - inputs: {{ states(''sensor.dc_''
          ~ z ~ ''_main_inputs_version'') }} - core: {{ states(''sensor.dc_'' ~ z
          ~ ''_main_core_version'') }} - defaults: {{ states(''sensor.dc_'' ~ z ~
          ''_main_defaults_version'') }} - automations: {{ states(''sensor.dc_'' ~
          z ~ ''_main_automations_version'') }} - runtime: {{ states(''sensor.dc_''
          ~ z ~ ''_main_runtime_version'') }} - scripts: {{ states(''sensor.dc_''
          ~ z ~ ''_main_scripts_version'') }} - safe_sensors: {{ states(''sensor.dc_''
          ~ z ~ ''_main_safe_sensors_version'') }}

          **dc_{{ z }}_addon** - observability: {{ states(''sensor.dc_'' ~ z ~ ''_addon_observability_version'')
          }} - test: {{ states(''sensor.dc_'' ~ z ~ ''_addon_test_version'') }} -
          sensor_health: {{ states(''sensor.dc_'' ~ z ~ ''_addon_sensor_health_version'')
          }} - audit: {{ states(''sensor.dc_'' ~ z ~ ''_addon_audit_version'') }}
          - params_table: {{ states(''sensor.dc_'' ~ z ~ ''_addon_params_table_version'')
          }} - adaptive_thresholds: {{ states(''sensor.dc_'' ~ z ~ ''_addon_adaptive_thresholds_version'')
          }} - simulator: {{ states(''sensor.dc_'' ~ z ~ ''_addon_simulator_version'')
          }} - sdhb: {{ states(''sensor.dc_'' ~ z ~ ''_addon_sdhb_version'') }}

          {% endfor %}

          **Missing core** {{ state_attr(''sensor.dc_install_eval'',''missing_core'')
          | default('''') }}

          **Missing recommended** {{ state_attr(''sensor.dc_install_eval'',''missing_recommended'')
          | default('''') }}

          **Missing optional** {{ state_attr(''sensor.dc_install_eval'',''missing_optional'')
          | default('''') }}'
  dc_hwmap_check_zona:
    alias: dc_hwmap_check_zona
    mode: queued
    fields:
      zone:
        description: zone slug without prefix (e.g. "zone01", "zone02", "zone03")
        example: zone01
    sequence:
    - variables:
        z: '{{ (zone|string)|lower|trim }}'
        hw: sensor.dc_{{ z }}_hw_map
        bad:
        - unknown
        - unavailable
        - none
        - ''
    - variables:
        refs: "{% set out = [] %} {% for k, v in (state_attr(hw) or {}).items() %}\n\
          \  {% if v is string and ('.' in v) %}\n    {% set out = out + [{'k': k,\
          \ 'v': v}] %}\n  {% endif %}\n{% endfor %} {{ out }}"
        missing: "{% set out = [] %} {% for r in refs %}\n  {% set s = states(r.v)\
          \ %}\n  {% if s in bad %}\n    {% set out = out + [r] %}\n  {% endif %}\n\
          {% endfor %} {{ out }}"
        missing_keys: "{% set out = [] %} {% for r in missing %}\n  {% set out = out\
          \ + [r.k ~ '=' ~ r.v] %}\n{% endfor %} {{ out }}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(hw) in bad }}'
        sequence:
        - service: persistent_notification.create
          data:
            title: dc_hwmap_check_zona · {{ z }}
            message: '❌ HW_MAP sensor missing/unavailable: {{ hw }} state={{ states(hw)
              }}'
      - conditions:
        - condition: template
          value_template: '{{ (missing | count) > 0 }}'
        sequence:
        - service: persistent_notification.create
          data:
            title: dc_hwmap_check_zona · {{ z }}
            message: '⚠️ HW_MAP refs missing/unavailable (zone={{ z }}): {{ missing_keys
              | join(''\n'') }}

              Total refs={{ refs|count }}, missing={{ missing|count }}.'
        - choose:
          - conditions:
            - condition: state
              entity_id: input_boolean.dc_hwmap_check_telegram_enabled
              state: 'on'
            sequence:
            - service: notify.send_message
              target:
                entity_id: '{{ (states(''input_text.dc_notify_target'') if states(''input_text.dc_notify_target'')
                  not in [''unknown'',''unavailable'',''none'',''''] else ''notify.notify'')
                  }}'
              data:
                message: 'DC HW_MAP WARNING (zone={{ z }}): missing={{ missing|count
                  }}/{{ refs|count }} {{ missing_keys | join('' | '') }}'
      default:
      - service: persistent_notification.create
        data:
          title: dc_hwmap_check_zona · {{ z }}
          message: ✅ HW_MAP OK (zone={{ z }}). Total refs={{ refs|count }}.
template:
- sensor:
  - name: dc_addon_onboarding_version
    unique_id: dc_addon_onboarding_version
    icon: mdi:tag
    state: '4.2'
    attributes:
      module: dc_addon_onboarding
      tier: core
  - name: dc_install_eval
    unique_id: dc_install_eval
    icon: mdi:clipboard-search-outline
    state: '{{ state_attr(''sensor.dc_install_eval'',''total_missing_count'') | int(0)
      }}'
    attributes:
      zones_enabled: '{{ states(''input_text.dc_zones_enabled'') }}'
      missing_core: "{% set miss = namespace(items=[]) %} {% set core = [\n  'sensor.dc_common_climate_version',\n\
        \  'sensor.dc_common_stats_version',\n  'sensor.dc_addon_onboarding_version'\n\
        ] %} {% for e in core %}\n  {% if states(e) in ['unknown','unavailable','']\
        \ %}\n    {% set miss.items = miss.items + [e] %}\n  {% endif %}\n{% endfor\
        \ %} {% if states('sensor.dc_addon_hwmap_startup_check_version') in ['unknown','unavailable','']\
        \ %}\n  {% set miss.items = miss.items + ['sensor.dc_addon_hwmap_startup_check_version']\
        \ %}\n{% endif %} {% set zones = states('input_text.dc_zones_enabled') | lower\
        \ %} {% set zs = zones.split(',') | map('trim') | reject('equalto','') | list\
        \ %} {% for z in zs %}\n  {% set main = [\n    'sensor.dc_' ~ z ~ '_main_inputs_version',\n\
        \    'sensor.dc_' ~ z ~ '_main_core_version',\n    'sensor.dc_' ~ z ~ '_main_defaults_version',\n\
        \    'sensor.dc_' ~ z ~ '_main_automations_version',\n    'sensor.dc_' ~ z\
        \ ~ '_main_runtime_version',\n    'sensor.dc_' ~ z ~ '_main_scripts_version',\n\
        \    'sensor.dc_' ~ z ~ '_main_safe_sensors_version'\n  ] %}\n  {% for e in\
        \ main %}\n    {% if states(e) in ['unknown','unavailable',''] %}\n      {%\
        \ set miss.items = miss.items + [e] %}\n    {% endif %}\n  {% endfor %}\n\
        {% endfor %} {{ miss.items | join(', ') }}"
      missing_recommended: "{% set miss = namespace(items=[]) %} {% if states('sensor.suite_dynamic_home_bus_version')\
        \ in ['unknown','unavailable',''] %}\n  {% set miss.items = miss.items + ['sensor.suite_dynamic_home_bus_version']\
        \ %}\n{% endif %} {% set zones = states('input_text.dc_zones_enabled') | lower\
        \ %} {% set zs = zones.split(',') | map('trim') | reject('equalto','') | list\
        \ %} {% for z in zs %}\n  {% set rec = [\n    'sensor.dc_' ~ z ~ '_addon_observability_version',\n\
        \    'sensor.dc_' ~ z ~ '_addon_sensor_health_version',\n    'sensor.dc_'\
        \ ~ z ~ '_addon_test_version',\n    'sensor.dc_' ~ z ~ '_addon_audit_version',\n\
        \    'sensor.dc_' ~ z ~ '_addon_params_table_version'\n  ] %}\n  {% for e\
        \ in rec %}\n    {% if states(e) in ['unknown','unavailable',''] %}\n    \
        \  {% set miss.items = miss.items + [e] %}\n    {% endif %}\n  {% endfor %}\n\
        {% endfor %} {{ miss.items | join(', ') }}"
      missing_optional: "{% set miss = namespace(items=[]) %} {% set zones = states('input_text.dc_zones_enabled')\
        \ | lower %} {% set zs = zones.split(',') | map('trim') | reject('equalto','')\
        \ | list %} {% for z in zs %}\n  {% set opt = [\n    'sensor.dc_' ~ z ~ '_addon_adaptive_thresholds_version',\n\
        \    'sensor.dc_' ~ z ~ '_addon_simulator_version',\n    'sensor.dc_' ~ z\
        \ ~ '_addon_sdhb_version'\n  ] %}\n  {% for e in opt %}\n    {% if states(e)\
        \ in ['unknown','unavailable',''] %}\n      {% set miss.items = miss.items\
        \ + [e] %}\n    {% endif %}\n  {% endfor %}\n{% endfor %} {{ miss.items |\
        \ join(', ') }}"
      total_missing_count: "{% set cnt = namespace(n=0) %} {% for block in [\n  (state_attr('sensor.dc_install_eval','missing_core')\
        \ | default('')),\n  (state_attr('sensor.dc_install_eval','missing_recommended')\
        \ | default('')),\n  (state_attr('sensor.dc_install_eval','missing_optional')\
        \ | default(''))\n] %}\n  {% for e in block.split(',') %}\n    {% if e | trim\
        \ != '' %}\n      {% set cnt.n = cnt.n + 1 %}\n    {% endif %}\n  {% endfor\
        \ %}\n{% endfor %} {{ cnt.n }}"
      versions_json: "{% set zones = states('input_text.dc_zones_enabled') | lower\
        \ %} {% set zs = zones.split(',') | map('trim') | reject('equalto','') | list\
        \ %} {% set d = namespace(v={}) %} {% set d.v = dict(d.v, **{'dc_common_climate':\
        \ states('sensor.dc_common_climate_version')}) %} {% set d.v = dict(d.v, **{'dc_common_stats':\
        \ states('sensor.dc_common_stats_version')}) %} {% set d.v = dict(d.v, **{'dc_addon_onboarding':\
        \ states('sensor.dc_addon_onboarding_version')}) %} {% set d.v = dict(d.v,\
        \ **{'dc_addon_hwmap_startup_check': states('sensor.dc_addon_hwmap_startup_check_version')})\
        \ %} {% set d.v = dict(d.v, **{'suite_dynamic_home_bus': states('sensor.suite_dynamic_home_bus_version')})\
        \ %} {% for z in zs %}\n  {% set d.v = dict(d.v, **{('dc_' ~ z ~ '_main_core'):\
        \ states('sensor.dc_' ~ z ~ '_main_core_version')}) %}\n  {% set d.v = dict(d.v,\
        \ **{('dc_' ~ z ~ '_addon_observability'): states('sensor.dc_' ~ z ~ '_addon_observability_version')})\
        \ %}\n  {% set d.v = dict(d.v, **{('dc_' ~ z ~ '_addon_test'): states('sensor.dc_'\
        \ ~ z ~ '_addon_test_version')}) %}\n  {% set d.v = dict(d.v, **{('dc_' ~\
        \ z ~ '_addon_sensor_health'): states('sensor.dc_' ~ z ~ '_addon_sensor_health_version')})\
        \ %}\n{% endfor %} {{ d.v | tojson }}"
  - name: dc_install_missing
    unique_id: dc_install_missing
    icon: mdi:alert-circle-outline
    state: '{{ state_attr(''sensor.dc_install_eval'',''total_missing_count'') | int(0)
      }}'
    attributes:
      missing_core: '{{ state_attr(''sensor.dc_install_eval'',''missing_core'') |
        default('''') }}'
      missing_recommended: '{{ state_attr(''sensor.dc_install_eval'',''missing_recommended'')
        | default('''') }}'
      missing_optional: '{{ state_attr(''sensor.dc_install_eval'',''missing_optional'')
        | default('''') }}'
      versions_json: '{{ state_attr(''sensor.dc_install_eval'',''versions_json'')
        | default(''{}'') }}'
- binary_sensor:
  - name: dc_install_core_ok
    unique_id: dc_install_core_ok
    icon: mdi:check-circle-outline
    state: '{{ (state_attr(''sensor.dc_install_eval'',''missing_core'') | default('''')
      | trim) == '''' }}'
  - name: dc_install_all_ok
    unique_id: dc_install_all_ok
    icon: mdi:check-all
    state: "{{\n  (state_attr('sensor.dc_install_eval','missing_core') | default('')\
      \ | trim) == '' and\n  (state_attr('sensor.dc_install_eval','missing_recommended')\
      \ | default('') | trim) == '' and\n  (state_attr('sensor.dc_install_eval','missing_optional')\
      \ | default('') | trim) == ''\n}}"
- sensor:
  - name: dc_addon_hwmap_startup_check_version
    unique_id: dc_addon_hwmap_startup_check_version
    icon: mdi:tag
    state: '4.2'
    attributes:
      module: dc_addon_hwmap_startup_check
      tier: recommended
input_boolean:
  dc_hwmap_check_telegram_enabled:
    name: dc_hwmap_check_telegram_enabled
    initial: false
automation:
- id: dc_hwmap_startup_check
  alias: dc_hwmap_startup_check
  mode: single
  trigger:
  - platform: homeassistant
    event: start
  action:
  - delay: 00:00:30
  - variables:
      zones: '{% set raw = states(''input_text.dc_hwmap_check_zones_csv'') %} {% set
        parts = (raw.split('','') if raw else []) %} {{ parts | map(''trim'') | map(''lower'')
        | reject(''equalto'','''') | list }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ zones | count == 0 }}'
      sequence:
      - service: persistent_notification.create
        data:
          title: dc_hwmap_startup_check
          message: No zones configured in input_text.dc_hwmap_check_zones_csv
    default:
    - repeat:
        for_each: '{{ zones }}'
        sequence:
        - service: script.dc_hwmap_check_zona
          data:
            zone: '{{ repeat.item }}'
