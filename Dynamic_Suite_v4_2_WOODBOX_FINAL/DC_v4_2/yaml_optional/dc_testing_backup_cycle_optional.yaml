# DC optional test: backup-save-restore cycle (v4.2)
#
# Purpose:
# - Validate that dc_common_backup_save + dc_common_backup_restore work end-to-end
# - Uses two common helpers as probe values (dc_modo_ayuda / dc_modo_vacaciones)
#
# Requires python_scripts installed:
# - /config/python_scripts/dc_common_backup_save.py
# - /config/python_scripts/dc_common_backup_restore.py
#
input_boolean:
  dc_backup_cycle_tests_enabled:
    name: dc_backup_cycle_tests_enabled
    icon: mdi:clipboard-check
    initial: false

input_select:
  dc_backup_cycle_test_scenario:
    name: dc_backup_cycle_test_scenario
    options:
      - none
      - t_common_backup_restore_cycle
    initial: none

input_boolean:
  dc_backup_cycle_test_pass:
    name: dc_backup_cycle_test_pass
    initial: false

input_text:
  dc_backup_cycle_test_last_result:
    name: dc_backup_cycle_test_last_result
    initial: ""

timer:
  dc_backup_cycle_tests_auto_off:
    name: dc_backup_cycle_tests_auto_off
    duration: "02:00:00"

automation:
  - id: dc_backup_cycle_tests_auto_off_start
    alias: dc_backup_cycle_tests_auto_off_start
    trigger:
      - platform: state
        entity_id: input_boolean.dc_backup_cycle_tests_enabled
        to: "on"
    action:
      - service: timer.start
        target:
          entity_id: timer.dc_backup_cycle_tests_auto_off

  - id: dc_backup_cycle_tests_auto_off_apply
    alias: dc_backup_cycle_tests_auto_off_apply
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.dc_backup_cycle_tests_auto_off
    condition:
      - condition: state
        entity_id: input_boolean.dc_backup_cycle_tests_enabled
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dc_backup_cycle_tests_enabled
      - service: input_select.select_option
        target:
          entity_id: input_select.dc_backup_cycle_test_scenario
        data:
          option: none

  - id: dc_backup_cycle_tests_run_on_scenario
    alias: dc_backup_cycle_tests_run_on_scenario
    trigger:
      - platform: state
        entity_id: input_select.dc_backup_cycle_test_scenario
    condition:
      - condition: state
        entity_id: input_boolean.dc_backup_cycle_tests_enabled
        state: "on"
      - condition: template
        value_template: "{{ trigger.to_state.state not in ['none','unknown','unavailable'] }}"
    action:
      - service: script.dc_run_backup_cycle_test
        data:
          scenario: "{{ trigger.to_state.state }}"

script:
  dc_run_backup_cycle_test:
    alias: dc_run_backup_cycle_test
    mode: queued
    fields:
      scenario:
        description: scenario key
    sequence:
      - variables:
          scen: "{{ scenario }}"
          e1: input_boolean.dc_modo_ayuda
          e2: input_boolean.dc_modo_vacaciones
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dc_backup_cycle_test_pass
      - service: input_text.set_value
        target:
          entity_id: input_text.dc_backup_cycle_test_last_result
        data:
          value: "RUN {{ scen }} @ {{ now() }}"
      - choose:
          - conditions: "{{ scen == 't_common_backup_restore_cycle' }}"
            sequence:
              - variables:
                  v1_init: "{{ states(e1) }}"
                  v2_init: "{{ states(e2) }}"
              # set probe values
              - service: input_boolean.turn_on
                target: { entity_id: "{{ e1 }}" }
              - service: input_boolean.turn_off
                target: { entity_id: "{{ e2 }}" }
              # save
              - service: script.dc_common_backup_save
              # change away
              - service: input_boolean.turn_off
                target: { entity_id: "{{ e1 }}" }
              - service: input_boolean.turn_on
                target: { entity_id: "{{ e2 }}" }
              # restore
              - service: script.dc_common_backup_restore
              - delay: "00:00:01"
              - choose:
                  - conditions: "{{ is_state(e1,'on') and is_state(e2,'off') }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.dc_backup_cycle_test_pass
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.dc_backup_cycle_test_last_result
                        data:
                          value: "PASS: common backup-save-restore restored values"
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.dc_backup_cycle_test_last_result
                        data:
                          value: "FAIL: expected e1=on e2=off after restore; got e1={{ states(e1) }} e2={{ states(e2) }}"
              # restore initial
              - choose:
                  - conditions: "{{ v1_init == 'on' }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target: { entity_id: "{{ e1 }}" }
                  - conditions: []
                    sequence:
                      - service: input_boolean.turn_off
                        target: { entity_id: "{{ e1 }}" }
              - choose:
                  - conditions: "{{ v2_init == 'on' }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target: { entity_id: "{{ e2 }}" }
                  - conditions: []
                    sequence:
                      - service: input_boolean.turn_off
                        target: { entity_id: "{{ e2 }}" }
      - service: input_select.select_option
        target:
          entity_id: input_select.dc_backup_cycle_test_scenario
        data:
          option: none
