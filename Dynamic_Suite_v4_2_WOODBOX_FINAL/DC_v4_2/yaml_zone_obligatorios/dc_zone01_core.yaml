      \     {% else %}\n              {% set peak = states('sensor.dc_zone01_forecast_t_peak')\
      \ | float(none) %}\n              {% if peak is none %}\n                OFF:\
      \ sin datos en ventana (win={{ win_h|round(2) }}h)\n              {% else %}\n\
      \                {% set dT = (peak - t_ext) %}\n                {% if (hv ==\
