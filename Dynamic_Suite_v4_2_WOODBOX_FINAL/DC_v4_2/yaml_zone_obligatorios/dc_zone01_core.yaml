    state: "{% set m = 'sensor.dc_zone01_hw_map' %} {% set clim = state_attr(m,'climate')\
      \ %} {% set hvac = states(clim) %} {% set vac_ent = state_attr(m,'modo_vacaciones')\
      \ %} {% set vac = (is_state(vac_ent,'on') if vac_ent else false) %} {% set t\
      \ = states('sensor.dc_zone01_target_limitado') | float(none) %} {% if t is none\
      \ %}\n  {{ none }}\n{% else %}\n  {% set bias_sdhb = states('sensor.dc_zone01_sdhb_bias_c')\
      \ | float(0) %}\n  {% set t = (t + bias_sdhb) %}\n\n  {% if vac %}\n    {% set\
      \ min_h = states('input_number.dc_zone01_vac_target_min_heat') | float(18) %}\n\
      \    {% set max_h = states('input_number.dc_zone01_vac_target_max_heat') | float(26)\
      \ %}\n    {% set min_c = states('input_number.dc_zone01_vac_target_min_cool')\
      \ | float(22) %}\n    {% set max_c = states('input_number.dc_zone01_vac_target_max_cool')\
      \ | float(29) %}\n  {% else %}\n    {% set min_h = states('input_number.dc_zone01_target_min_heat')\
      \ | float(18) %}\n    {% set max_h = states('input_number.dc_zone01_target_max_heat')\
      \ | float(26) %}\n    {% set min_c = states('input_number.dc_zone01_target_min_cool')\
      \ | float(22) %}\n    {% set max_c = states('input_number.dc_zone01_target_max_cool')\
      \ | float(29) %}\n  {% endif %}\n\n  {% set step = states('input_number.dc_zone01_target_step')\
      \ | float(0.5) %}\n  {% set step = [step, 0.1] | max %}\n  {% set lo = min_h\
      \ if hvac == 'heat' else min_c %}\n  {% set hi = max_h if hvac == 'heat' else\
      \ max_c %}\n  {% set clamped = [ lo, [ t, hi ] | min ] | max %}\n  {% set q_i = none %}
  {# Quantización robusta (evita errores float con step fino) #}
  {% set step_s = step | string %}
  {% set decimals = (step_s.split('.')[1] | length) if ('.' in step_s) else 0 %}
  {% set scale = (10 ** decimals) | int %}
  {% set step_i = (step * scale) | round(0) | int %}
  {% set val_i = (clamped * scale) | round(0) | int %}
  {% set q_i = ((val_i + (step_i // 2)) // step_i) * step_i %}
  {% set quant = (q_i / scale) %}
  {{ quant | round(decimals) }}\n{% endif %}\n"
