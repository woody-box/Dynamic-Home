      \ sequence) else none %}\n          {% if not times or not temps %}\n      \
      \      OFF: hourly.time/temperature_2m inválidos\n          {% else %}\n   \
      \         {% set win_h = states('input_number.dc_zone01_forecast_window_h')\
      \ | float(none) %}\n            {% set gain = states('input_number.dc_zone01_bias_forecast_gain')\
      \ | float(none) %}\n            {% set cap  = states('input_number.dc_zone01_bias_forecast_cap')\
      \  | float(none) %}\n            {% if win_h is none or gain is none or cap\
