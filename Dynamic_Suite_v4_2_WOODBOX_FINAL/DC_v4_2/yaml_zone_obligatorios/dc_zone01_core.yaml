# ============================================================================
# Dynamic Climate · DC Zone01 · Core + runtime
# ----------------------------------------------------------------------------
# version: 4.2
# changelog: v4.2 (compaction)
# ============================================================================

template:
- sensor:
  - name: dc_zone01_main_core_version
    unique_id: dc_zone01_main_core_version
    icon: mdi:tag
    state: '4.2'
    attributes:
      module: dc_zone01_main_core
      tier: core
- sensor:
  - name: dc_zone01_hw_map
    unique_id: dc_zone01_hw_map
    icon: mdi:chip
    state: ok
    attributes:
      climate: climate.dc_zone01
      sun: sun.sun
      modo_vacaciones: input_boolean.dc_modo_vacaciones
      ventanas_group: REPLACE_VENTANAS_GROUP
      t_int: REPLACE_T_INT
      h_int: REPLACE_H_INT
      punto_rocio: REPLACE_DEWPOINT
      riesgo_rocio: REPLACE_DEW_RISK
      notify_target: ''
      t_ext: REPLACE_T_EXT
      h_ext: REPLACE_H_EXT
      wind_speed: REPLACE_WIND_SPEED
      forecast_entity: REPLACE_FORECAST_ENTITY
      valve_switch: REPLACE_VALVE_SWITCH
      mode_heat_flag: input_boolean.dc_zone01_calor
      mode_cool_flag: input_boolean.dc_zone01_frio
      t_agua: REPLACE_T_AGUA_suelo_radiante_temperature

  - name: dc_zone01_hw_replace_count
    unique_id: dc_zone01_hw_replace_count
    icon: mdi:clipboard-search
    availability: "{{ states.sensor.dc_zone01_hw_map is not none }}"
    state: >-
      {% set a = states.sensor.dc_zone01_hw_map.attributes %}
      {% if a is mapping %}
        {% set ns = namespace(n=0) %}
        {% for k, v in a.items() %}
          {% if v is string and v.startswith('REPLACE_') %}
            {% set ns.n = ns.n + 1 %}
          {% endif %}
        {% endfor %}
        {{ ns.n }}
      {% else %}
        0
      {% endif %}
      vmc_velocidad_real: input_number.sdhb_metric_dv_vmc_speed
      f1_cover: cover.grupo_terraza
      f1_is_in_sun: sensor.persianas_terraza_is_in_sun
      f1_lux: sensor.sensor_de_lluvia_illuminance
      f1_t_ext: sensor.temperatura_terraza_temperature
      f1_h_ext: sensor.temperatura_terraza_humidity
      f2_cover: cover.grupo_salon
      f2_is_in_sun: sensor.persianas_salon_is_in_sun
      f2_lux: sensor.sensor_de_lluvia_illuminance
      f2_t_ext: REPLACE_T_EXT
      f2_h_ext: REPLACE_H_EXT
      f3_cover: ''
      f3_is_in_sun: ''
      f3_lux: ''
      f3_t_ext: ''
      f3_h_ext: ''
- sensor:
  - name: dc_zone01_hvac_mode
    unique_id: dc_zone01_hvac_mode
    icon: mdi:thermostat
    state: '{% set c = state_attr(''sensor.dc_zone01_hw_map'',''climate'') %} {{ states(c)
      if c else ''unknown'' }}

      '
  - name: dc_zone01_base_activa
    unique_id: dc_zone01_base_activa
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{{ is_number(states(''sensor.dc_zone01_t_int_safe'')) }}

      '
    state: "{% set hvac = states('sensor.dc_zone01_hvac_mode') %} {% set vac_ent =\
      \ state_attr('sensor.dc_zone01_hw_map','modo_vacaciones') %} {% set vac = (is_state(vac_ent,'on')\
      \ if vac_ent else false) %}\n{# ================================================================\n\
      \   DEGRADACIÓN EXPLÍCITA: Elevación Solar\n   - Si sensor.dc_zone01_sun_elevation_safe\
      \ está unavailable/none\n   - Degradación conservadora: asumir DÍA (es_noche\
      \ = false)\n   - Impacto: si realmente es noche, base se queda “día” temporalmente\n\
      \   ================================================================ #}\n{%\
      \ set elev = states('sensor.dc_zone01_sun_elevation_safe') | float(none) %}\
      \ {% if elev is none %}\n  {% set es_noche = false %}\n{% else %}\n  {% set\
      \ es_noche = (elev <= -3) %}\n{% endif %}\n{% if vac %}\n  {% set bh = states('input_number.dc_zone01_vac_base_heat_day')|float(17)\
      \ %}\n  {% set bc = states('input_number.dc_zone01_vac_base_cool_day')|float(30)\
      \ %}\n  {{ (bh if hvac == 'heat' else bc) | round(2) }}\n{% else %}\n  {% set\
      \ bh = states('input_number.dc_zone01_base_heat_day')|float(22.5) %}\n  {% set\
      \ bc = states('input_number.dc_zone01_base_cool_day')|float(26.5) %}\n  {% set\
      \ dn = states('input_number.dc_zone01_delta_noche')|float(0.5) %}\n  {% set\
      \ base_day = (bh if hvac == 'heat' else bc) %}\n  {% set base_n = (base_day\
      \ - dn) if hvac == 'heat' else (base_day + dn) %}\n  {{ (base_n if es_noche\
      \ else base_day) | round(2) }}\n{% endif %}\n"
    attributes:
      sun_elevation: '{{ states(''sensor.dc_zone01_sun_elevation_safe'') }}'
      sun_elevation_degraded: '{{ states(''sensor.dc_zone01_sun_elevation_safe'')
        | float(none) is none }}

        '
      es_noche: '{% set elev = states(''sensor.dc_zone01_sun_elevation_safe'') | float(none)
        %} {{ (elev is not none and elev <= -3) }}

        '
      degradation_reason: "{% if states('sensor.dc_zone01_sun_elevation_safe') | float(none)\
        \ is none %}\n  sun_elevation_unavailable\n{% else %}\n  none\n{% endif %}\n"
  - name: dc_zone01_tendencia_derivada
    unique_id: dc_zone01_tendencia_derivada
    unit_of_measurement: °C/h
    state: '{% set cph = states(''input_number.dc_zone01_tendencia_cph_ema'') | float(0)
      %} {% set th = states(''input_number.dc_zone01_tendencia_umbral_estable'') |
      float(0) %} {{ (0 if (cph | abs) < th else cph) | round(3) }}

      '
  - name: dc_zone01_lead_bias_h
    unique_id: dc_zone01_lead_bias_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    availability: "{{ is_number(states('input_number.dc_zone01_tendencia_cph_ema'))\n\
      \   and states('sensor.dc_zone01_hvac_mode') not in ['unknown','unavailable','none']\
      \ }}\n"
    state: "{% set m = 'sensor.dc_zone01_hw_map' %} {% set hvac = states('sensor.dc_zone01_hvac_mode')\
      \ %} {% set cph_abs = (states('input_number.dc_zone01_tendencia_cph_ema')|float(0))\
      \ | abs %} {% set dead = states('input_number.dc_zone01_lead_cph_deadband')|float(0)\
      \ %} {% set scale = states('input_number.dc_zone01_lead_cph_scale')|float(1)\
      \ %} {% set scale = [scale, 0.1] | max %} {% set tr_max = states('input_number.dc_zone01_lead_cph_max_h')|float(0)\
      \ %} {% set cph_eff = [0.0, (cph_abs - dead)]|max %} {% set tr = (cph_eff /\
      \ scale * tr_max) if scale > 0 else 0.0 %} {% set tr = [0, [tr, tr_max]|min]|max\
      \ %}\n{% set env = 0.0 %} {% set f1_ok = is_state('binary_sensor.dc_zone01_f1_valida','on')\
      \ %} {% set f2_ok = is_state('binary_sensor.dc_zone01_f2_valida','on') %} {%\
      \ set f3_ok = is_state('binary_sensor.dc_zone01_f3_valida','on') %}\n{# lux:\
      \ primera fachada válida con lux válido #} {% set bad = [none,'unknown','unavailable','']\
      \ %} {% set lux = states('sensor.dc_zone01_lux_f1_safe') | float(none) %} {%\
      \ if lux is none %}\n  {% set lux = states('sensor.dc_zone01_lux_f2_safe') |\
      \ float(none) %}\n{% endif %} {% if lux is none %}\n  {% set lux = states('sensor.dc_zone01_lux_f3_safe')\
      \ | float(none) %}\n{% endif %} {% if lux is none %}\n  {% set lux = 0.0 %}\n\
      {% endif %} {% set lux_ent = 'sensor.dc_zone01_lux_f1_safe' if (states('sensor.dc_zone01_lux_f1_safe')|float(none))\
      \ is not none else\n                ('sensor.dc_zone01_lux_f2_safe' if (states('sensor.dc_zone01_lux_f2_safe')|float(none))\
      \ is not none else\n                ('sensor.dc_zone01_lux_f3_safe' if (states('sensor.dc_zone01_lux_f3_safe')|float(none))\
      \ is not none else none)) %}\n{% set lux_min = states('input_number.dc_zone01_lead_lux_min')|float(0)\
      \ %} {% set lux_span = states('input_number.dc_zone01_lead_lux_span')|float(0)\
      \ %} {% set lux_span = [lux_span, 0.1] | max %} {% set sr_max = states('input_number.dc_zone01_lead_solar_max_h')|float(0)\
      \ %} {% set rise_scale = states('input_number.dc_zone01_lead_lux_rise_scale')|float(0)\
      \ %} {% set rise_scale = [rise_scale, 0.1] | max %}\n{# nivel solar por lux\
      \ (blindado contra lux_span = 0) #} {% set nivel_lux = ((lux - lux_min) / lux_span)\
      \ if lux_span > 0 else 0.0 %} {% set nivel_lux = [0, [nivel_lux, 1.0]|min]|max\
      \ %}\n{# factor por tendencia lux (blindado contra rise_scale = 0) #} {% set\
      \ lux_tr_raw = states('sensor.dc_exterior_lux_tendencia') %} {% set lux_tr =\
      \ (lux_tr_raw|float(0)) if lux_tr_raw not in ['unknown','unavailable','none']\
      \ else none %} {% set factor_rise = (lux_tr / rise_scale) if (lux_tr is not\
      \ none and rise_scale > 0) else 1.0 %} {% set factor_rise = [0, [factor_rise,\
      \ 1.0]|min]|max %}\n{% set sr = (nivel_lux * factor_rise * sr_max) if hvac in\
      \ ['heat','cool'] else 0.0 %}\n{% set c1 = state_attr(m,'f1_cover') %} {% set\
      \ c2 = state_attr(m,'f2_cover') %} {% set c3 = state_attr(m,'f3_cover') %} {%\
      \ if f1_ok and c1 and (is_state(c1,'open') or (state_attr(c1,'current_position')|int(0) > 0)) %}{% set env = env + (states('input_number.dc_zone01_lead_env_f1_h')|float(0))\
      \ %}{% endif %} {% if f2_ok and c2 and (is_state(c2,'open') or (state_attr(c2,'current_position')|int(0) > 0)) %}{% set env = env\
      \ + (states('input_number.dc_zone01_lead_env_f2_h')|float(0)) %}{% endif %}\
      \ {% if f3_ok and c3 and (is_state(c3,'open') or (state_attr(c3,'current_position')|int(0) > 0)) %}{% set env = env + (states('input_number.dc_zone01_lead_env_f3_h')|float(0))\
      \ %}{% endif %}\n{% set w_ent = state_attr(m,'wind_speed') %} {% set wind =\
      \ 0.0 %} {% if w_ent is string and w_ent|length > 0 %}\n  {% set w_raw = states(w_ent)\
      \ %}\n  {% if is_number(w_raw) %}\n    {% set wind = states('sensor.dc_zone01_wind_speed_safe')\
      \ | float(none) %}\n{% if wind is none %}{% set wind = 0 %}{% endif %}\n  {%\
      \ endif %}\n{% endif %} {% set w0 = states('input_number.dc_zone01_lead_wind_start')|float(0)\
      \ %} {% set ws = states('input_number.dc_zone01_lead_wind_span')|float(1) %}\
      \ {% set wmax = states('input_number.dc_zone01_lead_wind_max_h')|float(0) %}\
      \ {% set wf = ((wind - w0) / ws) if ws > 0 else 0 %} {% set wf = [0, [wf, 1.0]|min]|max\
      \ %} {% set wind_boost = wf * wmax %} {{ (tr + sr + env + wind_boost) | round(2)\
      \ }}\n"
  - name: dc_zone01_lead_base_h
    unique_id: dc_zone01_lead_base_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    availability: "{{ is_number(states('input_number.dc_zone01_tendencia_lead_gain'))\n\
      \   and (not is_state('input_boolean.dc_zone01_adaptive_lead_enabled','on')\n\
      \        or is_number(states('input_number.dc_zone01_lead_gain_adaptive')))\
      \ }}\n"
    state: "{% if is_state('input_boolean.dc_zone01_adaptive_lead_enabled','on') %}\n\
      \  {{ states('input_number.dc_zone01_lead_gain_adaptive') | float(0) | round(2)\
      \ }}\n{% else %}\n  {{ states('input_number.dc_zone01_tendencia_lead_gain')\
      \ | float(0) | round(2) }}\n{% endif %}\n"
  - name: dc_zone01_adapt_lead_target_h
    unique_id: dc_zone01_adapt_lead_target_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    availability: "{{ is_number(states('input_number.dc_zone01_learn_overshoot_ema'))\n\
      \   and is_number(states('input_number.dc_zone01_learn_on_rate_cph_ema'))\n\
      \   and is_number(states('input_number.dc_zone01_learned_thermal_lag_h'))\n\
      \   and is_number(states('input_number.dc_zone01_adapt_rate_floor_cph'))\n \
      \  and is_number(states('input_number.dc_zone01_adapt_lag_k')) }}\n"
    state: "{% set os = states('input_number.dc_zone01_learn_overshoot_ema') | float(0)\
      \ %} {% set target_os = states('input_number.dc_zone01_adapt_overshoot_target')\
      \ | float(0) %} {% set extra = [0, ((os|abs) - (target_os|abs))] | max %}\n\
      {% set rate = states('input_number.dc_zone01_learn_on_rate_cph_ema') | float(0)\
      \ %} {% set floor = states('input_number.dc_zone01_adapt_rate_floor_cph') |\
      \ float(0.1) %} {% set floor = [floor, 0.1] | max %} {% set rate_eff = [floor,\
      \ (rate|abs)] | max %}\n{% set lag = states('input_number.dc_zone01_learned_thermal_lag_h')\
      \ | float(0) %} {% set k = states('input_number.dc_zone01_adapt_lag_k') | float(1.0)\
      \ %} {% set k = [k, 0.1] | max %}\n{% set lead_lag = lag * k %} {% set lead_os\
      \ = extra / rate_eff %} {% set raw = [lead_lag, lead_os] | max %}\n{% set mn\
      \ = states('input_number.dc_zone01_lead_min_h') | float(0) %} {% set mx = states('input_number.dc_zone01_lead_max_h')\
      \ | float(0) %} {% if mx > 0 %}\n  {{ [mn, [raw, mx] | min] | max | round(2)\
      \ }}\n{% else %}\n  {{ [mn, raw] | max | round(2) }}\n{% endif %}\n"
  - name: dc_zone01_lead_final_h
    unique_id: dc_zone01_lead_final_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    availability: "{{ is_number(states('sensor.dc_zone01_lead_base_h'))\n   and is_number(states('sensor.dc_zone01_lead_bias_h'))\
      \ }}\n"
    state: "{% set base = states('sensor.dc_zone01_lead_base_h')|float(0) %} {% set\
      \ bias = states('sensor.dc_zone01_lead_bias_h')|float(0) %} {% set mn = states('input_number.dc_zone01_lead_min_h')|float(0)\
      \ %} {% set mx = states('input_number.dc_zone01_lead_max_h')|float(0) %} {%\
      \ set lead = base + bias %} {% if mx > 0 %}\n  {{ [mn, [lead, mx]|min]|max |\
      \ round(2) }}\n{% else %}\n  {{ [mn, lead]|max | round(2) }}\n{% endif %}\n"
  - name: dc_zone01_lead_tr_h
    unique_id: dc_zone01_lead_tr_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    availability: "{{ is_number(states('input_number.dc_zone01_tendencia_cph_ema'))\n\
      \   and states('sensor.dc_zone01_hvac_mode') not in ['unknown','unavailable','none']\
      \ }}\n"
    state: '{% set cph_abs = (states(''input_number.dc_zone01_tendencia_cph_ema'')|float(0))
      | abs %} {% set dead = states(''input_number.dc_zone01_lead_cph_deadband'')|float(0)
      %} {% set scale = states(''input_number.dc_zone01_lead_cph_scale'')|float(1)
      %} {% set scale = [scale, 0.1] | max %} {% set tr_max = states(''input_number.dc_zone01_lead_cph_max_h'')|float(0)
      %} {% set cph_eff = [0.0, (cph_abs - dead)]|max %} {% set tr = (cph_eff / scale
      * tr_max) if scale > 0 else 0.0 %} {{ [0, [tr, tr_max]|min]|max | round(2) }}

      '
  - name: dc_zone01_lead_solar_h
    unique_id: dc_zone01_lead_solar_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    availability: '{{ states(''sensor.dc_zone01_hvac_mode'') not in [''unknown'',''unavailable'',''none'']
      }}

      '
    state: "{% set m = 'sensor.dc_zone01_hw_map' %} {% set hvac = states('sensor.dc_zone01_hvac_mode')\
      \ %}\n{# Lux SAFE (f1->f2->f3). Si ninguno disponible => 0 (fail-safe) #} {%\
      \ set lux = states('sensor.dc_zone01_lux_f1_safe') | float(none) %} {% set lux_ent\
      \ = 'sensor.dc_zone01_lux_f1_safe' %} {% if lux is none %}\n  {% set lux = states('sensor.dc_zone01_lux_f2_safe')\
      \ | float(none) %}\n  {% set lux_ent = 'sensor.dc_zone01_lux_f2_safe' %}\n{%\
      \ endif %} {% if lux is none %}\n  {% set lux = states('sensor.dc_zone01_lux_f3_safe')\
      \ | float(none) %}\n  {% set lux_ent = 'sensor.dc_zone01_lux_f3_safe' %}\n{%\
      \ endif %} {% if lux is none %}\n  {% set lux = 0.0 %}\n  {% set lux_ent = none\
      \ %}\n{% endif %}\n{% set lux_min = states('input_number.dc_zone01_lead_lux_min')|float(0)\
      \ %} {% set lux_span = states('input_number.dc_zone01_lead_lux_span')|float(1)\
      \ %} {% set lux_span = [lux_span, 0.1] | max %} {% set sr_max = states('input_number.dc_zone01_lead_solar_max_h')|float(0)\
      \ %} {% set rise_scale = states('input_number.dc_zone01_lead_lux_rise_scale')|float(1)\
      \ %} {% set rise_scale = [rise_scale, 0.1] | max %}\n{% set lvl = ((lux - lux_min)\
      \ / lux_span) if lux_span > 0 else 0 %} {% set lvl = [0, [lvl, 1.0]|min]|max\
      \ %}\n{# Lux trend opcional: si no existe o falla -> rise=1.0 #} {% set lux_tr_raw\
      \ = states('sensor.dc_exterior_lux_tendencia') %} {% set lux_tr = (lux_tr_raw|float(0))\
      \ if lux_tr_raw not in ['unknown','unavailable','none'] else none %} {% set\
      \ rise = (lux_tr / rise_scale) if (lux_tr is not none and rise_scale > 0) else\
      \ 1.0 %} {% set rise = [0, [rise, 1.0]|min]|max %}\n{# Solar SIEMPRE suma lead\
      \ en heat/cool #} {% set sr = (lvl * rise * sr_max) if hvac in ['heat','cool']\
      \ else 0.0 %} {{ sr | round(2) }}\n"
  - name: dc_zone01_lead_env_h
    unique_id: dc_zone01_lead_env_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    availability: '{{ states(''sensor.dc_zone01_hvac_mode'') not in [''unknown'',''unavailable'',''none'']
      }}

      '
    state: '{% set m = ''sensor.dc_zone01_hw_map'' %} {% set env = 0.0 %} {% set f1_ok
      = is_state(''binary_sensor.dc_zone01_f1_valida'',''on'') %} {% set f2_ok = is_state(''binary_sensor.dc_zone01_f2_valida'',''on'')
      %} {% set f3_ok = is_state(''binary_sensor.dc_zone01_f3_valida'',''on'') %}
      {% set c1 = state_attr(m,''f1_cover'') %} {% set c2 = state_attr(m,''f2_cover'')
      %} {% set c3 = state_attr(m,''f3_cover'') %} {% if f1_ok and c1 and (is_state(c1,''open'') or (state_attr(c1,''current_position'')|int(0) > 0))
      %}{% set env = env + (states(''input_number.dc_zone01_lead_env_f1_h'')|float(0))
      %}{% endif %} {% if f2_ok and c2 and (is_state(c2,''open'') or (state_attr(c2,''current_position'')|int(0) > 0)) %}{% set env = env
      + (states(''input_number.dc_zone01_lead_env_f2_h'')|float(0)) %}{% endif %}
      {% if f3_ok and c3 and (is_state(c3,''open'') or (state_attr(c3,''current_position'')|int(0) > 0)) %}{% set env = env + (states(''input_number.dc_zone01_lead_env_f3_h'')|float(0))
      %}{% endif %} {{ env | round(2) }}

      '
  - name: dc_zone01_lead_wind_h
    unique_id: dc_zone01_lead_wind_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    availability: '{{ states(''sensor.dc_zone01_hvac_mode'') not in [''unknown'',''unavailable'',''none'']
      }}

      '
    state: "{% set m = 'sensor.dc_zone01_hw_map' %} {% set w_ent = state_attr(m,'wind_speed')\
      \ %} {% set wind = 0.0 %} {% if w_ent is string and w_ent|length > 0 %}\n  {%\
      \ set w_raw = states(w_ent) %}\n  {% if is_number(w_raw) %}\n    {% set wind\
      \ = states('sensor.dc_zone01_wind_speed_safe') | float(none) %}\n{% if wind\
      \ is none %}{% set wind = 0 %}{% endif %}\n  {% endif %}\n{% endif %}\n{% set\
      \ w0 = states('input_number.dc_zone01_lead_wind_start')|float(0) %} {% set ws\
      \ = states('input_number.dc_zone01_lead_wind_span')|float(1) %} {% set wmax\
      \ = states('input_number.dc_zone01_lead_wind_max_h')|float(0) %}\n{% set wf\
      \ = ((wind - w0) / ws) if ws > 0 else 0 %} {% set wf = [0, [wf, 1.0]|min]|max\
      \ %} {{ (wf * wmax) | round(2) }}\n"
  - name: dc_zone01_lead_breakdown_sum_h
    unique_id: dc_zone01_lead_breakdown_sum_h
    unit_of_measurement: h
    device_class: duration
    state_class: measurement
    availability: "{{ is_number(states('sensor.dc_zone01_lead_tr_h'))\n   and is_number(states('sensor.dc_zone01_lead_solar_h'))\n\
      \   and is_number(states('sensor.dc_zone01_lead_env_h'))\n   and is_number(states('sensor.dc_zone01_lead_wind_h'))\
      \ }}\n"
    state: '{% set tr = states(''sensor.dc_zone01_lead_tr_h'')|float(0) %} {% set
      sr = states(''sensor.dc_zone01_lead_solar_h'')|float(0) %} {% set env = states(''sensor.dc_zone01_lead_env_h'')|float(0)
      %} {% set w  = states(''sensor.dc_zone01_lead_wind_h'')|float(0) %} {{ (tr +
      sr + env + w) | round(2) }}

      '
  - name: dc_zone01_tendencia_efectiva
    unique_id: dc_zone01_tendencia_efectiva
    unit_of_measurement: °C
    availability: "{{ is_number(states('sensor.dc_zone01_lead_final_h'))\n   and is_number(states('sensor.dc_zone01_tendencia_derivada'))\n\
      \   and is_number(states('input_number.dc_zone01_tendencia_max_shift')) }} \
      \       \n"
