      \ and in_window)\n  or is_state('timer.dc_zone01_override_3_timer','active')\n\
      }}"
  - name: dc_zone01_override_activo
    unique_id: dc_zone01_override_activo
    state: "{{\n  is_state('binary_sensor.dc_zone01_override_1_activo','on')\n  or\
      \ is_state('binary_sensor.dc_zone01_override_2_activo','on')\n  or is_state('binary_sensor.dc_zone01_override_3_activo','on')\n\
      }}"
    attributes:
      slot: '{% if is_state(''binary_sensor.dc_zone01_override_1_activo'',''on'')
        %} 1 {% elif is_state(''binary_sensor.dc_zone01_override_2_activo'',''on'')
        %} 2 {% elif is_state(''binary_sensor.dc_zone01_override_3_activo'',''on'')
        %} 3 {% else %} none {% endif %}'
- sensor:
  - name: dc_zone01_override_temperatura_activa
    unique_id: dc_zone01_override_temperatura_activa
    unit_of_measurement: °C
    device_class: temperature
    availability: '{{ is_state(''binary_sensor.dc_zone01_override_activo'',''on'')
      }}'
    state: '{% set s = (state_attr(''binary_sensor.dc_zone01_override_activo'',''slot'')
      | string) %} {% if s == ''1'' %} {{ states(''input_number.dc_zone01_override_1_temp'')
      | float(none) }} {% elif s == ''2'' %} {{ states(''input_number.dc_zone01_override_2_temp'')
      | float(none) }} {% elif s == ''3'' %} {{ states(''input_number.dc_zone01_override_3_temp'')
      | float(none) }} {% else %} {{ none }} {% endif %}'
- binary_sensor:
  - name: dc_zone01_watchdog_tendencia_stale
    unique_id: dc_zone01_watchdog_tendencia_stale
    icon: mdi:timer-alert
    state: "{% set ts = states('input_number.dc_zone01_tendencia_last_ts') | int(0)\
      \ %} {% if ts <= 0 %}\n  true\n{% else %}\n  {% set age = (as_timestamp(now())\
      \ | int(0)) - ts %}\n  {{ age > 1200 }}\n{% endif %}\n"
    attributes:
      age_s: "{% set ts = states('input_number.dc_zone01_tendencia_last_ts') | int(0)\
        \ %} {% if ts <= 0 %}\n  {{ none }}\n{% else %}\n  {{ (as_timestamp(now())\
        \ | int(0)) - ts }}\n{% endif %}\n"
      threshold_s: 1200
- sensor:
  - name: dc_zone01_dew_point_c
    unique_id: dc_zone01_dew_point_c
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set t_ent = state_attr(''sensor.dc_zone01_hw_map'',''t_int'')
      %} {% set h_ent = state_attr(''sensor.dc_zone01_hw_map'',''h_int'') %} {{ t_ent
      and h_ent and is_number(states(t_ent)) and is_number(states(h_ent)) }}

      '
    state: "{% set t_ent = state_attr('sensor.dc_zone01_hw_map','t_int') %} {% set\
      \ h_ent = state_attr('sensor.dc_zone01_hw_map','h_int') %} {% set t = states(t_ent)\
      \ | float(none) %} {% set rh = states(h_ent) | float(none) %} {% if t is none\
      \ or rh is none or rh <= 0 %}\n  {{ none }}\n{% else %}\n  {# Magnus-Tetens\
      \ (agua), válido aprox -45..60°C #}\n  {% set a = 17.62 %}\n  {% set b = 243.12\
      \ %}\n  {% set gamma = ((a * t) / (b + t)) + ((rh / 100) | log) %}\n  {{ ((b\
      \ * gamma) / (a - gamma)) | round(2) }}\n{% endif %}\n"
    attributes:
      t_source: '{{ state_attr(''sensor.dc_zone01_hw_map'',''t_int'') }}'
      rh_source: '{{ state_attr(''sensor.dc_zone01_hw_map'',''h_int'') }}'
      reason_code: '{% set t_ent = state_attr(''sensor.dc_zone01_hw_map'',''t_int'')
        %} {% set h_ent = state_attr(''sensor.dc_zone01_hw_map'',''h_int'') %} {%
        if not t_ent or not h_ent %}missing_hwmap_key {% elif not is_number(states(t_ent))
        or not is_number(states(h_ent)) %}non_numeric {% else %}ok{% endif %}

        '
  - name: dc_zone01_dew_target_c
    unique_id: dc_zone01_dew_target_c
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set w_ent = state_attr(''sensor.dc_zone01_hw_map'',''t_agua'')
      %} {{ w_ent and is_number(states(w_ent)) }}

      '
    state: "{% set w_ent = state_attr('sensor.dc_zone01_hw_map','t_agua') %} {% set\
      \ w = states(w_ent) | float(none) %} {% set m = states('input_number.dc_zone01_dew_margin_c')\
      \ | float(0.5) %} {% if w is none %}\n  {{ none }}\n{% else %}\n  {{ (w + m)\
      \ | round(2) }}\n{% endif %}\n"
    attributes:
      water_source: '{{ state_attr(''sensor.dc_zone01_hw_map'',''t_agua'') }}'
      margin_c: '{{ states(''input_number.dc_zone01_dew_margin_c'') }}'
      reason_code: '{% set w_ent = state_attr(''sensor.dc_zone01_hw_map'',''t_agua'')
        %} {% if not w_ent %}missing_hwmap_key {% elif not is_number(states(w_ent))
        %}non_numeric {% else %}ok{% endif %}

        '
  - name: dc_zone01_dew_spread_c
    unique_id: dc_zone01_dew_spread_c
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{{ is_number(states(''sensor.dc_zone01_dew_point_c'')) and is_number(states(''sensor.dc_zone01_dew_target_c''))
      }}

      '
    state: "{% set dp = states('sensor.dc_zone01_dew_point_c') | float(none) %} {%\
      \ set tg = states('sensor.dc_zone01_dew_target_c') | float(none) %} {% if dp\
      \ is none or tg is none %}\n  {{ none }}\n{% else %}\n  {{ (tg - dp) | round(2)\
      \ }}\n{% endif %}\n"
- binary_sensor:
  - name: dc_zone01_dewpoint_safe
    unique_id: dc_zone01_dewpoint_safe
    attributes:
      reason_code: '{% set t_ent = state_attr(''sensor.dc_zone01_hw_map'',''t_int'')
        %} {% set h_ent = state_attr(''sensor.dc_zone01_hw_map'',''h_int'') %} {%
        set w_ent = state_attr(''sensor.dc_zone01_hw_map'',''t_agua'') %} {% if not
        t_ent or not h_ent or not w_ent %}missing_hwmap_key {% elif not is_number(states(t_ent))
        or not is_number(states(h_ent)) or not is_number(states(w_ent)) %}non_numeric
        {% else %}ok{% endif %}

        '
    icon: mdi:water-check
    device_class: connectivity
    state: '{{ is_number(states(''sensor.dc_zone01_dew_point_c'')) and is_number(states(''sensor.dc_zone01_dew_target_c''))
      }}

      '
  - name: dc_zone01_riesgo_rocio
    unique_id: dc_zone01_riesgo_rocio
    attributes:
      dew_spread: '{{ states(''sensor.dc_zone01_dew_spread_c'') }}'
      reason_code: '{% if not is_number(states(''sensor.dc_zone01_dew_spread_c''))
        %}missing_spread {% else %}ok{% endif %}

        '
    device_class: moisture
    state: '{% set s = states(''sensor.dc_zone01_dew_spread_c'') | float(none) %}
      {{ s is not none and s <= 0 }}

      '
  - name: dc_zone01_dew_prerisk
    unique_id: dc_zone01_dew_prerisk
    attributes:
      dew_spread: '{{ states(''sensor.dc_zone01_dew_spread_c'') }}'
      prerisk_delta_c: '{{ states(''input_number.dc_zone01_dew_prerisk_delta_c'')
        }}'
      reason_code: '{% if not is_number(states(''sensor.dc_zone01_dew_spread_c''))
        %}missing_spread {% elif not is_number(states(''input_number.dc_zone01_dew_prerisk_delta_c''))
        %}missing_delta {% else %}ok{% endif %}

        '
    icon: mdi:water-alert
    device_class: moisture
    state: '{% set s = states(''sensor.dc_zone01_dew_spread_c'') | float(none) %}
      {% set d = states(''input_number.dc_zone01_dew_prerisk_delta_c'') | float(1.0)
      %} {{ s is not none and s > 0 and s <= d }}

      '
- binary_sensor:
  - name: dc_zone01_ventana_abierta
    unique_id: dc_zone01_ventana_abierta
    icon: mdi:window-open
    state: "{% if is_state('input_boolean.dc_zone01_enable_window_sensor','off') %}\n\
      \  false\n{% else %}\n  {% set g = state_attr('group.dc_zone01_grupo_sensores_ventana','entity_id')\
      \ or [] %}\n  {% if g | count == 0 %}\n    false\n  {% else %}\n    {% set ents\
      \ = expand(g) %}\n    {{ ents | selectattr('state','in',['on','open','opened','true'])\
      \ | list | count > 0 }}\n  {% endif %}\n{% endif %}\n"
  - name: dc_zone01_f1_valida
    unique_id: dc_zone01_f1_valida
    state: "{% set f = state_attr('sensor.dc_zone01_hw_map','f1_cover') %} {{\n  is_state('input_boolean.dc_zone01_f1_enabled','on')\n\
      \  and f not in [none, '']\n  and f in states\n  and states(f) not in ['unknown','unavailable','none','']\n\
      }}"
  - name: dc_zone01_f2_valida
    unique_id: dc_zone01_f2_valida
    state: "{% set f = state_attr('sensor.dc_zone01_hw_map','f2_cover') %} {{\n  is_state('input_boolean.dc_zone01_f2_enabled','on')\n\
      \  and f not in [none, '']\n  and f in states\n  and states(f) not in ['unknown','unavailable','none','']\n\
      }}"
  - name: dc_zone01_f3_valida
    unique_id: dc_zone01_f3_valida
    state: "{% set f = state_attr('sensor.dc_zone01_hw_map','f3_cover') %} {{\n  is_state('input_boolean.dc_zone01_f3_enabled','on')\n\
      \  and f not in [none, '']\n  and f in states\n  and states(f) not in ['unknown','unavailable','none','']\n\
      }}"
  - name: dc_zone01_stats
    unique_id: dc_zone01_stats
    icon: mdi:heart-pulse
    state: "{% set max_age = states('input_number.dc_zone01_stats_max_age_s') | float(900)\
      \ %} {% set a = (as_timestamp(now()) - as_timestamp(states.sensor.dc_zone01_target_final.last_updated))\
      \ if states.sensor.dc_zone01_target_final is defined else none %} {% if a is\
      \ none %}\n  fail\n{% elif a > max_age %}\n  degraded\n{% else %}\n  ok\n{%\
      \ endif %}"
    attributes:
      max_age_s: '{{ states(''input_number.dc_zone01_stats_max_age_s'') | float(900)
        }}'
      hvac_mode: '{{ states(''sensor.dc_zone01_hvac_mode'') }}'
      target_final_age_s: "{% if states.sensor.dc_zone01_target_final is defined %}\n\
        \  {{ (as_timestamp(now()) - as_timestamp(states.sensor.dc_zone01_target_final.last_updated))\
        \ | round(0) }}\n{% else %}\n  {{ none }}\n{% endif %}"
      tendencia_age_s: "{% if states.sensor.dc_zone01_tendencia_derivada is defined\
        \ %}\n  {{ (as_timestamp(now()) - as_timestamp(states.sensor.dc_zone01_tendencia_derivada.last_updated))\
        \ | round(0) }}\n{% else %}\n  {{ none }}\n{% endif %}"
      overrides_active_count: "{{ [\n  is_state('binary_sensor.dc_zone01_override_1_activo','on'),\n\
        \  is_state('binary_sensor.dc_zone01_override_2_activo','on'),\n  is_state('binary_sensor.dc_zone01_override_3_activo','on')\n\
        ] | select('eq', true) | list | count }}"
      fachadas_validas_count: "{{ [\n  is_state('binary_sensor.dc_zone01_f1_valida','on'),\n\
        \  is_state('binary_sensor.dc_zone01_f2_valida','on'),\n  is_state('binary_sensor.dc_zone01_f3_valida','on')\n\
        ] | select('eq', true) | list | count }}"
      watchdog_tendencia_stale: '{{ states(''binary_sensor.dc_zone01_watchdog_tendencia_stale'')
        }}'
      windows_enabled: '{{ states(''input_boolean.dc_zone01_enable_window_sensor'')
        }}'
      window_open: '{{ states(''binary_sensor.dc_zone01_ventana_abierta'') }}'
  - name: dc_zone01_stats_max_age_s_fallback
    unique_id: dc_zone01_stats_max_age_s_fallback
    unit_of_measurement: s
    state: '{{ 900 }}'
