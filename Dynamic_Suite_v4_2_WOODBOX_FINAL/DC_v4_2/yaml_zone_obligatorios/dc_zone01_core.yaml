      \ %} {% set t_int_ent = state_attr(m,'t_int') %} {{ (t_int_ent is string and\
      \ t_int_ent not in bad)\n   and is_number(states('sensor.dc_zone01_t_int_safe'))\n\
      \   and (states('sensor.dc_zone01_base_activa') | float(none)) is not none }}\n"
    state: "{# Helpers #} {% set bad = [none,'unknown','unavailable',''] %} {% set\
      \ m = 'sensor.dc_zone01_hw_map' %}\n{% set hvac = states('sensor.dc_zone01_hvac_mode')\
      \ %} {% set base = states('sensor.dc_zone01_base_activa') | float(none) %}\n\
      {% set t_int = states('sensor.dc_zone01_t_int_safe') | float(none) %}\n{% if\
      \ base is none or t_int is none %}\n  {{ none }}\n{% else %}\n\n  {% set lux_low\
      \ = states('input_number.dc_zone01_fachada_lux_low') | float(300) %}\n  {% set\
      \ lux_high = states('input_number.dc_zone01_fachada_lux_high') | float(2800)\
      \ %}\n  {% set margin_heat = states('input_number.dc_zone01_fachada_solar_margin_heat')\
      \ | float(0.5) %}\n\n  {% set gain_heat = states('input_number.dc_zone01_fachada_gain_heat_max')\
      \ | float(0.15) %}\n  {% set freno_heat = states('input_number.dc_zone01_fachada_freno_heat_max')\
      \ | float(0.15) %}\n  {% set freno_cool = states('input_number.dc_zone01_fachada_freno_cool_max')\
      \ | float(0.15) %}\n\n  {% set w_low = states('input_number.dc_zone01_fachada_w_poco_abierta')\
      \ | float(0.35) %}\n  {% set w_mid = states('input_number.dc_zone01_fachada_w_entreabierta')\
      \ | float(0.7) %}\n  {% set w_open = states('input_number.dc_zone01_fachada_w_abierta')\
      \ | float(1.0) %}\n\n  {% macro boolish(ent) -%}\n    {%- if ent in bad -%}false\n\
      \    {%- else -%}\n      {%- set s = (states(ent) | string) | lower -%}\n  \
      \    {{ s in ['true','on','1','yes'] }}\n    {%- endif -%}\n  {%- endmacro %}\n\
      \n  {% macro cover_weight(ent) -%}\n    {%- if ent in bad -%}0\n    {%- else\
      \ -%}\n      {%- set p = state_attr(ent,'current_position') -%}\n      {%- set\
      \ pos = (p | float(none)) -%}\n      {%- if pos is none -%}0\n      {%- elif\
      \ pos == 0 -%}0.1\n      {%- elif pos <= 20 -%}{{ w_low }}\n      {%- elif pos\
      \ <= 80 -%}{{ w_mid }}\n      {%- else -%}{{ w_open }}\n      {%- endif -%}\n\
      \    {%- endif -%}\n  {%- endmacro %}\n\n  {% macro lux_norm(ent) -%}\n    {%-\
      \ if ent in bad -%}0\n    {%- else -%}\n      {%- set lx = states(ent) | float(none)\
      \ -%}\n      {%- if lx is none or lux_high <= lux_low -%}0\n      {%- else -%}\n\
      \        {%- set n = (lx - lux_low) / (lux_high - lux_low) -%}\n        {{ 0\
      \ if n < 0 else (1 if n > 1 else n) }}\n      {%- endif -%}\n    {%- endif -%}\n\
      \  {%- endmacro %}\n\n  {% macro fachada_bias(idx) -%}\n    {%- set en = is_state('binary_sensor.dc_zone01_f'\
      \ ~ idx ~ '_valida','on') -%}\n    {%- if not en -%}0\n    {%- else -%}\n  \
      \    {%- set cover = state_attr(m,'f' ~ idx ~ '_cover') -%}\n      {%- set sun\
      \  = state_attr(m,'f' ~ idx ~ '_is_in_sun') -%}\n      {%- set lux  = state_attr(m,'f'\
      \ ~ idx ~ '_lux') -%}\n      {%- set te   = state_attr(m,'f' ~ idx ~ '_t_ext')\
      \ -%}\n\n      {%- set w = cover_weight(cover) | float(0) -%}\n      {%- if\
      \ w == 0 -%}0\n      {%- else -%}\n        {%- set is_sun = boolish(sun) -%}\n\
      \        {%- set ln = (lux_norm(lux) | float(0)) -%}\n        {%- set solar\
      \ = (1 if is_sun else 0) * ln -%}\n\n        {# t_ext es opcional por fachada:\
      \ si falta, esa fachada NO aporta #}\n        {%- set t_ext = (states(te) |\
      \ float(none)) if (te is string and te not in bad) else none -%}\n        {%-\
      \ if t_ext is none -%}0\n        {%- else -%}\n          {%- set d = t_ext -\
      \ t_int -%}\n\n          {# Parte A: efecto por temperatura exterior vs interior\
      \ (sin sol) #}\n          {%- set temp_term = 0 -%}\n          {%- if hvac in\
      \ ['heat','cool'] -%}\n            {%- if d > 0 -%}\n              {%- set temp_term\
      \ = (-0.10 * w) -%}\n            {%- elif d < 0 -%}\n              {%- set temp_term\
      \ = (0.10 * w) -%}\n            {%- else -%}\n              {%- set temp_term\
      \ = 0 -%}\n            {%- endif -%}\n          {%- endif -%}\n\n          {#\
      \ Parte B: efecto solar (con freno si vamos cerca / por encima de base) #}\n\
      \          {%- set solar_term = 0 -%}\n          {%- if solar > 0 -%}\n    \
      \        {%- if hvac == 'heat' -%}\n              {%- if t_int >= (base - margin_heat)\
      \ -%}\n                {%- set solar_term = (-freno_heat * solar * w) -%}\n\
      \              {%- else -%}\n                {%- set solar_term = (gain_heat\
      \ * solar * w) -%}\n              {%- endif -%}\n            {%- elif hvac ==\
      \ 'cool' -%}\n              {%- set solar_term = (-freno_cool * solar * w) -%}\n\
      \            {%- endif -%}\n          {%- endif -%}\n\n          {{ (temp_term\
      \ + solar_term) | round(3) }}\n        {%- endif -%}\n      {%- endif -%}\n\
      \    {%- endif -%}\n  {%- endmacro %}\n\n  {% set max_abs = states('input_number.dc_zone01_fachada_bias_max_abs')\
      \ | float(0.20) %}\n\n  {% set b1r = fachada_bias(1) | float(0) %}\n  {% set\
      \ b2r = fachada_bias(2) | float(0) %}\n  {% set b3r = fachada_bias(3) | float(0)\
      \ %}\n\n  {% set b1 = (max_abs if b1r >  max_abs else (-max_abs if b1r < -max_abs\
      \ else b1r)) %}\n  {% set b2 = (max_abs if b2r >  max_abs else (-max_abs if\
      \ b2r < -max_abs else b2r)) %}\n  {% set b3 = (max_abs if b3r >  max_abs else\
      \ (-max_abs if b3r < -max_abs else b3r)) %}\n\n  {{ (b1 + b2 + b3) | round(3)\
      \ }}\n\n{% endif %}\n"
