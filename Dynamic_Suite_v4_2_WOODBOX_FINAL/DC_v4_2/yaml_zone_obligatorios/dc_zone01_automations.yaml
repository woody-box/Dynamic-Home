    - service: script.dc_zone01_apply_preset_section
      data:
        group: bias_forecast
        preset: '{{ states(''input_select.dc_zone01_preset_bias_forecast'') }}'
  dc_zone01_log_telemetry:
    alias: dc_zone01_log_telemetry
    mode: queued
    max: 50
    fields:
      reason:
        description: Motivo resumido (texto corto)
      sp_before:
        description: Consigna antes (float)
      sp_after:
        description: Consigna después (float)
      delta:
        description: Delta aplicado (float)
    sequence:
    - variables:
        hvac: '{{ states(''sensor.dc_zone01_hvac_mode'') }}'
        base: '{{ states(''sensor.dc_zone01_base_activa'') }}'
        ext: '{{ states(''sensor.dc_zone01_bias_exterior_raw'') }}'
        fac: '{{ states(''sensor.dc_zone01_bias_fachadas_raw'') }}'
        fcs: '{{ states(''sensor.dc_zone01_bias_forecast_ema'') }}'
        vmc: '{{ states(''sensor.dc_zone01_bias_vmc'') }}'
        tr: '{{ states(''sensor.dc_zone01_freno_tendencia'') }}'
        lead: '{{ states(''sensor.dc_zone01_lead_final_h'') }}'
        tgt: '{{ states(''sensor.dc_zone01_target_final'') }}'
        valve: '{{ states(''binary_sensor.dc_zone01_valve_open'') }}'
        nowts: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        spb: '{{ sp_before | float(none) }}'
        spa: '{{ sp_after  | float(none) }}'
        dd: '{{ delta     | float(none) }}'
        rsn: '{{ reason | default(''---'') }}'
        line: '{{ nowts }} | hvac={{ hvac }} | sp={{ ''---'' if spb is none else (spb|round(1))
          }}→{{ ''---'' if spa is none else (spa|round(1)) }} | Δ={{ ''---'' if dd
          is none else (dd|round(2)) }} | base={{ base }} | ext={{ ext }} fac={{ fac
          }} fcs={{ fcs }} vmc={{ vmc }} tr={{ tr }} | lead_h={{ lead }} | tgt={{
          tgt }} | valve={{ valve }} | {{ rsn }}'
    - service: logbook.log
      data:
        name: dc_zone01_telemetry
        message: '{{ line }}'
    - variables:
        old: '{{ states(''input_text.dc_zone01_telemetry_ring'') }}'
        joined: '{% set s = (line ~ ''\n'' ~ (old if old not in [''unknown'',''unavailable'',''none'',
          none] else '''')) %} {{ s[:2048] }}'
    - service: input_text.set_value
      target:
        entity_id: input_text.dc_zone01_telemetry_ring
      data:
        value: '{{ joined }}'
  dc_zone01_selftest_full:
    alias: dc_zone01_selftest_full
    mode: single
    sequence:
    - variables:
        m: sensor.dc_zone01_hw_map
        bad:
        - unknown
        - unavailable
        - none
        - ''
        errs: ''
        clim: '{{ state_attr(m,''climate'') }}'
        t_int: '{{ state_attr(''sensor.dc_zone01_t_int_safe'',''source'') }}'
        t_ext: '{{ state_attr(''sensor.dc_zone01_t_ext_safe'',''source'') }}'
        vac: '{{ state_attr(m,''vacaciones'') }}'
        valve: '{{ state_attr(m,''valve_switch'') }}'
        f_ent: '{{ state_attr(m,''forecast_entity'') }}'
        f_time: "{% if f_ent and states(f_ent) not in bad %}\n  {{ state_attr(f_ent,'hourly.time')\
          \ }}\n{% else %}\n  {{ none }}\n{% endif %}"
        base: '{{ states(''sensor.dc_zone01_base_activa'') | float(none) }}'
        tgt: '{{ states(''sensor.dc_zone01_target_final'') | float(none) }}'
        learning_on: '{{ is_state(''input_boolean.dc_zone01_adaptive_lead_enabled'',''on'')
          if states(''input_boolean.dc_zone01_adaptive_lead_enabled'') not in bad
          else false }}'
    - variables:
        errs: '{% set e = [] %} {% if states(m) in bad %}{% set e = e + [''HW map:
          sensor.dc_zone01_hw_map no disponible''] %}{% endif %} {% if not clim or
          clim in bad %}{% set e = e + [''HW map: falta climate''] %}{% endif %} {%
          if not t_int or t_int in bad %}{% set e = e + [''HW map: falta t_int'']
          %}{% endif %} {% if not t_ext or t_ext in bad %}{% set e = e + [''HW map:
          falta t_ext''] %}{% endif %} {% if not vac or vac in bad %}{% set e = e
          + [''HW map: falta vacaciones (attr)''] %}{% endif %} {{ e | join(''\n'')
          }}'
    - variables:
        errs: '{% set e = (errs.split(''\n'') if errs else []) %} {% if base is none
          %}{% set e = e + [''Rango: base_activa no numérica''] %}{% endif %} {% if
          base is not none and (base < 10 or base > 35) %}{% set e = e + [''Rango:
          base_activa fuera de 10–35''] %}{% endif %} {% if tgt is none %}{% set e
          = e + [''Rango: target_final no numérica''] %}{% endif %} {% if tgt is not
          none and (tgt < 10 or tgt > 35) %}{% set e = e + [''Rango: target_final
          fuera de 10–35''] %}{% endif %} {{ e | join(''\n'') }}'
    - variables:
        errs: "{% set e = (errs.split('\\n') if errs else []) %} {% if f_ent and f_ent\
          \ not in bad %}\n  {% if f_time is none %}\n    {% set e = e + ['Forecast:\
          \ hourly.time no disponible en ' ~ f_ent] %}\n  {% elif not (f_time is sequence)\
          \ %}\n    {% set e = e + ['Forecast: hourly.time no es secuencia en ' ~\
          \ f_ent] %}\n  {% endif %}\n{% endif %} {{ e | join('\\n') }}"
    - variables:
        errs: "{% set e = (errs.split('\\n') if errs else []) %} {% if learning_on\
          \ and (not valve or valve in bad) %}\n  {% set e = e + ['Coherencia: Adaptive\
          \ Lead ON pero falta valve_switch en HW map'] %}\n{% endif %} {{ e | join('\\\
          n') }}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ not errs }}'
        sequence:
        - service: persistent_notification.dismiss
          data:
            notification_id: dc_zone01_selftest_full
        - service: logbook.log
          data:
            name: dc_zone01_self_test
            message: ✅ OK (FULL)
      - conditions:
        - condition: template
          value_template: '{{ errs }}'
        sequence:
        - service: persistent_notification.create
          data:
            title: DC Zone01 · Self-test (FULL) ❌
            message: 'Se han detectado problemas:

              {{ errs }}'
            notification_id: dc_zone01_selftest_full
        - service: logbook.log
          data:
            name: dc_zone01_self_test
            message: ❌ KO (FULL) — ver notificación
    - event: dc_zone01_selftest_result
      event_data:
        test: selftest_full
        ok: '{{ not errs }}'
        msg: "{% if not errs %}\n  OK\n{% else %}\n  {{ (errs | replace('\\n',' ·\
          \ '))[:220] }}\n{% endif %}"
  dc_zone01_test_adaptive_learning:
    alias: dc_zone01_test_adaptive_learning
    mode: single
    sequence:
    - variables:
        bad:
        - unknown
        - unavailable
        - none
        - ''
        enabled: '{{ is_state(''input_boolean.dc_zone01_adaptive_lead_enabled'',''on'')
          }}'
        hw_ok: '{{ is_state(''binary_sensor.dc_zone01_hw_ok_valve_switch'',''on'')
          }}'
        off_sp: '{{ states(''input_number.dc_zone01_rt_off_sp'') | float(none) }}'
        off_peak: '{{ states(''input_number.dc_zone01_rt_off_peak'') | float(none)
          }}'
        sentinel: '{{ (off_sp is not none and off_sp <= -40) or (off_peak is not none
          and off_peak <= -40) }}'
        ok: '{{ (not enabled) or (hw_ok and not sentinel) }}'
        msg: "{% if not enabled %}\n  Adaptive Lead OFF → OK\n{% elif not hw_ok %}\n\
          \  Adaptive Lead ON pero falta valve_switch / hw_ok_valve_switch=off\n{%\
          \ elif sentinel %}\n  Adaptive Lead ON pero runtime OFF tiene sentinel (-50):\
          \ rt_off_sp={{ off_sp }}, rt_off_peak={{ off_peak }}\n{% else %}\n  Adaptive\
          \ Lead OK (hw_ok + sin sentinel)\n{% endif %}"
    - event: dc_zone01_selftest_result
      event_data:
        test: adaptive_learning
        ok: '{{ ok }}'
        msg: '{{ msg }}'
  dc_zone01_selftest_overall:
    alias: dc_zone01_selftest_overall
    mode: single
    sequence:
    - event: dc_zone01_selftest_reset
    - service: script.dc_zone01_selftest_full
    - service: script.dc_zone01_test_hw_map
    - service: script.dc_zone01_test_sensores_criticos
    - service: script.dc_zone01_test_pipeline
    - service: script.dc_zone01_test_lux_trend
    - service: script.dc_zone01_test_solar_params
    - service: script.dc_zone01_test_adaptive_learning
    - delay: 00:00:01
    - variables:
        res: '{{ state_attr(''sensor.dc_zone01_selftest_storage'',''results'') }}'
        fails: "{% set out = namespace(n=0) %} {% if res is iterable and res is not\
          \ string %}\n  {% for it in res %}\n    {% if not (it.ok | default(false))\
          \ %}\n      {% set out.n = out.n + 1 %}\n    {% endif %}\n  {% endfor %}\n\
          {% endif %} {{ out.n }}"
        fail_list: "{% set out = namespace(lst=[]) %} {% if res is iterable and res\
          \ is not string %}\n  {% for it in res %}\n    {% if not (it.ok | default(false))\
          \ %}\n      {% set out.lst = out.lst + [ (it.test | default('unknown'))\
          \ ] %}\n    {% endif %}\n  {% endfor %}\n{% endif %} {{ out.lst }}"
        fail_list_txt: '{{ (fail_list | join('', '')) if (fail_list | length) > 0
          else ''—'' }}'
        ok: '{{ fails == 0 }}'
        msg: "{% if ok %}\n  DC Zone01 Self-test OVERALL: ✅ OK ({{ (res | length)\
          \ if (res is iterable and res is not string) else 0 }} tests)\n{% else %}\n\
          \  DC Zone01 Self-test OVERALL: ❌ {{ fails }} FAILS → {{ fail_list_txt\
          \ }}\n{% endif %}"
    - service: system_log.write
      data:
        level: '{% if ok %}info{% else %}warning{% endif %}'
        message: '{{ msg }}'
    - service: logbook.log
      data:
        name: dc_zone01_self_test
        message: '{{ msg }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ not ok }}'
        sequence:
        - service: persistent_notification.create
          data:
            title: DC Zone01 · Self-test (OVERALL)
            message: '{{ msg }}'
            notification_id: dc_zone01_selftest_overall
      default:
      - service: persistent_notification.dismiss
        data:
          notification_id: dc_zone01_selftest_overall
  dc_zone01_apply_preset_bias_exterior:
    alias: dc_zone01_apply_preset_bias_exterior
    mode: single
    sequence:
    - service: script.dc_zone01_apply_preset_section
      data:
        group: bias_exterior
        preset: '{{ states(''input_select.dc_zone01_preset_bias_exterior'') }}'
  dc_zone01_apply_preset_bias_fachadas:
