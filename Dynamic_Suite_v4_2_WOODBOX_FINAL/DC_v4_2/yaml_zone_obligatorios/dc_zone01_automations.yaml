  dc_zone01_apply_preset_section:
    alias: dc_zone01_apply_preset_section
    mode: single
    fields:
      group:
        description: Sección a aplicar (bias_exterior | bias_fachadas | bias_vmc |
          bias_tendencia | freno_tendencia | lead | bias_forecast)
        example: bias_vmc
      preset:
        description: Preset a aplicar (normal | conservative | aggressive)
        example: aggressive
    sequence:
    - variables:
        fab: sensor.dc_zone01_fabrica
        grp: '{{ group | default('''') }}'
        pre: '{{ preset | default(''normal'') }}'
        group_patterns: "{{\n  dict(\n    bias_exterior=[\n      '^dc_zone01_bias_ext_.*',\n\
          \      '^dc_zone01_aislamiento_bias_exterior$',\n      '^dc_zone01_umbral_calor_exterior$',\n\
          \      '^dc_zone01_umbral_frio_exterior$'\n    ],\n    bias_fachadas=[\n\
          \      '^dc_zone01_f[123]_enabled$',\n      '^dc_zone01_fachada_.*'\n  \
          \  ],\n    bias_vmc=[\n      '^dc_zone01_vmc_enabled$',\n      '^dc_zone01_vmc_.*'\n\
          \    ],\n    bias_tendencia=[\n      '^dc_zone01_tendencia_ma_alpha$',\n\
          \      '^dc_zone01_tendencia_max_abs_cph$',\n      '^dc_zone01_tendencia_max_shift$',\n\
          \      '^dc_zone01_tendencia_umbral_estable$'\n    ],\n    freno_tendencia=[\n\
          \      '^dc_zone01_freno_tend_.*'\n    ],\n    lead=[\n      '^dc_zone01_lead_.*',\n\
          \      '^dc_zone01_tendencia_lead_gain$',\n      '^dc_zone01_adaptive_lead_enabled$',\n\
          \      '^dc_zone01_adapt_.*'\n    ],\n    bias_forecast=[\n      '^dc_zone01_forecast_.*',\n\
          \      '^dc_zone01_bias_forecast_.*',\n      '^dc_zone01_forecast_enabled$'\n\
          \    ]\n  )\n}}\n"
        patterns: '{% set p = group_patterns.get(grp, []) %} {{ p }}

          '
        keys_all: '{% set a = states[fab].attributes %} {% set k = a.keys() | select(''match'',''^dc_zone01_'')
          | list %} {{ k | sort }}

          '
        keys_group: "{% set out = namespace(l=[]) %} {% for k in keys_all %}\n  {%\
          \ set matched = namespace(v=false) %}\n  {% for r in patterns %}\n    {%\
          \ if (not matched.v) and (k is match(r)) %}\n      {% set out.l = out.l\
          \ + [k] %}\n      {% set matched.v = true %}\n    {% endif %}\n  {% endfor\
          \ %}\n{% endfor %} {{ out.l | unique | list | sort }}\n"
        base_entities: "{% set out = namespace(l=[]) %} {% for k in keys_group %}\n\
          \  {% set n = 'input_number.' ~ k %}\n  {% set b = 'input_boolean.' ~ k\
          \ %}\n  {% set t = 'input_text.' ~ k %}\n  {% set d = 'input_datetime.'\
          \ ~ k %}\n  {% if states(n) != 'unknown' %}\n    {% set out.l = out.l +\
          \ [n] %}\n  {% elif states(b) != 'unknown' %}\n    {% set out.l = out.l\
          \ + [b] %}\n  {% elif states(t) != 'unknown' %}\n    {% set out.l = out.l\
          \ + [t] %}\n  {% elif states(d) != 'unknown' %}\n    {% set out.l = out.l\
          \ + [d] %}\n  {% endif %}\n{% endfor %} {{ out.l | unique | list }}\n"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ grp == '''' }}'
        sequence:
        - stop: Falta field group.
      - conditions:
        - condition: template
          value_template: '{{ pre not in [''normal'',''conservative'',''aggressive'']
            }}'
        sequence:
        - stop: 'Preset inválido. Usa: normal | conservative | aggressive.'
      - conditions:
        - condition: template
          value_template: '{{ base_entities | count == 0 }}'
        sequence:
        - stop: No hay helpers detectados para esta sección (base_entities vacío).
    - variables:
        payload: "{% set out = namespace(d={}) %} {% for ent in base_entities %}\n\
          \  {% set k = ent.split('.',1)[1] %}\n\n  {% set fab_src = fab %}\n  {%\
          \ if pre in ['conservative','aggressive'] %}\n    {% set fab_src = 'sensor.dc_zone01_fabrica_'\
          \ ~ pre %}\n  {% endif %}\n\n  {% set v = state_attr(fab_src, k) %}\n  {%\
          \ if v is none %}\n    {% set v = state_attr(fab, k) %}\n  {% endif %}\n\
          \n  {% if v is not none %}\n    {% set out.d = dict(out.d, **{ ent: v })\
          \ %}\n  {% endif %}\n{% endfor %} {{ out.d }}\n"
    - repeat:
        for_each: '{{ payload | dictsort }}'
        sequence:
        - variables:
            ent: '{{ repeat.item[0] }}'
            val: '{{ repeat.item[1] }}'
            dom: '{{ ent.split(''.'')[0] }}'
            minv: '{{ state_attr(ent,''min'') | float(none) }}'
            maxv: '{{ state_attr(ent,''max'') | float(none) }}'
            step: '{{ state_attr(ent,''step'') | float(none) }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ dom == ''input_number'' }}'
            sequence:
            - variables:
                v: '{{ val | float(none) }}'
                clamped: "{% if v is none %}\n  {{ none }}\n{% elif minv is not none\
                  \ and maxv is not none %}\n  {{ [minv, [v, maxv] | min] | max }}\n\
                  {% else %}\n  {{ v }}\n{% endif %}\n"
                quant: "{% if clamped is none %}\n  {{ none }}\n{% elif step is not\
                  \ none and step > 0 %}\n  {{ ((clamped / step) | round(0)) * step\
                  \ }}\n{% else %}\n  {{ clamped }}\n{% endif %}\n"
            - condition: template
              value_template: '{{ quant is not none }}'
            - service: input_number.set_value
              target:
                entity_id: '{{ ent }}'
              data:
                value: '{{ quant }}'
          - conditions:
            - condition: template
              value_template: '{{ dom == ''input_boolean'' }}'
            sequence:
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ val == true }}'
                sequence:
                - service: input_boolean.turn_on
                  target:
                    entity_id: '{{ ent }}'
              - conditions:
                - condition: template
                  value_template: '{{ val == false }}'
                sequence:
                - service: input_boolean.turn_off
                  target:
                    entity_id: '{{ ent }}'
          - conditions:
            - condition: template
              value_template: '{{ dom == ''input_datetime'' }}'
            sequence:
            - variables:
                has_date: '{{ state_attr(ent,''has_date'') }}'
                has_time: '{{ state_attr(ent,''has_time'') }}'
                s: '{{ val | string }}'
                d: '{% if '' '' in s %}{{ s.split('' '')[0] }}{% else %}{{ s }}{%
                  endif %}'
                t: '{% if '' '' in s %}{{ s.split('' '')[1] }}{% else %}{{ s }}{%
                  endif %}'
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ has_date and has_time }}'
                sequence:
                - service: input_datetime.set_datetime
                  target:
                    entity_id: '{{ ent }}'
                  data:
                    date: '{{ d }}'
                    time: '{{ t }}'
              - conditions:
                - condition: template
                  value_template: '{{ has_date and not has_time }}'
                sequence:
                - service: input_datetime.set_datetime
                  target:
                    entity_id: '{{ ent }}'
                  data:
                    date: '{{ d }}'
              - conditions:
                - condition: template
                  value_template: '{{ has_time and not has_date }}'
                sequence:
                - service: input_datetime.set_datetime
                  target:
                    entity_id: '{{ ent }}'
                  data:
                    time: '{{ t }}'
          - conditions:
            - condition: template
              value_template: '{{ dom == ''input_text'' }}'
            sequence:
            - variables:
                s: '{{ val | string }}'
                s2: '{{ s[:250] }}'
            - service: input_text.set_value
              target:
                entity_id: '{{ ent }}'
              data:
                value: '{{ s2 }}'
    - service: persistent_notification.create
      data:
        title: DC Zone01 · Preset aplicado
        message: 'Sección: {{ grp }} Preset: {{ pre }} Aplicados: {{ payload | count
          }} {% if missing_sources | count > 0 %} Aviso: faltan helpers de preset
          (no aplicados): {{ missing_sources | count }} {% endif %}

          '
  dc_zone01_apply_presets_global:
    alias: dc_zone01_apply_presets_global
    mode: single
    sequence:
    - service: script.dc_zone01_apply_preset_section
      data:
        group: bias_exterior
        preset: '{{ states(''input_select.dc_zone01_preset_bias_exterior'') }}'
    - service: script.dc_zone01_apply_preset_section
      data:
        group: bias_fachadas
        preset: '{{ states(''input_select.dc_zone01_preset_bias_fachadas'') }}'
    - service: script.dc_zone01_apply_preset_section
      data:
        group: bias_vmc
        preset: '{{ states(''input_select.dc_zone01_preset_bias_vmc'') }}'
    - service: script.dc_zone01_apply_preset_section
      data:
        group: bias_tendencia
        preset: '{{ states(''input_select.dc_zone01_preset_bias_tendencia'') }}'
    - service: script.dc_zone01_apply_preset_section
      data:
        group: freno_tendencia
        preset: '{{ states(''input_select.dc_zone01_preset_freno_tendencia'') }}'
    - service: script.dc_zone01_apply_preset_section
      data:
        group: lead
