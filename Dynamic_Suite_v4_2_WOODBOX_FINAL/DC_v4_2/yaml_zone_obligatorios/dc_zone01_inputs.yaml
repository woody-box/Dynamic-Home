- binary_sensor:
  - name: dc_zone01_t_ext_outlier
    unique_id: dc_zone01_t_ext_outlier
    device_class: problem
    availability: '{% set t   = states(''sensor.dc_zone01_t_ext_safe'') | float(none)
      %} {% set avg = states(''sensor.dc_zone01_t_ext_mean_30d'') | float(none) %}
      {% set std = states(''sensor.dc_zone01_t_ext_std_30d'') | float(none) %} {{
      t is not none and avg is not none and std is not none and std > 0 }}

      '
    state: '{% set t   = states(''sensor.dc_zone01_t_ext_safe'') | float(none) %}
      {% set avg = states(''sensor.dc_zone01_t_ext_mean_30d'') | float(none) %} {%
      set std = states(''sensor.dc_zone01_t_ext_std_30d'') | float(none) %} {% set
      dev = (t - avg) | abs %} {{ dev > (3 * std) }}

      '
    attributes:
      current_value: '{{ states(''sensor.dc_zone01_t_ext_safe'') }}'
      mean_30d: '{{ states(''sensor.dc_zone01_t_ext_mean_30d'') }}'
      std_30d: '{{ states(''sensor.dc_zone01_t_ext_std_30d'') }}'
      deviation_sigma: "{% set t   = states('sensor.dc_zone01_t_ext_safe') | float(none)\
        \ %} {% set avg = states('sensor.dc_zone01_t_ext_mean_30d') | float(none)\
        \ %} {% set std = states('sensor.dc_zone01_t_ext_std_30d') | float(none) %}\
        \ {% if t is not none and avg is not none and std is not none and std > 0\
        \ %}\n  {{ (((t - avg) | abs) / std) | round(2) }}\n{% else %}\n  {{ none\
        \ }}\n{% endif %}\n"
      interpretation: "{% set s = state_attr('binary_sensor.dc_zone01_t_ext_outlier','deviation_sigma')\
        \ | float(none) %} {% if s is none %}\n  {{ none }}\n{% elif s > 3 %}\n  OUTLIER\
        \ (revisar sensor)\n{% elif s > 2 %}\n  Warning (valor inusual)\n{% else %}\n\
        \  Normal\n{% endif %}\n"
  - name: dc_zone01_wind_outlier
    unique_id: dc_zone01_wind_outlier
    device_class: problem
    availability: '{% set w   = states(''sensor.dc_zone01_wind_speed_safe'') | float(none)
      %} {% set avg = states(''sensor.dc_zone01_wind_mean_30d'') | float(none) %}
      {% set std = states(''sensor.dc_zone01_wind_std_30d'') | float(none) %} {{ w
      is not none and avg is not none and std is not none and std > 0 }}

      '
    state: '{% set w   = states(''sensor.dc_zone01_wind_speed_safe'') | float(none)
      %} {% set avg = states(''sensor.dc_zone01_wind_mean_30d'') | float(none) %}
      {% set std = states(''sensor.dc_zone01_wind_std_30d'') | float(none) %} {% set
      dev = (w - avg) | abs %} {{ dev > (3 * std) }}

      '
    attributes:
      current_value: '{{ states(''sensor.dc_zone01_wind_speed_safe'') }}'
      mean_30d: '{{ states(''sensor.dc_zone01_wind_mean_30d'') }}'
      std_30d: '{{ states(''sensor.dc_zone01_wind_std_30d'') }}'
      deviation_sigma: "{% set w   = states('sensor.dc_zone01_wind_speed_safe') |\
        \ float(none) %} {% set avg = states('sensor.dc_zone01_wind_mean_30d') | float(none)\
        \ %} {% set std = states('sensor.dc_zone01_wind_std_30d') | float(none) %}\
        \ {% if w is not none and avg is not none and std is not none and std > 0\
        \ %}\n  {{ (((w - avg) | abs) / std) | round(2) }}\n{% else %}\n  {{ none\
        \ }}\n{% endif %}\n"
  - name: dc_zone01_lux_f1_outlier
    unique_id: dc_zone01_lux_f1_outlier
    device_class: problem
    availability: '{% set l   = states(''sensor.dc_zone01_lux_f1_safe'') | float(none)
      %} {% set avg = states(''sensor.dc_zone01_lux_f1_mean_30d'') | float(none) %}
      {% set std = states(''sensor.dc_zone01_lux_f1_std_30d'') | float(none) %} {{
      l is not none and avg is not none and std is not none and std > 0 }}

      '
    state: '{% set l   = states(''sensor.dc_zone01_lux_f1_safe'') | float(none) %}
      {% set avg = states(''sensor.dc_zone01_lux_f1_mean_30d'') | float(none) %} {%
      set std = states(''sensor.dc_zone01_lux_f1_std_30d'') | float(none) %} {% set
      dev = (l - avg) | abs %} {{ dev > (3 * std) }}

      '
    attributes:
      current_value: '{{ states(''sensor.dc_zone01_lux_f1_safe'') }}'
      mean_30d: '{{ states(''sensor.dc_zone01_lux_f1_mean_30d'') }}'
      std_30d: '{{ states(''sensor.dc_zone01_lux_f1_std_30d'') }}'
- sensor:
  - name: dc_zone01_t_ext_expected_range
    unique_id: dc_zone01_t_ext_expected_range
    icon: mdi:thermometer-lines
    unit_of_measurement: °C
    availability: '{% set avg = states(''sensor.dc_zone01_t_ext_mean_30d'') | float(none)
      %} {% set std = states(''sensor.dc_zone01_t_ext_std_30d'') | float(none) %}
      {{ avg is not none and std is not none and std > 0 }}

      '
    state: '{{ states(''sensor.dc_zone01_t_ext_mean_30d'') | float(none) }}

      '
    attributes:
      min_expected: "{% set avg = states('sensor.dc_zone01_t_ext_mean_30d') | float(none)\
        \ %} {% set std = states('sensor.dc_zone01_t_ext_std_30d') | float(none) %}\
        \ {% if avg is not none and std is not none %}\n  {{ (avg - 2 * std) | round(1)\
        \ }}\n{% else %}\n  {{ none }}\n{% endif %}\n"
      max_expected: "{% set avg = states('sensor.dc_zone01_t_ext_mean_30d') | float(none)\
        \ %} {% set std = states('sensor.dc_zone01_t_ext_std_30d') | float(none) %}\
        \ {% if avg is not none and std is not none %}\n  {{ (avg + 2 * std) | round(1)\
        \ }}\n{% else %}\n  {{ none }}\n{% endif %}\n"
      current: '{{ states(''sensor.dc_zone01_t_ext_safe'') }}'
      in_range: "{% set t   = states('sensor.dc_zone01_t_ext_safe') | float(none)\
        \ %} {% set min = state_attr('sensor.dc_zone01_t_ext_expected_range','min_expected')\
        \ | float(none) %} {% set max = state_attr('sensor.dc_zone01_t_ext_expected_range','max_expected')\
        \ | float(none) %} {% if t is not none and min is not none and max is not\
        \ none %}\n  {{ t >= min and t <= max }}\n{% else %}\n  {{ none }}\n{% endif\
        \ %}\n"
script:
  dc_zone01_init_fabrica:
    alias: dc_zone01_init_reset_valores_fabrica
    mode: single
    sequence:
    - variables:
        fab: sensor.dc_zone01_fabrica
        keys: '{% set a = states[fab].attributes %} {% set k = a.keys() | select(''match'',''^dc_zone01_'')
          | list %} {{ k | sort }}

          '
        allowed_entities: "{% set out = namespace(l=[]) %} {% for k in keys %}\n \
          \ {% set n = 'input_number.' ~ k %}\n  {% set b = 'input_boolean.' ~ k %}\n\
          \  {% set t = 'input_text.' ~ k %}\n  {% set d = 'input_datetime.' ~ k %}\n\
          \  {% if states(n) != 'unknown' %}\n    {% set out.l = out.l + [n] %}\n\
          \  {% elif states(b) != 'unknown' %}\n    {% set out.l = out.l + [b] %}\n\
          \  {% elif states(t) != 'unknown' %}\n    {% set out.l = out.l + [t] %}\n\
          \  {% elif states(d) != 'unknown' %}\n    {% set out.l = out.l + [d] %}\n\
          \  {% endif %}\n{% endfor %} {{ out.l }}\n"
        ignored_missing: '{{ (keys | count) - (allowed_entities | count) }}

          '
    - service: logbook.log
      data:
        name: dc_zone01
        message: '🔄 Reset a valores de fábrica

          Se han preparado {{ allowed_entities | count }} ajustes para aplicar. (Keys
          recibidas: {{ keys | count }}, helpers faltantes: {{ ignored_missing }}.)

          '
        entity_id: sensor.dc_zone01_fabrica
    - repeat:
        for_each: '{{ keys }}'
        sequence:
        - variables:
            k: '{{ repeat.item }}'
            v: '{{ state_attr(fab, k) }}'
            n: '{{ ''input_number.'' ~ k }}'
            b: '{{ ''input_boolean.'' ~ k }}'
            t: '{{ ''input_text.'' ~ k }}'
            d: '{{ ''input_datetime.'' ~ k }}'
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ states(n) != ''unknown'' and v is not none }}'
            sequence:
            - service: input_number.set_value
              target:
                entity_id: '{{ n }}'
              data:
                value: '{{ v | float(none) }}'
          - conditions:
            - condition: template
              value_template: '{{ states(b) != ''unknown'' and v is not none }}'
            sequence:
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ v == true }}'
                sequence:
                - service: input_boolean.turn_on
                  target:
                    entity_id: '{{ b }}'
              - conditions:
                - condition: template
                  value_template: '{{ v == false }}'
                sequence:
                - service: input_boolean.turn_off
                  target:
                    entity_id: '{{ b }}'
          - conditions:
            - condition: template
              value_template: '{{ states(t) != ''unknown'' and v is not none }}'
            sequence:
            - service: input_text.set_value
              target:
                entity_id: '{{ t }}'
              data:
                value: '{{ v | string }}'
          - conditions:
            - condition: template
              value_template: '{{ states(d) != ''unknown'' and v is not none }}'
            sequence:
            - service: input_datetime.set_datetime
              target:
                entity_id: '{{ d }}'
              data:
                time: '{{ v | string }}'
    - variables:
        applied: '{{ allowed_entities | count }}'
    - service: logbook.log
      data:
        name: dc_zone01
        message: '✅ Reset a valores de fábrica completado

          Ajustes aplicados: {{ applied }} Helpers faltantes: {{ ignored_missing }}

          '
        entity_id: sensor.dc_zone01_fabrica
    - name: dc_zone01_fabrica_conservative
      unique_id: dc_zone01_fabrica_conservative
      state: ok
      attributes:
        dc_zone01_room_name: Room Name
