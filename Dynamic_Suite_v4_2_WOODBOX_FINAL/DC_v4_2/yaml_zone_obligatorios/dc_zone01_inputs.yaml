automation:
- id: dc_zone01_alert_sensor_miscalibrated
  alias: dc_zone01_alert_sensor_miscalibrated
  mode: single
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.dc_zone01_t_ext_outlier
    - binary_sensor.dc_zone01_wind_outlier
    - binary_sensor.dc_zone01_lux_f1_outlier
    to: 'on'
    for:
      hours: 2
  action:
  - service: persistent_notification.create
    data:
      title: ⚠️ DC Zone01 · Sensor posiblemente descalibrado
      message: '{{ trigger.to_state.name }} reporta valores anómalos de forma persistente
        (>= 2h).

        - Valor actual: {{ trigger.to_state.attributes.current_value }} - Media 30d:
        {{ trigger.to_state.attributes.mean_30d }} - Desviación: {{ trigger.to_state.attributes.deviation_sigma
        }}σ

        Posibles causas: - Sensor descalibrado (calibrar) - Obstrucción física (limpiar
        / revisar ubicación) - Condición extrema real (verificar manualmente)

        Acción recomendada: revisar el sensor físicamente.

        '
      notification_id: 'dc_zone01_sensor_miscalibrated_{{ trigger.entity_id | replace(''.'',''_'')
        }}

        '
- id: dc_zone01_alert_multiple_outliers
  alias: dc_zone01_alert_multiple_outliers
  mode: single
  trigger:
  - platform: template
    value_template: "{% set xs = [\n  is_state('binary_sensor.dc_zone01_t_ext_outlier','on'),\n\
      \  is_state('binary_sensor.dc_zone01_wind_outlier','on'),\n  is_state('binary_sensor.dc_zone01_lux_f1_outlier','on')\n\
      ] %} {{ (xs | select('equalto', true) | list | count) >= 2 }}\n"
    for:
      minutes: 10
  action:
  - service: persistent_notification.create
    data:
      title: 🌪️ DC Zone01 · Condiciones extremas
      message: '2+ sensores están en outlier simultáneamente durante >= 10 min. Esto
        suele indicar un evento real (ola de calor/frío, tormenta, etc.) más que un
        fallo individual.

        DC continúa operando con estos valores.

        '
      notification_id: dc_zone01_extreme_weather