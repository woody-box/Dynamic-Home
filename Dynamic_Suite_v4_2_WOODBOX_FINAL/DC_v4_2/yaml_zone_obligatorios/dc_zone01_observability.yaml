# ============================================================================
# Dynamic Climate · DC Zone01 · Observability/health/audit
# ----------------------------------------------------------------------------
# version: 4.2
# changelog: v4.2 (compaction)
# ============================================================================
template:
- sensor:
  - name: dc_zone01_main_safe_sensors_version
    unique_id: dc_zone01_main_safe_sensors_version
    icon: mdi:tag
    state: '4.2'
    attributes:
      module: dc_zone01_main_safe_sensors
      tier: core
- sensor:
  - name: dc_zone01_t_ext_raw
    unique_id: dc_zone01_t_ext_raw
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''t_ext'')
      %} {{ ent and is_number(states(ent)) }}

      '
    state: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''t_ext'') %} {{ states(ent)
      | float(none) }}

      '
    attributes:
      source: '{{ state_attr(''sensor.dc_zone01_hw_map'',''t_ext'') }}'
      source_entity: '{{ state_attr(''sensor.dc_zone01_hw_map'',''t_ext'') }}'
      reason_code: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''t_ext'')
        %} {% if not ent %}missing_hwmap_key {% elif states(ent) in [''unknown'',''unavailable'',''none'','''']
        %}bad_state {% else %}ok{% endif %}

        '
  - name: dc_zone01_wind_speed_raw
    unique_id: dc_zone01_wind_speed_raw
    unit_of_measurement: m/s
    state_class: measurement
    availability: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''wind_speed'')
      %} {{ ent and is_number(states(ent)) }}

      '
    state: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''wind_speed'') %}
      {{ states(ent) | float(none) }}

      '
    attributes:
      source: '{{ state_attr(''sensor.dc_zone01_hw_map'',''wind_speed'') }}'
      source_entity: '{{ state_attr(''sensor.dc_zone01_hw_map'',''wind_speed'') }}'
      reason_code: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''wind_speed'')
        %} {% if not ent %}missing_hwmap_key {% elif states(ent) in [''unknown'',''unavailable'',''none'','''']
        %}bad_state {% else %}ok{% endif %}

        '
  - name: dc_zone01_lux_f1_raw
    unique_id: dc_zone01_lux_f1_raw
    unit_of_measurement: lx
    state_class: measurement
    availability: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''f1_lux'')
      %} {{ ent and is_number(states(ent)) }}

      '
    state: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''f1_lux'') %} {{
      states(ent) | float(none) }}

      '
    attributes:
      source: '{{ state_attr(''sensor.dc_zone01_hw_map'',''f1_lux'') }}'
      source_entity: '{{ state_attr(''sensor.dc_zone01_hw_map'',''f1_lux'') }}'
      reason_code: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''f1_lux'')
        %} {% if not ent %}missing_hwmap_key {% elif states(ent) in [''unknown'',''unavailable'',''none'','''']
        %}bad_state {% else %}ok{% endif %}

        '
  - name: dc_zone01_t_ext_safe
    unique_id: dc_zone01_t_ext_safe
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''t_ext'')
      %} { ent and (states(ent) | float(none)) is not none }

      '
    state: "{% set ent = state_attr('sensor.dc_zone01_hw_map','t_ext') %} {% set v_new\
      \ = (states(ent) | float(none)) if ent else none %} {% set v_last = states('input_number.dc_zone01_last_good_t_ext')\
      \ | float(none) %} {% set ts_last = states('input_number.dc_zone01_last_good_t_ext_ts')\
      \ | int(0) %} {% set age_ok = (ts_last > 0) and ((now().timestamp() | int) -\
      \ ts_last <= 21600) %} {% set in_range = (v_new is not none) and (v_new >= -40)\
      \ and (v_new <= 60) %} {% set spike_ok = (ts_last == 0) or (v_new is none) or\
      \ (v_last is none) or ((v_new - v_last) | abs <= 5) %} {% if in_range and spike_ok\
      \ %}\n  { v_new | round(1) }\n{% elif age_ok and v_last is not none %}\n  {\
      \ v_last | round(1) }\n{% else %}\n  { none }\n{% endif %}\n"
    attributes:
      source: '{{ state_attr(''sensor.dc_zone01_hw_map'',''t_ext'') }}'
      source_entity: '{{ state_attr(''sensor.dc_zone01_hw_map'',''t_ext'') }}'
      reason_code: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''t_ext'')
        %} {% if not ent %}missing_hwmap_key {% elif states(ent) in [''unknown'',''unavailable'',''none'','''']
        %}bad_state {% else %}ok{% endif %}

        '
      last_good: '{{ states(''input_number.dc_zone01_last_good_t_ext'') }}'
      last_good_ts: '{{ states(''input_number.dc_zone01_last_good_t_ext_ts'') }}'
  - name: dc_zone01_t_int_safe
    unique_id: dc_zone01_t_int_safe
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: "{% if is_state('input_boolean.dc_zone01_test_force_missing_t_int','on')\
      \ %}\n  false\n{% else %}\n  {% set ent = state_attr('sensor.dc_zone01_hw_map','t_int')\
      \ %}\n  {% set bad = ['unknown','unavailable','none',''] %}\n  {{ ent and (states(ent)\
      \ not in bad) }}\n{% endif %}\n"
    state: "{% if is_state('input_boolean.dc_zone01_test_force_missing_t_int','on')\
      \ %}\n  {{ none }}\n{% else %}\n  {% set ent = state_attr('sensor.dc_zone01_hw_map','t_int')\
      \ %}\n  {{ states(ent) | float(none) if ent else none }}\n{% endif %}\n"
  - name: dc_zone01_wind_speed_safe
