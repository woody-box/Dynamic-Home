      \ ===================== #}\n  {% set vac_ent = state_attr(m,'modo_vacaciones')\
      \ %}\n  {% if vac_ent in bad %}\n    {% set missing = missing + ['modo_vacaciones']\
      \ %}\n  {% else %}\n    {% if states(vac_ent) not in ['on','off'] %}\n     \
      \ {% set badnum = badnum + ['modo_vacaciones_state'] %}\n    {% endif %}\n \
      \ {% endif %}\n\n  {# ===================== HARD: Tª INTERIOR (desde HW map)\
      \ ===================== #}\n  {% set t_int_ent = state_attr(m,'t_int') %}\n\
      \  {% if t_int_ent in bad %}\n    {% set missing = missing + ['t_int'] %}\n\
      \  {% else %}\n    {% set v_int = states(t_int_ent) | float(none) %}\n    {%\
      \ if v_int is none %}\n      {% set badnum = badnum + ['t_int'] %}\n    {% else\
      \ %}\n      {# rango razonable interior (no es un límite físico, es sanity-check)\
      \ #}\n      {% if v_int < -10 or v_int > 45 %}\n        {% set outrng = outrng\
      \ + ['t_int'] %}\n      {% endif %}\n    {% endif %}\n  {% endif %}\n\n  {#\
      \ ===================== HARD: Tª EXTERIOR (desde HW map) =====================\
      \ #}\n  {% set t_ext_ent = state_attr(m,'t_ext') %}\n  {% if t_ext_ent in bad\
      \ %}\n    {% set missing = missing + ['t_ext'] %}\n  {% else %}\n    {% set\
      \ v_ext = states(t_ext_ent) | float(none) %}\n    {% if v_ext is none %}\n \
      \     {% set badnum = badnum + ['t_ext'] %}\n    {% else %}\n      {# rango\
      \ razonable exterior (sanity-check) #}\n      {% if v_ext < -40 or v_ext > 60\
      \ %}\n        {% set outrng = outrng + ['t_ext'] %}\n      {% endif %}\n   \
      \ {% endif %}\n  {% endif %}\n\n  {# ===================== HARD: FAIL-SAFE Tª\
      \ INTERIOR (PUNTO 5) ===================== #}\n  {# Este sensor debe existir\
      \ y ser numérico. Si falla, la zona debe pararse (sin fallback). #}\n  {% set\
      \ v_safe = states('sensor.dc_zone01_t_int_safe') | float(none) %}\n  {% if v_safe\
      \ is none %}\n    {% set missing = missing + ['t_int_safe'] %}\n  {% endif %}\n\
      \n  {# ===================== SOFT: WATCHDOG (PUNTO 6) =====================\
      \ #}\n  {% if is_state('binary_sensor.dc_zone01_watchdog_tendencia_stale','on')\
      \ %}\n    {% set warnings = warnings + ['tendencia_stale'] %}\n  {% endif %}\n\
      \n  {# ===================== SOFT: VENTANAS (PUNTO 4) =====================\
      \ #}\n  {# IMPORTANTE: esto NO debe ser HARD, porque el grupo puede ser intencionalmente\
      \ externo. #}\n  {% set win_enabled = is_state('input_boolean.dc_zone01_enable_window_sensor','on')\
      \ %}\n  {% if win_enabled %}\n    {% set win_grp = state_attr(m,'ventanas_group')\
      \ %}\n    {% if win_grp in bad %}\n      {% set warnings = warnings + ['ventanas_group_missing_but_enabled']\
      \ %}\n    {% else %}\n      {% set members = state_attr(win_grp,'entity_id')\
      \ or [] %}\n      {% if members | count == 0 %}\n        {% set warnings = warnings\
      \ + ['ventanas_group_empty_but_enabled'] %}\n      {% endif %}\n    {% endif\
      \ %}\n  {% else %}\n    {% set skipped = skipped + ['ventanas'] %}\n  {% endif\
      \ %}\n\n{# ===================== SOFT: FORECAST (Forecast Bias) =====================\
      \ #} {% set fc_enabled = is_state('input_boolean.dc_zone01_forecast_enabled','on')\
      \ %} {% if fc_enabled %}\n  {% set fc_ent = state_attr(m,'forecast_entity')\
      \ %}\n  {% if fc_ent in bad %}\n    {% set warnings = warnings + ['forecast_entity_missing_but_enabled']\
      \ %}\n  {% else %}\n    {% set h = state_attr(fc_ent,'hourly') %}\n    {% if\
      \ h is not mapping %}\n      {% set warnings = warnings + ['forecast_hourly_missing_but_enabled']\
      \ %}\n    {% else %}\n      {% set times = h.time if (h.time is sequence) else\
      \ [] %}\n      {% set temps = h.temperature_2m if (h.temperature_2m is sequence)\
      \ else [] %}\n      {% if (times | count) == 0 or (temps | count) == 0 %}\n\
      \        {% set warnings = warnings + ['forecast_arrays_empty_but_enabled']\
      \ %}\n      {% endif %}\n    {% endif %}\n  {% endif %}\n{% else %}\n  {% set\
      \ skipped = skipped + ['forecast'] %}\n{% endif %}\n\n\n{% endif %}\n{# =====================\
      \ RESULTADO FINAL ===================== #} {% if (missing | count) > 0 or (badnum\
      \ | count) > 0 or (outrng | count) > 0 %}\n  error\n{% elif (warnings | count)\
      \ > 0 %}\n  warning\n{% else %}\n  ok\n{% endif %}\n"
    attributes:
      missing: '{{ state_attr(''sensor.dc_zone01_auditoria_payload'',''missing'')
        or [] }}'
      bad_numbers: '{{ state_attr(''sensor.dc_zone01_auditoria_payload'',''badnum'')
        or [] }}'
      out_of_range: '{{ state_attr(''sensor.dc_zone01_auditoria_payload'',''outrng'')
        or [] }}'
      warnings: '{{ state_attr(''sensor.dc_zone01_auditoria_payload'',''warnings'')
        or [] }}'
      warnings_count: '{{ (state_attr(''sensor.dc_zone01_auditoria_payload'',''warnings'')
        or []) | count }}'
      skipped: '{{ state_attr(''sensor.dc_zone01_auditoria_payload'',''skipped'')
        or [] }}'
      hw_map: sensor.dc_zone01_hw_map
      t_int_ent: '{{ state_attr(''sensor.dc_zone01_hw_map'',''t_int'') }}'
      t_ext_ent: '{{ state_attr(''sensor.dc_zone01_hw_map'',''t_ext'') }}'
      modo_vac_ent: '{{ state_attr(''sensor.dc_zone01_hw_map'',''modo_vacaciones'')
        }}'
  - name: dc_zone01_estado_configuracion
    unique_id: dc_zone01_estado_configuracion
    icon: "{% set s = states('sensor.dc_zone01_auditoria') %} {% if s == 'error' %}\n\
      \  mdi:alert-circle\n{% elif s == 'warning' %}\n  mdi:alert\n{% else %}\n  mdi:check-circle\n\
      {% endif %}\n"
    state: "{% set s = states('sensor.dc_zone01_auditoria') %} {% if s == 'error'\
      \ %}\n  error\n{% else %}\n  {% set w = state_attr('sensor.dc_zone01_auditoria','warnings')\
      \ or [] %}\n  {{ 'warning' if (w | count) > 0 else 'ok' }}\n{% endif %}\n"
    attributes:
      warnings: '{{ state_attr(''sensor.dc_zone01_auditoria'',''warnings'') or []
        }}'
      warnings_count: '{{ (state_attr(''sensor.dc_zone01_auditoria'',''warnings'')
        or []) | count }}'
      missing: '{{ state_attr(''sensor.dc_zone01_auditoria'',''missing'') or [] }}'
      bad_numbers: '{{ state_attr(''sensor.dc_zone01_auditoria'',''bad_numbers'')
        or [] }}'
      out_of_range: '{{ state_attr(''sensor.dc_zone01_auditoria'',''out_of_range'')
        or [] }}'
- trigger:
  - platform: event
    event_type: dc_zone01_selftest_reset
  - platform: event
    event_type: dc_zone01_selftest_result
  sensor:
  - name: dc_zone01_selftest_storage
    unique_id: dc_zone01_selftest_storage
    state: ok
    attributes:
      started: "{% if trigger.event.event_type == 'dc_zone01_selftest_reset' %}\n\
        \  {{ trigger.event.data.started | default(now().isoformat()) }}\n{% else\
        \ %}\n  {{ state_attr('sensor.dc_zone01_selftest_storage','started') | default('')\
        \ }}\n{% endif %}\n"
      results: "{% set et = trigger.event.event_type %} {% if et == 'dc_zone01_selftest_reset'\
        \ %}\n  {{ [] }}\n{% else %}\n  {% set prev = state_attr('sensor.dc_zone01_selftest_storage','results')\
        \ %}\n  {% set prev_list = prev if prev is iterable and prev is not string\
        \ else [] %}\n  {% set item = {\n    'ts': now().isoformat(),\n    'test':\
        \ trigger.event.data.test | default('unknown_test'),\n    'ok': trigger.event.data.ok\
        \ | default(false),\n    'msg': trigger.event.data.msg | default('')\n  }\
        \ %}\n  {{ prev_list + [ item ] }}\n{% endif %}\n"
      last_updated: '{{ now().isoformat() }}'
      count: "{# Recalcular SIEMPRE en base al \"results\" que vamos a devolver en\
        \ ESTE mismo evento #} {% set et = trigger.event.event_type %} {% if et ==\
        \ 'dc_zone01_selftest_reset' %}\n  {{ 0 }}\n{% else %}\n  {% set prev = state_attr('sensor.dc_zone01_selftest_storage','results')\
        \ %}\n  {% set prev_list = prev if prev is iterable and prev is not string\
        \ else [] %}\n  {{ (prev_list | count) + 1 }}\n{% endif %}\n"
      fails: "{# Recalcular SIEMPRE en base al \"results\" que vamos a devolver en\
        \ ESTE mismo evento #} {% set et = trigger.event.event_type %} {% if et ==\
        \ 'dc_zone01_selftest_reset' %}\n  {{ 0 }}\n{% else %}\n  {% set prev = state_attr('sensor.dc_zone01_selftest_storage','results')\
        \ %}\n  {% set prev_list = prev if prev is iterable and prev is not string\
        \ else [] %}\n  {% set out = namespace(n=0) %}\n  {% for it in prev_list %}\n\
        \    {% if not (it.ok | default(false)) %}\n      {% set out.n = out.n + 1\
        \ %}\n    {% endif %}\n  {% endfor %}\n  {# Añadimos el resultado actual #}\n\
        \  {% if not (trigger.event.data.ok | default(false)) %}\n    {% set out.n\
        \ = out.n + 1 %}\n  {% endif %}\n  {{ out.n }}\n{% endif %}\n"
- trigger:
  - platform: state
    entity_id:
    - sensor.dc_zone01_target_final
    - sensor.dc_zone01_hvac_mode
    - binary_sensor.dc_zone01_valve_open
    - binary_sensor.dc_zone01_override_activo
    - binary_sensor.dc_zone01_riesgo_rocio
    - input_boolean.dc_zone01_window_lockout
  sensor:
  - name: dc_zone01_telemetry_last
    unique_id: dc_zone01_telemetry_last
    icon: mdi:chart-timeline-variant
    state: '{{ now().isoformat() }}'
    attributes:
      timestamp: '{{ now().isoformat() }}'
      hvac_mode: '{{ states(''sensor.dc_zone01_hvac_mode'') }}'
      base: '{{ states(''sensor.dc_zone01_base_activa'') }}'
      bias_ext: '{{ states(''sensor.dc_zone01_bias_exterior_raw'') }}'
      bias_fachadas: '{{ states(''sensor.dc_zone01_bias_fachadas_raw'') }}'
      bias_forecast: '{{ states(''sensor.dc_zone01_bias_forecast_ema'') }}'
      bias_vmc: '{{ states(''sensor.dc_zone01_bias_vmc'') }}'
      freno_tendencia: '{{ states(''sensor.dc_zone01_freno_tendencia'') }}'
      lead_final_h: '{{ states(''sensor.dc_zone01_lead_final_h'') }}'
      target_final: '{{ states(''sensor.dc_zone01_target_final'') }}'
      t_int_safe: '{{ states(''sensor.dc_zone01_t_int_safe'') }}'
      valve_open: '{{ states(''binary_sensor.dc_zone01_valve_open'') }}'
      override: '{{ states(''binary_sensor.dc_zone01_override_activo'') }}'
      dew_risk: '{{ states(''binary_sensor.dc_zone01_riesgo_rocio'') }}'
      window_lockout: '{{ states(''input_boolean.dc_zone01_window_lockout'') }}'
- sensor:
  - name: dc_zone01_selftest_fails
    unique_id: dc_zone01_selftest_fails
    icon: '{% set n = this.state | int(0) %} {% if n == 0 %} mdi:check-circle {% else
      %} mdi:alert-circle {% endif %}'
    state: "{% set res = state_attr('sensor.dc_zone01_selftest_storage','results')\
      \ %} {% set out = namespace(n=0) %} {% if res is iterable and res is not string\
      \ %}\n  {% for it in res %}\n    {% if not (it.ok | default(false)) %}\n   \
      \   {% set out.n = out.n + 1 %}\n    {% endif %}\n  {% endfor %}\n{% endif %}\
      \ {{ out.n }}"
    attributes:
      fail_list: "{% set res = state_attr('sensor.dc_zone01_selftest_storage','results')\
        \ %} {% set out = namespace(lst=[]) %} {% if res is iterable and res is not\
        \ string %}\n  {% for it in res %}\n    {% if not (it.ok | default(false))\
        \ %}\n      {% set out.lst = out.lst + [ (it.test | default('unknown')) ]\
        \ %}\n    {% endif %}\n  {% endfor %}\n{% endif %} {{ out.lst }}"
      last_updated: '{{ state_attr(''sensor.dc_zone01_selftest_storage'',''last_updated'')
        }}'
- binary_sensor:
  - name: dc_zone01_adaptive_lead_sentinel
    unique_id: dc_zone01_adaptive_lead_sentinel
    icon: mdi:alert-circle
    state: "{% set bad = ['unknown','unavailable','none',''] %} {% if not is_state('input_boolean.dc_zone01_adaptive_lead_enabled','on')\
      \ %}\n  false\n{% else %}\n  {% set off_sp_s = states('input_number.dc_zone01_rt_off_sp')\
      \ %}\n  {% set off_pk_s = states('input_number.dc_zone01_rt_off_peak') %}\n\
      \  {% if off_sp_s in bad or off_pk_s in bad %}\n    true\n  {% else %}\n   \
      \ {% set off_sp = off_sp_s | float(0) %}\n    {% set off_pk = off_pk_s | float(0)\
      \ %}\n    {{ (off_sp <= -40) or (off_pk <= -40) }}\n  {% endif %}\n{% endif\
      \ %}"
