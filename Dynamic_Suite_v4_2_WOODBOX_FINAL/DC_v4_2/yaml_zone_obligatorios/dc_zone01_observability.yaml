    state_class: measurement
    availability: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''wind_speed'')
      %} {{ ent and is_number(states(ent)) }}

      '
    state: "{% set ent = state_attr('sensor.dc_zone01_hw_map','wind_speed') %} {%\
      \ set v = states(ent) | float(none) if ent else none %} {% if v is not none\
      \ and v >= 0 and v <= 50 %}\n  {{ v | round(1) }}\n{% else %}\n  {{ none }}\n\
      {% endif %}\n"
    attributes:
      source: '{{ state_attr(''sensor.dc_zone01_hw_map'',''wind_speed'') }}'
      source_entity: '{{ state_attr(''sensor.dc_zone01_hw_map'',''wind_speed'') }}'
      reason_code: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''wind_speed'')
