        \        {% if ('max_abs' in k) and v <= 0 %}{% set fail = fail + 1 %}{% endif\
        \ %}\n\n        {% if (k.endswith('_alpha') or '_alpha' in k) and (0 <= v\
        \ <= 1) and (v > 0.9 or v < 0.05) %}{% set warn = warn + 1 %}{% endif %}\n\
        \        {% if (('_cap' in k or k.endswith('cap')) and v > 10) %}{% set warn\
