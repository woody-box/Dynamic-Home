        \ %}\n      {% if v is none %}\n        {% set out = out + [eid] %}\n    \
        \  {% else %}\n        {% if ('_step' in k or k.endswith('step')) and v <\
        \ 0.1 %}{% set out = out + [eid] %}{% endif %}\n        {% if ('_span' in\
        \ k or '_scale' in k or '_window_h' in k) and v < 0.1 %}{% set out = out +\
        \ [eid] %}{% endif %}\n        {% if (k.endswith('_alpha') or '_alpha' in\
        \ k) and (v < 0 or v > 1) %}{% set out = out + [eid] %}{% endif %}\n     \
        \   {% if (('_cap' in k or k.endswith('cap')) and v < 0) %}{% set out = out\
        \ + [eid] %}{% endif %}\n        {% if ('max_abs' in k) and v <= 0 %}{% set\
        \ out = out + [eid] %}{% endif %}\n      {% endif %}\n    {% endif %}\n  {%\
