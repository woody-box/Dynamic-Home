      params: "{% macro audit_number(eid, v) -%}\n  {% set k = eid.split('.',1)[1]\
        \ %}\n  {% set status = 'ok' %}\n  {% set reason = 'ok' %}\n  {% if v is none\
        \ %}\n    {% set status = 'fail' %}\n    {% set reason = 'missing' %}\n  {%\
        \ else %}\n    {% if ('_step' in k) or k.endswith('step') %}\n      {% if\
        \ v < 0.1 %}{% set status='fail' %}{% set reason='step_lt_0p1' %}{% endif\
        \ %}\n    {% endif %}\n    {% if ('_span' in k) or ('_scale' in k) or ('_window_h'\
        \ in k) %}\n      {% if v < 0.1 %}{% set status='fail' %}{% set reason='divisor_lt_0p1'\
        \ %}{% endif %}\n    {% endif %}\n    {% if k.endswith('_alpha') or ('_alpha'\
        \ in k) %}\n      {% if v < 0 or v > 1 %}\n        {% set status='fail' %}{%\
        \ set reason='alpha_out_of_range' %}\n      {% elif v > 0.9 or v < 0.05 %}\n\
        \        {% if status == 'ok' %}{% set status='warn' %}{% set reason='alpha_extreme'\
        \ %}{% endif %}\n      {% endif %}\n    {% endif %}\n    {% if ('_cap' in\
        \ k) or k.endswith('cap') %}\n      {% if v < 0 %}{% set status='fail' %}{%\
        \ set reason='cap_negative' %}{% endif %}\n      {% if v > 10 and status ==\
        \ 'ok' %}{% set status='warn' %}{% set reason='cap_high' %}{% endif %}\n \
        \   {% endif %}\n    {% if ('max_abs' in k) and v <= 0 %}\n      {% set status='fail'\
        \ %}{% set reason='max_abs_le_0' %}\n    {% endif %}\n  {% endif %}\n  {{\
        \ dict(status=status, reason=reason) }}\n{%- endmacro %}\n\n{% set ns = namespace(params={},\
        \ ok=0, warn=0, fail=0) %}\n{% for eid in eids %}\n  {% set domain = eid.split('.',1)[0]\
        \ %}\n  {% set st = states(eid) %}\n  {% set value = st %}\n  {% set status\
        \ = 'ok' %}\n  {% set reason = 'ok' %}\n\n  {% if st in ['unknown','unavailable','none','']\
        \ %}\n    {% set status = 'fail' %}\n    {% set reason = 'missing' %}\n  {%\
        \ else %}\n    {% if domain == 'input_number' %}\n      {% set v = states(eid)\
        \ | float(none) %}\n      {% set ar = audit_number(eid, v) %}\n      {% set\
        \ status = ar.status %}\n      {% set reason = ar.reason %}\n      {% set\
        \ value = v %}\n    {% endif %}\n  {% endif %}\n\n  {% if status == 'ok' %}{%\
        \ set ns.ok = ns.ok + 1 %}{% endif %}\n  {% if status == 'warn' %}{% set ns.warn\
        \ = ns.warn + 1 %}{% endif %}\n  {% if status == 'fail' %}{% set ns.fail =\
        \ ns.fail + 1 %}{% endif %}\n\n  {% set meta = dict(domain=domain) %}\n  {%\
        \ if domain == 'input_number' %}\n    {% set meta = dict(meta, min=state_attr(eid,'min'),\
        \ max=state_attr(eid,'max'), step=state_attr(eid,'step')) %}\n  {% elif domain\
        \ == 'input_select' %}\n    {% set meta = dict(meta, options=state_attr(eid,'options'))\
        \ %}\n  {% endif %}\n\n  {% set ns.params = dict(ns.params, **{ eid: dict(value=value,\
        \ status=status, reason=reason, meta=meta) }) %}\n{% endfor %}\n{{ ns.params\
        \ }}\n"
