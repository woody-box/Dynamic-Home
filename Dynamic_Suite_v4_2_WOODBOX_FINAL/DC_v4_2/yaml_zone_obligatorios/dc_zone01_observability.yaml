        '
  - name: dc_zone01_vmc_speed_safe
    unique_id: dc_zone01_vmc_speed_safe
    icon: mdi:fan
    availability: "{% set enabled = is_state('input_boolean.dc_zone01_vmc_enabled','on')\
      \ %} {% if not enabled %}\n  {{ true }}\n{% else %}\n  {% set ent = state_attr('sensor.dc_zone01_hw_map','vmc_velocidad_real')\
      \ %}\n  {{ ent and is_number(states(ent)) }}\n{% endif %}\n"
    state: "{% set enabled = is_state('input_boolean.dc_zone01_vmc_enabled','on')\
      \ %} {% if not enabled %}\n  {{ 0 }}\n{% else %}\n  {% set ent = state_attr('sensor.dc_zone01_hw_map','vmc_velocidad_real')\
      \ %}\n  {% set v = states(ent) | int(none) if ent else none %}\n  {% if v is\
      \ not none and v in [0,1,2,3] %}\n    {{ v }}\n  {% else %}\n    {{ none }}\n\
      \  {% endif %}\n{% endif %}\n"
    attributes:
      source: '{{ state_attr(''sensor.dc_zone01_hw_map'',''vmc_velocidad_real'') }}'
      source_entity: '{{ state_attr(''sensor.dc_zone01_hw_map'',''vmc_velocidad_real'')
        }}'
      reason_code: "{% set enabled = is_state('input_boolean.dc_zone01_vmc_enabled','on')\
        \ %} {% if not enabled %}disabled {% else %}\n  {% set ent = state_attr('sensor.dc_zone01_hw_map','vmc_velocidad_real')\
        \ %}\n  {% if not ent %}missing_hwmap_key\n  {% elif states(ent) in ['unknown','unavailable','none','']\
        \ %}bad_state\n  {% else %}ok{% endif %}\n{% endif %}\n"
  - name: dc_zone01_sun_elevation_safe
    unique_id: dc_zone01_sun_elevation_safe
