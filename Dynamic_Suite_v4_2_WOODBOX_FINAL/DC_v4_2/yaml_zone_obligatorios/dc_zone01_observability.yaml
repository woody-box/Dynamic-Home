    target:
      entity_id: '{{ (states(''input_text.dc_notify_target'') if states(''input_text.dc_notify_target'')
        not in [''unknown'',''unavailable'',''none'',''''] else ''notify.notify'')
        }}'
    data:
      message: 'DC signals fault (10m): missing={{ states(''sensor.dc_zone01_signals_missing'')
        }} | degraded={{ is_state(''binary_sensor.dc_zone01_degraded'',''on'') }}
        | reason={{ states(''sensor.dc_zone01_degraded_reason'') }} | hvac={{ states(''sensor.dc_zone01_hvac_mode'')
        }}

        '
- id: dc_zone01_alert_signals_fault_cleared
  alias: dc_zone01_alert_signals_fault_cleared
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.dc_zone01_signals_fault
    to: 'off'
  action:
  - service: notify.send_message
    target:
      entity_id: '{{ (states(''input_text.dc_notify_target'') if states(''input_text.dc_notify_target'')
        not in [''unknown'',''unavailable'',''none'',''''] else ''notify.notify'')
        }}'
    data:
      message: 'DC signals OK: recovered (missing={{ states(''sensor.dc_zone01_signals_missing'')
        }})

        '
- id: dc_zone01_alert_health_not_ok
  alias: dc_zone01_alert_health_not_ok
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.dc_zone01_health_ok
    to: 'off'
    for: 00:10:00
  action:
  - service: notify.send_message
    target:
      entity_id: '{{ (states(''input_text.dc_notify_target'') if states(''input_text.dc_notify_target'')
        not in [''unknown'',''unavailable'',''none'',''''] else ''notify.notify'')
        }}'
    data:
      message: 'DC health NOT OK (10m): {{ states(''sensor.dc_zone01_health_report'')
        }} | hvac={{ states(''sensor.dc_zone01_hvac_mode'') }} valve_open={{ states(''binary_sensor.dc_zone01_valve_open'')
        }} | degraded={{ is_state(''binary_sensor.dc_zone01_degraded'',''on'') }}
        ({{ states(''sensor.dc_zone01_degraded_reason'') }}) | signals_missing={{
        states(''sensor.dc_zone01_signals_missing'') }} | mods_delta={{ states(''sensor.dc_zone01_mods_delta_raw'')
        }} reason={{ states(''sensor.dc_zone01_mods_incoherente_reason'') }}

        '
- id: dc_zone01_alert_health_ok_restored
  alias: dc_zone01_alert_health_ok_restored
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.dc_zone01_health_ok
    to: 'on'
  condition:
  - condition: template
    value_template: '{{ trigger.from_state is not none and trigger.from_state.state
      == ''off'' }}'
  action:
  - service: notify.send_message
    target:
      entity_id: '{{ (states(''input_text.dc_notify_target'') if states(''input_text.dc_notify_target'')
        not in [''unknown'',''unavailable'',''none'',''''] else ''notify.notify'')
        }}'
    data:
      message: 'DC health OK restored: {{ states(''sensor.dc_zone01_health_report'')
        }}'
- id: dc_zone01_target_final_oob_alert
  alias: dc_zone01_target_final_oob_alert
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.dc_zone01_target_final
  condition:
  - condition: template
    value_template: "{% set bad = ['unknown','unavailable','none',''] %} {% set tf\
      \ = states('sensor.dc_zone01_target_final') %} {% if tf in bad %} false {% else\
      \ %}\n  {% set v = tf | float(none) %}\n  {% set vmin = states('input_number.dc_zone01_target_final_min_c')\
      \ | float(10) %}\n  {% set vmax = states('input_number.dc_zone01_target_final_max_c')\
      \ | float(35) %}\n  {% set last = states('input_number.dc_zone01_target_final_oob_last_alert_ts')\
      \ | float(0) %}\n  {% set nowts = now().timestamp() %}\n  {{ v is number and\
      \ (v < vmin or v > vmax) and (nowts - last) > 600 }}\n{% endif %}"
  action:
  - service: input_number.set_value
    target:
      entity_id: input_number.dc_zone01_target_final_oob_last_alert_ts
    data:
      value: '{{ now().timestamp() | int }}'
  - service: persistent_notification.create
    data:
      title: dc_zone01_target_final_oob_alert
      message: 'WARN: sensor.dc_zone01_target_final fuera de rango físico target_final={{
        states(''sensor.dc_zone01_target_final'') }} min={{ states(''input_number.dc_zone01_target_final_min_c'')
        }}  max={{ states(''input_number.dc_zone01_target_final_max_c'') }}'
  - service: notify.send_message
    target:
      entity_id: '{{ (states(''input_text.dc_notify_target'') if states(''input_text.dc_notify_target'')
        not in [''unknown'',''unavailable'',''none'',''''] else ''notify.notify'')
        }}'
    data:
      message: 'DC WARN: target_final fuera de rango ({{ states(''sensor.dc_zone01_target_final'')
        }}) [{{ states(''input_number.dc_zone01_target_final_min_c'') }}..{{ states(''input_number.dc_zone01_target_final_max_c'')
        }}]'
- id: dc_zone01_signal_base_bad_10m_alert
  alias: dc_zone01_signal_base_bad_10m_alert
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.dc_zone01_signal_base_bad_10m
    to: 'on'
  action:
  - service: persistent_notification.create
    data:
      title: dc_zone01_signal_base_bad_10m
      message: Base signals bad for >=10m. missing={ state_attr('sensor.dc_zone01_degraded_component','missing_sources')
        or [] }
  - service: notify.send_message
    target:
      entity_id: '{{ (states(''input_text.dc_notify_target'') if states(''input_text.dc_notify_target'')
        not in [''unknown'',''unavailable'',''none'',''''] else ''notify.notify'')
        }}'
    data:
      message: 'DC SALON: base signals bad >=10m. missing={ state_attr(''sensor.dc_zone01_degraded_component'',''missing_sources'')
        or [] }'
- id: dc_prod_guard_alert
  alias: dc_prod_guard_alert
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.dc_prod_guard_ok
    to: 'off'
    for: 00:02:00
  condition:
  - condition: state
    entity_id: input_boolean.dc_prod_guard_enabled
    state: 'on'
  action:
  - service: script.dc_alert_send
    data:
      fingerprint: prod_guard_off
      title: prod_guard_off
      message: 'DC: Production guard OFF. sim_allowed={{ states(''binary_sensor.dc_sim_allowed'')
        if has_value(''binary_sensor.dc_sim_allowed'') else ''n/a'' }}, base_bad_10m={{
        states(''binary_sensor.dc_zone01_signal_base_bad_10m'') if has_value(''binary_sensor.dc_zone01_signal_base_bad_10m'')
        else ''n/a'' }}, config_health={{ states(''sensor.dc_zone01_config_health'')
        if has_value(''sensor.dc_zone01_config_health'') else ''n/a'' }}.'
- id: dc_zone01_alert_sensor_degrading
  alias: dc_zone01_alert_sensor_degrading
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.dc_zone01_t_ext_degrading
    to: 'on'
    for:
      hours: 24
  action:
  - service: persistent_notification.create
    data:
      title: 🔧 DC Zone01 · Mantenimiento preventivo requerido
      message: '{{ trigger.to_state.name }} muestra degradación progresiva (>= 24h).

        - Uptime 7d: {{ trigger.to_state.attributes.uptime_7d_pct }}% - Uptime 30d:
        {{ trigger.to_state.attributes.uptime_30d_pct }}% - Caída: {{ trigger.to_state.attributes.degradation_drop_pct
        }}% - Severidad: {{ trigger.to_state.attributes.severity }} - Fallo estimado
        (días): {{ trigger.to_state.attributes.estimated_failure_days }}

        Recomendado: - Revisar conexión física / alimentación - Revisar WiFi (si aplica)
        - Limpieza / ubicación - Planificar reemplazo preventivo

        '
      notification_id: dc_zone01_sensor_degrading
- id: dc_zone01_alert_low_health_score
  alias: dc_zone01_alert_low_health_score
  mode: single
  trigger:
  - platform: numeric_state
    entity_id: sensor.dc_zone01_system_health_score
    below: 85
    for:
      hours: 6
  action:
  - service: persistent_notification.create
    data:
      title: ⚠️ DC Zone01 · Health Score bajo
      message: 'System Health Score: {{ states(''sensor.dc_zone01_system_health_score'')
        }}%

        {{ state_attr(''sensor.dc_zone01_system_health_score'',''overall_status'')
        }}

        Revisa el dashboard de salud de sensores.

        '
      notification_id: dc_zone01_low_health_score
- id: dc_zone01_log_health_scores_daily
  alias: dc_zone01_log_health_scores_daily
  mode: single
  trigger:
  - platform: time
    at: 03:00:00
  action:
  - service: logbook.log
    data:
      name: dc_zone01_system_health
      message: 'Daily health report: System={{ states(''sensor.dc_zone01_system_health_score'')
        }}% T_ext={{ states(''sensor.dc_zone01_t_ext_health_score'') }}% Wind={{ states(''sensor.dc_zone01_wind_health_score'')
        }}% LuxF1={{ states(''sensor.dc_zone01_lux_f1_health_score'') }}%

        '
      entity_id: sensor.dc_zone01_system_health_score
input_number:
  dc_zone01_target_final_min_c:
    name: dc_zone01_target_final_min_c
    min: -10.0
    max: 50.0
    step: 0.5
    mode: box
    unit_of_measurement: °C
    initial: 10.0
  dc_zone01_target_final_max_c:
    name: dc_zone01_target_final_max_c
    min: -10.0
    max: 50.0
    step: 0.5
    mode: box
    unit_of_measurement: °C
    initial: 35.0
  dc_zone01_target_final_oob_last_alert_ts:
    name: dc_zone01_target_final_oob_last_alert_ts
    min: 0
    max: 4102444800
    step: 1
    mode: box
    unit_of_measurement: s
    initial: 0
  dc_zone01_last_tests_ts:
    name: dc_zone01_last_tests_ts
    min: 0
    max: 4102444800
    step: 1
    mode: box
    unit_of_measurement: s
    initial: 0
  dc_last_alert_ts:
    name: dc_last_alert_ts
    min: 0
    max: 9999999999
    step: 1
  dc_alert_cooldown_s:
    name: dc_alert_cooldown_s
    min: 0
    max: 3600
    step: 10
    unit_of_measurement: s
    initial: 600
input_select:
  dc_zone01_test_severity:
    name: dc_zone01_test_severity
    options:
    - warn
    - fail
    initial: warn
input_text:
  dc_zone01_last_tests_result:
    name: dc_zone01_last_tests_result
    max: 32
    initial: unknown
  dc_last_alert_fingerprint:
    name: dc_last_alert_fingerprint
  dc_last_alert_message:
    name: dc_last_alert_message
input_boolean:
  dc_prod_guard_enabled:
    name: dc_prod_guard_enabled
    initial: true
estimated_failure_days: "{% set u7  = (states('sensor.dc_zone01_t_ext_uptime_7d')\
  \ | float(1)) * 100 %} {% set u30 = (states('sensor.dc_zone01_t_ext_uptime_30d')\
  \ | float(1)) * 100 %} {% set d   = (u30 - u7) | round(1) %} {% if d > 5 %}\n  {{\
  \ (((u7 / d) * 7) | round(0)) | int }}\n{% else %}\n  {{ none }}\n{% endif %}\n"