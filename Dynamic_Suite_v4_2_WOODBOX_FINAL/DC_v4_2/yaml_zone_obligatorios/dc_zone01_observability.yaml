    icon: mdi:sun-angle
    availability: '{% set sun = state_attr(''sensor.dc_zone01_hw_map'',''sun'') %}
      {% set elev = state_attr(sun,''elevation'') if sun else none %} {{ elev is not
      none and is_number(elev) }}

      '
    state: "{% set sun = state_attr('sensor.dc_zone01_hw_map','sun') %} {% set v =\
      \ (state_attr(sun,'elevation') | float(none)) if sun else none %} {% if v is\
      \ not none and v >= -90 and v <= 90 %}\n  {{ v | round(1) }}\n{% else %}\n \
      \ {{ none }}\n{% endif %}\n"
    attributes:
      source: '{{ state_attr(''sensor.dc_zone01_hw_map'',''sun'') }}'
      source_entity: '{{ state_attr(''sensor.dc_zone01_hw_map'',''sun'') }}'
      reason_code: '{% set ent = state_attr(''sensor.dc_zone01_hw_map'',''sun'') %}
        {% if not ent %}missing_hwmap_key {% elif states(ent) in [''unknown'',''unavailable'',''none'','''']
        %}bad_state {% else %}ok{% endif %}

        '
