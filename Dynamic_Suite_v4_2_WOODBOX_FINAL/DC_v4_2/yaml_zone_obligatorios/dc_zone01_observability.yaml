script:
  dc_zone01_run_all_checks:
    alias: dc_zone01_run_all_checks
    mode: single
    sequence:
    - variables:
        now_ts: '{{ as_timestamp(now())|int(0) }}'
        zone: zone01
    - service: script.dc_onboarding_check_zona
      data:
        zone: '{{ zone }}'
    - service: script.dc_hwmap_check_zona
      data:
        zone: '{{ zone }}'
    - service: script.dc_zone01_run_self_test
    - service: script.dc_zone01_run_basic_tests
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ has_value(''script.dc_zone01_run_sim_regression_tests'')
            }}'
        sequence:
        - service: script.dc_zone01_run_sim_regression_tests
      default: []
    - service: input_number.set_value
      target:
        entity_id: input_number.dc_zone01_last_tests_ts
      data:
        value: '{{ now_ts }}'
  dc_alert_send:
    alias: dc_alert_send
    mode: queued
    max: 10
    fields:
      fingerprint:
        description: dedup id
      message:
        description: message
      title:
        description: title
    sequence:
    - variables:
        fp: '{{ fingerprint | default(''generic'') }}'
        msg: '{{ message | default('''') }}'
        ttl: '{{ states(''input_number.dc_alert_cooldown_s'') | int(600) }}'
        last_fp: '{{ states(''input_text.dc_last_alert_fingerprint'') }}'
        last_ts: '{{ states(''input_number.dc_last_alert_ts'') | int(0) }}'
        now_ts: '{{ as_timestamp(now()) | int(0) }}'
        cooldown_ok: '{{ (now_ts - last_ts) >= (ttl|int(0)) }}'
        same_fp: '{{ fp == last_fp }}'
        notify_target: '{% set t = states(''input_text.dc_notify_target'') %} {% if
          t not in [''unknown'',''unavailable'',''none'',''''] %}{{ t }}{% else %}notify.notify{%
          endif %}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ cooldown_ok and (not same_fp) }}'
        sequence:
        - service: input_text.set_value
          target:
            entity_id: input_text.dc_last_alert_fingerprint
          data:
            value: '{{ fp }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.dc_last_alert_ts
          data:
            value: '{{ now_ts }}'
        - service: persistent_notification.create
          data:
            title: '{{ title | default(fp) }}'
            message: '{{ msg }}'
        - service: notify.send_message
          target:
            entity_id: '{{ notify_target }}'
          data:
            message: '{{ msg }}'
      default: []
  dc_zone01_send_health_report:
    alias: dc_zone01_send_health_report
    mode: single
    sequence:
    - service: notify.send_message
      target:
        entity_id: '{{ (states(''input_text.dc_notify_target'') if states(''input_text.dc_notify_target'')
          not in [''unknown'',''unavailable'',''none'',''''] else ''notify.notify'')
          }}'
      data:
        message: 'DC self-test: health={{ states(''sensor.dc_zone01_health_report'')
          }} (ok={{ is_state(''binary_sensor.dc_zone01_health_ok'',''on'') }}) hvac={{
          states(''sensor.dc_zone01_hvac_mode'') }} | valve_open={{ states(''binary_sensor.dc_zone01_valve_open'')
          }} degraded={{ is_state(''binary_sensor.dc_zone01_degraded'',''on'') }}
          ({{ states(''sensor.dc_zone01_degraded_reason'') }}) signals_fault={{ is_state(''binary_sensor.dc_zone01_signals_fault'',''on'')
          }} missing={{ states(''sensor.dc_zone01_signals_missing'') }} mods_incoh={{
          is_state(''binary_sensor.dc_zone01_mods_incoherente'',''on'') }} delta={{
          states(''sensor.dc_zone01_mods_delta_raw'') }} mods_reason={{ states(''sensor.dc_zone01_mods_incoherente_reason'')
          }} t_int={{ states(''sensor.dc_zone01_t_int_safe'') }} | t_ext={{ states(''sensor.dc_zone01_t_ext_safe'')
          }} target_raw={{ states(''sensor.dc_zone01_target_raw'') }} | target_final={{
          states(''sensor.dc_zone01_target_final'') }} 7d: degraded={{ states(''sensor.dc_zone01_degraded_time_7d'')
          }}h, signals_fault={{ states(''sensor.dc_zone01_signals_fault_time_7d'')
          }}h, mods_incoh={{ states(''sensor.dc_zone01_mods_incoherente_time_7d'')
          }}h sim={{ states(''sensor.dc_zone01_sim_status'') }} live={{ is_state(''binary_sensor.dc_zone01_sim_live'',''on'')
          }} last={{ states(''input_text.dc_zone01_sim_last_action'') }}

          '
