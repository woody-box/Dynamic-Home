# ============================================================================
# Dynamic Climate · DC Zone01 · SDHB
# ----------------------------------------------------------------------------
# version: 4.2
# changelog: v4.2 (hotfix: DRY ds expanded targets via sensor)
# ============================================================================

input_boolean:
  dc_zone01_sdhb_enabled:
    name: dc_zone01_sdhb_enabled
    icon: mdi:lan-connect
    initial: false
  dc_zone01_sdhb_consume_enabled:
    name: dc_zone01_sdhb_consume_enabled
    icon: mdi:arrow-decision
    initial: false
  dc_zone01_sdhb_export_enabled:
    name: dc_zone01_sdhb_export_enabled
    icon: mdi:upload-network
    initial: false
input_number:
  dc_zone01_sdhb_bias_solar_gain_heat_c:
    name: dc_zone01_sdhb_bias_solar_gain_heat_c
    icon: mdi:white-balance-sunny
    min: -3
    max: 3
    step: 0.1
    mode: box
    unit_of_measurement: °C
    initial: -0.5
  dc_zone01_sdhb_bias_solar_shield_cool_c:
    name: dc_zone01_sdhb_bias_solar_shield_cool_c
    icon: mdi:weather-sunny-alert
    min: -3
    max: 3
    step: 0.1
    mode: box
    unit_of_measurement: °C
    initial: 0.5
template:
- sensor:
  - name: dc_zone01_addon_sdhb_version
    unique_id: dc_zone01_addon_sdhb_version
    icon: mdi:tag
    state: '4.2'
    attributes:
      module: dc_zone01_addon_sdhb
      tier: optional
- sensor:
  - name: dc_zone01_sdhb_intent_matched
    unique_id: dc_zone01_sdhb_intent_matched
    availability: "{{ is_state('input_boolean.sdhb_enabled','on')\n   and is_state('input_boolean.dc_zone01_sdhb_enabled','on')\
      \ }}\n"
    state: "{% set consume = is_state('input_boolean.dc_zone01_sdhb_consume_enabled','on')\
      \ %} {% set intent = states('sensor.sdhb_winner_dc_zone01') if states('sensor.sdhb_winner_dc_zone01')\
      \ not in ['unknown','unavailable'] else states('sensor.sdhb_intent_effective')\
      \ %} {% set tgt = state_attr('sensor.sdhb_winner_dc_zone01','target') if state_attr('sensor.sdhb_winner_dc_zone01','target')\
      \ not in [none,'unknown','unavailable'] else state_attr('sensor.sdhb_intent_effective','target')\
      \ %} {% if (not consume) or intent in ['unknown','unavailable','none',''] or\
      \ intent == 'none' %}\n  none\n{% else %}\n  {% if tgt in [none,'','unknown','unavailable']\
      \ %}\n    {{ intent }}\n  {% elif tgt in ['dc','dc_zone01','zone01','z1'] %}\n\
      \    {{ intent }}\n  {% else %}\n    none\n  {% endif %}\n{% endif %}\n"
    attributes:
      consume_enabled: '{{ is_state(''input_boolean.dc_zone01_sdhb_consume_enabled'',''on'')
        }}'
      intent: '{{ states(''sensor.sdhb_winner_dc_zone01'') if states(''sensor.sdhb_winner_dc_zone01'')
        not in [''unknown'',''unavailable''] else states(''sensor.sdhb_intent_effective'')
        }}'
      target: '{{ state_attr(''sensor.sdhb_winner_dc_zone01'',''target'') if state_attr(''sensor.sdhb_winner_dc_zone01'',''target'')
        not in [none,''unknown'',''unavailable''] else state_attr(''sensor.sdhb_intent_effective'',''target'')
        }}'
      source: '{{ state_attr(''sensor.sdhb_winner_dc_zone01'',''source'') if state_attr(''sensor.sdhb_winner_dc_zone01'',''source'')
        not in [none,''unknown'',''unavailable''] else state_attr(''sensor.sdhb_intent_effective'',''source'')
        }}'
      priority: '{{ state_attr(''sensor.sdhb_intent_effective'',''priority'') }}'
      expires_at: '{{ state_attr(''sensor.sdhb_intent_effective'',''expires_at'')
        }}'
      payload: '{{ state_attr(''sensor.sdhb_winner_dc_zone01'',''payload'') if state_attr(''sensor.sdhb_winner_dc_zone01'',''payload'')
        not in [none,''unknown'',''unavailable''] else state_attr(''sensor.sdhb_intent_effective'',''payload'')
        }}'
  - name: dc_zone01_sdhb_bias_c
    unique_id: dc_zone01_sdhb_bias_c
    unit_of_measurement: °C
    state: "{% if not (is_state('input_boolean.sdhb_enabled','on')\n           and\
      \ is_state('input_boolean.dc_zone01_sdhb_enabled','on')\n           and is_state('input_boolean.dc_zone01_sdhb_consume_enabled','on'))\
      \ %}\n  0\n{% else %}\n  {% set intent = states('sensor.dc_zone01_sdhb_intent_matched')\
      \ %}\n  {% set m = 'sensor.dc_zone01_hw_map' %}\n  {% set clim = state_attr(m,'climate')\
      \ %}\n  {% set hvac = states(clim) if clim else 'off' %}\n  {% set is_heat =\
      \ (hvac == 'heat') %}\n  {% set is_cool = (hvac == 'cool') %}\n  {% if intent\
      \ == 'request_solar_gain' and is_heat %}\n    {{ states('input_number.dc_zone01_sdhb_bias_solar_gain_heat_c')|float(-0.5)\
      \ }}\n  {% elif intent == 'request_solar_shield' and is_cool %}\n    {{ states('input_number.dc_zone01_sdhb_bias_solar_shield_cool_c')|float(0.5)\
      \ }}\n  {% else %}\n    0\n  {% endif %}\n{% endif %}\n"
  - name: sdhb_dc_zone01
    unique_id: sdhb_dc_zone01
    availability: "{{ is_state('input_boolean.sdhb_enabled','on')\n   and is_state('input_boolean.dc_zone01_sdhb_enabled','on')\
      \ }}\n"
    state: "{% set m = 'sensor.dc_zone01_hw_map' %} {% set clim = state_attr(m,'climate')\
      \ %} {% if clim is none %}error {% else %}\n  {% set hv = states(clim) %}\n\
      \  {% if hv == 'off' %}off\n  {% elif hv in ['heat','cool'] %}idle\n  {% else\
      \ %}idle\n  {% endif %}\n{% endif %}\n"
    attributes:
      zone_id: zone01
      module: dc
      hvac_mode: '{% set m = ''sensor.dc_zone01_hw_map'' %} {% set c = state_attr(m,''climate'')
        %} {{ states(c) if c else ''off'' }}

        '
      t_in: '{{ states(''sensor.dc_zone01_t_int_safe'')|float(none) }}'
      t_out: '{{ states(''sensor.dc_zone01_t_ext_safe'')|float(none) }}'
      sp: '{{ states(''sensor.dc_zone01_target_final'')|float(none) }}'
      lock: '{% if is_state(''binary_sensor.dc_zone01_override_activo'',''on'') %}manual{%
        else %}none{% endif %}

        '
      intent: '{{ states(''sensor.dc_zone01_sdhb_intent_matched'') }}'
      priority: '{{ state_attr(''sensor.sdhb_intent_effective'',''priority'') }}'

- sensor:
  - name: dc_zone01_ds_targets_expanded
    unique_id: dc_zone01_ds_targets_expanded
    icon: mdi:target-variant
    state: >-
      {% set t = this.attributes.get('targets') %}
      {{ (t | count) if t is iterable else 0 }}
    attributes:
      targets: >-
        {% set bad = ['unknown','unavailable','none',''] %}
        {% set raw_targets = states('input_text.dc_zone01_ds_targets_csv') %}
        {% set s = 'ds' if raw_targets in bad else raw_targets %}
        {% set targets = s.split(',') | map('trim') | reject('equalto','') | list %}
        {% set raw_groups = states('input_text.dc_ds_facade_groups_json') %}
        {% set g = '{}' if raw_groups in bad else raw_groups %}
        {% set groups = g | from_json %}
        {% set ns = namespace(arr=[]) %}
        {% for t in targets %}
          {% if t.startswith('ds_f') and (groups is mapping) and (t in groups) %}
            {% for w in groups[t] %}
              {% set ns.arr = ns.arr + [w] %}
            {% endfor %}
          {% else %}
            {% set ns.arr = ns.arr + [t] %}
          {% endif %}
        {% endfor %}
        {% set out = ns.arr | map('trim') | reject('equalto','') | unique | list %}
        {{ out if out | count > 0 else ['ds'] }}

input_text:
  dc_zone01_ds_targets_csv:
    name: dc_zone01_ds_targets_csv
    initial: ds
    max: 255
  dc_ds_facade_groups_json:
    name: dc_ds_facade_groups_json
    initial: "{}"
    max: 2048
automation:
- id: dc_zone01_sdhb_export_hvac_to_ds
  alias: dc_zone01_sdhb_export_hvac_to_ds
  mode: queued
  trigger:
  - platform: state
    entity_id: sensor.dc_zone01_hvac_mode
  condition:
  - condition: state
    entity_id: input_boolean.sdhb_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.dc_zone01_sdhb_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.dc_zone01_sdhb_export_enabled
    state: 'on'
  action:
  - variables:
      hvac: '{{ states(''sensor.dc_zone01_hvac_mode'') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ hvac == ''heat'' }}'
      sequence:
      - variables:
          _expanded_targets: >-
            {% set t = state_attr('sensor.dc_zone01_ds_targets_expanded','targets') %}
            {{ t if t is iterable and (t | count > 0) else ['ds'] }}
      - repeat:
          for_each: "{{ _expanded_targets }}"
          sequence:
          - service: script.sdhb_publish_intent
            data:
              source: dc_zone01
              intent: request_solar_gain
              target: "{{ repeat.item }}"
              ttl_s: 1800
              payload: hvac=heat
    - conditions:
      - condition: template
        value_template: '{{ hvac == ''cool'' }}'
      sequence:
      - variables:
          _expanded_targets: >-
            {% set t = state_attr('sensor.dc_zone01_ds_targets_expanded','targets') %}
            {{ t if t is iterable and (t | count > 0) else ['ds'] }}
      - repeat:
          for_each: "{{ _expanded_targets }}"
          sequence:
          - service: script.sdhb_publish_intent
            data:
              source: dc_zone01
              intent: request_solar_shield
              target: "{{ repeat.item }}"
              ttl_s: 1800
              payload: hvac=cool
    default:
    - service: script.sdhb_clear_intent
      data:
        source: dc_zone01
- id: dc_zone01_sdhb_heartbeat
  alias: dc_zone01_sdhb_heartbeat
  mode: queued
  trigger:
  - platform: homeassistant
    event: start
  - platform: time_pattern
    minutes: /2
  condition:
  - condition: state
    entity_id: input_boolean.sdhb_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.dc_zone01_sdhb_enabled
    state: 'on'
  action:
  - service: script.sdhb_heartbeat
    data:
      source: dc_zone01
      details: dc_zone01
- id: dc_zone01_sdhb_feedback_ack
  alias: dc_zone01_sdhb_feedback_ack
  mode: queued
  trigger:
  - platform: state
    entity_id:
    - sensor.dc_zone01_sdhb_intent_matched
    - sensor.dc_zone01_sdhb_bias_c
  condition:
  - condition: state
    entity_id: input_boolean.sdhb_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.dc_zone01_sdhb_enabled
    state: 'on'
  action:
  - variables:
      intent: '{{ states(''sensor.dc_zone01_sdhb_intent_matched'') }}'
      bias: '{{ states(''sensor.dc_zone01_sdhb_bias_c'')|float(0) }}'
      applied: '{{ (bias|float(0)) != 0 }}'
      status: "{% if intent in ['none','unknown','unavailable',''] or intent == 'none'\
        \ %}\n  none\n{% else %}\n  accepted\n{% endif %}\n"
      reason: "{% if intent in ['none','unknown','unavailable',''] or intent == 'none'\
        \ %}\n  no_intent\n{% elif (bias|float(0)) != 0 %}\n  bias_applied\n{% else\
        \ %}\n  intent_not_applicable_current_hvac\n{% endif %}\n"
      details: bias={{ bias }}
  - service: script.sdhb_feedback
    data:
      source: dc_zone01
      status: '{{ status }}'
      intent_received: '{{ intent }}'
      applied: '{{ applied }}'
      reason: '{{ reason }}'
      details: '{{ details }}'
