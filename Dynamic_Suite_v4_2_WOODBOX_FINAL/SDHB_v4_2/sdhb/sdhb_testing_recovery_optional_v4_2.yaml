# SDHB optional tests: recovery & TTL (v4.2)
#
# Purpose:
# - Validate TTL expiry: winner returns to 'none'
# - Validate priority fallback: when top intent expires, next one becomes winner
#
# Safe by default: disabled unless sdhb_tests_enabled is ON.
#
input_boolean:
  sdhb_recovery_tests_enabled:
    name: sdhb_recovery_tests_enabled
    icon: mdi:shield-check
    initial: false

input_select:
  sdhb_recovery_test_scenario:
    name: sdhb_recovery_test_scenario
    options:
      - none
      - t_ttl_expiry_ds_w1
      - t_fallback_on_expiry_ds_w1
      - t_clear_intent_ds_w1
      - t_republish_after_expiry_ds_w1
    initial: none
    icon: mdi:clipboard-check

input_boolean:
  sdhb_recovery_test_pass:
    name: sdhb_recovery_test_pass
    initial: false

input_text:
  sdhb_recovery_test_last_result:
    name: sdhb_recovery_test_last_result
    initial: ""

timer:
  sdhb_recovery_tests_auto_off:
    name: sdhb_recovery_tests_auto_off
    duration: "02:00:00"

automation:
  - id: sdhb_recovery_tests_auto_off_start
    alias: sdhb_recovery_tests_auto_off_start
    mode: restart
    trigger:
      - platform: state
        entity_id: input_boolean.sdhb_recovery_tests_enabled
        to: "on"
    action:
      - service: timer.start
        target:
          entity_id: timer.sdhb_recovery_tests_auto_off

  - id: sdhb_recovery_tests_auto_off_apply
    alias: sdhb_recovery_tests_auto_off_apply
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.sdhb_recovery_tests_auto_off
    condition:
      - condition: state
        entity_id: input_boolean.sdhb_recovery_tests_enabled
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sdhb_recovery_tests_enabled
      - service: input_select.select_option
        target:
          entity_id: input_select.sdhb_recovery_test_scenario
        data:
          option: none

  - id: sdhb_recovery_tests_run_on_scenario
    alias: sdhb_recovery_tests_run_on_scenario
    mode: queued
    trigger:
      - platform: state
        entity_id: input_select.sdhb_recovery_test_scenario
    condition:
      - condition: state
        entity_id: input_boolean.sdhb_recovery_tests_enabled
        state: "on"
      - condition: template
        value_template: "{{ trigger.to_state.state not in ['none','unknown','unavailable'] }}"
    action:
      - service: script.sdhb_run_recovery_test
        data:
          scenario: "{{ trigger.to_state.state }}"

script:
  sdhb_run_recovery_test:
    alias: sdhb_run_recovery_test
    mode: queued
    fields:
      scenario:
        description: test scenario key
    sequence:
      - variables:
          scen: "{{ scenario }}"
          tgt: "ds_w1"
          # canonical priorities
          prio_solar_shield: 80
          prio_quiet: 60
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.sdhb_recovery_test_pass
      - service: input_text.set_value
        target:
          entity_id: input_text.sdhb_recovery_test_last_result
        data:
          value: "RUN {{ scen }} @ {{ now() }}"
      # clear any previous intents for the target (best effort)
      - service: script.sdhb_clear_intent
        data:
          target: "{{ tgt }}"
          source: "dc_zone01"
      - choose:
          - conditions: "{{ scen == 't_ttl_expiry_ds_w1' }}"
            sequence:
              - service: script.sdhb_publish_intent
                data:
                  source: "dc_zone01"
                  target: "{{ tgt }}"
                  intent: "request_quiet"
                  priority: "{{ prio_quiet }}"
                  ttl_s: 3
              - delay: "00:00:01"
              - choose:
                  - conditions: "{{ states('sensor.sdhb_winner_ds_w1') == 'request_quiet' }}"
                    sequence: []
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.sdhb_recovery_test_last_result
                        data:
                          value: "FAIL: expected winner=request_quiet, got={{ states('sensor.sdhb_winner_ds_w1') }}"
                      - stop: "winner mismatch"
              - delay: "00:00:04"
              - choose:
                  - conditions: "{{ states('sensor.sdhb_winner_ds_w1') in ['none',''] }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.sdhb_recovery_test_pass
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.sdhb_recovery_test_last_result
                        data:
                          value: "PASS: TTL expiry returned winner to none"
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.sdhb_recovery_test_last_result
                        data:
                          value: "FAIL: TTL expiry expected none, got={{ states('sensor.sdhb_winner_ds_w1') }}"
          - conditions: "{{ scen == 't_fallback_on_expiry_ds_w1' }}"
            sequence:
              - service: script.sdhb_publish_intent
                data:
                  source: "dv_vmc"
                  target: "{{ tgt }}"
                  intent: "request_quiet"
                  priority: "{{ prio_quiet }}"
                  ttl_s: 12
              - service: script.sdhb_publish_intent
                data:
                  source: "dc_zone01"
                  target: "{{ tgt }}"
                  intent: "request_solar_shield"
                  priority: "{{ prio_solar_shield }}"
                  ttl_s: 3
              - delay: "00:00:01"
              - choose:
                  - conditions: "{{ states('sensor.sdhb_winner_ds_w1') == 'request_solar_shield' }}"
                    sequence: []
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.sdhb_recovery_test_last_result
                        data:
                          value: "FAIL: expected winner=request_solar_shield, got={{ states('sensor.sdhb_winner_ds_w1') }}"
                      - stop: "winner mismatch"
              - delay: "00:00:04"
              - choose:
                  - conditions: "{{ states('sensor.sdhb_winner_ds_w1') == 'request_quiet' }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.sdhb_recovery_test_pass
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.sdhb_recovery_test_last_result
                        data:
                          value: "PASS: fallback to next intent after expiry"
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.sdhb_recovery_test_last_result
                        data:
                          value: "FAIL: expected fallback winner=request_quiet, got={{ states('sensor.sdhb_winner_ds_w1') }}"
          - conditions: "{{ scen == 't_clear_intent_ds_w1' }}"
            sequence:
              - service: script.sdhb_publish_intent
                data:
                  source: "dc_zone01"
                  target: "{{ tgt }}"
                  intent: "request_quiet"
                  priority: "{{ prio_quiet }}"
                  ttl_s: 30
              - delay: "00:00:01"
              - service: script.sdhb_clear_intent
                data:
                  target: "{{ tgt }}"
                  source: "dc_zone01"
              - delay: "00:00:01"
              - choose:
                  - conditions: "{{ states('sensor.sdhb_winner_ds_w1') in ['none',''] }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.sdhb_recovery_test_pass
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.sdhb_recovery_test_last_result
                        data:
                          value: "PASS: clear_intent => winner none"
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.sdhb_recovery_test_last_result
                        data:
                          value: "FAIL: expected winner none after clear_intent; got={{ states('sensor.sdhb_winner_ds_w1') }}"

          - conditions: "{{ scen == 't_republish_after_expiry_ds_w1' }}"
            sequence:
              - service: script.sdhb_publish_intent
                data:
                  source: "dc_zone01"
                  target: "{{ tgt }}"
                  intent: "request_quiet"
                  priority: "{{ prio_quiet }}"
                  ttl_s: 2
              - delay: "00:00:03"
              - service: script.sdhb_publish_intent
                data:
                  source: "dc_zone01"
                  target: "{{ tgt }}"
                  intent: "request_quiet"
                  priority: "{{ prio_quiet }}"
                  ttl_s: 20
              - delay: "00:00:01"
              - choose:
                  - conditions: "{{ states('sensor.sdhb_winner_ds_w1') == 'request_quiet' }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.sdhb_recovery_test_pass
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.sdhb_recovery_test_last_result
                        data:
                          value: "PASS: republish after expiry => winner restored"
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.sdhb_recovery_test_last_result
                        data:
                          value: "FAIL: expected winner request_quiet after republish; got={{ states('sensor.sdhb_winner_ds_w1') }}"

      - service: input_select.select_option
        target:
          entity_id: input_select.sdhb_recovery_test_scenario
        data:
          option: none
