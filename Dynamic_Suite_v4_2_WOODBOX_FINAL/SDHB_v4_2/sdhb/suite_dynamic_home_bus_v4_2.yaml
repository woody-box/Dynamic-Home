# version: v4.2
# file: suite_dynamic_home_bus_v4_2.yaml
# purpose: SDHB core logic (scripts + template sensors).
# required packages (must also be loaded):
#   - SDHB_v4_2/sdhb/sdhb_bus_helpers_v4_2.yaml
#   - SDHB_v4_2/sdhb/sdhb_bus_automations_v4_2.yaml
# changelog: v4.2 (refactor: split monolithic bus into helpers/logic/automations; keep file name as entrypoint for logic; publish_intent: rate-limit unchanged writes)

script:
  sdhb_publish_intent:
    alias: "sdhb_publish_intent_multi_slot"
    mode: queued
    fields:
      source:
        description: "Source slot key (e.g. dc_zone01, ds_w1, dv_vmc)"
      intent:
        description: "Intent name"
      target:
        description: "Target scope: '' (broadcast) | 'dc'/'ds'/'dv' | instance id (e.g. ds_w1)"
      ttl_s:
        description: "TTL seconds (0 disables expiration)"
      priority:
        description: "Optional priority override (0..200). Score=max(matrix,override)."
      payload:
        description: "Optional payload (json/text)"
    sequence:
      - variables:
          src: "{{ source | lower }}"
          # Guard: validate source slot before touching dynamically-built entities
          valid_sources: >
            {{ ['dc_zone01','dc_zone02','dc_zone03','dc_zone04',
              'dc_zone05','dc_zone06','dc_zone07','dc_zone08',
              'ds_w1','ds_w2','ds_w3','ds_w4',
              'ds_w5','ds_w6','ds_w7','ds_w8',
              'ds_w9','ds_w10','ds_w11','ds_w12',
              'dv_vmc','dv_2','dv_3'] }}
          src_valid: "{{ src in valid_sources }}"
          ent_intent: "{{ 'input_select.sdhb_' ~ src ~ '_intent' }}"
          ent_target: "{{ 'input_text.sdhb_' ~ src ~ '_target' }}"
          ent_payload: "{{ 'input_text.sdhb_' ~ src ~ '_payload' }}"
          ent_prio: "{{ 'input_number.sdhb_' ~ src ~ '_priority' }}"
          ent_ttl: "{{ 'input_number.sdhb_' ~ src ~ '_ttl_s' }}"
          ent_ts: "{{ 'input_datetime.sdhb_' ~ src ~ '_ts' }}"
          ent_exp: "{{ 'input_datetime.sdhb_' ~ src ~ '_expires_at' }}"
          ent_enabled: "{{ 'input_boolean.sdhb_' ~ src ~ '_enabled' }}"
          ent_last_seen: "{{ 'input_number.sdhb_' ~ src ~ '_last_seen_ts' }}"
          now_dt: "{{ now() }}"
          now_ts: "{{ now().timestamp() | int }}"
          ttl: "{{ (ttl_s | int(0)) }}"
          exp_dt: "{{ (now() + timedelta(seconds=ttl)) if ttl > 0 else now() }}"

          payload_str: "{{ (payload | default('')) | string }}"
          payload_len: "{{ payload_str | length }}"
          payload_too_long: "{{ payload_len > 250 }}"
          payload_is_json: "{{ (payload_str | trim).startswith('{') or (payload_str | trim).startswith('[') }}"
          payload_json_ok: >-
            {% if not payload_is_json %}
              true
            {% elif payload_str in ['unknown','unavailable','none',''] %}
              true
            {% else %}
              {% set _ = payload_str | from_json %}
              true
            {% endif %}
      - choose:
          - conditions: "{{ not src_valid }}"
            sequence:
              - event: sdhb_error
                event_data:
                  error: "unknown_source"
                  source: "{{ src }}"
                  script: "sdhb_publish_intent"
              - stop: "unknown source: {{ src }}"
      
      - choose:
          - conditions: "{{ payload_is_json and not payload_json_ok }}"
            sequence:
              - event: sdhb_error
                event_data:
                  error: "invalid_payload_json"
                  source: "{{ src }}"
                  script: "sdhb_publish_intent"
                  payload: "{{ payload_str | truncate(120, True) }}"
              - stop: "invalid payload json"
      - choose:
          - conditions: "{{ payload_too_long }}"
            sequence:
              - event: sdhb_error
                event_data:
                  error: "payload_truncated"
                  source: "{{ src }}"
                  script: "sdhb_publish_intent"
                  payload_len: "{{ payload_len }}"
              - variables:
                  payload_str: >-
                    {% if payload_is_json %}
                      {{ '{"truncated":true,"len":' ~ payload_len ~ '}' }}
                    {% else %}
                      {{ payload_str[:250] }}
                    {% endif %}

      - service: input_boolean.turn_on
        target:
          entity_id: "{{ ent_enabled }}"
      - choose:
          - conditions:
              - condition: template
                value_template: >-
                  {% set same =
                    states(ent_intent) == intent
                    and states(ent_target) == target
                    and states(ent_payload) == payload_str
                    and (states(ent_prio) | int(0)) == (priority | int(0))
                    and (states(ent_ttl) | int(0)) == (ttl_s | int(0))
                  %}
                  {% set cooldown = (now_ts - (states(ent_last_seen) | int(0))) < 1 %}
                  {{ same and cooldown }}
            sequence:
              - stop: "sdhb_publish_intent: unchanged within cooldown"
      - service: input_select.select_option
        target:
          entity_id: "{{ ent_intent }}"
        data:
          option: "{{ intent | default('none') }}"
      - service: input_text.set_value
        target:
          entity_id: "{{ ent_target }}"
        data:
          value: "{{ (target | default('')) | lower }}"
      - service: input_text.set_value
        target:
          entity_id: "{{ ent_payload }}"
        data:
          value: "{{ payload_str }}"
      - service: input_number.set_value
        target:
          entity_id: "{{ ent_prio }}"
        data:
          value: "{{ priority | int(0) }}"
      - service: input_number.set_value
        target:
          entity_id: "{{ ent_ttl }}"
        data:
          value: "{{ ttl }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: "{{ ent_ts }}"
        data:
          datetime: "{{ now_dt }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: "{{ ent_exp }}"
        data:
          datetime: "{{ exp_dt }}"
      # Health: mark publisher as seen
      - service: input_number.set_value
        target:
          entity_id: "{{ ent_last_seen }}"
        data:
          value: "{{ now_ts }}"
      - event: sdhb_intent_published
        event_data:
          source: "{{ src }}"
          intent: "{{ intent | default('none') }}"
          target: "{{ (target | default('')) | lower }}"
          ttl_s: "{{ ttl }}"
          priority_override: "{{ priority | int(0) }}"

  sdhb_clear_intent:
    alias: "sdhb_clear_intent_by_source"
    mode: queued
    fields:
      source:
        description: "Source slot key"
    sequence:
      - variables:
          src: "{{ source | lower }}"
          # Guard: validate source slot before touching dynamically-built entities
          valid_sources: >
            {{ ['dc_zone01','dc_zone02','dc_zone03','dc_zone04',
              'dc_zone05','dc_zone06','dc_zone07','dc_zone08',
              'ds_w1','ds_w2','ds_w3','ds_w4',
              'ds_w5','ds_w6','ds_w7','ds_w8',
              'ds_w9','ds_w10','ds_w11','ds_w12',
              'dv_vmc','dv_2','dv_3'] }}
          src_valid: "{{ src in valid_sources }}"
      - choose:
          - conditions: "{{ not src_valid }}"
            sequence:
              - event: sdhb_error
                event_data:
                  error: "unknown_source"
                  source: "{{ src }}"
                  script: "sdhb_clear_intent"
              - stop: "unknown source: {{ src }}"
      - variables:
          src: "{{ source | lower }}"
          ent_intent: "{{ 'input_select.sdhb_' ~ src ~ '_intent' }}"
          ent_target: "{{ 'input_text.sdhb_' ~ src ~ '_target' }}"
          ent_payload: "{{ 'input_text.sdhb_' ~ src ~ '_payload' }}"
          ent_prio: "{{ 'input_number.sdhb_' ~ src ~ '_priority' }}"
          ent_ttl: "{{ 'input_number.sdhb_' ~ src ~ '_ttl_s' }}"
          ent_ts: "{{ 'input_datetime.sdhb_' ~ src ~ '_ts' }}"
          ent_exp: "{{ 'input_datetime.sdhb_' ~ src ~ '_expires_at' }}"
          ent_enabled: "{{ 'input_boolean.sdhb_' ~ src ~ '_enabled' }}"
      - service: input_select.select_option
        target:
          entity_id: "{{ ent_intent }}"
        data:
          option: none
      - service: input_text.set_value
        target:
          entity_id: "{{ ent_target }}"
        data:
          value: ""
      - service: input_text.set_value
        target:
          entity_id: "{{ ent_payload }}"
        data:
          value: ""
      - service: input_number.set_value
        target:
          entity_id: "{{ ent_prio }}"
        data:
          value: 0
      - service: input_number.set_value
        target:
          entity_id: "{{ ent_ttl }}"
        data:
          value: 0
      - service: input_boolean.turn_off
        target:
          entity_id: "{{ ent_enabled }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: "{{ ent_ts }}"
        data:
          timestamp: 0
      - service: input_datetime.set_datetime
        target:
          entity_id: "{{ ent_exp }}"
        data:
          timestamp: 0

  sdhb_heartbeat:
    alias: "sdhb_heartbeat_module_online"
    mode: queued
    fields:
      source:
        description: "Module instance key (e.g. dc_zone01, ds_w1, dv_vmc)"
      details:
        description: "Optional detail string"
    sequence:
      - variables:
          src: "{{ source | lower }}"
          # Guard: validate source slot before touching dynamically-built entities
          valid_sources: >
            {{ ['dc_zone01','dc_zone02','dc_zone03','dc_zone04',
              'dc_zone05','dc_zone06','dc_zone07','dc_zone08',
              'ds_w1','ds_w2','ds_w3','ds_w4',
              'ds_w5','ds_w6','ds_w7','ds_w8',
              'ds_w9','ds_w10','ds_w11','ds_w12',
              'dv_vmc','dv_2','dv_3'] }}
          src_valid: "{{ src in valid_sources }}"
      - choose:
          - conditions: "{{ not src_valid }}"
            sequence:
              - event: sdhb_error
                event_data:
                  error: "unknown_source"
                  source: "{{ src }}"
                  script: "sdhb_heartbeat"
              - stop: "unknown source: {{ src }}"
      - variables:
          src: "{{ source | lower }}"
          ent_last_seen: "{{ 'input_number.sdhb_' ~ src ~ '_last_seen_ts' }}"
          now_ts: "{{ now().timestamp() | int }}"
      - service: input_number.set_value
        target:
          entity_id: "{{ ent_last_seen }}"
        data:
          value: "{{ now_ts }}"
      - event: sdhb_heartbeat
        event_data:
          source: "{{ src }}"
          ts: "{{ now_ts }}"
          details: "{{ details | default('') }}"

  # --------------------------------------------------------------------------
  # Feedback ACK channel
  # - Consumers (DC/DV/DS) should call script.sdhb_feedback when a winner changes
  #   or when the ability to apply it changes.
  # - status: accepted | ignored | rejected | none
  # - applied: true when the module is actively applying the winner intent
  # - reason: short machine-friendly reason (e.g. consume_disabled, gate_off, weather_protect)
  # --------------------------------------------------------------------------
  sdhb_feedback:
    alias: "sdhb_feedback_ack"
    mode: queued
    fields:
      source:
        description: "Consumer instance key (e.g. dc_zone01, ds_w1, dv_vmc)"
      status:
        description: "accepted|rejected|ignored|none"
      intent_received:
        description: "Intent that was received/matched"
      applied:
        description: "true/false"
      reason:
        description: "Short human reason"
      details:
        description: "Optional details string (small)"
    sequence:
      - variables:
          src: "{{ source | lower }}"
          # Guard: validate source slot before touching dynamically-built entities
          valid_sources: >
            {{ ['dc_zone01','dc_zone02','dc_zone03','dc_zone04',
              'dc_zone05','dc_zone06','dc_zone07','dc_zone08',
              'ds_w1','ds_w2','ds_w3','ds_w4',
              'ds_w5','ds_w6','ds_w7','ds_w8',
              'ds_w9','ds_w10','ds_w11','ds_w12',
              'dv_vmc','dv_2','dv_3'] }}
          src_valid: "{{ src in valid_sources }}"
      - choose:
          - conditions: "{{ not src_valid }}"
            sequence:
              - event: sdhb_error
                event_data:
                  error: "unknown_source"
                  source: "{{ src }}"
                  script: "sdhb_feedback"
              - stop: "unknown source: {{ src }}"
      - variables:
          src: "{{ source | lower }}"
          ent_state: "{{ 'input_select.sdhb_' ~ src ~ '_feedback_state' }}"
          ent_intent: "{{ 'input_text.sdhb_' ~ src ~ '_feedback_intent' }}"
          ent_reason: "{{ 'input_text.sdhb_' ~ src ~ '_feedback_reason' }}"
          ent_details: "{{ 'input_text.sdhb_' ~ src ~ '_feedback_details' }}"
          ent_applied: "{{ 'input_boolean.sdhb_' ~ src ~ '_feedback_applied' }}"
          ent_ts: "{{ 'input_number.sdhb_' ~ src ~ '_feedback_ts' }}"
          ent_last_seen: "{{ 'input_number.sdhb_' ~ src ~ '_last_seen_ts' }}"
          now_ts: "{{ now().timestamp() | int }}"
          st: "{{ status | default('none') }}"
          ap: "{{ applied | default(false) }}"
      - variables:
          cooldown_s: "{{ states('input_number.sdhb_feedback_ack_cooldown_s') | int(90) }}"
          last_ts: "{{ states(ent_ts) | int(0) }}"
          last_state: "{{ states(ent_state) }}"
          last_intent: "{{ states(ent_intent) }}"
          last_reason: "{{ states(ent_reason) }}"
          last_applied: "{{ is_state(ent_applied,'on') }}"
          same_payload: >-
            {{ (last_state == st)
               and (last_intent == (intent_received | default('none')))
               and (last_reason == (reason | default('')))
               and (last_applied == (ap | bool)) }}
          within_cd: "{{ (now_ts - last_ts) < cooldown_s }}"
      - choose:
          - conditions: "{{ same_payload and within_cd }}"
            sequence:
              - stop: "feedback spam guard (no change within cooldown)"
      - service: input_select.select_option
        target:
          entity_id: "{{ ent_state }}"
        data:
          option: "{{ st }}"
      - service: input_text.set_value
        target:
          entity_id: "{{ ent_intent }}"
        data:
          value: "{{ intent_received | default('none') }}"
      - service: input_text.set_value
        target:
          entity_id: "{{ ent_reason }}"
        data:
          value: "{{ reason | default('') }}"
      - service: input_text.set_value
        target:
          entity_id: "{{ ent_details }}"
        data:
          value: "{{ details | default('') }}"
      - choose:
          - conditions: "{{ ap | bool }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: "{{ ent_applied }}"
        default:
          - service: input_boolean.turn_off
            target:
              entity_id: "{{ ent_applied }}"
      - service: input_number.set_value
        target:
          entity_id: "{{ ent_ts }}"
        data:
          value: "{{ now_ts }}"
      # Health: feedback implies module is alive
      - service: input_number.set_value
        target:
          entity_id: "{{ ent_last_seen }}"
        data:
          value: "{{ now_ts }}"
      - event: sdhb_feedback
        event_data:
          source: "{{ src }}"
          status: "{{ st }}"
          intent_received: "{{ intent_received | default('none') }}"
          applied: "{{ ap }}"
          reason: "{{ reason | default('') }}"
          ts: "{{ now_ts }}"

template:
  - sensor:
      - name: suite_dynamic_home_bus_version
        unique_id: suite_dynamic_home_bus_version
        icon: mdi:tag
        state: "4.2"
        attributes:
          module: suite_dynamic_home_bus
          tier: recommended
      - name: sdhb_version
        unique_id: sdhb_version
        icon: mdi:transit-connection-variant
        state: "4.2"
        attributes:
          module: sdhb
          role: bus
  - sensor:
      - name: sdhb_error_count
        unique_id: sdhb_error_count
        icon: mdi:alert-circle-outline
        state: "{{ states('counter.sdhb_error_count') | int(0) }}"

      - name: sdhb_intent_history
        unique_id: sdhb_intent_history
        icon: mdi:history
        state: "{{ (this.state | int(0)) + 1 }}"
        trigger:
          - platform: event
            event_type: sdhb_winner_changed
        attributes:
          last_ts: "{{ now().isoformat(timespec='seconds') }}"
          last_target: "{{ trigger.event.data.target | default('') }}"
          last_source: "{{ trigger.event.data.source | default('') }}"
          last_intent: "{{ trigger.event.data.intent | default('') }}"
          last_priority: "{{ trigger.event.data.priority | default('') }}"
          history: >-
            {% set n = 15 %}
            {% set old = (this.attributes.get('history','') | string) %}
            {% set line = now().strftime('%Y-%m-%d %H:%M:%S') ~ '|' ~ (trigger.event.data.target|default('')) ~ '|' ~ (trigger.event.data.intent|default('')) ~ '|' ~ (trigger.event.data.source|default('')) ~ '|' ~ (trigger.event.data.priority|default('')) %}
            {% set lines = ([line] + (old.split('\n') if old else []))[:n] %}
            {{ lines | join('\n') }}

      - name: sdhb_feedback_summary
        unique_id: sdhb_feedback_summary
        icon: mdi:check-network-outline
        state: >-
          {% set all = states.input_boolean | selectattr('entity_id','search','^input_boolean\.sdhb_.*_feedback_applied$') | list %}
          {% set on = all | selectattr('state','eq','on') | list %}
          {{ on | count }}
        attributes:
          total_consumers: >-
            {% set all = states.input_boolean | selectattr('entity_id','search','^input_boolean\.sdhb_.*_feedback_applied$') | list %}
            {{ all | count }}
          applied_count: >-
            {% set on = states.input_boolean | selectattr('entity_id','search','^input_boolean\.sdhb_.*_feedback_applied$') | selectattr('state','eq','on') | list %}
            {{ on | count }}
          applied_entity_ids: >-
            {% set on = states.input_boolean | selectattr('entity_id','search','^input_boolean\.sdhb_.*_feedback_applied$') | selectattr('state','eq','on') | map(attribute='entity_id') | list %}
            {{ on }}

      - name: sdhb_health_summary
        unique_id: sdhb_health_summary
        icon: mdi:heart-pulse
        state: >-
          {% set en = is_state('input_boolean.sdhb_enabled','on') %}
          {% set err = states('sensor.sdhb_error_count')|int(0) %}
          {% set w = states('sensor.sdhb_winner_global') %}
          {% if not en %}
            OFF
          {% elif err > 0 %}
            ERRORS_PRESENT
          {% elif w in ['unknown','unavailable','none',''] %}
            IDLE
          {% else %}
            OK
          {% endif %}

      - name: sdhb_health_code
        unique_id: sdhb_health_code
        icon: mdi:shield-check
        state: >-
          {% set en = is_state('input_boolean.sdhb_enabled','on') %}
          {% set err = states('sensor.sdhb_error_count')|int(0) %}
          {% if not en %} 0
          {% elif err > 0 %} 2
          {% else %} 1
          {% endif %}

      - name: "sdhb_winner_global"
        unique_id: sdhb_winner_global
        icon: mdi:flag-checkered
        state: >
          {% if is_state('input_boolean.sdhb_enabled','off') or is_state('input_boolean.sdhb_lock','on') %}
            none
          {% else %}
            {% set sources = states.input_number
              | selectattr('entity_id','search','^input_number\.sdhb_.*_last_seen_ts$')
              | map(attribute='entity_id')
              | map('regex_replace','^input_number\.sdhb_(.*)_last_seen_ts$','\1')
              | list %}
            {% set pm_raw = states('input_text.sdhb_priority_map_json') %}
            {% set pm = (pm_raw | from_json) if pm_raw not in ['unknown','unavailable','none',''] else none %}
            {% if pm is not mapping %}
              {% set pm = {'request_weather_protect':100,'request_solar_shield':80,'request_privacy':70,'request_quiet':60,'request_preheat':50,'request_solar_gain':40,'request_freecool':30,'request_eco':20,'request_normal':10,'request_boost':0} %}
            {% endif %}
            {% set cand = namespace(items=[]) %}
            {% for s in sources %}
              {% set en = is_state('input_boolean.sdhb_' ~ s ~ '_enabled','on') %}
              {% set it = states('input_select.sdhb_' ~ s ~ '_intent') %}
              {% set exp_ts = state_attr('input_datetime.sdhb_' ~ s ~ '_expires_at','timestamp') %}
              {% set ts = state_attr('input_datetime.sdhb_' ~ s ~ '_ts','timestamp') %}
              {% set ttl = states('input_number.sdhb_' ~ s ~ '_ttl_s') | int(0) %}
              {% set pr = states('input_number.sdhb_' ~ s ~ '_priority') | int(0) %}
              {% set tgt = states('input_text.sdhb_' ~ s ~ '_target') %}
              {% set exp_str = states('input_datetime.sdhb_' ~ s ~ '_expires_at') %}
              {% if en and it not in ['none','unknown','unavailable',''] %}
                {% if ttl == 0 or (exp_ts is not none and exp_ts > now().timestamp()) %}
                  {% set base = pm.get(it, 0) %}
                  {% set score = [base, pr] | max %}
                  {% set cand.items = cand.items + [{'source': s, 'intent': it, 'score': score, 'ts': (ts or now().timestamp()), 'target': tgt, 'ttl_s': ttl, 'expires_at': exp_str}] %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% if cand.items | length == 0 %}
              none
            {% else %}
              {% set best = (cand.items | sort(attribute='source')) | sort(attribute='ts') | sort(attribute='score', reverse=true) | first %}
              {{ best.intent }}
            {% endif %}
          {% endif %}
        attributes:
          candidates: >
            {% if is_state('input_boolean.sdhb_enabled','off') or is_state('input_boolean.sdhb_lock','on') %}
              []
            {% else %}
            {% set sources = states.input_number
              | selectattr('entity_id','search','^input_number\.sdhb_.*_last_seen_ts$')
              | map(attribute='entity_id')
              | map('regex_replace','^input_number\.sdhb_(.*)_last_seen_ts$','\1')
              | list %}
              {% set pm_raw = states('input_text.sdhb_priority_map_json') %}
              {% set pm = (pm_raw | from_json) if pm_raw not in ['unknown','unavailable','none',''] else none %}
              {% if pm is not mapping %}
                {% set pm = {'request_weather_protect':100,'request_solar_shield':80,'request_privacy':70,'request_quiet':60,'request_preheat':50,'request_solar_gain':40,'request_freecool':30,'request_eco':20,'request_normal':10,'request_boost':0} %}
              {% endif %}
              {% set out = namespace(items=[]) %}
              {% for s in sources %}
                {% set en = is_state('input_boolean.sdhb_' ~ s ~ '_enabled','on') %}
                {% set it = states('input_select.sdhb_' ~ s ~ '_intent') %}
                {% set exp_ts = state_attr('input_datetime.sdhb_' ~ s ~ '_expires_at','timestamp') %}
                {% set ts = state_attr('input_datetime.sdhb_' ~ s ~ '_ts','timestamp') %}
                {% set ttl = states('input_number.sdhb_' ~ s ~ '_ttl_s') | int(0) %}
                {% set pr = states('input_number.sdhb_' ~ s ~ '_priority') | int(0) %}
                {% set tgt = states('input_text.sdhb_' ~ s ~ '_target') %}
                {% set exp_str = states('input_datetime.sdhb_' ~ s ~ '_expires_at') %}
                {% if en and it not in ['none','unknown','unavailable',''] %}
                  {% if ttl == 0 or (exp_ts is not none and exp_ts > now().timestamp()) %}
                    {% set base = pm.get(it, 0) %}
                    {% set score = [base, pr] | max %}
                    {% set out.items = out.items + [{'source': s, 'intent': it, 'score': score, 'ts': (ts or now().timestamp()), 'target': tgt, 'ttl_s': ttl, 'expires_at': exp_str}] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ out.items | sort(attribute='source') | sort(attribute='ts') | sort(attribute='score', reverse=true) }}
            {% endif %}
          winner_source: >
            {% if is_state('input_boolean.sdhb_enabled','off') or is_state('input_boolean.sdhb_lock','on') %}
              none
            {% else %}
              {% set c = state_attr('sensor.sdhb_winner_global','candidates') or [] %}
              {% if c | length == 0 %} none
