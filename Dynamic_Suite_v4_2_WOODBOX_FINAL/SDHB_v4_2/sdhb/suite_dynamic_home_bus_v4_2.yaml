      - name: "sdhb_modules_health"
        unique_id: sdhb_modules_health
        icon: mdi:heart-pulse
        state: >
          {% if is_state('input_boolean.sdhb_enabled','off') %}
            disabled
          {% else %}
            {% set sources = states.input_number
              | selectattr('entity_id','search','^input_number\.sdhb_.*_last_seen_ts$')
              | map(attribute='entity_id')
              | map('regex_replace','^input_number\.sdhb_(.*)_last_seen_ts$','\1')
              | list %}
            {% set now_ts = now().timestamp() | int %}
            {% set th = 300 %}
            {% set present = namespace(items=[]) %}
            {% for s in sources %}
              {% set last = states('input_number.sdhb_' ~ s ~ '_last_seen_ts') | int(0) %}
              {% if last > 0 %}
                {% set present.items = present.items + [{'source': s, 'age_s': (now_ts - last) | int(0), 'last_seen_ts': last}] %}
              {% endif %}
            {% endfor %}
            {% if present.items | length == 0 %}
              empty
            {% else %}
              {% set off = present.items | selectattr('age_s','gt', th) | list %}
              {% if off | length == 0 %} healthy
              {% else %} degraded
              {% endif %}
            {% endif %}
          {% endif %}
        attributes:
          threshold_s: 300
          present_sources: >
            {% set sources = states.input_number
              | selectattr('entity_id','search','^input_number\.sdhb_.*_last_seen_ts$')
              | map(attribute='entity_id')
              | map('regex_replace','^input_number\.sdhb_(.*)_last_seen_ts$','\1')
              | list %}
            {% set now_ts = now().timestamp() | int %}
            {% set out = namespace(items=[]) %}
            {% for s in sources %}
              {% set last = states('input_number.sdhb_' ~ s ~ '_last_seen_ts') | int(0) %}
              {% if last > 0 %}
                {% set out.items = out.items + [s] %}
              {% endif %}
            {% endfor %}
            {{ out.items }}
          online_sources: >
            {% set sources = states.input_number
              | selectattr('entity_id','search','^input_number\\.sdhb_.*_last_seen_ts$')
              | map(attribute='entity_id')
              | map('regex_replace','^input_number\\.sdhb_(.*)_last_seen_ts$','\\1')
              | list %}
            {% set now_ts = now().timestamp() | int %}
            {% set th = 300 %}
            {% set out = namespace(items=[]) %}
            {% for s in sources %}
              {% set last = states('input_number.sdhb_' ~ s ~ '_last_seen_ts') | int(0) %}
              {% if last > 0 and (now_ts - last) <= th %}
                {% set out.items = out.items + [s] %}
              {% endif %}
            {% endfor %}
            {{ out.items }}

          offline_sources: >
            {% set sources = states.input_number
              | selectattr('entity_id','search','^input_number\\.sdhb_.*_last_seen_ts$')
              | map(attribute='entity_id')
              | map('regex_replace','^input_number\\.sdhb_(.*)_last_seen_ts$','\\1')
              | list %}
            {% set now_ts = now().timestamp() | int %}
            {% set th = 300 %}
            {% set out = namespace(items=[]) %}
            {% for s in sources %}
              {% set last = states('input_number.sdhb_' ~ s ~ '_last_seen_ts') | int(0) %}
              {% if last > 0 and (now_ts - last) > th %}
                {% set out.items = out.items + [s] %}
              {% endif %}
            {% endfor %}
            {{ out.items }}

      - name: sdhb_bus_stats
        unique_id: sdhb_bus_stats
        icon: mdi:chart-box-outline
        state: >
          {% set c = state_attr('sensor.sdhb_winner_global','candidates') or [] %}
          {{ c | length }}
        attributes:
          active_intents_count: >
            {% set c = state_attr('sensor.sdhb_winner_global','candidates') or [] %}
            {{ c | length }}
          active_sources: >
            {% set c = state_attr('sensor.sdhb_winner_global','candidates') or [] %}
            {{ c | map(attribute='source') | list | unique | list }}
          online_sources_count: >
            {% set on = state_attr('sensor.sdhb_modules_health','online_sources') or [] %}
            {{ on | length }}
          offline_sources_count: >
            {% set off = state_attr('sensor.sdhb_modules_health','offline_sources') or [] %}
            {{ off | length }}
          threshold_s: "{{ state_attr('sensor.sdhb_modules_health','threshold_s') }}"
