script:
  dv_vmc_init_fabrica:
    alias: dv_vmc_fabrica_aplicar_valores_iniciales
    mode: single
    sequence:
    - variables:
        fab: sensor.dv_vmc_fabrica
        kj: '{{ state_attr(''sensor.dv_vmc_fabrica_keys'', ''keys_json'') }}'
        keys: "{% if kj is string %}\n  {{ (kj | default('[]')) | from_json }}\n{%\
          \ elif kj is iterable %}\n  {{ kj | list }}\n{% else %}\n  {{ [] }}\n{%\
          \ endif %}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ keys | count > 0 }}'
        sequence: []
      default:
      - stop: 'DV · Fábrica: keys vacío o sensor.dv_vmc_fabrica_keys no listo'
    - repeat:
        for_each: '{{ keys }}'
        sequence:
        - variables:
            k: '{{ repeat.item }}'
            v_raw: '{{ state_attr(fab, k) }}'
            n: '{{ ''input_number.'' ~ k }}'
            b: '{{ ''input_boolean.'' ~ k }}'
            s: '{{ ''input_select.'' ~ k }}'
            v: "{% if v_raw is string %}\n  {{ v_raw | trim }}\n{% else %}\n  {{ v_raw\
              \ }}\n{% endif %}"
            v_mapped: "{% if k == 'dv_vmc_prev_speed' and (v in ['off','OFF','Off'])\
              \ %}\n  v1\n{% else %}\n  {{ v }}\n{% endif %}"
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ n in states and v_mapped is not none }}'
            sequence:
            - service: input_number.set_value
              target:
                entity_id: '{{ n }}'
              data:
                value: '{{ v_mapped | float(none) }}'
          - conditions:
            - condition: template
              value_template: '{{ b in states and v_mapped is not none }}'
            sequence:
            - choose:
              - conditions:
                - condition: template
                  value_template: '{{ v_mapped in [true,''true'',''True'',1,''1'',''on'',''On'',''ON'']
                    }}'
                sequence:
                - service: input_boolean.turn_on
                  target:
                    entity_id: '{{ b }}'
              - conditions:
                - condition: template
                  value_template: '{{ v_mapped in [false,''false'',''False'',0,''0'',''off'',''Off'',''OFF'']
                    }}'
                sequence:
                - service: input_boolean.turn_off
                  target:
                    entity_id: '{{ b }}'
          - conditions:
            - condition: template
              value_template: '{{ s in states and v_mapped is not none }}'
            sequence:
            - variables:
                opts: '{{ state_attr(s, ''options'') or [] }}'
            - condition: template
              value_template: '{{ (v_mapped | string) in opts }}'
            - service: input_select.select_option
              target:
                entity_id: '{{ s }}'
              data:
                option: '{{ v_mapped | string }}'
    - service: logbook.log
      data:
        name: dv_vmc_dv
        message: Aplicados valores de fábrica ({{ keys | count }} keys)
  trigger:
  - platform: homeassistant
    event: start
  - platform: state
    entity_id:
    - sensor.dv_vmc_hw_missing_count
    - sensor.dv_vmc_onboarding_missing_runtime
  condition:
  - condition: template
    value_template: '{% set hw = states(''sensor.dv_vmc_hw_missing_count'')|int(999)
      %} {% set r = states(''sensor.dv_vmc_onboarding_missing_runtime'') %} {% set
      rm = (r | from_json) if (r is string) else (r or []) %} {{ hw > 0 or (rm|length)
      > 0 }}'
  action:
  - service: persistent_notification.create
    data:
      notification_id: dv_vmc_onboarding
      title: 'DV onboarding: contratos incompletos'
      message: 'Faltan contratos (HW_MAP y/o runtime contracts).

        hw_missing_count={{ states(''sensor.dv_vmc_hw_missing_count'')|int(999) }}
        missing_keys={{ states(''sensor.dv_vmc_onboarding_missing_keys'') }} runtime_missing={{
        states(''sensor.dv_vmc_onboarding_missing_runtime'') }}

        Acción: 1) Asegura que está cargado el addon runtime_contracts (crea dv_vmc_permitida,
        dv_vmc_en_horario, dv_vmc_override_activo, dv_vmc_velocidad_real, dv_vmc_filtros_horas_desde_reset).
        2) Abre el package core y edita: sensor.dv_vmc_hw_map → attributes 2) Asigna
        cada key a tu entidad física (switch/sensor real). 3) Reinicia HA o espera
        al siguiente refresco.

        Nota clonación: - Para 2ª VMC: duplica dv_vmc_* → dv_vmc2_* + find&replace
        dv_vmc_→dv_vmc2_. - Luego ajusta solo sensor.dv_vmc2_hw_map.'

automation:
  - id: dv_vmc_hwmap_startup_check
    alias: dv_vmc_hwmap_startup_check
    mode: single
    trigger:
    - platform: homeassistant
      event: start
    action:
    - delay:
        minutes: 7
    - variables:
        missing: '{{ states(''sensor.dv_vmc_hw_missing_count'')|int(999) }}'
        ok: '{{ is_state(''binary_sensor.dv_vmc_hw_contract_ok'',''on'') and (missing
          == 0) }}'
        notify_target: "{{ states('input_text.dv_vmc_notify_target')\n   if states('input_text.dv_vmc_notify_target')\
          \ not in ['unknown','unavailable','none','']\n   else 'notify.notify' }}"
        required_keys: '{{ state_attr(''sensor.dv_vmc_hw_contract'',''required'') if
          state_attr(''sensor.dv_vmc_hw_contract'',''required'') is not none else []
          }}'
        replace_missing: "{%- set req = state_attr('sensor.dv_vmc_hw_contract','required')\
          \ if state_attr('sensor.dv_vmc_hw_contract','required') is not none else []\
          \ -%} {%- set extra = [] -%} {# Optionally validate SDHB wiring only if enabled\
          \ #} {%- if is_state('input_boolean.dv_vmc_sdhb_enabled','on') -%}\n  {%-\
          \ set extra = ['sdhb_winner_entity','sdhb_source_slot'] -%}\n{%- endif -%}\
          \ {%- set keys = (req + extra) -%} {%- set ns = namespace(m=[]) -%} {%- for\
          \ k in keys -%}\n  {%- set v = state_attr('sensor.dv_vmc_hw_map', k) -%}\n\
          \  {%- if v is string and v.startswith('REPLACE_') -%}\n    {%- set ns.m =\
          \ ns.m + [k ~ '=' ~ v] -%}\n  {%- endif -%}\n{%- endfor -%} {{ ns.m }}"
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ (not ok) or (replace_missing|length > 0) }}'
        sequence:
        - service: persistent_notification.create
          data:
            title: DV · HW_MAP/Contrato KO (post-arranque)
            notification_id: dv_vmc_hwmap_startup_check
            message: DV HW_MAP/Contrato KO tras el arranque (delay 7 min). hw_contract_ok={{
              is_state('binary_sensor.dv_vmc_hw_contract_ok','on') }} hw_missing_count={{
              missing }} Revisa sensor.dv_vmc_hw_map y los detalles de sensor.dv_vmc_hw_missing_count.
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ is_state(''input_boolean.dv_vmc_notif_telegram'',''on'')
                }}'
            sequence:
            - service: notify.send_message
              target:
                entity_id: '{{ notify_target }}'
              data:
                message: ⚠️ DV HW_MAP/Contrato KO tras el arranque (delay 7 min). contract_ok={{
                  is_state('binary_sensor.dv_vmc_hw_contract_ok','on') }}, missing={{
                  missing }}. Mira sensor.dv_vmc_hw_map / sensor.dv_vmc_hw_missing_count.
      default: []

    dv_vmc_backup_save:
      alias: dv_vmc_backup_save
      mode: single
      sequence:
      - variables:
          path: dynamic_suite/dv/vmc/dv_vmc_backup.json
          bad: ['unknown','unavailable','none','']
          kj: '{{ state_attr(''sensor.dv_vmc_fabrica_keys'', ''keys_json'') }}'
          keys: "{% if kj is string %}\n  {{ (kj | default('[]')) | from_json }}\n{% elif kj is iterable %}\n  {{ kj | list }}\n{% else %}\n  {{ [] }}\n{% endif %}"
          payload: >-
            {% set out = namespace(d={}) %}
            {% for k in keys %}
              {% set n = 'input_number.' ~ k %}
              {% set b = 'input_boolean.' ~ k %}
              {% set s = 'input_select.' ~ k %}
              {% set dt = 'input_datetime.' ~ k %}
              {% if n in states and states(n) not in bad %}
                {% set out.d = dict(out.d, **{ n: (states(n) | float(none)) }) %}
              {% elif b in states and states(b) not in bad %}
                {% set out.d = dict(out.d, **{ b: (states(b) | string) }) %}
              {% elif s in states and states(s) not in bad %}
                {% set out.d = dict(out.d, **{ s: (states(s) | string) }) %}
              {% elif dt in states and states(dt) not in bad %}
                {% set out.d = dict(out.d, **{ dt: (states(dt) | string) }) %}
              {% endif %}
            {% endfor %}
            {# extras fuera de fabrica_keys #}
            {% set nt = 'input_text.dv_vmc_notify_target' %}
            {% if nt in states and states(nt) not in bad %}
              {% set out.d = dict(out.d, **{ nt: (states(nt) | string) }) %}
            {% endif %}
            {{ out.d | to_json }}
      - service: appdaemon.dynamic_suite_backup/save
        data:
          path: '{{ path }}'
          payload: '{{ payload }}'

    dv_vmc_backup_restore:
      alias: dv_vmc_backup_restore
      mode: single
      sequence:
      - service: appdaemon.dynamic_suite_backup/restore
        data:
          path: dynamic_suite/dv/vmc/dv_vmc_backup.json
