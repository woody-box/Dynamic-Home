      mensaje: Bootstrap no confirmado en 5 min (guard)

- id: dv_vmc_hw_map_replace_guard
  alias: dv_vmc_hw_map_replace_detectado_notificacion
  mode: restart
  trigger:
  - platform: state
    entity_id: sensor.dv_vmc_hw_replace_count
  condition:
  - condition: state
    entity_id: input_boolean.dv_vmc_enabled
    state: 'on'
  action:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.dv_vmc_hw_replace_count
        above: 0
      sequence:
      - service: persistent_notification.create
        data:
          notification_id: dv_vmc_hw_map_replace
          title: DV · HW MAP sin configurar
          message: >-
            Detectados placeholders REPLACE_* en sensor.dv_vmc_hw_map ({{ states('sensor.dv_vmc_hw_replace_count') }}).
            Edita el hw_map y sustituye REPLACE_* por tus entity_id reales antes de usar DV.
    - conditions:
      - condition: numeric_state
        entity_id: sensor.dv_vmc_hw_replace_count
        below: 1
      sequence:
      - service: persistent_notification.dismiss
        data:
          notification_id: dv_vmc_hw_map_replace

- id: dv_vmc_startup_grace_timer_start
  alias: dv_vmc_startup_grace_timer_start
  mode: single
  trigger:
  - platform: homeassistant
    event: start
  action:
  - service: timer.start
    target:
      entity_id: timer.dv_vmc_startup_grace
- id: dv_vmc_startup_grace_end_early_on_contract_ok
  alias: dv_vmc_startup_grace_end_early_on_contract_ok
  mode: restart
  trigger:
    - platform: state
      entity_id: binary_sensor.dv_vmc_hw_contract_ok
      to: 'on'
  condition:
    - condition: state
      entity_id: input_boolean.dv_vmc_enabled
      state: 'on'
    - condition: state
      entity_id: timer.dv_vmc_startup_grace
      state: active
  action:
    - service: timer.cancel
      target:
        entity_id: timer.dv_vmc_startup_grace

- id: dv_vmc_startup_grace_end_early_on_replace_placeholders
  alias: dv_vmc_startup_grace_end_early_on_replace_placeholders
  mode: restart
  trigger:
    - platform: numeric_state
      entity_id: sensor.dv_vmc_hw_replace_count
      above: 0
  condition:
    - condition: state
      entity_id: input_boolean.dv_vmc_enabled
      state: 'on'
    - condition: state
      entity_id: timer.dv_vmc_startup_grace
      state: active
  action:
    - service: timer.cancel
      target:
        entity_id: timer.dv_vmc_startup_grace

- id: dv_vmc_co2_ema_update_1m
  alias: dv_vmc_co2_ema_update_1m
  mode: single
  trigger:
    - platform: time_pattern
      minutes: /1
  condition:
    - condition: state
      entity_id: input_boolean.dv_vmc_co2_ema_enabled
      state: 'on'
    - condition: template
      value_template: "{{ states('sensor.dv_vmc_co2_safe') not in ['unknown','unavailable','none',''] }}"
  action:
    - variables:
        x: "{{ states('sensor.dv_vmc_co2_safe') | float(0) }}"
        prev: "{{ states('input_number.dv_vmc_co2_ema_value') | float(0) }}"
        a: "{{ states('input_number.dv_vmc_co2_ema_alpha') | float(0.2) }}"
        ema: >-
          {% if prev <= 0 %}
            {{ x }}
          {% else %}
            {{ (a * x + (1 - a) * prev) }}
          {% endif %}
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_co2_ema_value
      data:
        value: "{{ ema | round(0) }}"

- id: dv_vmc_pm25_ema_update_1m
  alias: dv_vmc_pm25_ema_update_1m
  mode: single
  trigger:
    - platform: time_pattern
      minutes: /1
  condition:
    - condition: state
      entity_id: input_boolean.dv_vmc_pm25_ema_enabled
      state: 'on'
    - condition: template
      value_template: "{{ states('sensor.dv_vmc_pm25_safe') not in ['unknown','unavailable','none',''] }}"
  action:
    - variables:
        x: "{{ states('sensor.dv_vmc_pm25_safe') | float(0) }}"
        prev: "{{ states('input_number.dv_vmc_pm25_ema_value') | float(0) }}"
        a: "{{ states('input_number.dv_vmc_pm25_ema_alpha') | float(0.2) }}"
        ema: >-
          {% if prev <= 0 %}
            {{ x }}
          {% else %}
            {{ (a * x + (1 - a) * prev) }}
          {% endif %}
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_pm25_ema_value
      data:
        value: "{{ ema | round(1) }}"

template:
- sensor:
  - name: dv_vmc_main_automations_version
    unique_id: dv_vmc_main_automations_version
    state: '4.2'
- sensor:
  - name: dv_vmc_main_scripts_version
    unique_id: dv_vmc_main_scripts_version
    state: '4.2'
script:
  dv_vmc_log_evento:
    alias: dv_vmc_registrar_evento_en_log
    mode: queued
    fields:
      nivel:
        description: Nivel del evento (INFO, WARNING, ERROR)
        default: INFO
      mensaje:
        description: Mensaje descriptivo
      datos_adicionales:
        description: Diccionario opcional con datos adicionales
        default: {}
    sequence:
    - variables:
        ts: '{{ now().isoformat() }}'
        _nivel: '{{ (nivel if nivel is defined else ''INFO'') | upper }}'
        _mensaje: '{{ (mensaje if mensaje is defined else '''') }}'
        _datos: '{{ datos_adicionales if datos_adicionales is defined else {} }}'
        payload: '{{ {''timestamp'': ts, ''nivel'': _nivel, ''mensaje'': _mensaje,
          ''datos'': _datos} | tojson }}'
    - event: dv_vmc_log_evento_event
      event_data:
        payload: '{{ payload }}'
  dv_vmc_cleanup_state:
    alias: dv_vmc_cleanup_reles_timers_ui_coherente
    icon: mdi:broom
    mode: restart
    sequence:
    - service: switch.turn_off
      data:
        entity_id: '{{ state_attr(''sensor.dv_vmc_hw_map'',''sw_v2'') }}'
    - service: switch.turn_off
      data:
        entity_id: '{{ state_attr(''sensor.dv_vmc_hw_map'',''sw_v3'') }}'
    - service: timer.cancel
      target:
        entity_id:
        - timer.dv_vmc_override
        - timer.dv_vmc_ducha_override
    - service: input_boolean.turn_off
      target:
        entity_id:
        - input_boolean.dv_vmc_override_v2
        - input_boolean.dv_vmc_override_v3
    - service: input_select.select_option
      target:
        entity_id: input_select.dv_vmc_ducha_nivel
      data:
        option: none
    - service: input_boolean.turn_off
      target:
        entity_id:
        - input_boolean.dv_vmc_v2
        - input_boolean.dv_vmc_v3
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.dv_vmc_v1
    - service: script.dv_vmc_log_evento
      data:
        nivel: INFO
        mensaje: Cleanup completo realizado
        datos_adicionales:
          accion: Reset estado completo
  dv_vmc_permiso_extra_iniciar:
    alias: dv_vmc_permiso_extra_iniciar
    icon: mdi:timer-plus
    mode: restart
    sequence:
    - service: timer.start
      target:
        entity_id: timer.dv_vmc_permiso_extra
      data:
        duration: '{% set m = states(''input_number.dv_vmc_permiso_extra_min'')|int(0)
          %} {{ ''%02d:%02d:00''|format((m//60), (m%60)) }}'
    - service: script.dv_vmc_log_evento
      data:
        nivel: INFO
        mensaje: Permiso extra iniciado
        datos_adicionales:
          duracion_min: '{{ states(''input_number.dv_vmc_permiso_extra_min'')|int(0)
            }}'
  dv_vmc_reset_valores_fabrica:
    alias: dv_vmc_reset_valores_fabrica
    icon: mdi:backup-restore
    mode: single
    sequence:
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_override_min
      data:
        value: '{{ states(''sensor.dv_vmc_override_manual_min_fabrica'')|float(30)
          }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_permiso_extra_min
      data:
        value: '{{ states(''sensor.dv_vmc_permiso_extra_min_fabrica'')|float(120)
          }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_ducha_v3_min
      data:
        value: '{{ states(''sensor.dv_vmc_ducha_v3_min_fabrica'')|float(20) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_ducha_v2_min
      data:
        value: '{{ states(''sensor.dv_vmc_ducha_v2_min_fabrica'')|float(10) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_co2_v2_threshold
      data:
        value: '{{ states(''sensor.dv_vmc_co2_v2_threshold_fabrica'')|float(900) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_co2_v3_threshold
      data:
        value: '{{ states(''sensor.dv_vmc_co2_v3_threshold_fabrica'')|float(1300)
          }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_pm25_v2_threshold
      data:
        value: '{{ states(''sensor.dv_vmc_pm25_v2_threshold_fabrica'')|float(15) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_pm25_v3_threshold
      data:
        value: '{{ states(''sensor.dv_vmc_pm25_v3_threshold_fabrica'')|float(40) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_co2_hysteresis
      data:
        value: '{{ states(''sensor.dv_vmc_co2_hysteresis_fabrica'')|float(100) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_pm25_hysteresis
      data:
        value: '{{ states(''sensor.dv_vmc_pm25_hysteresis_fabrica'')|float(5) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_filtros_intervalo_horas
      data:
        value: '{{ state_attr(''sensor.dv_vmc_fabrica'',''dv_vmc_filtros_intervalo_horas'')
          | float(3650) }}'
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.dv_vmc_filtros_aviso_enviado
    - service: script.dv_vmc_filtros_reset_contador
    - service: script.dv_vmc_log_evento
      data:
        nivel: WARNING
        mensaje: Valores de fábrica restaurados (+ reset contador filtros)
        datos_adicionales:
          usuario: '{{ user_id }}'
          accion: Reset completo valores configurables
          reset_filtros: true
          filtros_intervalo_h: '{{ state_attr(''sensor.dv_vmc_fabrica'',''dv_vmc_filtros_intervalo_horas'')
            | float(3650) }}'
  dv_vmc_filtros_reset_contador:
    alias: dv_vmc_filtros_reset_contador_mantenimiento
    mode: single
    sequence:
    - variables:
        src_total_hours: sensor.dv_vmc_maquina_horas_total
        h: '{{ states(src_total_hours) | float(none) }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ h is not none }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_filtros_horas_offset
          data:
            value: '{{ h | round(2) }}'
        - service: logbook.log
          data:
            name: dv_vmc_dv
            message: 'Reset filtros: baseline_horas={{ h | round(2) }}'
      default:
      - service: logbook.log
        data:
          name: dv_vmc_dv
          message: 'Reset filtros: NO aplicado (sensor horas total no disponible:
            {{ src_total_hours }})'
  dv_vmc_apply_hardware_speed:
    alias: dv_vmc_aplicar_velocidad_a_reles_hw_driver
    icon: mdi:chip
    mode: queued
    max: 10
    fields:
      speed:
        description: Velocidad objetivo lógica (1/2/3)
    sequence:
    - condition: template
      value_template: '{{ states(''sensor.dv_vmc_velocidad_real'')|int(0) != (speed|int(1))
        }}'
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.dv_vmc_driver_busy
    - variables:
        s: '{{ speed|int(1) }}'
        d_ms: 1
        p_ms: 800
        boot_done: '{{ is_state(''input_boolean.dv_vmc_bootstrap_done'',''on'') }}'
    - service: switch.turn_off
      data:
        entity_id: '{{ state_attr(''sensor.dv_vmc_hw_map'',''sw_v2'') }}'
    - service: switch.turn_off
      data:
        entity_id: '{{ state_attr(''sensor.dv_vmc_hw_map'',''sw_v3'') }}'
    - delay:
        milliseconds: '{{ d_ms }}'
    - choose:
      - conditions: '{{ (not boot_done) and (p_ms|int(0) > 0) }}'
        sequence:
        - service: switch.turn_on
          data:
            entity_id: '{{ state_attr(''sensor.dv_vmc_hw_map'',''sw_v2'') }}'
        - delay:
            milliseconds: '{{ p_ms }}'
        - service: switch.turn_off
          data:
            entity_id: '{{ state_attr(''sensor.dv_vmc_hw_map'',''sw_v2'') }}'
        - delay:
            milliseconds: '{{ d_ms }}'
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_bootstrap_done
    - choose:
      - conditions: '{{ s == 2 }}'
        sequence:
        - service: switch.turn_on
          data:
            entity_id: '{{ state_attr(''sensor.dv_vmc_hw_map'',''sw_v2'') }}'
      - conditions: '{{ s == 3 }}'
        sequence:
        - service: switch.turn_on
          data:
            entity_id: '{{ state_attr(''sensor.dv_vmc_hw_map'',''sw_v3'') }}'
      - conditions: '{{ s == 1 }}'
        sequence:
        - service: switch.turn_off
          data:
            entity_id: '{{ state_attr(''sensor.dv_vmc_hw_map'',''sw_v2'') }}'
        - service: switch.turn_off
          data:
            entity_id: '{{ state_attr(''sensor.dv_vmc_hw_map'',''sw_v3'') }}'
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.dv_vmc_driver_busy
    - service: script.dv_vmc_log_evento
      data:
        nivel: INFO
        mensaje: Velocidad cambiada en HW
        datos_adicionales:
          velocidad: '{{ s }}'
          boot_done: '{{ is_state(''input_boolean.dv_vmc_bootstrap_done'',''on'')
            }}'
  dv_vmc_set_speed:
    alias: dv_vmc_set_speed_ui_hw
    icon: mdi:fan
    mode: restart
    fields:
      speed:
        description: Velocidad objetivo (1/2/3)
    sequence:
    - variables:
        s: '{{ speed|int(1) }}'
        v_real: '{{ states(''sensor.dv_vmc_velocidad_real'')|int(0) }}'
    - condition: template
      value_template: '{{ v_real != s }}'
    - service: input_boolean.turn_off
      target:
        entity_id:
        - input_boolean.dv_vmc_v1
        - input_boolean.dv_vmc_v2
        - input_boolean.dv_vmc_v3
    - choose:
      - conditions: '{{ s == 1 }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_v1
      - conditions: '{{ s == 2 }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_v2
      - conditions: '{{ s == 3 }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_v3
    - service: script.dv_vmc_apply_hardware_speed
      data:
        speed: '{{ s }}'
    - service: script.dv_vmc_log_evento
      data:
        nivel: INFO
        mensaje: Velocidad cambiada desde UI
        datos_adicionales:
          velocidad_anterior: '{{ states(''sensor.dv_vmc_velocidad_actual'') }}'
          velocidad_nueva: '{{ s }}'
          modo: '{{ ''AUTO'' if is_state(''input_boolean.dv_vmc_auto'',''on'') else
            ''MANUAL'' }}'
  dv_vmc_start_override:
    alias: dv_vmc_iniciar_override_manual_v2_v3
    icon: mdi:timer-play-outline
    mode: restart
    fields:
      speed:
        description: Velocidad override (2 o 3)
      duration_min:
        description: Duración opcional (min). Si no se pasa, usa input_number.dv_vmc_override_min
    sequence:
    - variables:
        s: '{{ speed|int(2) }}'
        dur_m: "{% if duration_min is defined and (duration_min|int(0) > 0) %}\n \
          \ {{ duration_min|int(0) }}\n{% else %}\n  {{ states('input_number.dv_vmc_override_min')|int(30)\
          \ }}\n{% endif %}"
    - service: input_boolean.turn_off
      target:
        entity_id:
        - input_boolean.dv_vmc_override_v2
        - input_boolean.dv_vmc_override_v3
    - choose:
      - conditions: '{{ s == 2 }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_override_v2
      - conditions: '{{ s == 3 }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_override_v3
    - service: timer.start
      target:
        entity_id: timer.dv_vmc_override
      data:
        duration: '{% set m = dur_m|int(0) %} {{ ''%02d:%02d:00''|format((m//60),
          (m%60)) }}'
    - service: script.dv_vmc_set_speed
      data:
        speed: '{{ s }}'
    - service: script.dv_vmc_log_evento
      data:
        nivel: INFO
        mensaje: Override manual iniciado
        datos_adicionales:
          velocidad: V{{ s }}
          duracion_min: '{{ dur_m }}'
          usuario: '{{ user_id }}'
  dv_vmc_ducha_snapshot_prev:
    alias: dv_vmc_ducha_snapshot_estado_previo
    mode: single
    sequence:
    - variables:
        prev_modo: '{{ ''auto'' if is_state(''input_boolean.dv_vmc_auto'',''on'')
          else ''manual'' }}'
        prev_speed: '{% if is_state(''input_boolean.dv_vmc_v3'',''on'') %}v3 {% elif
          is_state(''input_boolean.dv_vmc_v2'',''on'') %}v2 {% elif is_state(''input_boolean.dv_vmc_v1'',''on'')
          %}v1 {% else %}off {% endif %}'
    - service: input_select.select_option
      target:
        entity_id: input_select.dv_vmc_prev_modo
      data:
        option: '{{ prev_modo }}'
    - service: input_select.select_option
      target:
        entity_id: input_select.dv_vmc_prev_speed
      data:
        option: '{{ prev_speed }}'
  dv_vmc_ducha_force_auto:
    alias: dv_vmc_ducha_forzar_auto
    mode: single
    sequence:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.dv_vmc_auto
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.dv_vmc_auto_lock
  dv_vmc_ducha_restore_prev:
    alias: dv_vmc_ducha_restaurar_estado_previo
    mode: single
    sequence:
    - variables:
        prev_modo: '{{ states(''input_select.dv_vmc_prev_modo'') }}'
        prev_speed: '{{ states(''input_select.dv_vmc_prev_speed'') }}'
    - choose:
      - conditions: '{{ prev_modo == ''auto'' }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_auto
      default:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dv_vmc_auto
      - choose:
        - conditions: '{{ prev_speed == ''v3'' }}'
          sequence:
          - service: script.dv_vmc_set_speed
            data:
              speed: 3
        - conditions: '{{ prev_speed == ''v2'' }}'
          sequence:
          - service: script.dv_vmc_set_speed
            data:
              speed: 2
        - conditions: '{{ prev_speed == ''v1'' }}'
          sequence:
          - service: script.dv_vmc_set_speed
            data:
              speed: 1
        - conditions: '{{ prev_speed == ''off'' }}'
          sequence:
          - service: script.dv_vmc_set_speed
            data:
              speed: 1
  dv_vmc_cancel_override:
    alias: dv_vmc_cancelar_override
    mode: single
    sequence:
    - service: timer.cancel
      target:
        entity_id:
        - timer.dv_vmc_override
        - timer.dv_vmc_ducha_override
    - service: input_boolean.turn_off
      target:
        entity_id:
        - input_boolean.dv_vmc_override_v2
        - input_boolean.dv_vmc_override_v3
    - service: script.dv_vmc_log_evento
      data:
        nivel: INFO
        mensaje: Override cancelado
        datos_adicionales:
          usuario: '{{ user_id }}'
    - choose:
      - conditions:
        - condition: state
          entity_id: input_boolean.dv_vmc_auto
          state: 'on'
        - condition: state
          entity_id: input_boolean.dv_vmc_auto_lock
          state: 'off'
        sequence:
        - service: script.dv_vmc_set_speed
          data:
            speed: 1
        - delay: 00:00:35
        - service: automation.trigger
          target:
            entity_id: automation.dv_vmc_control_principal_stage_1_2
      - conditions:
        - condition: state
          entity_id: input_boolean.dv_vmc_auto
          state: 'off'
        sequence:
        - service: script.dv_vmc_set_speed
          data:
            speed: 1
  dv_vmc_reset_filtros_horas:
    alias: dv_vmc_reset_horas_de_filtro
    mode: single
    sequence:
    - variables:
        total: '{{ states(''sensor.dv_vmc_maquina_horas_total'') | float(none) }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ total is not none }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_filtros_horas_offset
          data:
            value: '{{ total | round(2) }}'
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.dv_vmc_filtros_aviso_enviado
        - service: persistent_notification.dismiss
          data:
            notification_id: dv_vmc_filtros
        - service: script.dv_vmc_log_evento
          data:
            nivel: INFO
            mensaje: Reset horas de filtro (mantenimiento)
            datos_adicionales:
              horas_totales: '{{ total | round(2) }}'
              offset_aplicado: '{{ total | round(2) }}'
      default:
      - service: script.dv_vmc_log_evento
        data:
          nivel: WARN
          mensaje: Reset horas de filtro NO aplicado (sensor horas total no disponible)
          datos_adicionales:
            sensor: sensor.dv_vmc_maquina_horas_total
  dv_vmc_run_self_test:
    alias: dv_vmc_self_test_diagnostico
    mode: single
    sequence:
    - variables:
        bad:
        - unknown
        - unavailable
        - none
        - ''
        req_raw: '{{ state_attr(''sensor.dv_vmc_hw_contract'',''required'') }}'
        req: "{% if req_raw is string %}\n  {{ (req_raw | default('[]')) | from_json\
          \ }}\n{% elif req_raw is iterable %}\n  {{ req_raw | list }}\n{% else %}\n\
          \  {{ [] }}\n{% endif %}"
        ns: '{% set x = namespace(err=[], warn=[]) %} {{ x }}

          '
    - variables:
        contract_ok: '{{ is_state(''binary_sensor.dv_vmc_hw_contract_ok'',''on'')
          }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ not contract_ok }}'
        sequence:
        - variables:
            _x: '{% set ns = namespace(err=[]) %} {{ ns }}

              '
        - service: logbook.log
          data:
            name: dv_vmc_dv
            message: 'Self-test: HW contract KO (faltan entidades requeridas).'
    - variables:
        missing_list: "{% set ns = namespace(m=[]) %} {% for k in req %}\n  {% set\
          \ e = state_attr('sensor.dv_vmc_hw_map', k) %}\n  {% if e is none %}\n \
          \   {% set ns.m = ns.m + [k ~ '=(none)'] %}\n  {% else %}\n    {% set st\
          \ = states(e) %}\n    {% if st in bad %}\n      {% set ns.m = ns.m + [k\
          \ ~ '=' ~ e ~ ':' ~ st] %}\n    {% endif %}\n  {% endif %}\n{% endfor %}\
          \ {{ ns.m }}"
    - variables:
        v2: '{{ is_state(''binary_sensor.dv_vmc_hw_v2'',''on'') }}'
        v3: '{{ is_state(''binary_sensor.dv_vmc_hw_v3'',''on'') }}'
        doble_rele: '{{ v2 and v3 }}'
    - variables:
        co2_v2: '{{ states(''input_number.dv_vmc_co2_v2_threshold'')|float(none) }}'
        co2_v3: '{{ states(''input_number.dv_vmc_co2_v3_threshold'')|float(none) }}'
        pm_v2: '{{ states(''input_number.dv_vmc_pm25_v2_threshold'')|float(none) }}'
        pm_v3: '{{ states(''input_number.dv_vmc_pm25_v3_threshold'')|float(none) }}'
        umbrales_ok: "{% set ok = true %} {% if co2_v2 is none or co2_v3 is none or\
          \ pm_v2 is none or pm_v3 is none %}\n  {% set ok = false %}\n{% elif co2_v2\
          \ >= co2_v3 %}\n  {% set ok = false %}\n{% elif pm_v2 >= pm_v3 %}\n  {%\
          \ set ok = false %}\n{% endif %} {{ ok }}"
    - variables:
        status: "{% set errs = [] %} {% set warns = [] %}\n{% if missing_list | count\
          \ > 0 %}\n  {% set errs = errs + ['HW missing: ' ~ (missing_list | count)]\
          \ %}\n{% endif %}\n{% if doble_rele %}\n  {% set errs = errs + ['Relés:\
          \ V2 y V3 a la vez'] %}\n{% endif %}\n{% if not umbrales_ok %}\n  {% set\
          \ warns = warns + ['Umbrales: revisar V2<V3 (CO2/PM)'] %}\n{% endif %}\n\
          {% if errs | count == 0 and warns | count == 0 %}\n  OK\n{% else %}\n  {%\
          \ if errs | count > 0 %}\n    ERROR: {{ errs | join(' · ') }}\n  {% else\
          \ %}\n    WARN: {{ warns | join(' · ') }}\n  {% endif %}\n{% endif %}"
    - service: logbook.log
      data:
        name: dv_vmc_dv
        message: '🧪 Self-test: {{ status }}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ status != ''OK'' }}'
        sequence:
        - service: persistent_notification.create
          data:
            title: DV · Self-test
            message: 'Resultado: {{ status }} {% if missing_list | count > 0 %} \n\nHW
              missing ({{ missing_list | count }}): - {{ missing_list | join(''\n-
              '') }} {% endif %}'
    - choose:
      - conditions:
        - condition: template
          value_template: '{{ states(''script.dv_vmc_log_evento'') not in [''unknown'',''unavailable'',''none'','''']
            }}'
        sequence:
        - service: script.dv_vmc_log_evento
          data:
            nivel: '{{ ''ERROR'' if status.startswith(''ERROR'') else (''WARNING''
              if status.startswith(''WARN'') else ''INFO'') }}'
            mensaje: 'Self-test: {{ status }}'
  dv_vmc_notify_throttled:
    alias: dv_vmc_notify_throttled
    mode: queued
    max: 10
    sequence:
    - variables:
        notify_target: '{{ states(''input_text.dv_vmc_notify_target'') if states(''input_text.dv_vmc_notify_target'')
          not in [''unknown'',''unavailable'',''''] else ''notify.notify'' }}'
        min_interval_s: '{{ states(''input_number.dv_vmc_notif_min_interval_s'')|int(0)
          }}'
        last_raw: '{{ states(''input_datetime.dv_vmc_notif_last_ts'') }}'
        last_ts: "{% if last_raw in ['unknown','unavailable',''] %}\n  {{ none }}\n\
          {% else %}\n  {{ as_timestamp(strptime(last_raw, '%Y-%m-%d %H:%M:%S')) }}\n\
          {% endif %}"
        now_ts: '{{ as_timestamp(now()) }}'
        allow: "{% if min_interval_s|int(0) <= 0 %}\n  true\n{% elif last_ts is none\
          \ %}\n  true\n{% else %}\n  {{ (now_ts - (last_ts|float(0))) >= (min_interval_s|int(0))\
          \ }}\n{% endif %}"
        msg: '{{ msg|default('''') }}'
    - choose:
      - conditions: '{{ allow and (msg|length > 0) }}'
        sequence:
        - service: notify.send_message
          target:
            entity_id: '{{ notify_target }}'
          data:
            message: '{{ msg }}'
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.dv_vmc_notif_last_ts
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
