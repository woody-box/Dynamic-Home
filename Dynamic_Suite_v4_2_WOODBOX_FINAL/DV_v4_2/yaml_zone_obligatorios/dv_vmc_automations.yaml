        sensor.dv_vmc_validacion_umbrales (atributo 'resumen').
- id: dv_vmc_aviso_umbrales_ok
  alias: dv_vmc_aviso_umbrales_ok
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.dv_vmc_validacion_umbrales
    to: OK
    for: 00:00:10
  condition:
  - condition: template
    value_template: '{{ trigger.from_state is not none and trigger.from_state.state
      == ''ERROR'' }}'
  action:
  - service: persistent_notification.create
    data:
      title: DV · Umbrales OK
      message: Los umbrales han vuelto a un estado coherente (OK).
- id: dv_vmc_self_test_btn
  alias: dv_vmc_self_test_boton
  trigger:
  - platform: state
    entity_id: input_button.dv_vmc_self_test_btn
  action:
  - service: script.dv_vmc_run_self_test
