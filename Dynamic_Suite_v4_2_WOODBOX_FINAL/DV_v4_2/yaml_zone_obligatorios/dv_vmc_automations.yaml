  alias: dv_vmc_bootstrap_guard_timeout
  mode: single
  trigger:
  - platform: event
    event_type: timer.finished
    event_data:
      entity_id: timer.dv_vmc_bootstrap_guard
  condition:
  - condition: state
    entity_id: input_boolean.dv_vmc_bootstrap_done
    state: 'off'
