# ============================================================================
# Dynamic Ventilation · DV VMC · Logic (core + adaptive + guardrails + safe sensors)
# ----------------------------------------------------------------------------
# version: 4.2
# changelog: v4.2 hotfix p7 (startup grace 120s for hw_contract_ok)
# ============================================================================

template:
- sensor:
  - name: dv_vmc_main_core_version
    unique_id: dv_vmc_main_core_version
    state: '4.2'
- sensor:
  - name: dv_vmc_version
    unique_id: dv_vmc_version
    icon: mdi:tag
    state: '4.2'
    attributes:
      module: dynamic_ventilation
      channel: stable
      hw_map_entity: sensor.dv_vmc_hw_map
- sensor:
  - name: dv_vmc_hw_replace_count
    unique_id: dv_vmc_hw_replace_count
    icon: mdi:form-textbox-password
    state: >-
      {% set m = (states.sensor.dv_vmc_hw_map.attributes if states.sensor.dv_vmc_hw_map is not none else none) %}
      {% if m is mapping %}
        {% set ns = namespace(c=0) %}
        {% for k,v in m.items() %}
          {% if v is string and ('REPLACE_' in v) %}
            {% set ns.c = ns.c + 1 %}
          {% endif %}
        {% endfor %}
        {{ ns.c }}
      {% else %}
        0
      {% endif %}
    availability: "{{ states.sensor.dv_vmc_hw_map is not none and (states.sensor.dv_vmc_hw_map.attributes is mapping) }}"
- binary_sensor:
  - name: dv_vmc_hw_pwr
    unique_id: dv_vmc_hw_pwr
    device_class: power
    availability: '{% set e = state_attr(''sensor.dv_vmc_hw_map'',''sw_pwr'') %} {{
      e is not none and states(e) not in [''unknown'',''unavailable'',''none'','''']
      }}'
    state: '{% set e = state_attr(''sensor.dv_vmc_hw_map'',''sw_pwr'') %} {{ e is
      not none and is_state(e,''on'') }}'
  - name: dv_vmc_hw_v2
    unique_id: dv_vmc_hw_v2
    device_class: running
    availability: '{% set e = state_attr(''sensor.dv_vmc_hw_map'',''sw_v2'') %} {{
      e is not none and states(e) not in [''unknown'',''unavailable'',''none'','''']
      }}'
    state: '{% set e = state_attr(''sensor.dv_vmc_hw_map'',''sw_v2'') %} {{ e is not
      none and is_state(e,''on'') }}'
  - name: dv_vmc_hw_v3
    unique_id: dv_vmc_hw_v3
    device_class: running
    availability: '{% set e = state_attr(''sensor.dv_vmc_hw_map'',''sw_v3'') %} {{
      e is not none and states(e) not in [''unknown'',''unavailable'',''none'','''']
      }}'
    state: '{% set e = state_attr(''sensor.dv_vmc_hw_map'',''sw_v3'') %} {{ e is not
      none and is_state(e,''on'') }}'
  - name: dv_vmc_hw_contract_ok
    unique_id: dv_vmc_hw_contract_ok
    icon: mdi:shield-check-outline
    state: >-
      {% set repl = states('sensor.dv_vmc_hw_replace_count')|int(999) %}
      {% set miss = states('sensor.dv_vmc_hw_missing_count') %}
      {% set miss_i = miss|int(999) if miss not in ['unknown','unavailable','none',''] else 999 %}
      {% if is_state('timer.dv_vmc_startup_grace','active') %}
        {{ repl == 0 }}
      {% else %}
        {{ miss_i == 0 and repl == 0 }}
      {% endif %}
    availability: >-
      {{
        states('sensor.dv_vmc_hw_missing_count') not in ['unknown','unavailable','none',''] and
        states('sensor.dv_vmc_hw_replace_count') not in ['unknown','unavailable','none',''] and
        states('timer.dv_vmc_startup_grace') not in ['unknown','unavailable','none','']
      }}
    attributes:
      warming_up: "{{ is_state('timer.dv_vmc_startup_grace','active') }}"
      missing_count: "{{ states('sensor.dv_vmc_hw_missing_count')|int(999) }}"
      replace_count: "{{ states('sensor.dv_vmc_hw_replace_count')|int(999) }}"
- sensor:
  - name: dv_vmc_hw_map
    unique_id: dv_vmc_hw_map
    icon: mdi:chip
    state: ok
    attributes:
      sw_pwr: REPLACE_sw_pwr
      sw_v1: REPLACE_sw_v1
      sw_v2: REPLACE_sw_v2
      sw_v3: REPLACE_sw_v3
      hum_bano_pasillo: REPLACE_hum_bano_pasillo
      hum_bano_dormitorio: REPLACE_hum_bano_dormitorio
      hum_exterior: REPLACE_hum_exterior
      co2: REPLACE_co2
      pm25: REPLACE_pm25
      outdoor_aqi_entity: ""  # opcional (solo si se usa hostile outside)
      dp_exterior: "{% if is_state('input_boolean.dv_vmc_sim_enabled','on') %}\n \
        \ sensor.dv_vmc_sim_dp_exterior_c\n{% else %}\n  REPLACE_dp_exterior\n{% endif\
        \ %}"
      dp_casa: "{% if is_state('input_boolean.dv_vmc_sim_enabled','on') %}\n  sensor.dv_vmc_sim_dp_casa_c\n\
        {% else %}\n  REPLACE_dp_casa\n{% endif %}"
      dp_bano_pasillo: REPLACE_dp_bano_pasillo
      dp_bano_dormitorio: REPLACE_dp_bano_dormitorio
      t_asp: REPLACE_t_asp
      t_ins: REPLACE_t_ins
      t_in: "{% if is_state('input_boolean.dv_vmc_sim_enabled','on') %}\n  sensor.dv_vmc_sim_t_in_c\n\
        {% else %}\n  REPLACE_t_in\n{% endif %}"
      t_ext: "{% if is_state('input_boolean.dv_vmc_sim_enabled','on') %}\n  sensor.dv_vmc_sim_t_ext_c\n\
        {% else %}\n  REPLACE_t_ext\n{% endif %}"
      pwr_power: REPLACE_pwr_power
      pwr_energy: REPLACE_pwr_energy
      sdhb_winner_entity: "{% if is_state('input_boolean.dv_vmc_sim_enabled','on')\
        \ and is_state('input_boolean.dv_vmc_sim_sdhb_enabled','on') %}\n  sensor.dv_vmc_sim_sdhb_winner\n\
        {% else %}\n  REPLACE_sdhb_winner_entity\n{% endif %}"
      sdhb_source_slot: REPLACE_sdhb_source_slot
  - name: dv_vmc_hw_contract
    unique_id: dv_vmc_hw_contract
    icon: mdi:clipboard-check-outline
    state: ok
    attributes:
      required: "{{ ['sw_pwr','sw_v2','sw_v3','co2','pm25',\n    'hum_bano_pasillo','hum_bano_dormitorio','hum_exterior',\n\
        \    'dp_exterior','dp_casa'] | tojson }}"
- trigger:
  - platform: time_pattern
    seconds: /30
  - platform: state
    entity_id: sensor.dv_vmc_hw_map
  sensor:
  - name: dv_vmc_hw_missing_count
    unique_id: dv_vmc_hw_missing_count
    icon: mdi:alert-circle-outline
    state: "{% set req_raw = state_attr('sensor.dv_vmc_hw_contract','required') %}\
      \ {% set req = (req_raw | from_json) if (req_raw is string) else (req_raw or\
      \ []) %} {% set ns = namespace(m=[]) %} {% for k in req %}\n  {% set e = state_attr('sensor.dv_vmc_hw_map',\
      \ k) %}\n  {% if e is none %}\n    {% set ns.m = ns.m + [k ~ '=(none)'] %}\n\
      \  {% else %}\n    {% set st = states(e) %}\n    {% if st in ['unknown','unavailable','none','']\
      \ %}\n      {% set ns.m = ns.m + [k ~ '=' ~ e ~ ':' ~ st] %}\n    {% endif %}\n\
      \  {% endif %}\n{% endfor %} {{ ns.m | count }}"
    attributes:
      missing: "{% set req_raw = state_attr('sensor.dv_vmc_hw_contract','required')\
        \ %} {% set req = (req_raw | from_json) if (req_raw is string) else (req_raw\
        \ or []) %} {% set ns = namespace(m=[]) %} {% for k in req %}\n  {% set e\
        \ = state_attr('sensor.dv_vmc_hw_map', k) %}\n  {% if e is none %}\n    {%\
        \ set ns.m = ns.m + [k ~ '=(none)'] %}\n  {% else %}\n    {% set st = states(e)\
        \ %}\n    {% if st in ['unknown','unavailable','none',''] %}\n      {% set\
        \ ns.m = ns.m + [k ~ '=' ~ e ~ ':' ~ st] %}\n    {% endif %}\n  {% endif %}\n\
        {% endfor %} {{ ns.m }}"
    availability: '{{ states(''sensor.dv_vmc_hw_map'') not in [''unknown'',''unavailable'',''none'','''']
      }}'
- sensor:
  - name: dv_vmc_addon_adaptive_version
    unique_id: dv_vmc_addon_adaptive_version
    state: '4.2'
- binary_sensor:
  - name: dv_vmc_adaptive_learn_gate
    unique_id: dv_vmc_adaptive_learn_gate
    icon: mdi:shield-check
    state: '{% set learning = is_state(''input_boolean.dv_vmc_adaptive_learning_enabled'',''on'')
      %} {% set auto_ok = is_state(''input_boolean.dv_vmc_auto'',''on'') %} {% set
      lock_ok = is_state(''input_boolean.dv_vmc_auto_lock'',''off'') %} {% set override_ok
      = is_state(''sensor.dv_vmc_override_activo'',''NINGUNO'') %} {% set horario_ok
      = is_state(''binary_sensor.dv_vmc_en_horario'',''on'') %} {% set permitida_ok
      = is_state(''binary_sensor.dv_vmc_permitida'',''on'') %} {% set degraded_ok
      = (states(''sensor.dv_vmc_degradation_events'') | int(0) == 0) %} {{ learning
      and auto_ok and lock_ok and override_ok and horario_ok and permitida_ok and
      degraded_ok }}

      '
    attributes:
      learning_enabled: '{{ is_state(''input_boolean.dv_vmc_adaptive_learning_enabled'',''on'')
        }}'
      auto: '{{ states(''input_boolean.dv_vmc_auto'') }}'
      auto_lock: '{{ states(''input_boolean.dv_vmc_auto_lock'') }}'
      override: '{{ states(''sensor.dv_vmc_override_activo'') }}'
      en_horario: '{{ states(''binary_sensor.dv_vmc_en_horario'') }}'
      permitida: '{{ states(''binary_sensor.dv_vmc_permitida'') }}'
      degraded_events: '{{ states(''sensor.dv_vmc_degradation_events'') }}'
- trigger:
  - platform: time_pattern
    minutes: /5
  sensor:
  - name: dv_vmc_adaptive_co2_learn_value
    unique_id: dv_vmc_adaptive_co2_learn_value
    unit_of_measurement: ppm
    device_class: carbon_dioxide
    state_class: measurement
    icon: mdi:molecule-co2
    availability: '{% set gate = is_state(''binary_sensor.dv_vmc_adaptive_learn_gate'',''on'')
      %} {% set co2 = states(''sensor.dv_vmc_co2_safe'') | float(none) %} {% set pm25
      = states(''sensor.dv_vmc_pm25_safe'') | float(none) %} {% set co2_evt = states(''input_number.dv_vmc_adaptive_event_co2_ppm'')
      | float(1400) %} {% set pm_evt = states(''input_number.dv_vmc_adaptive_event_pm25_ugm3'')
      | float(60) %} {{ gate and (co2 is not none) and (pm25 is not none) and (co2
      < co2_evt) and (pm25 < pm_evt) }}

      '
    state: '{% set v = states(''sensor.dv_vmc_co2_safe'') | float(none) %} {{ v if
      v is not none else none }}

      '
  - name: dv_vmc_adaptive_pm25_learn_value
    unique_id: dv_vmc_adaptive_pm25_learn_value
    unit_of_measurement: µg/m³
    device_class: pm25
    state_class: measurement
    icon: mdi:air-filter
    availability: '{% set gate = is_state(''binary_sensor.dv_vmc_adaptive_learn_gate'',''on'')
      %} {% set co2 = states(''sensor.dv_vmc_co2_safe'') | float(none) %} {% set pm25
      = states(''sensor.dv_vmc_pm25_safe'') | float(none) %} {% set co2_evt = states(''input_number.dv_vmc_adaptive_event_co2_ppm'')
      | float(1400) %} {% set pm_evt = states(''input_number.dv_vmc_adaptive_event_pm25_ugm3'')
      | float(60) %} {{ gate and (co2 is not none) and (pm25 is not none) and (co2
      < co2_evt) and (pm25 < pm_evt) }}

      '
    state: '{% set v = states(''sensor.dv_vmc_pm25_safe'') | float(none) %} {{ v if
      v is not none else none }}

      '
- sensor:
  - name: dv_vmc_adaptive_learning_span_days
    unique_id: dv_vmc_adaptive_learning_span_days
    icon: mdi:timeline-clock
    unit_of_measurement: d
    state: "{% set o = state_attr('sensor.dv_vmc_adaptive_samples_7d','datetime_oldest')\
      \ %} {% set n = state_attr('sensor.dv_vmc_adaptive_samples_7d','datetime_newest')\
      \ %} {% if o is string and n is string %}\n  {% set ts_o = as_timestamp(o) %}\n\
      \  {% set ts_n = as_timestamp(n) %}\n  {% if ts_o is number and ts_n is number\
      \ and ts_n >= ts_o %}\n    {{ ((ts_n - ts_o) / 86400) | round(2) }}\n  {% else\
      \ %}\n    0\n  {% endif %}\n{% else %}\n  0\n{% endif %}\n"
    attributes:
      datetime_oldest: '{{ state_attr(''sensor.dv_vmc_adaptive_samples_7d'',''datetime_oldest'')
        }}'
      datetime_newest: '{{ state_attr(''sensor.dv_vmc_adaptive_samples_7d'',''datetime_newest'')
        }}'
      samples: '{{ states(''sensor.dv_vmc_adaptive_samples_7d'') }}'
  - name: dv_vmc_adaptive_valid_ratio
    unique_id: dv_vmc_adaptive_valid_ratio
    icon: mdi:percent
    unit_of_measurement: '%'
    state: '{% set d = states(''input_number.dv_vmc_adaptive_min_days'') | int(7)
      %} {% set expected = (((d|int(0)) if (d|int(0)) > 0 else 1) * 24 * 60 / 5) %}
      {% set n = states(''sensor.dv_vmc_adaptive_samples_7d'') | float(0) %} {{ ((n
      / expected) * 100) | round(1) }}

      '
    attributes:
      expected_samples: '{% set d = states(''input_number.dv_vmc_adaptive_min_days'')
        | int(7) %} {{ (d * 24 * 60 / 5) | int }}

        '
      valid_samples: '{{ states(''sensor.dv_vmc_adaptive_samples_7d'') }}'
  - name: dv_vmc_adaptive_ready
    unique_id: dv_vmc_adaptive_ready
    icon: mdi:check-circle-outline
    state: '{% set min_days     = states(''input_number.dv_vmc_adaptive_min_days'')
      | float(7) %} {% set min_ratio    = states(''input_number.dv_vmc_adaptive_min_valid_ratio'')
      | float(30) %} {% set span_days    = states(''sensor.dv_vmc_adaptive_learning_span_days'')
      | float(0) %} {% set ratio_pct    = states(''sensor.dv_vmc_adaptive_valid_ratio'')
      | float(0) %} {% set n_samples    = states(''sensor.dv_vmc_adaptive_samples_7d'')
      | int(0) %} {% set min_samples  = states(''input_number.dv_vmc_adaptive_min_samples'')
      | int(500) %} {{ (span_days >= min_days) and (ratio_pct >= min_ratio) and (n_samples
      >= min_samples) }}

      '
    attributes:
      min_days: '{{ states(''input_number.dv_vmc_adaptive_min_days'') }}'
      min_valid_ratio_pct: '{{ states(''input_number.dv_vmc_adaptive_min_valid_ratio'')
        }}'
      min_samples: '{{ states(''input_number.dv_vmc_adaptive_min_samples'') }}'
      span_days: '{{ states(''sensor.dv_vmc_adaptive_learning_span_days'') }}'
      valid_ratio_pct: '{{ states(''sensor.dv_vmc_adaptive_valid_ratio'') }}'
      valid_samples: '{{ states(''sensor.dv_vmc_adaptive_samples_7d'') }}'
  - name: dv_vmc_adaptive_mode
    unique_id: dv_vmc_adaptive_mode
    icon: mdi:swap-horizontal
    state: "{% if is_state('input_boolean.dv_vmc_adaptive_thresholds_enabled','on')\
      \ and (states('sensor.dv_vmc_adaptive_ready')|lower == 'true') %}\n  adaptive\n\
      {% else %}\n  manual\n{% endif %}\n"
  - name: dv_vmc_co2_v2_threshold_adaptive
    unique_id: dv_vmc_co2_v2_threshold_adaptive
    icon: mdi:tune-vertical
    unit_of_measurement: ppm
    state: "{% set p90 = states('sensor.dv_vmc_adaptive_co2_p90_7d') | float(none)\
      \ %} {% if p90 is not none %}\n  {% set v = p90 | round(0) %}\n  {{ [700, [v,\
      \ 1200] | min] | max }}\n{% else %}\n  {{ states('input_number.dv_vmc_co2_v2_threshold')\
      \ | int(900) }}\n{% endif %}\n"
    attributes:
      source_percentile: p90
      p90: '{{ states(''sensor.dv_vmc_adaptive_co2_p90_7d'') }}'
      fallback_manual: '{{ states(''input_number.dv_vmc_co2_v2_threshold'') }}'
  - name: dv_vmc_co2_v3_threshold_adaptive
    unique_id: dv_vmc_co2_v3_threshold_adaptive
    icon: mdi:tune-vertical
    unit_of_measurement: ppm
    state: "{% set p95 = states('sensor.dv_vmc_adaptive_co2_p95_7d') | float(none)\
      \ %} {% if p95 is not none %}\n  {% set v = p95 | round(0) %}\n  {{ [1000, [v,\
      \ 1600] | min] | max }}\n{% else %}\n  {{ states('input_number.dv_vmc_co2_v3_threshold')\
      \ | int(1300) }}\n{% endif %}\n"
    attributes:
      source_percentile: p95
      p95: '{{ states(''sensor.dv_vmc_adaptive_co2_p95_7d'') }}'
      fallback_manual: '{{ states(''input_number.dv_vmc_co2_v3_threshold'') }}'
  - name: dv_vmc_pm25_v2_threshold_adaptive
    unique_id: dv_vmc_pm25_v2_threshold_adaptive
    icon: mdi:tune-vertical
    unit_of_measurement: µg/m³
    state: "{% set p90 = states('sensor.dv_vmc_adaptive_pm25_p90_7d') | float(none)\
      \ %} {% if p90 is not none %}\n  {% set v = p90 | round(1) %}\n  {{ [5, [v,\
      \ 25] | min] | max }}\n{% else %}\n  {{ states('input_number.dv_vmc_pm25_v2_threshold')\
      \ | float(15) }}\n{% endif %}\n"
    attributes:
      source_percentile: p90
      p90: '{{ states(''sensor.dv_vmc_adaptive_pm25_p90_7d'') }}'
      fallback_manual: '{{ states(''input_number.dv_vmc_pm25_v2_threshold'') }}'
  - name: dv_vmc_pm25_v3_threshold_adaptive
    unique_id: dv_vmc_pm25_v3_threshold_adaptive
    icon: mdi:tune-vertical
    unit_of_measurement: µg/m³
    state: "{% set p95 = states('sensor.dv_vmc_adaptive_pm25_p95_7d') | float(none)\
      \ %} {% if p95 is not none %}\n  {% set v = p95 | round(1) %}\n  {{ [20, [v,\
      \ 60] | min] | max }}\n{% else %}\n  {{ states('input_number.dv_vmc_pm25_v3_threshold')\
      \ | float(40) }}\n{% endif %}\n"
    attributes:
      source_percentile: p95
      p95: '{{ states(''sensor.dv_vmc_adaptive_pm25_p95_7d'') }}'
      fallback_manual: '{{ states(''input_number.dv_vmc_pm25_v3_threshold'') }}'
- sensor:
  - name: dv_vmc_addon_guardrails_version
    unique_id: dv_vmc_addon_guardrails_version
    state: '4.2'
- binary_sensor:
  - name: dv_vmc_failsafe_lockout_active
    unique_id: dv_vmc_failsafe_lockout_active
    icon: mdi:lock-alert
    state: '{{ as_timestamp(states(''input_datetime.dv_vmc_failsafe_lockout_until''))|float(0)
      > as_timestamp(now()) }}'
    attributes:
      lockout_until: '{{ states(''input_datetime.dv_vmc_failsafe_lockout_until'')
        }}'
      trip_count: '{{ states(''input_number.dv_vmc_failsafe_trip_count'') }}'
      trip_window_h: '{{ states(''input_number.dv_vmc_failsafe_trip_window_h'') }}'
      trip_limit: '{{ states(''input_number.dv_vmc_failsafe_trip_limit'') }}'
      lockout_min: '{{ states(''input_number.dv_vmc_failsafe_lockout_min'') }}'
- sensor:
  - name: dv_vmc_main_safe_sensors_version
    unique_id: dv_vmc_main_safe_sensors_version
    state: '4.2'
- sensor:
  - name: dv_vmc_co2_safe
    unique_id: dv_vmc_co2_safe
    unit_of_measurement: ppm
    device_class: carbon_dioxide
    state_class: measurement
    icon: mdi:molecule-co2
    availability: '{% set ent = state_attr(''sensor.dv_vmc_hw_map'',''co2'') %} {{
      ent is not none and is_number(states(ent)) }}'
    state: "{% set ent = state_attr('sensor.dv_vmc_hw_map','co2') %} {% set v = states(ent)\
      \ | float(none) %} {% if v is not none and 0 <= v <= 5000 %}\n  {{ v | round(0)\
      \ }}\n{% else %}\n  {{ none }}\n{% endif %}"
    attributes:
      source: '{{ state_attr(''sensor.dv_vmc_hw_map'',''co2'') }}'
      validated: true
      min_range: 0
      max_range: 5000
      validation_reason: "{% set ent = state_attr('sensor.dv_vmc_hw_map','co2') %}\
        \ {% set raw = states(ent) if ent else none %} {% set v = raw | float(none)\
        \ %} {% if ent is none %}\n  entity_none\n{% elif not is_number(raw) %}\n\
        \  not_numeric\n{% elif v is none %}\n  conversion_failed\n{% elif v < 0 %}\n\
        \  below_min\n{% elif v > 5000 %}\n  above_max\n{% else %}\n  ok\n{% endif\
        \ %}"

  - name: dv_vmc_co2_ema
    unique_id: dv_vmc_co2_ema
    unit_of_measurement: ppm
    device_class: carbon_dioxide
    state_class: measurement
    icon: mdi:chart-line
    availability: "{{ is_state('input_boolean.dv_vmc_co2_ema_enabled','on') and states('input_number.dv_vmc_co2_ema_value') not in ['unknown','unavailable','none',''] }}"
    state: "{{ states('input_number.dv_vmc_co2_ema_value') | float(none) }}"
    attributes:
      alpha: "{{ states('input_number.dv_vmc_co2_ema_alpha') }}"
      source: "input_number.dv_vmc_co2_ema_value"

  - name: dv_vmc_pm25_safe
    unique_id: dv_vmc_pm25_safe
    unit_of_measurement: µg/m³
    device_class: pm25
    state_class: measurement
    icon: mdi:air-filter
    availability: '{% set ent = state_attr(''sensor.dv_vmc_hw_map'',''pm25'') %} {{
      ent is not none and is_number(states(ent)) }}'
    state: "{% set ent = state_attr('sensor.dv_vmc_hw_map','pm25') %} {% set v = states(ent)\
      \ | float(none) %} {% if v is not none and 0 <= v <= 500 %}\n  {{ v | round(1)\
      \ }}\n{% else %}\n  {{ none }}\n{% endif %}"
    attributes:
      source: '{{ state_attr(''sensor.dv_vmc_hw_map'',''pm25'') }}'
      validated: true
      min_range: 0
      max_range: 500
      validation_reason: "{% set ent = state_attr('sensor.dv_vmc_hw_map','pm25') %}\
        \ {% set raw = states(ent) if ent else none %} {% set v = raw | float(none)\
        \ %} {% if ent is none %}\n  entity_none\n{% elif not is_number(raw) %}\n\
        \  not_numeric\n{% elif v is none %}\n  conversion_failed\n{% elif v < 0 %}\n\
        \  below_min\n{% elif v > 500 %}\n  above_max\n{% else %}\n  ok\n{% endif\
        \ %}"
  - name: dv_vmc_pm25_ema
