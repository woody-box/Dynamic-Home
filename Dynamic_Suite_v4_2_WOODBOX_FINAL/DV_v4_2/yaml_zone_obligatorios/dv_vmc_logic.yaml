automation:
- id: dv_vmc_guardrails_failsafe_trip_counter
  alias: dv_vmc_guardrails_failsafe_trip_counter
  mode: single
  trigger:
  - platform: state
    entity_id: input_boolean.dv_vmc_auto_lock
    to: 'on'
  variables:
    now_ts: '{{ as_timestamp(now()) }}'
    last_ts: '{{ as_timestamp(states(''input_datetime.dv_vmc_failsafe_last_trip''))|float(0)
      }}'
    window_h: '{{ states(''input_number.dv_vmc_failsafe_trip_window_h'')|float(2)
      }}'
    limit: '{{ states(''input_number.dv_vmc_failsafe_trip_limit'')|int(3) }}'
    lockout_min: '{{ states(''input_number.dv_vmc_failsafe_lockout_min'')|int(30)
      }}'
    count_prev: '{{ states(''input_number.dv_vmc_failsafe_trip_count'')|int(0) }}'
    fresh_window: '{{ (now_ts - last_ts) > (window_h*3600) }}'
    count_base: '{{ 0 if fresh_window else count_prev }}'
    count_new: '{{ count_base + 1 }}'
    lockout_until: '{{ (now_ts + lockout_min*60) | timestamp_custom(''%Y-%m-%d %H:%M:%S'',
      true) }}'
  action:
  - service: input_number.set_value
    target:
      entity_id: input_number.dv_vmc_failsafe_trip_count
    data:
      value: '{{ count_new }}'
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.dv_vmc_failsafe_last_trip
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ count_new >= limit }}'
      sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.dv_vmc_failsafe_lockout_until
        data:
          datetime: '{{ lockout_until }}'
      - choose:
        - conditions:
          - condition: state
            entity_id: input_boolean.dv_vmc_notif_persistente
            state: 'on'
          sequence:
          - service: persistent_notification.create
            data:
              notification_id: dv_vmc_failsafe_lockout
              title: DV FAILSAFE LOCKOUT
              message: Se ha activado LOCKOUT por oscilación de FAILSAFE. Trips={{
                count_new }} (limit={{ limit }}) en ventana={{ window_h }}h. Lockout
                hasta {{ states('input_datetime.dv_vmc_failsafe_lockout_until') }}.
        default: []
    default: []

  - name: dv_vmc_outdoor_aqi_safe
    unique_id: dv_vmc_outdoor_aqi_safe
    icon: mdi:weather-hazy
    unit_of_measurement: AQI
    state_class: measurement
    availability: "{{ (states('input_text.dv_vmc_outdoor_aqi_entity_override') not in ['unknown','unavailable','none',''] ) or ((state_attr('sensor.dv_vmc_hw_map','outdoor_aqi_entity')|default('') )|string|length > 0) }}"
    state: >-
      {% set ovr = states('input_text.dv_vmc_outdoor_aqi_entity_override') %}
      {% set ent = (ovr if ovr not in ['unknown','unavailable','none',''] else state_attr('sensor.dv_vmc_hw_map','outdoor_aqi_entity')) %}
      {% if ent is none or (ent|string)|length == 0 %}
        {{ none }}
      {% else %}
        {{ states(ent) | float(none) }}
      {% endif %}

  - name: dv_vmc_hostile_outside_cap
    unique_id: dv_vmc_hostile_outside_cap
    icon: mdi:shield-alert
    availability: "{{ is_state('input_boolean.dv_vmc_hostile_outside_enabled','on') and states('sensor.dv_vmc_outdoor_aqi_safe') not in ['unknown','unavailable','none',''] }}"
    state: >-
      {% set aqi = states('sensor.dv_vmc_outdoor_aqi_safe') | float(0) %}
      {% set t1 = states('input_number.dv_vmc_hostile_outside_t1') | float(50) %}
      {% set t2 = states('input_number.dv_vmc_hostile_outside_t2') | float(100) %}
      {% set t3 = states('input_number.dv_vmc_hostile_outside_t3') | float(150) %}
      {% if aqi < t1 %}
        3
      {% elif aqi < t2 %}
        2
      {% elif aqi < t3 %}
        1
      {% else %}
        0
      {% endif %}
    attributes:
      aqi: "{{ states('sensor.dv_vmc_outdoor_aqi_safe') }}"
      t1: "{{ states('input_number.dv_vmc_hostile_outside_t1') }}"
      t2: "{{ states('input_number.dv_vmc_hostile_outside_t2') }}"
      t3: "{{ states('input_number.dv_vmc_hostile_outside_t3') }}"
      meaning: >-
        {% set c = states('sensor.dv_vmc_hostile_outside_cap') | int(3) %}
        {% if c == 3 %}no_cap{% elif c == 2 %}cap_v2{% elif c == 1 %}cap_v1{% else %}off{% endif %}

  - name: dv_vmc_hostile_outside_active
    unique_id: dv_vmc_hostile_outside_active
    icon: mdi:shield-alert-outline
    availability: "{{ states('sensor.dv_vmc_hostile_outside_cap') not in ['unknown','unavailable','none',''] }}"
    state: "{{ (states('sensor.dv_vmc_hostile_outside_cap') | int(3)) != 3 }}"
