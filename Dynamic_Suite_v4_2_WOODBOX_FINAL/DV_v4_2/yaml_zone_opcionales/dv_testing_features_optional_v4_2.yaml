# DV optional tests: hw_replace_count guard (v4.2)
#
# This test validates that hw_replace_count > 0 forces hw_contract_ok=off even during startup grace.
#
input_boolean:
  dv_feature_tests_enabled:
    name: dv_feature_tests_enabled
    icon: mdi:clipboard-check
    initial: false

input_select:
  dv_feature_test_scenario:
    name: dv_feature_test_scenario
    options:
      - none
      - t_hw_replace_blocks_contract
      - t_replace_fixed_recovery
    initial: none

input_boolean:
  dv_feature_test_pass:
    name: dv_feature_test_pass
    initial: false

input_text:
  dv_feature_test_last_result:
    name: dv_feature_test_last_result
    initial: ""

timer:
  dv_feature_tests_auto_off:
    name: dv_feature_tests_auto_off
    duration: "02:00:00"

automation:
  - id: dv_feature_tests_auto_off_start
    alias: dv_feature_tests_auto_off_start
    trigger:
      - platform: state
        entity_id: input_boolean.dv_feature_tests_enabled
        to: "on"
    action:
      - service: timer.start
        target:
          entity_id: timer.dv_feature_tests_auto_off

  - id: dv_feature_tests_auto_off_apply
    alias: dv_feature_tests_auto_off_apply
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.dv_feature_tests_auto_off
    condition:
      - condition: state
        entity_id: input_boolean.dv_feature_tests_enabled
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dv_feature_tests_enabled
      - service: input_select.select_option
        target:
          entity_id: input_select.dv_feature_test_scenario
        data:
          option: none

  - id: dv_feature_tests_run_on_scenario
    alias: dv_feature_tests_run_on_scenario
    trigger:
      - platform: state
        entity_id: input_select.dv_feature_test_scenario
    condition:
      - condition: state
        entity_id: input_boolean.dv_feature_tests_enabled
        state: "on"
      - condition: template
        value_template: "{{ trigger.to_state.state not in ['none','unknown','unavailable'] }}"
    action:
      - service: script.dv_run_feature_test
        data:
          scenario: "{{ trigger.to_state.state }}"

script:
  dv_run_feature_test:
    alias: dv_run_feature_test
    mode: queued
    fields:
      scenario:
        description: scenario key
    sequence:
      - variables:
          scen: "{{ scenario }}"
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dv_feature_test_pass
      - service: input_text.set_value
        target:
          entity_id: input_text.dv_feature_test_last_result
        data:
          value: "RUN {{ scen }} @ {{ now() }}"
      - choose:
          - conditions: "{{ scen == 't_hw_replace_blocks_contract' }}"
            sequence:
              # This scenario is a CHECK ONLY. To run it, intentionally set at least one REPLACE_* in dv_vmc_hw_map.
              # Then restart HA: during grace, contract should still be OFF.
              - delay: "00:00:01"
              - choose:
                  - conditions: "{{ (states('sensor.dv_vmc_hw_replace_count')|int(0)) > 0 and is_state('timer.dv_vmc_startup_grace','active') and is_state('binary_sensor.dv_vmc_hw_contract_ok','off') }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.dv_feature_test_pass
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.dv_feature_test_last_result
                        data:
                          value: "PASS: replace_count>0 blocks contract even during grace"
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.dv_feature_test_last_result
                        data:
                          value: "FAIL: expected contract OFF during grace when replace_count>0. repl={{ states('sensor.dv_vmc_hw_replace_count') }} grace={{ states('timer.dv_vmc_startup_grace') }} contract={{ states('binary_sensor.dv_vmc_hw_contract_ok') }}"
          - conditions: "{{ scen == 't_replace_fixed_recovery' }}"
            sequence:
              # Manual recovery check:
              # 1) Ensure dv_vmc_hw_replace_count was >0 previously (placeholders present).
              # 2) Fix hw_map REPLACE_* values to real entities.
              # 3) After restart (or reload), dv_vmc_hw_replace_count should be 0 and hw_contract_ok should become ON (after grace if missing_count needs time).
              - delay: "00:00:01"
              - choose:
                  - conditions: "{{ (states('sensor.dv_vmc_hw_replace_count')|int(0)) == 0 and is_state('binary_sensor.dv_vmc_hw_contract_ok','on') }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.dv_feature_test_pass
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.dv_feature_test_last_result
                        data:
                          value: "PASS: replace_count fixed => contract OK"
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.dv_feature_test_last_result
                        data:
                          value: "INFO: To pass, set replace_count to 0 by fixing hw_map. repl={{ states('sensor.dv_vmc_hw_replace_count') }} contract={{ states('binary_sensor.dv_vmc_hw_contract_ok') }}"

      - service: input_select.select_option
        target:
          entity_id: input_select.dv_feature_test_scenario
        data:
          option: none
