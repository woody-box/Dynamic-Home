# ============================================================================
# Dynamic Ventilation · DV · Testing/Simulator/Regression (optional)
# ----------------------------------------------------------------------------
# version: 4.2
# changelog: v4.2 hotfix (golden regression fixes: SDHB scenario gating + freecool check)
# ============================================================================

input_boolean:
  dv_vmc_sim_enabled:
    name: dv_vmc_sim_enabled
    icon: mdi:flask
  dv_vmc_sim_ko:
    name: dv_vmc_sim_ko
    icon: mdi:alert-octagon-outline
  dv_vmc_sim_ramp_active:
    name: dv_vmc_sim_ramp_active
    icon: mdi:chart-line
  dv_vmc_sim_ramp_hw_follow_cmd:
    name: dv_vmc_sim_ramp_hw_follow_cmd
    icon: mdi:sync
  dv_vmc_sim_sdhb_enabled:
    name: dv_vmc_sim_sdhb_enabled
    icon: mdi:lan-connect
  dv_vmc_sim_dp_available:
    name: dv_vmc_sim_dp_available
    icon: mdi:water-percent
input_text:
  dv_vmc_sim_sdhb_intent:
    name: dv_vmc_sim_sdhb_intent
    max: 64
  dv_vmc_golden_last:
    name: dv_vmc_golden_last
    max: 255
input_select:
  dv_vmc_sim_scenario:
    name: dv_vmc_sim_scenario
    options:
    - baseline
    - co2_high
    - pm25_high
    - outside_bad
    - outside_good
    - hostile_outside_cap
    - shower_like
    - sensor_ko
    - co2_ramp_up
    - pm25_ramp_up
    - co2_ramp_down
    - pm25_ramp_down
    - adaptive_active
    - sdhb_boost
    - sdhb_quiet
    - sdhb_freecool
    - freecool_native
    - stage3_blind
    - stage3_active
    icon: mdi:script-text-outline
input_number:
  dv_vmc_sim_co2_ppm:
    name: dv_vmc_sim_co2_ppm
    min: 400
    max: 3000
    step: 25
    mode: box
    unit_of_measurement: ppm
    icon: mdi:molecule-co2
  dv_vmc_sim_pm25_ugm3:
    name: dv_vmc_sim_pm25_ugm3
    min: 0
    max: 250
    step: 1
    mode: box
    unit_of_measurement: µg/m³
    icon: mdi:air-filter

  # Hostile outside (AQI) simulator input (used by golden scenario hostile_outside_cap)
  dv_vmc_sim_outdoor_aqi:
    name: dv_vmc_sim_outdoor_aqi
    min: 0
    max: 500
    step: 1
    mode: box
    unit_of_measurement: AQI
    icon: mdi:weather-hazy
  dv_vmc_sim_t_ext_c:
    name: dv_vmc_sim_t_ext_c
    min: -20
    max: 45
    step: 0.5
    mode: box
    unit_of_measurement: °C
    icon: mdi:thermometer
  dv_vmc_sim_t_in_c:
    name: dv_vmc_sim_t_in_c
    min: 0
    max: 40
    step: 0.5
    mode: box
    unit_of_measurement: °C
    icon: mdi:home-thermometer
  dv_vmc_sim_rh_ext_pct:
    name: dv_vmc_sim_rh_ext_pct
    min: 0
    max: 100
    step: 1
    mode: box
    unit_of_measurement: '%'
    icon: mdi:water-percent
  dv_vmc_sim_dp_exterior_c:
    name: dv_vmc_sim_dp_exterior_c
    min: -40
    max: 50
    step: 0.5
    mode: box
    unit_of_measurement: °C
    icon: mdi:water-thermometer-outline
  dv_vmc_sim_dp_casa_c:
    name: dv_vmc_sim_dp_casa_c
    min: -10
    max: 40
    step: 0.5
    mode: box
    unit_of_measurement: °C
    icon: mdi:water-thermometer-outline
  dv_vmc_sim_ramp_step_s:
    name: dv_vmc_sim_ramp_step_s
    min: 5
    max: 120
    step: 5
    mode: box
    unit_of_measurement: s
    icon: mdi:timer-outline
  dv_vmc_sim_ramp_co2_ppm_per_min:
    name: dv_vmc_sim_ramp_co2_ppm_per_min
    min: -500
    max: 500
    step: 10
    mode: box
    unit_of_measurement: ppm/min
    icon: mdi:molecule-co2
  dv_vmc_sim_ramp_pm25_ugm3_per_min:
    name: dv_vmc_sim_ramp_pm25_ugm3_per_min
    min: -200
    max: 100
    step: 1
    mode: box
    unit_of_measurement: µg/m³/min
    icon: mdi:air-filter
  dv_vmc_sim_ramp_duration_min:
    name: dv_vmc_sim_ramp_duration_min
    min: 1
    max: 60
    step: 1
    mode: box
    unit_of_measurement: min
    icon: mdi:clock-outline
input_datetime:
  dv_vmc_sim_ramp_started_at:
    name: dv_vmc_sim_ramp_started_at
    has_date: true
    has_time: true
  dv_vmc_sim_ramp_last_step_at:
    name: dv_vmc_sim_ramp_last_step_at
    has_date: true
    has_time: true
template:
- sensor:
  - name: dv_vmc_addon_simulator_version
    unique_id: dv_vmc_addon_simulator_version
    state: '4.2'
  - name: dv_vmc_sim_sdhb_winner
    unique_id: dv_vmc_sim_sdhb_winner
    icon: mdi:lan-connect
    state: '{{ states(''input_text.dv_vmc_sim_sdhb_intent'') if is_state(''input_boolean.dv_vmc_sim_sdhb_enabled'',''on'')
      else ''unknown'' }}'
- sensor:
  - name: dv_vmc_sim_co2_ppm
    unique_id: dv_vmc_sim_co2_ppm
    unit_of_measurement: ppm
    state: '{{ states(''input_number.dv_vmc_sim_co2_ppm'')|float(none) }}'
    availability: '{{ is_number(states(''input_number.dv_vmc_sim_co2_ppm'')) and not
      is_state(''input_boolean.dv_vmc_sim_ko'',''on'') }}'
  - name: dv_vmc_sim_pm25_ugm3
    unique_id: dv_vmc_sim_pm25_ugm3
    unit_of_measurement: µg/m³
    state: '{{ states(''input_number.dv_vmc_sim_pm25_ugm3'')|float(none) }}'
    availability: '{{ is_number(states(''input_number.dv_vmc_sim_pm25_ugm3'')) and
      not is_state(''input_boolean.dv_vmc_sim_ko'',''on'') }}'
  - name: dv_vmc_sim_t_ext_c
    unique_id: dv_vmc_sim_t_ext_c
    unit_of_measurement: °C
    state: '{{ states(''input_number.dv_vmc_sim_t_ext_c'')|float(none) }}'
    availability: '{{ is_number(states(''input_number.dv_vmc_sim_t_ext_c'')) and not
      is_state(''input_boolean.dv_vmc_sim_ko'',''on'') }}'
  - name: dv_vmc_sim_t_in_c
    unique_id: dv_vmc_sim_t_in_c
    unit_of_measurement: °C
    state: '{{ states(''input_number.dv_vmc_sim_t_in_c'')|float(none) }}'
    availability: '{{ is_number(states(''input_number.dv_vmc_sim_t_in_c'')) and not
      is_state(''input_boolean.dv_vmc_sim_ko'',''on'') }}'
  - name: dv_vmc_sim_rh_ext_pct
    unique_id: dv_vmc_sim_rh_ext_pct
    unit_of_measurement: '%'
    state: '{{ states(''input_number.dv_vmc_sim_rh_ext_pct'')|float(none) }}'
    availability: '{{ is_number(states(''input_number.dv_vmc_sim_rh_ext_pct'')) and
      not is_state(''input_boolean.dv_vmc_sim_ko'',''on'') }}'
  - name: dv_vmc_sim_dp_exterior_c
    unique_id: dv_vmc_sim_dp_exterior_c
    unit_of_measurement: °C
    icon: mdi:water-thermometer-outline
    availability: '{{ is_state(''input_boolean.dv_vmc_sim_dp_available'',''on'') and
      is_number(states(''input_number.dv_vmc_sim_dp_exterior_c'')) and not is_state(''input_boolean.dv_vmc_sim_ko'',''on'')
      }}'
    state: '{{ states(''input_number.dv_vmc_sim_dp_exterior_c'')|float(none) }}'
  - name: dv_vmc_sim_dp_casa_c
    unique_id: dv_vmc_sim_dp_casa_c
    unit_of_measurement: °C
    icon: mdi:water-thermometer-outline
    availability: '{{ is_state(''input_boolean.dv_vmc_sim_dp_available'',''on'') and
      is_number(states(''input_number.dv_vmc_sim_dp_casa_c'')) and not is_state(''input_boolean.dv_vmc_sim_ko'',''on'')
      }}'
    state: '{{ states(''input_number.dv_vmc_sim_dp_casa_c'')|float(none) }}'
- sensor:
  - name: dv_vmc_addon_test_version
    unique_id: dv_vmc_addon_test_version
    state: '4.2'
- sensor:
  - name: dv_vmc_test_summary
    unique_id: dv_vmc_test_summary
    icon: mdi:clipboard-check-outline
    state: '{% set ok = is_state(''binary_sensor.dv_vmc_test_ok'',''on'') %} {{ ''pass''
      if ok else ''fail'' }}'
    attributes:
      t_contract_ok: '{{ is_state(''binary_sensor.dv_vmc_hw_contract_ok'',''on'')
        }}'
      t_missing_zero: '{{ (states(''sensor.dv_vmc_hw_missing_count'')|int(0)) == 0
        }}'
      t_mutex_v2_v3: '{{ not (is_state(''input_boolean.dv_vmc_v2'',''on'') and is_state(''input_boolean.dv_vmc_v3'',''on''))
        }}'
      t_driver_busy_stuck: "{% if is_state('input_boolean.dv_vmc_driver_busy','on')\
        \ %}\n  {{ (as_timestamp(now()) - as_timestamp(states.input_boolean.dv_vmc_driver_busy.last_changed))\
        \ < 900 }}\n{% else %}\n  true\n{% endif %}"
      t_bus_present: '{{ states(''sensor.dv_vmc_bus'') not in [''unknown'',''unavailable'',''none'','''']
        }}'
      t_bus_degraded_false: '{{ state_attr(''sensor.dv_vmc_bus'',''degraded'') in
        [false, None] }}'
- binary_sensor:
  - name: dv_vmc_test_ok
    unique_id: dv_vmc_test_ok
    icon: mdi:check-decagram
    state: '{% set t1 = is_state(''binary_sensor.dv_vmc_hw_contract_ok'',''on'') %}
      {% set t2 = (states(''sensor.dv_vmc_hw_missing_count'')|int(0)) == 0 %} {% set
      t3 = not (is_state(''input_boolean.dv_vmc_v2'',''on'') and is_state(''input_boolean.dv_vmc_v3'',''on''))
      %} {% set t4 = (not is_state(''input_boolean.dv_vmc_driver_busy'',''on'')) or
      ((as_timestamp(now()) - as_timestamp(states.input_boolean.dv_vmc_driver_busy.last_changed))
      < 900) %} {{ t1 and t2 and t3 and t4 }}'
- sensor:
  - name: dv_vmc_addon_golden_regression_version
    unique_id: dv_vmc_addon_golden_regression_version
    state: '4.2'
script:
  dv_vmc_sim_apply_scenario:
    alias: dv_vmc_sim_apply_scenario
    mode: single
    sequence:
    - service: input_boolean.turn_off
      target:
        entity_id:
        - input_boolean.dv_vmc_sim_ko
        - input_boolean.dv_vmc_sim_ramp_active
    - service: input_text.set_value
      target:
        entity_id: input_text.dv_vmc_outdoor_aqi_entity_override
      data:
        value: ""
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.dv_vmc_hostile_outside_enabled
    - service: input_number.set_value
      target:
        entity_id: input_number.dv_vmc_sim_outdoor_aqi
      data:
        value: 40
    - choose:
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''baseline'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_co2_ppm
          data:
            value: 600
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_pm25_ugm3
          data:
            value: 4
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_t_ext_c
          data:
            value: 10
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_t_in_c
          data:
            value: 22
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_rh_ext_pct
          data:
            value: 55
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''co2_high'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_co2_ppm
          data:
            value: 1400
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''pm25_high'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_pm25_ugm3
          data:
            value: 55
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''outside_bad'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_pm25_ugm3
          data:
            value: 120
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_rh_ext_pct
          data:
            value: 85
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''outside_good'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_pm25_ugm3
          data:
            value: 3
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_rh_ext_pct
          data:
            value: 40

      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''hostile_outside_cap'')
          }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_hostile_outside_enabled
        - service: input_text.set_value
          target:
            entity_id: input_text.dv_vmc_outdoor_aqi_entity_override
          data:
            value: input_number.dv_vmc_sim_outdoor_aqi
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_outdoor_aqi
          data:
            value: 120
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_co2_ppm
          data:
            value: 1400
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''shower_like'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_rh_ext_pct
          data:
            value: 90
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''adaptive_active'')
          }}'
        sequence: []
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''sdhb_boost'')
          }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_sim_sdhb_enabled
        - service: input_text.set_value
          target:
            entity_id: input_text.dv_vmc_sim_sdhb_intent
          data:
            value: request_boost
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''sdhb_quiet'')
          }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_sim_sdhb_enabled
        - service: input_text.set_value
          target:
            entity_id: input_text.dv_vmc_sim_sdhb_intent
          data:
            value: request_quiet
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''sdhb_freecool'')
          }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_sim_sdhb_enabled
        - service: input_text.set_value
          target:
            entity_id: input_text.dv_vmc_sim_sdhb_intent
          data:
            value: request_freecool
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''freecool_native'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_t_in_c
          data:
            value: 24
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_t_ext_c
          data:
            value: 18
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''stage3_blind'')
          }}'
        sequence:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.dv_vmc_sim_dp_available
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''stage3_active'')
          }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_sim_dp_available
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_dp_exterior_c
          data:
            value: 10
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_dp_casa_c
          data:
            value: 16
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''sensor_ko'')
          }}'
        sequence:
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_sim_ko
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''co2_ramp_up'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_co2_ppm
          data:
            value: 600
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_ramp_co2_ppm_per_min
          data:
            value: 120
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_ramp_pm25_ugm3_per_min
          data:
            value: 0
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.dv_vmc_sim_ramp_started_at
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.dv_vmc_sim_ramp_last_step_at
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_sim_ramp_active
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''pm25_ramp_up'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_pm25_ugm3
          data:
            value: 4
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_ramp_pm25_ugm3_per_min
          data:
            value: 10
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_ramp_co2_ppm_per_min
          data:
            value: 0
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.dv_vmc_sim_ramp_started_at
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.dv_vmc_sim_ramp_last_step_at
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_sim_ramp_active
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''co2_ramp_down'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_co2_ppm
          data:
            value: 2000
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_ramp_co2_ppm_per_min
          data:
            value: -150
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_ramp_pm25_ugm3_per_min
          data:
            value: 0
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.dv_vmc_sim_ramp_started_at
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.dv_vmc_sim_ramp_last_step_at
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_sim_ramp_active
      - conditions: '{{ is_state(''input_select.dv_vmc_sim_scenario'',''pm25_ramp_down'')
          }}'
        sequence:
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_pm25_ugm3
          data:
            value: 80
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_ramp_pm25_ugm3_per_min
          data:
            value: -20
        - service: input_number.set_value
          target:
            entity_id: input_number.dv_vmc_sim_ramp_co2_ppm_per_min
          data:
            value: 0
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.dv_vmc_sim_ramp_started_at
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.dv_vmc_sim_ramp_last_step_at
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: input_boolean.turn_on
          target:
            entity_id: input_boolean.dv_vmc_sim_ramp_active
  dv_vmc_run_golden_regression:
    alias: dv_vmc_run_golden_regression
    mode: single
    sequence:
    - variables:
        notify_target: '{{ states(''input_text.dv_vmc_notify_target'') if states(''input_text.dv_vmc_notify_target'')
          not in [''unknown'',''unavailable'',''''] else ''notify.notify'' }}'
        results: []
    - choose:
      - conditions: '{{ not is_state(''input_boolean.dv_vmc_sim_enabled'',''on'')
          }}'
        sequence:
        - service: input_text.set_value
          data:
            entity_id: input_text.dv_vmc_golden_last
            value: 'fail: sim_disabled'
        - service: notify.send_message
          target:
            entity_id: '{{ notify_target }}'
          data:
            message: 'DV Golden: FAIL (sim disabled)'
        - stop: sim disabled
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.dv_vmc_auto
    - service: script.dv_vmc_cancel_override
    - repeat:
        for_each:
        - scenario: baseline
          expect_min: 1
          expect_reason_slug: auto_idle
          expect_degraded: false
        - scenario: co2_high
          expect_min: 2
          expect_reason_slug: co2_v2
          expect_degraded: false
        - scenario: pm25_high
          expect_min: 2
          expect_reason_slug: pm25_v2
          expect_degraded: false
        - scenario: sensor_ko
          expect_min: 0
          expect_reason_slug: sensor_ko_hard
          expect_degraded: true
        - scenario: co2_ramp_up
          expect_min: 2
          expect_reason_slug: co2_v2
          expect_degraded: false
        - scenario: pm25_ramp_up
          expect_min: 2
          expect_reason_slug: pm25_v2
          expect_degraded: false
        - scenario: co2_ramp_down
          expect_min: 0
          expect_degraded: false
        - scenario: pm25_ramp_down
          expect_min: 0
          expect_degraded: false
        - scenario: adaptive_active
          expect_min: 2
          expect_reason_slug: co2_v2
          expect_degraded: false
          expect_thresholds_source: adaptive
        - scenario: sdhb_boost
          expect_min: 3
          expect_degraded: false
          expect_speed_eq: 3
        - scenario: sdhb_quiet
          expect_min: 1
          expect_degraded: false
          expect_speed_eq: 1
        - scenario: sdhb_freecool
          expect_min: 2
          expect_degraded: false
          expect_speed_eq: 2
        - scenario: freecool_native
          expect_min: 2
          expect_degraded: false
          expect_freecool_active: true
        - scenario: stage3_blind
          expect_min: 1
          expect_degraded: false
        - scenario: stage3_active
          expect_min: 3
          expect_degraded: false
          expect_speed_eq: 3
        sequence:
        - service: input_select.select_option
          target:
            entity_id: input_select.dv_vmc_sim_scenario
          data:
            option: '{{ repeat.item.scenario }}'
        - service: script.dv_vmc_sim_apply_scenario
        - choose:
          - conditions: '{{ repeat.item.scenario == ''adaptive_active'' }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.dv_vmc_adaptive_thresholds_enabled
            - service: input_number.set_value
              target:
                entity_id: input_number.dv_vmc_adaptive_min_days
              data:
                value: 0
            - service: input_number.set_value
              target:
                entity_id: input_number.dv_vmc_adaptive_min_valid_ratio
              data:
                value: 0
            - service: input_number.set_value
              target:
                entity_id: input_number.dv_vmc_adaptive_min_samples
              data:
                value: 0
          - conditions: '{{ repeat.item.scenario != ''adaptive_active'' }}'
            sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.dv_vmc_adaptive_thresholds_enabled
          - conditions: '{{ repeat.item.scenario in [''sdhb_boost'',''sdhb_quiet'',''sdhb_freecool'']
              }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id:
                - input_boolean.sdhb_enabled
                - input_boolean.dv_vmc_sdhb_enabled
                - input_boolean.dv_vmc_sdhb_consume_enabled
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.dv_vmc_sim_sdhb_enabled
            - service: input_text.set_value
              target:
                entity_id: input_text.dv_vmc_sim_sdhb_intent
              data:
                value: '{{ ''request_boost'' if repeat.item.scenario == ''sdhb_boost''
                  else (''request_quiet'' if repeat.item.scenario == ''sdhb_quiet''
                  else ''request_freecool'') }}'
          - conditions: '{{ repeat.item.scenario not in [''sdhb_boost'',''sdhb_quiet'',''sdhb_freecool''] }}'
            sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.dv_vmc_sim_sdhb_enabled
            - service: input_text.set_value
              target:
                entity_id: input_text.dv_vmc_sim_sdhb_intent
              data:
                value: unknown
        - choose:
          - conditions: '{{ repeat.item.scenario == ''freecool_native'' }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.dv_vmc_freecool_enabled
          - conditions: '{{ repeat.item.scenario != ''freecool_native'' }}'
            sequence:
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.dv_vmc_freecool_enabled
        - choose:
          - conditions: '{{ repeat.item.scenario == ''stage3_active'' }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.dv_vmc_dry_mode
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.dv_vmc_dew_risk_sim
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.dv_vmc_sim_dp_available
          - conditions: '{{ repeat.item.scenario == ''stage3_blind'' }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id:
                - input_boolean.dv_vmc_dry_mode
                - input_boolean.dv_vmc_dew_risk_sim
            - service: input_boolean.turn_off
              target:
                entity_id: input_boolean.dv_vmc_sim_dp_available
          - conditions: '{{ repeat.item.scenario not in [''stage3_blind'',''stage3_active'']
              }}'
            sequence:
            - service: input_boolean.turn_off
              target:
                entity_id:
                - input_boolean.dv_vmc_dry_mode
                - input_boolean.dv_vmc_dew_risk_sim
        - variables:
            pre_delay_s: "{% if repeat.item.scenario in ['co2_ramp_up','pm25_ramp_up','co2_ramp_down','pm25_ramp_down']\
              \ %}\n  60\n{% else %}\n  2\n{% endif %}"
        - delay:
            seconds: '{{ pre_delay_s|int(2) }}'
        - service: automation.trigger
          target:
            entity_id: automation.dv_vmc_control_principal_stage_1_2
        - delay: 00:00:02
        - variables:
            speed: '{{ state_attr(''sensor.dv_vmc_bus'',''speed_cmd'')|int(0) }}'
            speed_actual_raw: '{{ state_attr(''sensor.dv_vmc_bus'',''speed_actual'')
              }}'
            speed_actual: "{% set x = state_attr('sensor.dv_vmc_bus','speed_actual')\
              \ %} {% if x is none %}\n  {{ none }}\n{% else %}\n  {{ x|int(none)\
              \ }}\n{% endif %}"
            degraded: '{{ is_state(''binary_sensor.dv_vmc_bus_degraded'',''on'') }}'
            reason: '{{ states(''sensor.dv_vmc_decision_reason'')|lower }}'
            reason_slug: '{{ (state_attr(''sensor.dv_vmc_decision_reason'',''reason_slug'')
              if state_attr(''sensor.dv_vmc_decision_reason'',''reason_slug'') is
              not none else '''')|lower }}'
            ok_down: true
            stage3_blind: '{{ state_attr(''sensor.dv_vmc_bus'',''stage3_blind'') ==
              true }}'
            thresholds_source: '{{ state_attr(''sensor.dv_vmc_bus'',''thresholds_source'')
              if state_attr(''sensor.dv_vmc_bus'',''thresholds_source'') is not none
              else '''' }}'
            freecool_active: '{{ is_state(''binary_sensor.dv_vmc_freecool_active'',''on'') }}'
        - choose:
          - conditions: '{{ repeat.item.scenario in [''co2_ramp_down'',''pm25_ramp_down'']
              }}'
            sequence:
            - variables:
                speed_start: '{{ speed }}'
            - delay: 00:01:00
            - service: automation.trigger
              target:
                entity_id: automation.dv_vmc_control_principal_stage_1_2
            - delay: 00:00:02
            - variables:
                speed: '{{ state_attr(''sensor.dv_vmc_bus'',''speed_cmd'')|int(0)
                  }}'
                speed_actual_raw: '{{ state_attr(''sensor.dv_vmc_bus'',''speed_actual'')
                  }}'
                speed_actual: "{% set x = state_attr('sensor.dv_vmc_bus','speed_actual')\
                  \ %} {% if x is none %}\n  {{ none }}\n{% else %}\n  {{ x|int(none)\
                  \ }}\n{% endif %}"
                degraded: '{{ is_state(''binary_sensor.dv_vmc_bus_degraded'',''on'')
                  }}'
                reason: '{{ states(''sensor.dv_vmc_decision_reason'')|lower }}'
                reason_slug: '{{ (state_attr(''sensor.dv_vmc_decision_reason'',''reason_slug'')
                  if state_attr(''sensor.dv_vmc_decision_reason'',''reason_slug'')
                  is not none else '''')|lower }}'
                ok_down: '{{ speed <= speed_start }}'
        - variables:
            ok_speed: '{{ speed >= (repeat.item.expect_min|int(0)) }}'
            ok_degraded: '{{ degraded == (repeat.item.expect_degraded|default(false))
              }}'
            ok_freecool: "{% if repeat.item.expect_freecool_active is defined %}\n\
              \  {{ freecool_active == (repeat.item.expect_freecool_active|bool) }}\n\
              {% else %}\n  true\n{% endif %}"
            ok_stage3: "{% if repeat.item.scenario == 'stage3_blind' %}\n  {{ stage3_blind\
              \ }}\n{% else %}\n  true\n{% endif %}"
            ok_speed_eq: "{% if repeat.item.expect_speed_eq is defined %}\n  {{ speed\
              \ == (repeat.item.expect_speed_eq|int(0)) }}\n{% else %}\n  true\n{%\
              \ endif %}"
            ok_thresholds_source: "{% if repeat.item.expect_thresholds_source is defined\
              \ %}\n  {{ (thresholds_source|lower) == (repeat.item.expect_thresholds_source|lower)\
              \ }}\n{% else %}\n  true\n{% endif %}"
            ok_reason_slug: '{% set exp = (repeat.item.expect_reason_slug|default('''')|lower)
              %} {{ exp == '''' or (exp == reason_slug) }}'
            ok_actual: "{% set exp = repeat.item.expect_actual|default('auto') %}\
              \ {% if exp == 'skip' %}\n  true\n{% elif exp == 'auto' %}\n  {{ speed_actual\
              \ is none or (speed_actual == speed) }}\n{% else %}\n  {{ (speed_actual|int(-999))\
              \ == (exp|int(-998)) }}\n{% endif %}"
            ok: '{{ ok_speed and ok_speed_eq and ok_thresholds_source and ok_degraded
              and ok_freecool and ok_stage3 and ok_reason_slug and ok_actual and (ok_down|default(true))
              }}'
            line: "{{ repeat.item.scenario ~ ':' ~ ('pass' if ok else 'fail') ~\n\
              \   '(speed=' ~ speed ~ ',min=' ~ repeat.item.expect_min ~\n   ',degraded='\
              \ ~ degraded ~ ',exp_deg=' ~ repeat.item.expect_degraded ~\n   ',reason='\
              \ ~ reason ~ ',reason_slug=' ~ reason_slug ~ ',exp_reason_slug=' ~ (repeat.item.expect_reason_slug|default(''))\
              \ ~ ',down=' ~ (ok_down|default(true)) ~ ')' }}"
        - service: input_text.set_value
          data:
            entity_id: input_text.dv_vmc_golden_last
            value: '{{ line }}'
        - service: script.dv_vmc_log_evento
          data:
            nivel: '{{ ''INFO'' if ok else ''WARNING'' }}'
            mensaje: Golden regression
            datos_adicionales:
              scenario: '{{ repeat.item.scenario }}'
              speed_cmd: '{{ speed }}'
              expect_min: '{{ repeat.item.expect_min }}'
              reason: '{{ reason }}'
              reason_slug: '{{ reason_slug }}'
              expect_reason_slug: '{{ repeat.item.expect_reason_slug|default('''')
                }}'
              pass: '{{ ok }}'
        - choose:
          - conditions: '{{ not ok }}'
            sequence:
            - service: notify.send_message
              target:
                entity_id: '{{ notify_target }}'
              data:
                message: 'DV Golden: FAIL in {{ repeat.item.scenario }} (speed={{
                  speed }}, min={{ repeat.item.expect_min }}, reason=''{{ reason }}'',
                  reason_slug=''{{ reason_slug }}'', exp_reason_slug=''{{ repeat.item.expect_reason_slug|default('''')
                  }}'')'
            - stop: golden failed
    - service: notify.send_message
      target:
        entity_id: '{{ notify_target }}'
      data:
        message: 'DV Golden: PASS (all scenarios)'
    - service: input_text.set_value
      data:
        entity_id: input_text.dv_vmc_golden_last
        value: pass
automation:
- id: dv_vmc_sim_ramp_step
  alias: dv_vmc_sim_ramp_step
  mode: single
  trigger:
  - platform: time_pattern
    seconds: /15
  condition:
  - condition: state
    entity_id: input_boolean.dv_vmc_sim_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.dv_vmc_sim_ramp_active
    state: 'on'
  action:
  - variables:
      step_s: '{{ states(''input_number.dv_vmc_sim_ramp_step_s'')|int(15) }}'
      dur_min: '{{ states(''input_number.dv_vmc_sim_ramp_duration_min'')|int(10) }}'
      co2_rate: '{{ states(''input_number.dv_vmc_sim_ramp_co2_ppm_per_min'')|float(0)
        }}'
      pm_rate: '{{ states(''input_number.dv_vmc_sim_ramp_pm25_ugm3_per_min'')|float(0)
        }}'
      started: '{{ states(''input_datetime.dv_vmc_sim_ramp_started_at'') }}'
      last: '{{ states(''input_datetime.dv_vmc_sim_ramp_last_step_at'') }}'
  - choose:
    - conditions: '{{ started in [''unknown'',''unavailable'',''none'',''''] }}'
      sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.dv_vmc_sim_ramp_started_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.dv_vmc_sim_ramp_last_step_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  - variables:
      elapsed_s: "{% set s = states('input_datetime.dv_vmc_sim_ramp_started_at') %}\
        \ {% if s in ['unknown','unavailable','none',''] %}\n  0\n{% else %}\n  {{\
        \ (as_timestamp(now()) - as_timestamp(s))|int(0) }}\n{% endif %}"
      dt_s: "{% set s = states('input_datetime.dv_vmc_sim_ramp_last_step_at') %} {%\
        \ if s in ['unknown','unavailable','none',''] %}\n  9999\n{% else %}\n  {{\
        \ (as_timestamp(now()) - as_timestamp(s))|int(0) }}\n{% endif %}"
  - choose:
    - conditions: '{{ elapsed_s >= (dur_min*60) }}'
      sequence:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dv_vmc_sim_ramp_active
    - conditions: '{{ dt_s >= step_s }}'
      sequence:
      - variables:
          co2_now: '{{ states(''input_number.dv_vmc_sim_co2_ppm'')|float(0) }}'
          pm_now: '{{ states(''input_number.dv_vmc_sim_pm25_ugm3'')|float(0) }}'
          co2_next: '{{ [400, [3000, co2_now + (co2_rate * (step_s/60.0))]|min]|max
            }}'
          pm_next: '{{ [0, [250, pm_now + (pm_rate * (step_s/60.0))]|min]|max }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.dv_vmc_sim_co2_ppm
        data:
          value: '{{ co2_next|round(0) }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.dv_vmc_sim_pm25_ugm3
        data:
          value: '{{ pm_next|round(1) }}'
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.dv_vmc_sim_ramp_last_step_at
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
- id: dv_vmc_test_notify_on_fail
  alias: dv_vmc_test_notify_on_fail
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.dv_vmc_test_ok
    to: 'off'
    for: 00:01:00
  - platform: state
    entity_id: input_button.dv_vmc_self_test_btn
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.dv_vmc_notif_persistente
        state: 'on'
      sequence:
      - service: persistent_notification.create
        data:
          notification_id: dv_vmc_test_report
          title: DV SELF-TEST
          message: 'Estado: {{ states(''sensor.dv_vmc_test_summary'') }} Contract
            OK: {{ state_attr(''sensor.dv_vmc_test_summary'',''t_contract_ok'') }}
            Missing=0: {{ state_attr(''sensor.dv_vmc_test_summary'',''t_missing_zero'')
            }} Mutex V2/V3: {{ state_attr(''sensor.dv_vmc_test_summary'',''t_mutex_v2_v3'')
            }} Driver busy <15m: {{ state_attr(''sensor.dv_vmc_test_summary'',''t_driver_busy_stuck'')
            }} Bus present: {{ state_attr(''sensor.dv_vmc_test_summary'',''t_bus_present'')
            }} Bus degraded=false: {{ state_attr(''sensor.dv_vmc_test_summary'',''t_bus_degraded_false'')
            }}'
- id: dv_vmc_golden_run_btn
  alias: dv_vmc_golden_run_btn
  trigger:
  - platform: state
    entity_id: input_button.dv_vmc_golden_run_btn
  action:
  - service: script.dv_vmc_run_golden_regression
input_button:
  dv_vmc_golden_run_btn:
    name: dv_vmc_golden_run_btn
    icon: mdi:play-circle-outline