# DV VMC optional tests: Golden scenarios (record/verify) (v4.2)
#
# True golden harness for DV:
# - Select a simulator scenario (dv_vmc_sim_scenario)
# - Apply via script.dv_vmc_sim_apply_scenario
# - Record or verify key outputs against a file baseline
#
# Storage: /config/dynamic_suite/dv/vmc/dv_vmc_golden.json
#
# Requires python_scripts in /config/python_scripts/:
# - dv_vmc_golden_record.py
# - dv_vmc_golden_verify.py
#
input_boolean:
  dv_vmc_golden_scenarios_enabled:
    name: dv_vmc_golden_scenarios_enabled
    icon: mdi:shield-check
    initial: false

input_select:
  dv_vmc_golden_scenarios_mode:
    name: dv_vmc_golden_scenarios_mode
    options:
      - record
      - verify
    initial: verify
    icon: mdi:content-save-check

input_select:
  dv_vmc_golden_scenarios_case:
    name: dv_vmc_golden_scenarios_case
    # aligned with dv_vmc_sim_scenario options
    options:
      - none
      - baseline
      - co2_high
      - pm25_high
      - outside_bad
      - outside_good
      - hostile_outside_cap
      - shower_like
      - sensor_ko
      - co2_ramp_up
      - pm25_ramp_up
      - co2_ramp_down
      - pm25_ramp_down
      - adaptive_active
      - sdhb_boost
      - sdhb_quiet
      - sdhb_freecool
      - freecool_native
      - stage3_blind
      - stage3_active
    initial: none
    icon: mdi:playlist-play

input_button:
  dv_vmc_golden_scenarios_run_btn:
    name: dv_vmc_golden_scenarios_run_btn
    icon: mdi:play

input_boolean:
  dv_vmc_golden_scenarios_pass:
    name: dv_vmc_golden_scenarios_pass
    initial: false

input_text:
  dv_vmc_golden_scenarios_last_result:
    name: dv_vmc_golden_scenarios_last_result
    initial: ""

automation:
  - id: dv_vmc_golden_scenarios_run_on_button
    alias: dv_vmc_golden_scenarios_run_on_button
    trigger:
      - platform: state
        entity_id: input_button.dv_vmc_golden_scenarios_run_btn
    condition:
      - condition: state
        entity_id: input_boolean.dv_vmc_golden_scenarios_enabled
        state: "on"
      - condition: template
        value_template: "{{ states('input_select.dv_vmc_golden_scenarios_case') not in ['none','unknown','unavailable'] }}"
    action:
      - service: script.dv_vmc_golden_scenarios_run_case

script:
  dv_vmc_golden_scenarios_run_case:
    alias: dv_vmc_golden_scenarios_run_case
    mode: queued
    sequence:
      - variables:
          case: "{{ states('input_select.dv_vmc_golden_scenarios_case') }}"
          mode: "{{ states('input_select.dv_vmc_golden_scenarios_mode') }}"
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.dv_vmc_golden_scenarios_pass
      - service: input_text.set_value
        target:
          entity_id: input_text.dv_vmc_golden_scenarios_last_result
        data:
          value: "RUN {{ mode }} / {{ case }} @ {{ now() }}"
      # apply simulator scenario
      - service: input_select.select_option
        target:
          entity_id: input_select.dv_vmc_sim_scenario
        data:
          option: "{{ case }}"
      - service: script.dv_vmc_sim_apply_scenario
      - delay: "00:00:03"
      - choose:
          - conditions: "{{ mode == 'record' }}"
            sequence:
              - service: appdaemon.dynamic_suite_golden/record
                data:
                  case: "{{ case }}"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.dv_vmc_golden_scenarios_pass
              - service: input_text.set_value
                target:
                  entity_id: input_text.dv_vmc_golden_scenarios_last_result
                data:
                  value: "RECORDED: {{ case }} (dynamic_suite/dv/vmc/dv_vmc_golden.json)"
          - conditions: "{{ mode == 'verify' }}"
            sequence:
              - service: appdaemon.dynamic_suite_golden/verify
                data:
                  case: "{{ case }}"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.dv_vmc_golden_scenarios_pass
              - service: input_text.set_value
                target:
                  entity_id: input_text.dv_vmc_golden_scenarios_last_result
                data:
                  value: "VERIFY OK (no exception): {{ case }}"
