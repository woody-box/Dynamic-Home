# DS W1 optional tests: consume gate & ACK feedback (v4.2)
#
# Requires:
# - SDHB installed
# - ds_w1_sdhb.yaml loaded (W1)
#
input_boolean:
  ds_w1_feature_tests_enabled:
    name: ds_w1_feature_tests_enabled
    icon: mdi:clipboard-check
    initial: false

input_select:
  ds_w1_feature_test_scenario:
    name: ds_w1_feature_test_scenario
    options:
      - none
      - t_consume_disabled_ack_ignored
      - t_consume_enabled_ack_accepted_solar_shield
      - t_consume_toggle_recovery
    initial: none

input_boolean:
  ds_w1_feature_test_pass:
    name: ds_w1_feature_test_pass
    initial: false

input_text:
  ds_w1_feature_test_last_result:
    name: ds_w1_feature_test_last_result
    initial: ""

timer:
  ds_w1_feature_tests_auto_off:
    name: ds_w1_feature_tests_auto_off
    duration: "02:00:00"

automation:
  - id: ds_w1_feature_tests_auto_off_start
    alias: ds_w1_feature_tests_auto_off_start
    trigger:
      - platform: state
        entity_id: input_boolean.ds_w1_feature_tests_enabled
        to: "on"
    action:
      - service: timer.start
        target:
          entity_id: timer.ds_w1_feature_tests_auto_off

  - id: ds_w1_feature_tests_auto_off_apply
    alias: ds_w1_feature_tests_auto_off_apply
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.ds_w1_feature_tests_auto_off
    condition:
      - condition: state
        entity_id: input_boolean.ds_w1_feature_tests_enabled
        state: "on"
    action:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.ds_w1_feature_tests_enabled
      - service: input_select.select_option
        target:
          entity_id: input_select.ds_w1_feature_test_scenario
        data:
          option: none

  - id: ds_w1_feature_tests_run_on_scenario
    alias: ds_w1_feature_tests_run_on_scenario
    mode: queued
    trigger:
      - platform: state
        entity_id: input_select.ds_w1_feature_test_scenario
    condition:
      - condition: state
        entity_id: input_boolean.ds_w1_feature_tests_enabled
        state: "on"
      - condition: template
        value_template: "{{ trigger.to_state.state not in ['none','unknown','unavailable'] }}"
    action:
      - service: script.ds_w1_run_feature_test
        data:
          scenario: "{{ trigger.to_state.state }}"

script:
  ds_w1_run_feature_test:
    alias: ds_w1_run_feature_test
    mode: queued
    fields:
      scenario:
        description: scenario key
    sequence:
      - variables:
          scen: "{{ scenario }}"
          tgt: "ds_w1"
          src: "dc_zone01"
          prio_solar_shield: 80
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.ds_w1_feature_test_pass
      - service: input_text.set_value
        target:
          entity_id: input_text.ds_w1_feature_test_last_result
        data:
          value: "RUN {{ scen }} @ {{ now() }}"
      - choose:
          - conditions: "{{ scen == 't_consume_disabled_ack_ignored' }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.ds_w1_sdhb_consume_enabled
              - service: script.sdhb_publish_intent
                data:
                  source: "{{ src }}"
                  target: "{{ tgt }}"
                  intent: "request_solar_shield"
                  priority: "{{ prio_solar_shield }}"
                  ttl_s: 20
              - delay: "00:00:03"
              - choose:
                  - conditions: "{{ is_state('input_boolean.sdhb_ds_w1_feedback_applied','off') }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.ds_w1_feature_test_pass
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.ds_w1_feature_test_last_result
                        data:
                          value: "PASS: consume_disabled => ACK ignored"
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.ds_w1_feature_test_last_result
                        data:
                          value: "FAIL: expected ACK ignored, got={{ states('input_boolean.sdhb_ds_w1_feedback_applied') }}"
          - conditions: "{{ scen == 't_consume_enabled_ack_accepted_solar_shield' }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.ds_w1_sdhb_consume_enabled
              - service: script.sdhb_publish_intent
                data:
                  source: "{{ src }}"
                  target: "{{ tgt }}"
                  intent: "request_solar_shield"
                  priority: "{{ prio_solar_shield }}"
                  ttl_s: 20
              - delay: "00:00:03"
              - choose:
                  - conditions: "{{ is_state('input_boolean.sdhb_ds_w1_feedback_applied','on') and is_state('binary_sensor.ds_w1_sdhb_request_solar_shield','on') }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.ds_w1_feature_test_pass
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.ds_w1_feature_test_last_result
                        data:
                          value: "PASS: consume_enabled => ACK accepted + solar_shield ON"
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.ds_w1_feature_test_last_result
                        data:
                          value: "FAIL: expected accepted+solar_shield ON, ack={{ states('input_boolean.sdhb_ds_w1_feedback_applied') }} bs={{ states('binary_sensor.ds_w1_sdhb_request_solar_shield') }}"
          - conditions: "{{ scen == 't_consume_toggle_recovery' }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.ds_w1_sdhb_consume_enabled
              - service: script.sdhb_publish_intent
                data:
                  source: "{{ src }}"
                  target: "{{ tgt }}"
                  intent: "request_solar_shield"
                  priority: "{{ prio_solar_shield }}"
                  ttl_s: 30
              - delay: "00:00:02"
              - choose:
                  - conditions: "{{ is_state('input_boolean.sdhb_ds_w1_feedback_applied','off') }}"
                    sequence: []
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.ds_w1_feature_test_last_result
                        data:
                          value: "FAIL: expected ignored when consume OFF; got={{ states('input_boolean.sdhb_ds_w1_feedback_applied') }}"
                      - stop: "precondition failed"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.ds_w1_sdhb_consume_enabled
              - delay: "00:00:03"
              - choose:
                  - conditions: "{{ is_state('input_boolean.sdhb_ds_w1_feedback_applied','on') and is_state('binary_sensor.ds_w1_sdhb_request_solar_shield','on') }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.ds_w1_feature_test_pass
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.ds_w1_feature_test_last_result
                        data:
                          value: "PASS: recovery consume OFF->ON => ignored->accepted + solar_shield ON"
                  - conditions: []
                    sequence:
                      - service: input_text.set_value
                        target:
                          entity_id: input_text.ds_w1_feature_test_last_result
                        data:
                          value: "FAIL: expected accepted+solar_shield ON after re-enable; ack={{ states('input_boolean.sdhb_ds_w1_feedback_applied') }} bs={{ states('binary_sensor.ds_w1_sdhb_request_solar_shield') }}"

      - service: input_select.select_option
        target:
          entity_id: input_select.ds_w1_feature_test_scenario
        data:
          option: none
