          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 0
          rain: false
          hvac: false
          sim_cover_pos: 40
          sdhb_winner_mock: request_quiet
          expect_reason: sdhb_quiet
          expect_pos: 40
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w1_golden_fail_count
      data:
        value: 0
    - service: input_text.set_value
      target:
        entity_id: input_text.ds_w1_golden_last_report
      data:
        value: running
    - service: input_text.set_value
      target:
        entity_id: input_text.ds_w1_golden_last_result
      data:
        value: \"{{ now().isoformat() }} | {{ 'pass' if fails == 0 else ('fail_' ~
          fails) }}\"
    - repeat:
        for_each: '{{ cases }}'
        sequence:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.ds_w1_cover_inverted
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.ds_w1_slew_enabled
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w1_slew_step_pct
          data:
            value: 10
        - service: input_text.set_value
          target:
            entity_id: input_text.ds_w1_sim_sdhb_winner_mock
          data:
            value: ''
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w1_sim_cover_pos_pct
          data:
            value: 50
        - choose:
          - conditions: '{{ repeat.item.sim_cover_pos is defined }}'
            sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.ds_w1_sim_cover_pos_pct
              data:
                value: '{{ repeat.item.sim_cover_pos|int }}'
          - conditions: '{{ repeat.item.cover_inverted is defined and repeat.item.cover_inverted
              }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.ds_w1_cover_inverted
          - conditions: '{{ repeat.item.slew_enabled is defined and repeat.item.slew_enabled
              }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.ds_w1_slew_enabled
          - conditions: '{{ repeat.item.slew_step is defined }}'
            sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.ds_w1_slew_step_pct
              data:
                value: '{{ repeat.item.slew_step|int }}'
          - conditions: '{{ repeat.item.sdhb_winner_mock is defined }}'
            sequence:
            - service: input_text.set_value
              target:
                entity_id: input_text.ds_w1_sim_sdhb_winner_mock
              data:
                value: '{{ repeat.item.sdhb_winner_mock }}'
          default: []
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w1_sim_t_in_c
          data:
            value: '{{ repeat.item.t_in }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w1_sim_t_out_c
          data:
            value: '{{ repeat.item.t_out }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w1_sim_lux_out
          data:
            value: '{{ repeat.item.lux }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w1_sim_sun_el_deg
          data:
            value: '{{ repeat.item.sun_el }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w1_sim_sun_az_deg
          data:
            value: '{{ repeat.item.sun_az }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w1_sim_wind_kmh
          data:
            value: '{{ repeat.item.wind }}'
        - choose:
          - conditions: '{{ repeat.item.rain }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.ds_w1_sim_rain
          default:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.ds_w1_sim_rain
        - choose:
          - conditions: '{{ repeat.item.sun_eff }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.ds_w1_sim_sun_effective
          default:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.ds_w1_sim_sun_effective
        - service: input_select.select_option
          target:
            entity_id: input_select.ds_w1_sim_hvac_mode
          data:
            option: '{{ repeat.item.hvac }}'
        - service: input_text.set_value
          target:
            entity_id: input_text.ds_w1_sim_sdhb_winner_mock
          data:
            value: "{% if repeat.item.sdhb_mock is defined %}\n  {{ repeat.item.sdhb_mock\
              \ }}\n{% else %}\n  \"\"\n{% endif %}"
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w1_sim_cover_pos_pct
          data:
            value: "{% if repeat.item.cover_pos is defined %}\n  {{ repeat.item.cover_pos|int\
              \ }}\n{% else %}\n  {{ states('input_number.ds_w1_sim_cover_pos_pct')|int(50)\
              \ }}\n{% endif %}"
        - service: input_select.select_option
          target:
            entity_id: input_select.ds_w1_override_mode
          data:
            option: "{% if repeat.item.ov_mode is defined %}\n  {{ repeat.item.ov_mode\
              \ }}\n{% else %}\n  auto\n{% endif %}"
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w1_override_position_pct
          data:
            value: "{% if repeat.item.ov_pos is defined %}\n  {{ repeat.item.ov_pos|int\
              \ }}\n{% else %}\n  {{ states('input_number.ds_w1_override_position_pct')|int(50)\
              \ }}\n{% endif %}"
        - choose:
          - conditions: '{{ repeat.item.ov_mode is defined and repeat.item.ov_mode
              == ''hold'' }}'
            sequence:
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ds_w1_hold_until
              data:
                datetime: '{{ (now() + timedelta(minutes=60)).isoformat() }}'
          - conditions: '{{ repeat.item.ov_mode is defined and repeat.item.ov_mode
              == ''ttl'' }}'
            sequence:
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ds_w1_override_until
              data:
                datetime: '{{ (now() + timedelta(minutes=60)).isoformat() }}'
          default:
          - service: input_datetime.set_datetime
            target:
              entity_id: input_datetime.ds_w1_hold_until
            data:
              datetime: '{{ (now() - timedelta(minutes=1)).isoformat() }}'
          - service: input_datetime.set_datetime
            target:
              entity_id: input_datetime.ds_w1_override_until
            data:
              datetime: '{{ (now() - timedelta(minutes=1)).isoformat() }}'
        - choose:
          - conditions: '{{ repeat.item.now_hhmm is defined }}'
            sequence:
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ds_w1_privacy_from
              data:
                time: '{{ (now() - timedelta(minutes=1)).strftime(''%H:%M:%S'') }}'
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ds_w1_privacy_until
              data:
                time: '{{ (now() + timedelta(minutes=30)).strftime(''%H:%M:%S'') }}'
          default: []
        - wait_template: '{{ states(''sensor.ds_w1_target_decision_json'') not in
            [''unknown'',''unavailable'',''''] }}'
          timeout: 00:00:03
          continue_on_timeout: true
        - variables:
            dec: '{{ states(''sensor.ds_w1_target_decision_json'')|default(''{}'')|from_json
              }}'
            got_reason: '{{ dec.reason|default('''') }}'
            got_pos: '{{ dec.pos|default(none) }}'
            ok_reason: '{{ got_reason == repeat.item.expect_reason }}'
            expect_pos: '{{ repeat.item.expect_pos|int }}'
            tol: '{{ states(''input_number.ds_w1_golden_pos_tolerance_pct'')|int(0)
              }}'
            ok_pos: '{{ (got_pos is not none) and (((got_pos|int(-999)) - (repeat.item.expect_pos|int(-999)))|abs
              <= tol) }}'
            ok: '{{ ok_reason and ok_pos }}'
        - choose:
          - conditions: '{{ not ok }}'
            sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.ds_w1_golden_fail_count
              data:
                value: '{{ (states(''input_number.ds_w1_golden_fail_count'')|int(0))
                  + 1 }}'
            - service: system_log.write
              data:
                level: warning
                message: 'ds_w1_golden_fail case={{ repeat.item.name }} got_reason={{
                  got_reason }} expect_reason={{ repeat.item.expect_reason }} got_pos={{
                  got_pos }}

                  '
    - variables:
        fails: '{{ states(''input_number.ds_w1_golden_fail_count'')|int(0) }}'
    - service: input_text.set_value
      target:
        entity_id: input_text.ds_w1_golden_last_report
      data:
        value: '{{ ''pass'' if fails == 0 else (''fail_'' ~ fails) }}'
    - choose:
      - conditions:
        - condition: state
          entity_id: input_boolean.ds_w1_golden_notify_enabled
          state: 'on'
        - condition: template
          value_template: '{{ fails > 0 }}'
        - condition: template
          value_template: "{% set last = states('input_datetime.ds_w1_golden_last_notify')\
            \ %} {% if last in ['unknown','unavailable','none',''] %} true {% else\
            \ %}\n  {{ (now() - as_datetime(last)).total_seconds() >= (states('input_number.ds_w1_golden_notify_cooldown_min')|int(30))*60\
            \ }}\n{% endif %}\n"
        sequence:
        - service: notify.send_message
          target:
            entity_id: '{{ states(''input_text.ds_w1_golden_notify_target_entity'')
              }}'
          data:
            message: DS W1 golden FAIL ({{ fails }})
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ds_w1_golden_last_notify
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
  ds_w2_tests_run:
    alias: ds_w2_tests_run
    mode: single
    sequence:
    - variables:
        ts: '{{ now().isoformat() }}'
        fails: '{{ state_attr(''sensor.ds_w2_tests_summary_json'',''fails'') | default([])
          }}'
        warns: '{{ state_attr(''sensor.ds_w2_tests_summary_json'',''warns'') | default([])
          }}'
        status: '{{ states(''sensor.ds_w2_tests_summary_json'') }}'
        counts: '{{ state_attr(''sensor.ds_w2_tests_summary_json'',''counts'') | default({''fails'':0,''warns'':0})
          }}'
        report: '[ds_w2_tests] ts={{ ts }} status={{ status }} fails={{ fails }} warns={{
          warns }}'
    - service: input_text.set_value
      target:
        entity_id: input_text.ds_w2_tests_last_report
      data:
        value: '{{ report[:2048] }}'
    - service: system_log.write
      data:
        level: '{% if status == ''fail'' %}warning{% else %}info{% endif %}

          '
        message: '{{ report }}'
    - choose:
      - conditions:
        - condition: state
          entity_id: input_boolean.ds_w2_tests_notify_enabled
          state: 'on'
        - condition: template
          value_template: '{{ status == ''fail'' }}'
        - condition: template
          value_template: "{% set cd = states('input_number.ds_w2_tests_notify_cooldown_min')|int(180)\
            \ %} {% set last = states('input_datetime.ds_w2_tests_last_notify') %}\
            \ {% if last in ['unknown','unavailable',''] %}\n  true\n{% else %}\n\
            \  {{ (as_timestamp(now()) - as_timestamp(last)) > (cd*60) }}\n{% endif\
            \ %}\n"
        sequence:
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ds_w2_tests_last_notify
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: notify.send_message
          target:
            entity_id: '{{ states(''input_text.ds_w2_tests_notify_target_entity'')
              }}'
          data:
            title: ds_w2_tests_fail
            message: '{{ report }}'
