          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 2
          rain: false
          hvac: false
          ov_mode: lock
          ov_pos: 33
          expect_reason: ov_lock
          expect_pos: 33
        - name: ov_hold
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 2
          rain: false
          hvac: false
          ov_mode: hold
          ov_pos: 44
          expect_reason: ov_hold
          expect_pos: 44
        - name: ov_ttl
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 2
          rain: false
          hvac: false
          ov_mode: ttl
          ov_pos: 55
