  ds_w8_tests_run:
    alias: ds_w8_tests_run
    mode: single
    sequence:
    - variables:
        ts: '{{ now().isoformat() }}'
        fails: '{{ state_attr(''sensor.ds_w8_tests_summary_json'',''fails'') | default([])
          }}'
        warns: '{{ state_attr(''sensor.ds_w8_tests_summary_json'',''warns'') | default([])
          }}'
        status: '{{ states(''sensor.ds_w8_tests_summary_json'') }}'
        counts: '{{ state_attr(''sensor.ds_w8_tests_summary_json'',''counts'') | default({''fails'':0,''warns'':0})
          }}'
        report: '[ds_w8_tests] ts={{ ts }} status={{ status }} fails={{ fails }} warns={{
          warns }}'
    - service: input_text.set_value
      target:
        entity_id: input_text.ds_w8_tests_last_report
      data:
        value: '{{ report[:2048] }}'
    - service: system_log.write
      data:
        level: '{% if status == ''fail'' %}warning{% else %}info{% endif %}

          '
        message: '{{ report }}'
    - choose:
      - conditions:
        - condition: state
          entity_id: input_boolean.ds_w8_tests_notify_enabled
          state: 'on'
        - condition: template
          value_template: '{{ status == ''fail'' }}'
        - condition: template
          value_template: "{% set cd = states('input_number.ds_w8_tests_notify_cooldown_min')|int(180)\
            \ %} {% set last = states('input_datetime.ds_w8_tests_last_notify') %}\
            \ {% if last in ['unknown','unavailable',''] %}\n  true\n{% else %}\n\
            \  {{ (as_timestamp(now()) - as_timestamp(last)) > (cd*60) }}\n{% endif\
            \ %}\n"
        sequence:
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ds_w8_tests_last_notify
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: notify.send_message
          target:
            entity_id: '{{ states(''input_text.ds_w8_tests_notify_target_entity'')
              }}'
          data:
            title: ds_w8_tests_fail
            message: '{{ report }}'
