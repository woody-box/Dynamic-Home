    - repeat:
        for_each: '{{ cases }}'
        sequence:
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.ds_w6_cover_inverted
        - service: input_boolean.turn_off
          target:
            entity_id: input_boolean.ds_w6_slew_enabled
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w6_slew_step_pct
          data:
            value: 10
        - service: input_text.set_value
          target:
            entity_id: input_text.ds_w6_sim_sdhb_winner_mock
          data:
            value: ''
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w6_sim_cover_pos_pct
          data:
            value: 50
        - choose:
          - conditions: '{{ repeat.item.sim_cover_pos is defined }}'
            sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.ds_w6_sim_cover_pos_pct
              data:
                value: '{{ repeat.item.sim_cover_pos|int }}'
          - conditions: '{{ repeat.item.cover_inverted is defined and repeat.item.cover_inverted
              }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.ds_w6_cover_inverted
          - conditions: '{{ repeat.item.slew_enabled is defined and repeat.item.slew_enabled
              }}'
            sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.ds_w6_slew_enabled
          - conditions: '{{ repeat.item.slew_step is defined }}'
            sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.ds_w6_slew_step_pct
              data:
                value: '{{ repeat.item.slew_step|int }}'
          - conditions: '{{ repeat.item.sdhb_winner_mock is defined }}'
            sequence:
            - service: input_text.set_value
              target:
                entity_id: input_text.ds_w6_sim_sdhb_winner_mock
              data:
                value: '{{ repeat.item.sdhb_winner_mock }}'
          default: []
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w6_sim_t_in_c
          data:
            value: '{{ repeat.item.t_in }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w6_sim_t_out_c
          data:
            value: '{{ repeat.item.t_out }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w6_sim_lux_out
          data:
            value: '{{ repeat.item.lux }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w6_sim_sun_el_deg
          data:
            value: '{{ repeat.item.sun_el }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w6_sim_sun_az_deg
          data:
            value: '{{ repeat.item.sun_az }}'
        - service: input_number.set_value
          target:
