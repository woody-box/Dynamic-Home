        - name: wind_hold_still_active_after_drop
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 0
          rain: false
          hvac: false
          expect_reason: meteo_wind_cap
          expect_pos: '{{ states(''input_number.ds_w4_weather_max_open_pct'')|int
            }}'
        - name: slew_step_towards_target
          t_in: 20
          t_out: 5
          lux: 8000
          sun_el: 25
          sun_az: 180
          sun_eff: true
          wind: 0
          rain: false
          hvac: heat
          sim_cover_pos: 0
          slew_enabled: true
          slew_step: 10
          expect_reason: winter_solar_gain
          expect_pos: 10
        - name: cover_inverted_quiet_keeps_logical_pos
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 0
          rain: false
          hvac: false
          cover_inverted: true
          sim_cover_pos: 20
          sdhb_winner_mock: request_quiet
          expect_reason: sdhb_quiet
          expect_pos: 80
        - name: sdhb_quiet_mock
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 0
          rain: false
          hvac: false
          sim_cover_pos: 40
          sdhb_winner_mock: request_quiet
          expect_reason: sdhb_quiet
          expect_pos: 40
