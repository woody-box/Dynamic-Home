      target:
        entity_id: input_number.ds_w4_golden_fail_count
      data:
        value: 0
    - service: input_text.set_value
      target:
        entity_id: input_text.ds_w4_golden_last_report
      data:
        value: running
    - service: input_text.set_value
      target:
