            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ds_w4_privacy_until
              data:
                time: '{{ (now() + timedelta(minutes=30)).strftime(''%H:%M:%S'') }}'
          default: []
        - wait_template: '{{ states(''sensor.ds_w4_target_decision_json'') not in
            [''unknown'',''unavailable'',''''] }}'
          timeout: 00:00:03
          continue_on_timeout: true
        - variables:
            dec: '{{ states(''sensor.ds_w4_target_decision_json'')|default(''{}'')|from_json
              }}'
            got_reason: '{{ dec.reason|default('''') }}'
            got_pos: '{{ dec.pos|default(none) }}'
            ok_reason: '{{ got_reason == repeat.item.expect_reason }}'
            expect_pos: '{{ repeat.item.expect_pos|int }}'
            tol: '{{ states(''input_number.ds_w4_golden_pos_tolerance_pct'')|int(0)
              }}'
            ok_pos: '{{ (got_pos is not none) and (((got_pos|int(-999)) - (repeat.item.expect_pos|int(-999)))|abs
              <= tol) }}'
            ok: '{{ ok_reason and ok_pos }}'
        - choose:
          - conditions: '{{ not ok }}'
            sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.ds_w4_golden_fail_count
              data:
                value: '{{ (states(''input_number.ds_w4_golden_fail_count'')|int(0))
                  + 1 }}'
            - service: system_log.write
              data:
                level: warning
                message: 'ds_w4_golden_fail case={{ repeat.item.name }} got_reason={{
                  got_reason }} expect_reason={{ repeat.item.expect_reason }} got_pos={{
                  got_pos }}

                  '
    - variables:
        fails: '{{ states(''input_number.ds_w4_golden_fail_count'')|int(0) }}'
    - service: input_text.set_value
      target:
        entity_id: input_text.ds_w4_golden_last_report
      data:
        value: '{{ ''pass'' if fails == 0 else (''fail_'' ~ fails) }}'
    - choose:
      - conditions:
        - condition: state
          entity_id: input_boolean.ds_w4_golden_notify_enabled
          state: 'on'
        - condition: template
          value_template: '{{ fails > 0 }}'
        - condition: template
          value_template: "{% set last = states('input_datetime.ds_w4_golden_last_notify')\
            \ %} {% if last in ['unknown','unavailable','none',''] %} true {% else\
            \ %}\n  {{ (now() - as_datetime(last)).total_seconds() >= (states('input_number.ds_w4_golden_notify_cooldown_min')|int(30))*60\
            \ }}\n{% endif %}\n"
        sequence:
        - service: notify.send_message
          target:
            entity_id: '{{ states(''input_text.ds_w4_golden_notify_target_entity'')
              }}'
          data:
            message: DS W4 golden FAIL ({{ fails }})
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ds_w4_golden_last_notify
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
