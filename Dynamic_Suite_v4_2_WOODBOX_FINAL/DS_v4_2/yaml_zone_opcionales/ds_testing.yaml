    alias: ds_w8_golden_run_all
    sequence:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.ds_w8_sim_enabled
    - variables:
        cases:
        - name: winter_gain_day
          t_in: 20
          t_out: 5
          lux: 8000
          sun_el: 25
          sun_az: 180
          sun_eff: true
          wind: 5
          rain: false
          hvac: heat
          expect_reason: winter_solar_gain
          expect_pos: 100
        - name: winter_night_insulate
          t_in: 22
          t_out: 10
          lux: 5
          sun_el: -10
          sun_az: 0
          sun_eff: false
          wind: 2
          rain: false
          hvac: heat
          expect_reason: winter_night_insulate
          expect_pos: '{{ states(''input_number.ds_w8_winter_night_pct'')|int }}'
        - name: rain_close
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 2
          rain: true
          hvac: false
          expect_reason: meteo_rain
          expect_pos: '{{ states(''input_number.ds_w8_rain_close_pct'')|int }}'
        - name: wind_cap
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 60
          rain: false
          hvac: false
          expect_reason: meteo_wind_cap
          expect_pos: '{{ states(''input_number.ds_w8_weather_max_open_pct'')|int
            }}'
        - name: freecool_night
          t_in: 26
          t_out: 18
          lux: 5
          sun_el: -8
          sun_az: 0
          sun_eff: false
          wind: 3
          rain: false
          hvac: false
          expect_reason: freecool_night
          expect_pos: '{{ states(''input_number.ds_w8_freecool_max_open_pct'')|int
            }}'
        - name: summer_solar_shield
          t_in: 26
          t_out: 34
          lux: 20000
          sun_el: 35
          sun_az: 180
          sun_eff: true
          wind: 2
          rain: false
          hvac: cool
