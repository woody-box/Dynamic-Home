template:
- sensor:
  - name: ds_w1_stage3_inputs_version
    unique_id: ds_w1_stage3_inputs_version
    state: '4.2'
- sensor:
  - name: ds_w1_stage3_tests_version
    unique_id: ds_w1_stage3_tests_version
    state: '4.2'
- binary_sensor:
  - name: ds_w1_tests_pass
    unique_id: ds_w1_tests_pass
    icon: "{% if is_state('binary_sensor.ds_w1_tests_pass','on') %}\n  mdi:check-circle-outline\n\
      {% else %}\n  mdi:alert-circle-outline\n{% endif %}\n"
    state: '{% set fails = state_attr(''sensor.ds_w1_tests_summary_json'',''fails'')
      | default([]) %} {{ ''on'' if (fails | length == 0) else ''off'' }}

      '
- sensor:
  - name: ds_w1_tests_summary_json
    unique_id: ds_w1_tests_summary_json
    icon: mdi:clipboard-check-outline
    state: '{% set fails = state_attr(''sensor.ds_w1_tests_summary_json'',''fails'')
      | default([]) %} {{ ''pass'' if (fails | length == 0) else ''fail'' }}

      '
    attributes:
      ts: '{{ now().isoformat() }}'
      fails: "{% set out = [] %}\n{# --- HW map disponible --- #} {% if states('sensor.ds_w1_hw_map')\
        \ in ['unknown','unavailable',''] %}\n  {% set out = out + ['hw_map_missing']\
        \ %}\n{% endif %}\n{# --- Cover entity existe y está disponible --- #} {%\
        \ set cover_e = state_attr('sensor.ds_w1_hw_map','cover_entity') %} {% if\
        \ not cover_e %}\n  {% set out = out + ['cover_entity_not_set'] %}\n{% else\
        \ %}\n  {% if states(cover_e) in ['unknown','unavailable',''] %}\n    {% set\
        \ out = out + ['cover_unavailable'] %}\n  {% endif %}\n{% endif %}\n{# ---\
        \ Decision base calculable --- #} {% if states('sensor.ds_w1_target_position')\
        \ in ['unknown','unavailable',''] %}\n  {% set out = out + ['target_position_unavailable']\
        \ %}\n{% endif %} {% if states('sensor.ds_w1_target_reason') in ['unknown','unavailable','']\
        \ %}\n  {% set out = out + ['target_reason_unavailable'] %}\n{% endif %}\n\
        {# --- Rango target_position 0..100 --- #} {% set p = states('sensor.ds_w1_target_position')\
        \ %} {% if p not in ['unknown','unavailable',''] %}\n  {% set pn = p | float(none)\
        \ %}\n  {% if pn is none %}\n    {% set out = out + ['target_position_not_numeric']\
        \ %}\n  {% else %}\n    {% if pn < 0 or pn > 100 %}\n      {% set out = out\
        \ + ['target_position_out_of_range'] %}\n    {% endif %}\n  {% endif %}\n\
        {% endif %}\n{{ out }}\n"
      warns: "{% set out = [] %}\n{# --- health degraded (no es fallo duro) --- #}\
        \ {% if states('sensor.ds_w1_health') == 'degraded' %}\n  {% set out = out\
        \ + ['health_degraded'] %}\n{% endif %}\n{# --- sensores safe en none (señal\
        \ de falta opcional) --- #} {% if states('sensor.ds_w1_wind_eff') in ['unknown','unavailable','']\
        \ %}\n  {% set out = out + ['wind_safe_unavailable'] %}\n{% endif %} {% if\
        \ states('sensor.ds_w1_lux_out_eff') in ['unknown','unavailable',''] %}\n\
        \  {% set out = out + ['lux_out_safe_unavailable'] %}\n{% endif %}\n{{ out\
        \ }}\n"
      counts: '{% set f = state_attr(''sensor.ds_w1_tests_summary_json'',''fails'')
        | default([]) %} {% set w = state_attr(''sensor.ds_w1_tests_summary_json'',''warns'')
        | default([]) %} {{ {''fails'': (f|length), ''warns'': (w|length)} }}

        '
- sensor:
  - name: ds_w1_stage5_inputs_version
    unique_id: ds_w1_stage5_inputs_version
    state: '4.2'
- sensor:
  - name: ds_w1_stage5_sim_version
    unique_id: ds_w1_stage5_sim_version
    state: '4.2'
  - name: ds_w1_hvac_mode_eff
    unique_id: ds_w1_hvac_mode_eff
    availability: "{{ is_state('input_boolean.ds_w1_sim_enabled','on')\n   or states('sensor.ds_w1_hvac_mode')\
      \ not in ['unknown','unavailable','none',''] }}\n"
    state: "{% if is_state('input_boolean.ds_w1_sim_enabled','on') %}\n  {{ states('input_select.ds_w1_sim_hvac_mode')\
      \ }}\n{% else %}\n  {{ states('sensor.ds_w1_hvac_mode') }}\n{% endif %}\n"
  - name: ds_w1_t_in_eff
    unique_id: ds_w1_t_in_eff
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: "{{ is_state('input_boolean.ds_w1_sim_enabled','on')\n   or states('sensor.ds_w1_t_in_safe')\
      \ not in ['unknown','unavailable','none',''] }}\n"
    state: "{% if is_state('input_boolean.ds_w1_sim_enabled','on') %}\n  {{ states('input_number.ds_w1_sim_t_in_c')|float(none)\
      \ }}\n{% else %}\n  {{ states('sensor.ds_w1_t_in_safe')|float(none) }}\n{% endif\
      \ %}\n"
  - name: ds_w1_t_out_eff
    unique_id: ds_w1_t_out_eff
    unit_of_measurement: °C
    device_class: temperature
    state_class: measurement
    availability: "{{ is_state('input_boolean.ds_w1_sim_enabled','on')\n   or states('sensor.ds_w1_t_out_safe')\
      \ not in ['unknown','unavailable','none',''] }}\n"
    state: "{% if is_state('input_boolean.ds_w1_sim_enabled','on') %}\n  {{ states('input_number.ds_w1_sim_t_out_c')|float(none)\
      \ }}\n{% else %}\n  {{ states('sensor.ds_w1_t_out_safe')|float(none) }}\n{%\
      \ endif %}\n"
  - name: ds_w1_lux_out_eff
    unique_id: ds_w1_lux_out_eff
    unit_of_measurement: lx
    device_class: illuminance
    state_class: measurement
    availability: "{{ is_state('input_boolean.ds_w1_sim_enabled','on')\n   or states('sensor.ds_w1_lux_out_safe')\
      \ not in ['unknown','unavailable','none',''] }}\n"
    state: "{% if is_state('input_boolean.ds_w1_sim_enabled','on') %}\n  {{ states('input_number.ds_w1_sim_lux_out')|float(none)\
      \ }}\n{% else %}\n  {{ states('sensor.ds_w1_lux_out_safe')|float(none) }}\n\
      {% endif %}\n"
  - name: ds_w1_wind_eff
    unique_id: ds_w1_wind_eff
    unit_of_measurement: km/h
    device_class: wind_speed
    state_class: measurement
    availability: "{{ is_state('input_boolean.ds_w1_sim_enabled','on')\n   or states('sensor.ds_w1_wind_safe')\
      \ not in ['unknown','unavailable','none',''] }}\n"
    state: "{% if is_state('input_boolean.ds_w1_sim_enabled','on') %}\n  {{ states('input_number.ds_w1_sim_wind_kmh')|float(none)\
      \ }}\n{% else %}\n  {{ states('sensor.ds_w1_wind_safe')|float(none) }}\n{% endif\
      \ %}\n"
  - name: ds_w1_sun_az_eff
    unique_id: ds_w1_sun_az_eff
    unit_of_measurement: °
    state_class: measurement
    availability: "{{ is_state('input_boolean.ds_w1_sim_enabled','on')\n   or state_attr('sun.sun','azimuth')\
      \ is not none }}\n"
    state: "{% if is_state('input_boolean.ds_w1_sim_enabled','on') %}\n  {{ states('input_number.ds_w1_sim_sun_az_deg')|float(none)\
      \ }}\n{% else %}\n  {{ state_attr('sun.sun','azimuth')|float(none) }}\n{% endif\
      \ %}\n"
  - name: ds_w1_sun_el_eff
    unique_id: ds_w1_sun_el_eff
    unit_of_measurement: °
    state_class: measurement
    availability: "{{ is_state('input_boolean.ds_w1_sim_enabled','on')\n   or state_attr('sun.sun','elevation')\
      \ is not none }}\n"
    state: "{% if is_state('input_boolean.ds_w1_sim_enabled','on') %}\n  {{ states('input_number.ds_w1_sim_sun_el_deg')|float(none)\
      \ }}\n{% else %}\n  {{ state_attr('sun.sun','elevation')|float(none) }}\n{%\
      \ endif %}\n"
