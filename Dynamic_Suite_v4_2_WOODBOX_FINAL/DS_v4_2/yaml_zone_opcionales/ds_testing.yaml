  ds_w4_golden_run_all:
    alias: ds_w4_golden_run_all
    sequence:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.ds_w4_sim_enabled
    - variables:
        cases:
        - name: winter_gain_day
          t_in: 20
          t_out: 5
          lux: 8000
          sun_el: 25
          sun_az: 180
          sun_eff: true
          wind: 5
          rain: false
          hvac: heat
          expect_reason: winter_solar_gain
          expect_pos: 100
        - name: winter_night_insulate
          t_in: 22
          t_out: 10
          lux: 5
          sun_el: -10
          sun_az: 0
          sun_eff: false
          wind: 2
          rain: false
          hvac: heat
          expect_reason: winter_night_insulate
          expect_pos: '{{ states(''input_number.ds_w4_winter_night_pct'')|int }}'
        - name: rain_close
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 2
          rain: true
          hvac: false
          expect_reason: meteo_rain
          expect_pos: '{{ states(''input_number.ds_w4_rain_close_pct'')|int }}'
        - name: wind_cap
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 60
          rain: false
          hvac: false
          expect_reason: meteo_wind_cap
          expect_pos: '{{ states(''input_number.ds_w4_weather_max_open_pct'')|int
            }}'
        - name: freecool_night
          t_in: 26
          t_out: 18
          lux: 5
          sun_el: -8
          sun_az: 0
          sun_eff: false
          wind: 3
          rain: false
          hvac: false
          expect_reason: freecool_night
          expect_pos: '{{ states(''input_number.ds_w4_freecool_max_open_pct'')|int
            }}'
        - name: summer_solar_shield
          t_in: 26
          t_out: 34
          lux: 20000
          sun_el: 35
          sun_az: 180
          sun_eff: true
          wind: 2
          rain: false
          hvac: cool
          expect_reason: summer_solar_shield
          expect_pos: '{{ states(''input_number.ds_w4_summer_min_open_pct'')|int }}'
        - name: privacy_time
          t_in: 22
          t_out: 18
          lux: 200
          sun_el: -12
          sun_az: 0
          sun_eff: false
          wind: 2
          rain: false
          hvac: false
          now_hhmm: '23:30'
          expect_reason: privacy_time
          expect_pos: '{{ states(''input_number.ds_w4_privacy_position_pct'')|int
            }}'
        - name: ov_lock
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 2
          rain: false
          hvac: false
          ov_mode: lock
          ov_pos: 33
          expect_reason: ov_lock
          expect_pos: 33
        - name: ov_hold
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 2
          rain: false
          hvac: false
          ov_mode: hold
          ov_pos: 44
          expect_reason: ov_hold
          expect_pos: 44
        - name: ov_ttl
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 2
          rain: false
          hvac: false
          ov_mode: ttl
          ov_pos: 55
          expect_reason: ov_ttl
          expect_pos: 55
        - name: sdhb_solar_shield
          t_in: 22
          t_out: 30
          lux: 20000
          sun_el: 30
          sun_az: 180
          sun_eff: true
          wind: 2
          rain: false
          hvac: cool
          sdhb_mock: request_solar_shield
          expect_reason: sdhb_solar_shield
          expect_pos: '{{ states(''input_number.ds_w4_sdhb_shield_max_open_pct'')|int
            }}'
        - name: sdhb_quiet_hold_position
          t_in: 22
          t_out: 18
          lux: 20000
          sun_el: 30
          sun_az: 180
          sun_eff: true
          wind: 5
          rain: false
          hvac: heat
          sdhb_mock: request_quiet
          cover_pos: 77
          expect_reason: sdhb_quiet
          expect_pos: 77
        - name: default
          t_in: 22
          t_out: 22
          lux: 1500
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 2
          rain: false
          hvac: false
          expect_reason: default
          expect_pos: 100
        - name: wind_hold_latch
          t_in: 22
          t_out: 18
          lux: 2000
          sun_el: 10
          sun_az: 90
          sun_eff: true
          wind: 60
          rain: false
          hvac: false
          expect_reason: meteo_wind_cap
