            entity_id: input_number.ds_w7_override_position_pct
          data:
            value: "{% if repeat.item.ov_pos is defined %}\n  {{ repeat.item.ov_pos|int\
              \ }}\n{% else %}\n  {{ states('input_number.ds_w7_override_position_pct')|int(50)\
              \ }}\n{% endif %}"
        - choose:
          - conditions: '{{ repeat.item.ov_mode is defined and repeat.item.ov_mode
              == ''hold'' }}'
            sequence:
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ds_w7_hold_until
              data:
                datetime: '{{ (now() + timedelta(minutes=60)).isoformat() }}'
          - conditions: '{{ repeat.item.ov_mode is defined and repeat.item.ov_mode
              == ''ttl'' }}'
            sequence:
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ds_w7_override_until
              data:
                datetime: '{{ (now() + timedelta(minutes=60)).isoformat() }}'
          default:
          - service: input_datetime.set_datetime
            target:
              entity_id: input_datetime.ds_w7_hold_until
            data:
              datetime: '{{ (now() - timedelta(minutes=1)).isoformat() }}'
          - service: input_datetime.set_datetime
            target:
              entity_id: input_datetime.ds_w7_override_until
            data:
              datetime: '{{ (now() - timedelta(minutes=1)).isoformat() }}'
        - choose:
          - conditions: '{{ repeat.item.now_hhmm is defined }}'
            sequence:
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ds_w7_privacy_from
              data:
                time: '{{ (now() - timedelta(minutes=1)).strftime(''%H:%M:%S'') }}'
            - service: input_datetime.set_datetime
              target:
                entity_id: input_datetime.ds_w7_privacy_until
              data:
                time: '{{ (now() + timedelta(minutes=30)).strftime(''%H:%M:%S'') }}'
          default: []
        - wait_template: '{{ states(''sensor.ds_w7_target_decision_json'') not in
            [''unknown'',''unavailable'',''''] }}'
          timeout: 00:00:03
          continue_on_timeout: true
        - variables:
            dec: '{{ states(''sensor.ds_w7_target_decision_json'')|default(''{}'')|from_json
              }}'
            got_reason: '{{ dec.reason|default('''') }}'
            got_pos: '{{ dec.pos|default(none) }}'
            ok_reason: '{{ got_reason == repeat.item.expect_reason }}'
            expect_pos: '{{ repeat.item.expect_pos|int }}'
            tol: '{{ states(''input_number.ds_w7_golden_pos_tolerance_pct'')|int(0)
              }}'
            ok_pos: '{{ (got_pos is not none) and (((got_pos|int(-999)) - (repeat.item.expect_pos|int(-999)))|abs
              <= tol) }}'
            ok: '{{ ok_reason and ok_pos }}'
        - choose:
          - conditions: '{{ not ok }}'
            sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.ds_w7_golden_fail_count
              data:
                value: '{{ (states(''input_number.ds_w7_golden_fail_count'')|int(0))
