automation:
- id: ds_sync_window_group_membership
  alias: ds_sync_window_group_membership
  mode: queued
  trigger:
  - platform: state
    entity_id: input_select.ds_w1_zone
    id: w1
  - platform: state
    entity_id: input_select.ds_w1_facade
    id: w1
  - platform: state
    entity_id: input_select.ds_w2_zone
    id: w2
  - platform: state
    entity_id: input_select.ds_w2_facade
    id: w2
  - platform: state
    entity_id: input_select.ds_w3_zone
    id: w3
  - platform: state
    entity_id: input_select.ds_w3_facade
    id: w3
  - platform: state
    entity_id: input_select.ds_w4_zone
    id: w4
  - platform: state
    entity_id: input_select.ds_w4_facade
    id: w4
  - platform: state
    entity_id: input_select.ds_w5_zone
    id: w5
  - platform: state
    entity_id: input_select.ds_w5_facade
    id: w5
  - platform: state
    entity_id: input_select.ds_w6_zone
    id: w6
  - platform: state
    entity_id: input_select.ds_w6_facade
    id: w6
  - platform: state
    entity_id: input_select.ds_w7_zone
    id: w7
  - platform: state
    entity_id: input_select.ds_w7_facade
    id: w7
  - platform: state
    entity_id: input_select.ds_w8_zone
    id: w8
  - platform: state
    entity_id: input_select.ds_w8_facade
    id: w8
  action:
  - variables:
      w: '{{ trigger.id }}'
      sensor_entity: binary_sensor.ds_{{ trigger.id }}_solar_shield_active
      zone_raw: '{{ states(''input_select.ds_'' ~ trigger.id ~ ''_zone'')|lower }}'
      facade: '{{ states(''input_select.ds_'' ~ trigger.id ~ ''_facade'')|lower }}'
      zone_short: '{{ zone_raw | replace(''dc_'', '''') }}'
      target_group: group.ds_{{ zone_short }}_{{ facade }}_windows
      all_groups: "{{ [\n  'group.ds_zone01_f1_windows',\n  'group.ds_zone01_f2_windows',\n\
        \  'group.ds_zone01_f3_windows',\n  'group.ds_zone01_f4_windows',\n  'group.ds_zone02_f1_windows',\n\
        \  'group.ds_zone02_f2_windows',\n  'group.ds_zone02_f3_windows',\n  'group.ds_zone02_f4_windows',\n\
        \  'group.ds_zone03_f1_windows',\n  'group.ds_zone03_f2_windows',\n  'group.ds_zone03_f3_windows',\n\
        \  'group.ds_zone03_f4_windows',\n  'group.ds_zone04_f1_windows',\n  'group.ds_zone04_f2_windows',\n\
        \  'group.ds_zone04_f3_windows',\n  'group.ds_zone04_f4_windows',\n  'group.ds_zone05_f1_windows',\n\
        \  'group.ds_zone05_f2_windows',\n  'group.ds_zone05_f3_windows',\n  'group.ds_zone05_f4_windows',\n\
        \  'group.ds_zone06_f1_windows',\n  'group.ds_zone06_f2_windows',\n  'group.ds_zone06_f3_windows',\n\
        \  'group.ds_zone06_f4_windows',\n  'group.ds_zone07_f1_windows',\n  'group.ds_zone07_f2_windows',\n\
        \  'group.ds_zone07_f3_windows',\n  'group.ds_zone07_f4_windows',\n  'group.ds_zone08_f1_windows',\n\
        \  'group.ds_zone08_f2_windows',\n  'group.ds_zone08_f3_windows',\n  'group.ds_zone08_f4_windows'\n\
        ] }}\n"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ zone_raw in [''unknown'',''unavailable'',''none'','''']
          or facade in [''unknown'',''unavailable'',''none'',''''] }}'
      sequence: []
    default:
    - repeat:
        for_each: '{{ all_groups }}'
        sequence:
        - variables:
            members: '{{ state_attr(repeat.item, ''entity_id'') or [] }}'
        - condition: template
          value_template: '{{ sensor_entity in members }}'
        - service: group.set
          data:
            object_id: '{{ repeat.item.split(''.'')[-1] }}'
            entities: '{{ members | reject(''equalto'', sensor_entity) | list }}'
    - variables:
        members_t: '{{ state_attr(target_group, ''entity_id'') or [] }}'
    - service: group.set
      data:
        object_id: '{{ target_group.split(''.'')[-1] }}'
        entities: '{{ (members_t + [sensor_entity]) | unique | list }}

          '
- id: ds_publish_bus_facade_flags
  alias: ds_publish_bus_facade_flags
  mode: queued
  trigger:
