  - platform: state
    entity_id: group.ds_zone08_f3_windows
  - platform: state
    entity_id: group.ds_zone08_f4_windows
  action:
  - variables:
      group_entity: '{{ trigger.entity_id }}'
      group_name: '{{ group_entity.split(''.'')[-1] }}'
      parts: '{{ group_name.split(''_'') }}'
      zone_short: '{{ parts[1] }}'
      facade: '{{ parts[2] }}'
      bus_flag: input_boolean.sdhb_flag_ds_{{ zone_short }}_{{ facade }}_solar_shield
      desired: '{{ is_state(group_entity, ''on'') }}'
      allowed_zone_short:
      - zone01
      - zone02
      - zone03
      - zone04
      - zone05
      - zone06
      - zone07
      - zone08
      allowed_facade:
      - f1
      - f2
      - f3
      - f4
      is_valid: '{{ zone_short in allowed_zone_short and facade in allowed_facade
        }}'
  - choose:
    - conditions: '{{ is_valid }}'
      sequence:
      - service: input_boolean.turn_{{ 'on' if desired else 'off' }}
        target:
          entity_id: '{{ bus_flag }}'
    - conditions: '{{ not is_valid }}'
      sequence:
      - service: logbook.log
        data:
          name: DS BUS flags
          message: Invalid zone/facade parsed from group {{ group_entity }} (zone_short={{
            zone_short }}, facade={{ facade }}). Skipping publish.
