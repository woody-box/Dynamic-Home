# ============================================================================
# Dynamic Shutter · DS · BUS integration (flags + groups)
# ----------------------------------------------------------------------------
# version: 4.2
# changelog: v4.2 (compaction: inputs/logic/sdhb + global common/bus)
# ============================================================================


# Intent contract (suite-level, used by SDHB winners):
# - request_quiet: prioritize acoustic comfort (silent/low-noise).
# - request_eco: prioritize efficiency/low power. DS treats it as 'quiet-lite' by default.
# - request_solar_shield: prioritize solar shading / glare control.
# Recommendation: modules that want strict silence should publish request_quiet.

