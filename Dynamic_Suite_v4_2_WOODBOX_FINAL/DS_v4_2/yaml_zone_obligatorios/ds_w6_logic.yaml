# ============================================================================
# Dynamic Shutter · DS W6 · Logic (calc/runtime/observability/forecast)
# ----------------------------------------------------------------------------
# version: 4.2
# changelog: v4.2 (compaction: inputs/logic/sdhb + global common/bus)
# ============================================================================
template:
- sensor:
  - name: ds_w6_safe_sensors_version
    unique_id: ds_w6_safe_sensors_version
    state: '4.2'
  - name: ds_w6_t_in_validation_reason
    unique_id: ds_w6_t_in_validation_reason
    icon: mdi:check-decagram
    state: "{% set en = state_attr('sensor.ds_w6_hw_map','t_in_enabled') %} {% set\
      \ e = state_attr('sensor.ds_w6_hw_map','t_in_entity') %} {% if not en %}\n \
      \ disabled\n{% elif not e %}\n  missing_entity\n{% elif states(e) in ['unknown','unavailable','none','']\
      \ %}\n  unavailable\n{% else %}\n  {% set v = states(e) | float(none) %}\n \
      \ {% if v is none %}\n    nan\n  {% elif v < -40 or v > 60 %}\n    out_of_range\n\
      \  {% else %}\n    ok\n  {% endif %}\n{% endif %}"
    attributes:
      entity: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''t_in_entity'') %} {%
        if e %}{{ e }}{% else %}{{ none }}{% endif %}'
      value: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''t_in_entity'') %} {%
        if e and states(e) not in [''unknown'',''unavailable'',''none'',''''] %}{{
        states(e) }}{% else %}{{ none }}{% endif %}'
      min: -40
      max: 60
      unit: °C
  - name: ds_w6_t_out_validation_reason
    unique_id: ds_w6_t_out_validation_reason
    icon: mdi:check-decagram
    state: "{% set en = state_attr('sensor.ds_w6_hw_map','t_out_enabled') %} {% set\
      \ e = state_attr('sensor.ds_w6_hw_map','t_out_entity') %} {% if not en %}\n\
      \  disabled\n{% elif not e %}\n  missing_entity\n{% elif states(e) in ['unknown','unavailable','none','']\
      \ %}\n  unavailable\n{% else %}\n  {% set v = states(e) | float(none) %}\n \
      \ {% if v is none %}\n    nan\n  {% elif v < -40 or v > 60 %}\n    out_of_range\n\
      \  {% else %}\n    ok\n  {% endif %}\n{% endif %}"
    attributes:
      entity: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''t_out_entity'') %}
        {% if e %}{{ e }}{% else %}{{ none }}{% endif %}'
      value: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''t_out_entity'') %} {%
        if e and states(e) not in [''unknown'',''unavailable'',''none'',''''] %}{{
        states(e) }}{% else %}{{ none }}{% endif %}'
      min: -40
      max: 60
      unit: °C
  - name: ds_w6_dew_in_validation_reason
    unique_id: ds_w6_dew_in_validation_reason
    icon: mdi:check-decagram
    state: "{% set en = state_attr('sensor.ds_w6_hw_map','dew_in_enabled') %} {% set\
      \ e = state_attr('sensor.ds_w6_hw_map','dew_in_entity') %} {% if not en %}\n\
      \  disabled\n{% elif not e %}\n  missing_entity\n{% elif states(e) in ['unknown','unavailable','none','']\
      \ %}\n  unavailable\n{% else %}\n  {% set v = states(e) | float(none) %}\n \
      \ {% if v is none %}\n    nan\n  {% elif v < -40 or v > 60 %}\n    out_of_range\n\
      \  {% else %}\n    ok\n  {% endif %}\n{% endif %}"
    attributes:
      entity: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''dew_in_entity'') %}
        {% if e %}{{ e }}{% else %}{{ none }}{% endif %}'
      value: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''dew_in_entity'') %}
        {% if e and states(e) not in [''unknown'',''unavailable'',''none'',''''] %}{{
        states(e) }}{% else %}{{ none }}{% endif %}'
      min: -40
      max: 60
      unit: °C
  - name: ds_w6_dew_out_validation_reason
    unique_id: ds_w6_dew_out_validation_reason
    icon: mdi:check-decagram
    state: "{% set en = state_attr('sensor.ds_w6_hw_map','dew_out_enabled') %} {%\
      \ set e = state_attr('sensor.ds_w6_hw_map','dew_out_entity') %} {% if not en\
      \ %}\n  disabled\n{% elif not e %}\n  missing_entity\n{% elif states(e) in ['unknown','unavailable','none','']\
      \ %}\n  unavailable\n{% else %}\n  {% set v = states(e) | float(none) %}\n \
      \ {% if v is none %}\n    nan\n  {% elif v < -40 or v > 60 %}\n    out_of_range\n\
      \  {% else %}\n    ok\n  {% endif %}\n{% endif %}"
    attributes:
      entity: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''dew_out_entity'') %}
        {% if e %}{{ e }}{% else %}{{ none }}{% endif %}'
      value: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''dew_out_entity'') %}
        {% if e and states(e) not in [''unknown'',''unavailable'',''none'',''''] %}{{
        states(e) }}{% else %}{{ none }}{% endif %}'
      min: -40
      max: 60
      unit: °C
  - name: ds_w6_lux_out_validation_reason
    unique_id: ds_w6_lux_out_validation_reason
    icon: mdi:check-decagram
    state: "{% set en = state_attr('sensor.ds_w6_hw_map','lux_out_enabled') %} {%\
      \ set e = state_attr('sensor.ds_w6_hw_map','lux_out_entity') %} {% if not en\
      \ %}\n  disabled\n{% elif not e %}\n  missing_entity\n{% elif states(e) in ['unknown','unavailable','none','']\
      \ %}\n  unavailable\n{% else %}\n  {% set v = states(e) | float(none) %}\n \
      \ {% if v is none %}\n    nan\n  {% elif v < 0 or v > 200000 %}\n    out_of_range\n\
      \  {% else %}\n    ok\n  {% endif %}\n{% endif %}"
    attributes:
      entity: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''lux_out_entity'') %}
        {% if e %}{{ e }}{% else %}{{ none }}{% endif %}'
      value: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''lux_out_entity'') %}
        {% if e and states(e) not in [''unknown'',''unavailable'',''none'',''''] %}{{
        states(e) }}{% else %}{{ none }}{% endif %}'
      min: 0
      max: 200000
      unit: lux
  - name: ds_w6_wind_validation_reason
    unique_id: ds_w6_wind_validation_reason
    icon: mdi:check-decagram
    state: "{% set en = state_attr('sensor.ds_w6_hw_map','wind_enabled') %} {% set\
      \ e = state_attr('sensor.ds_w6_hw_map','wind_entity') %} {% if not en %}\n \
      \ disabled\n{% elif not e %}\n  missing_entity\n{% elif states(e) in ['unknown','unavailable','none','']\
      \ %}\n  unavailable\n{% else %}\n  {% set v = states(e) | float(none) %}\n \
      \ {% if v is none %}\n    nan\n  {% elif v < 0 or v > 200 %}\n    out_of_range\n\
      \  {% else %}\n    ok\n  {% endif %}\n{% endif %}"
    attributes:
      entity: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''wind_entity'') %} {%
        if e %}{{ e }}{% else %}{{ none }}{% endif %}'
      value: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''wind_entity'') %} {%
        if e and states(e) not in [''unknown'',''unavailable'',''none'',''''] %}{{
        states(e) }}{% else %}{{ none }}{% endif %}'
      min: 0
      max: 200
      unit: km/h
  - name: ds_w6_cover_pos_raw
    unique_id: ds_w6_cover_pos_raw
    unit_of_measurement: '%'
    availability: "{% if is_state('input_boolean.ds_w6_sim_enabled','on') %}\n  {{\
      \ states('input_number.ds_w6_sim_cover_pos_pct') not in ['unknown','unavailable','none','']\
      \ }}\n{% else %}\n  {% set e = state_attr('sensor.ds_w6_hw_map','cover_entity')\
      \ %}\n  {{ e and (state_attr(e,'current_position') is not none) }}\n{% endif\
      \ %}\n"
    state: "{% if is_state('input_boolean.ds_w6_sim_enabled','on') %}\n  {{ states('input_number.ds_w6_sim_cover_pos_pct')|int(0)\
      \ }}\n{% else %}\n  {% set e = state_attr('sensor.ds_w6_hw_map','cover_entity')\
      \ %}\n  {% set p = (state_attr(e,'current_position') if e else none) %}\n  {%\
      \ if p is not none %}\n    {{ p|int }}\n  {% else %}\n    {{ none }}\n  {% endif\
      \ %}\n{% endif %}\n"
  - name: ds_w6_t_in_safe
    unique_id: ds_w6_t_in_safe
    unit_of_measurement: °C
    availability: '{{ is_state(''sensor.ds_w6_t_in_validation_reason'',''ok'') }}'
    state: "{% set e = state_attr('sensor.ds_w6_hw_map','t_in_entity') %} {% if e\
      \ and states(e) not in ['unknown','unavailable','none',''] %}\n  {{ states(e)\
      \ | float }}\n{% else %}\n  {{ none }}\n{% endif %}\n"
    attributes:
      validation_reason: '{{ states(''sensor.ds_w6_t_in_validation_reason'') }}'
  - name: ds_w6_t_out_safe
    unique_id: ds_w6_t_out_safe
    unit_of_measurement: °C
    availability: '{{ is_state(''sensor.ds_w6_t_out_validation_reason'',''ok'') }}'
    state: "{% set e = state_attr('sensor.ds_w6_hw_map','t_out_entity') %} {% if e\
      \ and states(e) not in ['unknown','unavailable','none',''] %}\n  {{ states(e)\
      \ | float }}\n{% else %}\n  {{ none }}\n{% endif %}\n"
    attributes:
      validation_reason: '{{ states(''sensor.ds_w6_t_out_validation_reason'') }}'
  - name: ds_w6_dew_in_safe
    unique_id: ds_w6_dew_in_safe
    unit_of_measurement: °C
    availability: '{{ is_state(''sensor.ds_w6_dew_in_validation_reason'',''ok'') }}'
    state: "{% set e = state_attr('sensor.ds_w6_hw_map','dew_in_entity') %} {% if\
      \ e and states(e) not in ['unknown','unavailable','none',''] %}\n  {{ states(e)\
      \ | float }}\n{% else %}\n  {{ none }}\n{% endif %}\n"
    attributes:
      validation_reason: '{{ states(''sensor.ds_w6_dew_in_validation_reason'') }}'
  - name: ds_w6_dew_out_safe
    unique_id: ds_w6_dew_out_safe
    unit_of_measurement: °C
    availability: '{{ is_state(''sensor.ds_w6_dew_out_validation_reason'',''ok'')
      }}'
    state: "{% set e = state_attr('sensor.ds_w6_hw_map','dew_out_entity') %} {% if\
      \ e and states(e) not in ['unknown','unavailable','none',''] %}\n  {{ states(e)\
      \ | float }}\n{% else %}\n  {{ none }}\n{% endif %}\n"
    attributes:
      validation_reason: '{{ states(''sensor.ds_w6_dew_out_validation_reason'') }}'
  - name: ds_w6_lux_out_safe
    unique_id: ds_w6_lux_out_safe
    unit_of_measurement: lx
    availability: '{{ is_state(''sensor.ds_w6_lux_out_validation_reason'',''ok'')
      }}'
    state: "{% set e = state_attr('sensor.ds_w6_hw_map','lux_out_entity') %} {% if\
      \ e and states(e) not in ['unknown','unavailable','none',''] %}\n  {{ states(e)\
      \ | float }}\n{% else %}\n  {{ none }}\n{% endif %}\n"
    attributes:
      validation_reason: '{{ states(''sensor.ds_w6_lux_out_validation_reason'') }}'
  - name: ds_w6_wind_safe
    unique_id: ds_w6_wind_safe
    unit_of_measurement: km/h
    availability: '{{ is_state(''sensor.ds_w6_wind_validation_reason'',''ok'') }}'
    state: "{% set e = state_attr('sensor.ds_w6_hw_map','wind_entity') %} {% if e\
      \ and states(e) not in ['unknown','unavailable','none',''] %}\n  {{ states(e)\
      \ | float }}\n{% else %}\n  {{ none }}\n{% endif %}\n"
    attributes:
      validation_reason: '{{ states(''sensor.ds_w6_wind_validation_reason'') }}'
- binary_sensor:
  - name: ds_w6_solar_shield_active
    unique_id: ds_w6_solar_shield_active
    state: '{ is_state(''sensor.ds_w6_target_reason'', ''summer_solar_shield'') }'
  - name: ds_w6_rain_detected
    unique_id: ds_w6_rain_detected
    state: "{% set en = state_attr('sensor.ds_w6_hw_map','rain_enabled') %} {% set\
      \ e = state_attr('sensor.ds_w6_hw_map','rain_entity') %} {% if not en %}\n \
      \ false\n{% elif not e %}\n  true\n{% elif states(e) in ['unknown','unavailable','none','']\
      \ %}\n  true\n{% else %}\n  {% set thr = states('input_number.ds_w6_rain_threshold')|float(0.1)\
      \ %}\n  {% set s = states(e) %}\n  {% if s in ['on','off'] %}\n    {{ is_state(e,'on')\
      \ }}\n  {% else %}\n    {{ (s|float(0)) > thr }}\n  {% endif %}\n{% endif %}"
- sensor:
  - name: ds_w6_template_logic_version
    unique_id: ds_w6_template_logic_version
    state: '4.2'
- binary_sensor:
  - name: ds_w6_sun_effective
    unique_id: ds_w6_sun_effective
    state: "{% set off = states('input_number.ds_w6_offset_edificios_min')|int(0)\
      \ %} {% set rising = as_datetime(state_attr('sun.sun','next_rising')) %} {%\
      \ set setting = as_datetime(state_attr('sun.sun','next_setting')) %} {% if rising\
      \ is none or setting is none %}\n  false\n{% else %}\n  {% set start = rising\
      \ + timedelta(minutes=off) %}\n  {% set end = setting - timedelta(minutes=off)\
      \ %}\n  {{ now() >= start and now() <= end }}\n{% endif %}\n"
  - name: ds_w6_is_night
    unique_id: ds_w6_is_night
    state: "{% if states('sensor.ds_w6_lux_out_eff') not in ['unknown','unavailable','none','']\
      \ %}\n  {{ (states('sensor.ds_w6_lux_out_eff')|float(999999)) <= (states('input_number.ds_w6_lux_night_max')|float(30))\
      \ }}\n{% else %}\n  {{ (states('sensor.ds_w6_sun_el_eff')|float(-90)) <= 0 }}\n\
      {% endif %}\n"
  - name: ds_w6_is_night_lux_sun
    unique_id: ds_w6_is_night_lux_sun
    state: '{{ is_state(''binary_sensor.ds_w6_is_night'',''on'') }}'
  - name: ds_w6_is_cloudy
    unique_id: ds_w6_is_cloudy
    state: "{% if states('sensor.ds_w6_lux_out_eff') not in ['unknown','unavailable','none','']\
      \ %}\n  {% set lux = states('sensor.ds_w6_lux_out_eff')|float(0) %}\n  {% set\
      \ day_min = states('input_number.ds_w6_lux_day_min')|float(2900) %}\n  {% set\
      \ cloudy_max = states('input_number.ds_w6_lux_cloudy_max')|float(2900) %}\n\
      \  {{ lux >= day_min and lux <= cloudy_max }}\n{% else %}\n  false\n{% endif\
      \ %}\n"
- binary_sensor:
  - name: ds_w6_wind_cap_raw_active
    unique_id: ds_w6_wind_cap_raw_active
    state: "{% set meteo_on = is_state('input_boolean.ds_w6_weather_protect_enabled','on')\
      \ %} {% set wind_ok = states('sensor.ds_w6_wind_eff') not in ['unknown','unavailable','none','']\
      \ %} {% set wind = states('sensor.ds_w6_wind_eff')|float(none) %} {% set start\
      \ = states('input_number.ds_w6_wind_limit_kmh')|float(40) %} {% set hyst = states('input_number.ds_w6_wind_cap_hyst_kmh')|float(5)\
      \ %} {% set release = start - hyst %} {% if not meteo_on or not wind_ok or wind\
      \ is none %}\n  false\n{% else %}\n  {% if is_state(this.entity_id,'on') %}\n\
      \    {{ wind >= release }}\n  {% else %}\n    {{ wind >= start }}\n  {% endif\
      \ %}\n{% endif %}\n"
  - name: ds_w6_wind_cap_active
    unique_id: ds_w6_wind_cap_active
    state: "{% set meteo_on = is_state('input_boolean.ds_w6_weather_protect_enabled','on')\
      \ %} {% if not meteo_on %}\n  false\n{% else %}\n  {% set raw_on = is_state('binary_sensor.ds_w6_wind_cap_raw_active','on')\
      \ %}\n  {% set hold_ok = states('input_datetime.ds_w6_wind_cap_hold_until')\
      \ not in ['unknown','unavailable','none',''] %}\n  {% set hold_ts = as_timestamp(states('input_datetime.ds_w6_wind_cap_hold_until'))\
      \ if hold_ok else none %}\n  {% set hold_active = hold_ts is not none and as_timestamp(now())\
      \ < hold_ts %}\n  {{ raw_on or hold_active }}\n{% endif %}\n"
- sensor:
  - name: ds_w6_solar_impact_pct
    unique_id: ds_w6_solar_impact_pct
    unit_of_measurement: '%'
    state: "{% set win_az = states('input_number.ds_w6_orientacion_deg')|float(0)\
      \ %} {% set H = states('input_number.ds_w6_altura_cm')|float(1) %} {% set L\
      \ = states('input_number.ds_w6_voladizo_cm')|float(0) %} {% set span = states('input_number.ds_w6_angulo_fachada_deg')|float(180)\
      \ %} {% set half = span / 2 %} {% set sun_az = states('sensor.ds_w6_sun_az_eff')|float(0)\
      \ %} {% set sun_el = states('sensor.ds_w6_sun_el_eff')|float(-90) %}\n{% set\
      \ diff = ((sun_az - win_az + 540) % 360) - 180 %} {% set in_front = (diff|abs)\
      \ <= half %} {% set sol_ok = is_state('binary_sensor.ds_w6_sun_effective_eff','on')\
      \ %}\n{% if sun_el <= 0 %}\n  {% set exposed = 0 %}\n{% else %}\n  {% set sombra\
      \ = L * tan(sun_el * pi / 180) %}\n  {% set shaded = (sombra / H) %}\n  {% if\
      \ shaded < 0 %}{% set shaded = 0 %}{% endif %}\n  {% if shaded > 1 %}{% set\
      \ shaded = 1 %}{% endif %}\n  {% set exposed = 1 - shaded %}\n{% endif %}\n\
      {% set impact = (in_front and sol_ok) and exposed or 0 %} {% set step10 = (impact\
      \ * 10) | round(0, 'floor') / 10 %} {{ (step10 * 100) | int }}\n"
  - name: ds_w6_solar_impact_0_100
    unique_id: ds_w6_solar_impact_0_100
    unit_of_measurement: '%'
    state: '{{ states(''sensor.ds_w6_solar_impact_pct'')|int(0) }}'
  - name: ds_w6_hvac_mode
    unique_id: ds_w6_hvac_mode
    state: "{% set en = state_attr('sensor.ds_w6_hw_map','climate_enabled') %} {%\
      \ set c = state_attr('sensor.ds_w6_hw_map','climate_entity') %} {% if en and\
      \ c %}\n  {{ states(c) }}\n{% else %}\n  none\n{% endif %}\n"
  - name: ds_w6_cover_pos_eff
    unique_id: ds_w6_cover_pos_eff
    unit_of_measurement: '%'
    state: "{# Posición lógica actual (0-100). Si cover_inverted=on, invierte. Soporta\
      \ simulador. #} {% set inv = is_state('input_boolean.ds_w6_cover_inverted','on')\
      \ %} {% if is_state('input_boolean.ds_w6_sim_enabled','on') %}\n  {% set raw\
      \ = states('input_number.ds_w6_sim_cover_pos_pct')|int(none) %}\n{% else %}\n\
      \  {% set e = state_attr('sensor.ds_w6_hw_map','cover_entity') %}\n  {% set\
      \ raw = state_attr(e,'current_position') if e else none %}\n{% endif %} {% if\
      \ raw is none %}\n  {{ none }}\n{% else %}\n  {{ (100 - (raw|int)) if inv else\
      \ (raw|int) }}\n{% endif %}\n"
  - name: ds_w6_target_decision_json
    unique_id: ds_w6_target_decision_json
    state: "{# --------------------------------------------------------------------\n\
      \   DECISIÓN ÚNICA (v1_1)\n   Calcula una sola vez la consigna objetivo y devuelve\
      \ JSON:\n   {\"pos\": <0-100>, \"reason\": \"<CODE>\"}\n   --------------------------------------------------------------------\
      \ #}\n\n{% set pos = 100 %} {% set reason = 'default' %} {% set branch = 'default'\
      \ %} {% set detail = {} %}\n{# --- Override lock/hold ------------------------------------------------\
      \ #} {% set ov_mode = states('input_select.ds_w6_override_mode') %} {% set ov_pos\
      \ = states('input_number.ds_w6_override_position_pct')|int(0) %} {% set hold_until\
      \ = states('input_datetime.ds_w6_hold_until') %} {% set hold_ok = false %} {%\
      \ set override_until = states('input_datetime.ds_w6_override_until') %} {% set\
      \ ttl_ok = false %} {% if hold_until not in ['unknown','unavailable','none','']\
      \ %}\n  {% set hu = as_datetime(hold_until) %}\n  {% if hu is not none and now()\
      \ < hu %}\n    {% set hold_ok = true %}\n  {% endif %}\n{% endif %} {% if override_until\
      \ not in ['unknown','unavailable','none',''] %}\n  {% set ou = as_datetime(override_until)\
      \ %}\n  {% if ou is not none and now() < ou %}\n    {% set ttl_ok = true %}\n\
      \  {% endif %}\n{% endif %}\n{% if ov_mode == 'lock' %}\n  {% set pos = ov_pos\
      \ %}\n  {% set reason = 'ov_lock' %}\n  {% set branch = 'override.lock' %}\n\
      {% elif ov_mode == 'hold' and hold_ok %}\n  {% set pos = ov_pos %}\n  {% set\
      \ reason = 'ov_hold' %}\n  {% set branch = 'override.hold' %}\n{% elif ov_mode\
      \ == 'ttl' and ttl_ok %}\n  {% set pos = ov_pos %}\n  {% set reason = 'ov_ttl'\
      \ %}\n  {% set branch = 'override.ttl' %}\n{% else %}\n\n  {% set hvac = states('sensor.ds_w6_hvac_mode')\
      \ %}\n  {% set is_cool = (hvac == 'cool') %}\n  {% set is_heat = (hvac == 'heat')\
      \ %}\n\n  {% set impact = states('sensor.ds_w6_solar_impact_0_100')|int(0) %}\n\
      \  {% set night = is_state('binary_sensor.ds_w6_is_night_lux_sun','on') %}\n\
      \n  {% set t_in_ok = states('sensor.ds_w6_t_in_eff') not in ['unknown','unavailable','none','']\
      \ %}\n  {% set t_out_ok = states('sensor.ds_w6_t_out_eff') not in ['unknown','unavailable','none','']\
      \ %}\n  {% set t_in = states('sensor.ds_w6_t_in_eff')|float(none) %}\n  {% set\
      \ t_out = states('sensor.ds_w6_t_out_eff')|float(none) %}\n\n  {% set hot_delta\
      \ = states('input_number.ds_w6_delta_hot_out')|float(0.8) %}\n  {% set free_delta\
      \ = states('input_number.ds_w6_delta_freecool')|float(0.8) %}\n\n  {% set summer_min\
      \ = states('input_number.ds_w6_summer_min_open_pct')|int(20) %}\n  {% set free_max\
      \ = states('input_number.ds_w6_freecool_max_open_pct')|int(60) %}\n  {% set\
      \ winter_night = states('input_number.ds_w6_winter_night_pct')|int(0) %}\n\n\
      \  {# --- Meteo protect (lluvia/viento) -----------------------------------\
      \ #}\n  {% set meteo_on = is_state('input_boolean.ds_w6_weather_protect_enabled','on')\
      \ %}\n  {% set raining = is_state('binary_sensor.ds_w6_rain_detected_eff','on')\
      \ %}\n  {% set wind_ok = states('sensor.ds_w6_wind_eff') not in ['unknown','unavailable','none','']\
      \ %}\n  {% set wind = states('sensor.ds_w6_wind_eff')|float(none) %}\n  {% set\
      \ wind_limit = states('input_number.ds_w6_wind_limit_kmh')|float(40) %}\n  {%\
      \ set wind_span = states('input_number.ds_w6_wind_cap_span_kmh')|float(20) %}\n\
      \  {% set wind_hyst = states('input_number.ds_w6_wind_cap_hyst_kmh')|float(5)\
      \ %}\n  {% set meteo_max_open = states('input_number.ds_w6_weather_max_open_pct')|int(30)\
      \ %}\n  {% set rain_pos = states('input_number.ds_w6_rain_close_pct')|int(0)\
      \ %}\n\n  {% if meteo_on and raining %}\n    {% set pos = rain_pos %}\n    {%\
      \ set reason = 'meteo_rain' %}\n    {% set branch = 'meteo.rain' %}\n    {%\
      \ set detail = {'rain_pos': rain_pos} %}\n  {% else %}\n\n    {# --- Sleep mode:\
      \ bloquea aperturas por freecool --------------------- #}\n    {% set sleep\
      \ = is_state('input_boolean.ds_w6_sleep_mode','on') %}\n\n    {# --- Privacidad\
      \ por hora (desde/hasta) ------------------------------ #}\n    {% set priv_en\
      \ = is_state('input_boolean.ds_w6_privacy_enabled','on') %}\n    {% set priv_from\
      \ = states('input_datetime.ds_w6_privacy_from') %}\n    {% set priv_until =\
      \ states('input_datetime.ds_w6_privacy_until') %}\n    {% set priv_pos = states('input_number.ds_w6_privacy_position_pct')|int(40)\
      \ %}\n    {% set priv_active = false %}\n    {% if priv_en\n          and priv_from\
      \ not in ['unknown','unavailable','none','']\n          and priv_until not in\
      \ ['unknown','unavailable','none',''] %}\n      {% set pf = today_at(priv_from)\
      \ %}\n      {% set pu = today_at(priv_until) %}\n      {% if pf is not none\
      \ and pu is not none %}\n        {# Si el usuario pone una hora \"until\" menor/equal\
      \ que \"from\", interpretamos rango cruzando medianoche #}\n        {% if pu\
      \ <= pf %}\n          {% set pu = pu + timedelta(days=1) %}\n        {% endif\
      \ %}\n        {% if now() >= pf and now() < pu %}\n          {% set priv_active\
      \ = true %}\n        {% endif %}\n      {% endif %}\n    {% endif %}\n\n   \
      \ {% if priv_active %}\n      {% set pos = priv_pos %}\n      {% set reason\
      \ = 'privacy_time' %}\n      {% set branch = 'privacy.time' %}\n      {% set\
      \ detail = {'from': priv_from, 'until': priv_until, 'pos': priv_pos} %}\n  \
      \  {% else %}\n\n      {# --- Free cooling (verano) ----------------------------------------\
      \ #}\n      {% set free_ok = (is_cool and night and t_in_ok and t_out_ok and\
      \ (t_out is not none) and (t_in is not none) and (t_out <= (t_in - free_delta)))\
      \ %}\n      {% if free_ok and (not sleep) %}\n        {% set pos = free_max\
      \ %}\n        {% set reason = 'freecool_night' %}\n        {% set branch = 'summer.freecool'\
      \ %}\n        {% set detail = {'t_in': t_in, 't_out': t_out, 'delta': free_delta,\
      \ 'max_open': free_max} %}\n      {% else %}\n\n        {# --- Summer shield\
      \ (verano + sol + fuera más caliente) ----------- #}\n        {% set shield_ok\
      \ = (is_cool and (impact > 0) and t_in_ok and t_out_ok and (t_out is not none)\
      \ and (t_in is not none) and (t_out >= (t_in + hot_delta))) %}\n        {% if\
      \ shield_ok %}\n          {% set raw = 100 - impact %}\n          {% if raw\
      \ < summer_min %}{% set raw = summer_min %}{% endif %}\n          {% set pos\
      \ = (raw/10)|round(0,'floor')*10 %}\n          {% set reason = 'summer_solar_shield'\
      \ %}\n          {% set branch = 'summer.shield' %}\n          {% set detail\
      \ = {'impact_pct': impact, 't_in': t_in, 't_out': t_out, 'hot_delta': hot_delta,\
      \ 'min_open': summer_min} %}\n        {% else %}\n\n          {# --- Winter\
      \ gain / night insulation --------------------------- #}\n          {% if is_heat\
      \ and (impact > 0) %}\n            {% set pos = 100 %}\n            {% set reason\
      \ = 'winter_solar_gain' %}\n            {% set branch = 'winter.gain' %}\n \
      \           {% set detail = {'impact_pct': impact} %}\n          {% elif is_heat\
      \ and (impact == 0) %}\n            {% set pos = winter_night %}\n         \
      \   {% set reason = 'winter_night_insulate' %}\n            {% set branch =\
      \ 'winter.night' %}\n            {% set detail = {'night_pct': winter_night}\
      \ %}\n          {% else %}\n            {% set pos = 100 %}\n            {%\
      \ set reason = 'default' %}\n            {% set branch = 'default' %}\n    \
      \      {% endif %}\n\n        {% endif %}\n      {% endif %}\n    {% endif %}\n\
      \  {% endif %}\n{% endif %}\n\n\n\n {# --- Wind cap avanzado (cap + histéresis)\
      \ ------------------------------- #}\n {% set wind_cap_active = is_state('binary_sensor.ds_w6_wind_cap_active','on')\
      \ %}\n {% set cap_pct = 100 %}\n {% if meteo_on and wind_ok and wind is not\
      \ none and wind_span|float(0) > 0 and wind >= wind_limit %}\n   {% set ratio\
      \ = (wind - wind_limit) / (wind_span|float(1)) %}\n   {% if ratio < 0 %}{% set\
      \ ratio = 0 %}{% endif %}\n   {% if ratio > 1 %}{% set ratio = 1 %}{% endif\
      \ %}\n   {% set raw = 100 - ratio * (100 - meteo_max_open) %}\n   {% if raw\
      \ < meteo_max_open %}{% set raw = meteo_max_open %}{% endif %}\n   {% if raw\
      \ > 100 %}{% set raw = 100 %}{% endif %}\n   {% set cap_pct = (raw/10)|round(0,'floor')*10\
      \ %}\n {% elif meteo_on and wind_ok and wind is not none and wind >= wind_limit\
      \ %}\n   {# fallback si span=0: cap fijo como antes #}\n   {% set cap_pct =\
      \ meteo_max_open %}\n {% endif %}\n\n {% if wind_cap_active and (pos|int(100))\
      \ > (cap_pct|int(100)) and reason != 'meteo_rain' %}\n   {% set detail = (detail\
      \ | default({})) %}\n   {% set detail = dict(detail, **{'wind_kmh': wind, 'wind_limit_kmh':\
      \ wind_limit, 'cap_pct': cap_pct, 'prev_reason': reason, 'prev_branch': branch\
      \ }) %}\n   {% set pos = cap_pct %}\n   {% set reason = 'meteo_wind_cap' %}\n\
      \   {% set branch = 'meteo.wind_cap' %}\n {% endif %}\n\n {# --- SDHB (Suite\
      \ Bus) clamp (Sprint 4) ---------------------------------- #}\n{% set sdhb_en\
      \ = is_state('input_boolean.ds_w6_sdhb_enabled','on') %} {% set req_solar_shield\
      \ = is_state('binary_sensor.ds_w6_sdhb_request_solar_shield','on') %} {% set\
      \ shield_max = states('input_number.ds_w6_sdhb_solar_shield_max_open_pct')|int(30)\
      \ %}\n{# --- SDHB quiet (request_quiet) ----------------------------------------\
      \ #} {% set req_quiet = is_state('binary_sensor.ds_w6_sdhb_request_quiet','on')\
      \ %} {% if sdhb_en and req_quiet and reason not in ['ov_lock','ov_hold','ov_ttl','meteo_rain','meteo_wind_cap','privacy_time']\
      \ %}\n  {% set cur = states('sensor.ds_w6_cover_pos_eff') %}\n  {% if cur not\
      \ in ['unknown','unavailable','none',''] %}\n    {% set pos = cur|int(pos|int(100))\
      \ %}\n  {% endif %}\n  {% set reason = 'sdhb_quiet' %}\n  {% set branch = 'sdhb.quiet'\
      \ %}\n{% endif %}\n\n{# Si el bus pide SHIELD, limitamos apertura máxima (sin\
      \ interferir con razones críticas) #} {% if sdhb_en and req_solar_shield and\
      \ (pos|int(100)) > shield_max %}\n  {% set pos = shield_max %}\n  {% if reason\
      \ not in ['ov_lock','ov_hold','ov_ttl','meteo_rain','meteo_wind_cap','privacy_time']\
      \ %}\n    {% set reason = 'sdhb_solar_shield' %}\n    {% set branch = 'sdhb.solar_shield'\
      \ %}\n    {% set detail = {'shield_max': shield_max} %}\n  {% endif %}\n{% endif\
      \ %}\n\n{# --- Slew rate (movimiento por pasos) --------------------------------\
      \ #} {% set slew_en = is_state('input_boolean.ds_w6_slew_enabled','on') %} {%\
      \ set slew_step = states('input_number.ds_w6_slew_step_pct')|int(10) %} {% set\
      \ curp = states('sensor.ds_w6_cover_pos_eff') %} {% if slew_en and (curp not\
      \ in ['unknown','unavailable','none','']) and reason not in ['ov_lock','ov_hold','ov_ttl','meteo_rain','meteo_wind_cap','privacy_time']\
      \ %}\n  {% set curi = curp|int(0) %}\n  {% set tar = pos|int(100) %}\n  {% if\
      \ (tar - curi)|abs > slew_step %}\n    {% set pos = (curi + (slew_step if tar\
      \ > curi else -slew_step)) %}\n    {% set detail = detail | combine({'slew_applied':\
      \ true, 'slew_from': curi, 'slew_target': tar, 'slew_step': slew_step }) %}\n\
      \    {% set branch = branch ~ '.slew' %}\n  {% endif %}\n{% endif %}\n{{ {'pos':\
      \ (pos|int(100)), 'reason': reason, 'reason_slug': (reason|string)|lower|replace('\
      \ ','_'), 'branch': branch, 'detail': detail } | to_json }}\n"
  - name: ds_w6_target_position
    unique_id: ds_w6_target_position
    unit_of_measurement: '%'
    state: "{% set raw = states('sensor.ds_w6_target_decision_json') %} {% if raw\
