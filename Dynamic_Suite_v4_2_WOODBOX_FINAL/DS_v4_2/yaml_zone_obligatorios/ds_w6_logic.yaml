- binary_sensor:
  - name: ds_w6_rain_detected_eff
    unique_id: ds_w6_rain_detected_eff
    state: "{% if is_state('input_boolean.ds_w6_sim_enabled','on') %}\n  {{ is_state('input_boolean.ds_w6_sim_rain','on')\
      \ }}\n{% else %}\n  {% set en = state_attr('sensor.ds_w6_hw_map','rain_enabled')\
      \ %}\n  {% set e = state_attr('sensor.ds_w6_hw_map','rain_entity') %}\n  {%\
      \ if not en %}\n    false\n  {% elif not e %}\n    true\n  {% elif states(e)\
      \ in ['unknown','unavailable','none',''] %}\n    true\n  {% else %}\n    {%\
      \ set thr = states('input_number.ds_w6_rain_threshold')|float(0.1) %}\n    {%\
      \ set s = states(e) %}\n    {% if s in ['on','off'] %}\n      {{ is_state(e,'on')\
      \ }}\n    {% else %}\n      {{ (s|float(0)) > thr }}\n    {% endif %}\n  {%\
      \ endif %}\n{% endif %}"
    attributes:
      source: '{% if is_state(''input_boolean.ds_w6_sim_enabled'',''on'') %}sim{%
        else %}hw{% endif %}'
      reason: "{% if is_state('input_boolean.ds_w6_sim_enabled','on') %}\n  sim\n\
        {% else %}\n  {% set en = state_attr('sensor.ds_w6_hw_map','rain_enabled')\
        \ %}\n  {% set e = state_attr('sensor.ds_w6_hw_map','rain_entity') %}\n  {%\
        \ if not en %}disabled{% elif not e %}missing_entity{% elif states(e) in ['unknown','unavailable','none','']\
        \ %}unavailable{% else %}ok{% endif %}\n{% endif %}"
  - name: ds_w6_sun_effective_eff
    unique_id: ds_w6_sun_effective_eff
    state: "{% if is_state('input_boolean.ds_w6_sim_enabled','on') %}\n  {{ is_state('input_boolean.ds_w6_sim_sun_effective','on')\
      \ }}\n{% else %}\n  {{ is_state('binary_sensor.ds_w6_sun_effective','on') }}\n\
      {% endif %}"
    attributes:
      source: '{% if is_state(''input_boolean.ds_w6_sim_enabled'',''on'') %}sim{%
        else %}logic{% endif %}'
- sensor:
  - name: ds_w6_decision_debug_json
    unique_id: ds_w6_decision_debug_json
    icon: mdi:bug-outline
    state: "{% set d = states('sensor.ds_w6_target_decision_json') %} {% if d in ['unknown','unavailable','none','']\
      \ %}\n  {{ {'pos': 100, 'reason': 'DEFAULT', 'note': 'decision_json_unavailable'}\
      \ | to_json }}\n{% else %}\n  {% set j = d | from_json %}\n\n  {% set hvac =\
      \ states('sensor.ds_w6_hvac_mode') %}\n  {% set impact = states('sensor.ds_w6_solar_impact_0_100')|int(0)\
      \ %}\n  {% set night = is_state('binary_sensor.ds_w6_is_night_lux_sun','on')\
      \ %}\n  {% set sleep = is_state('input_boolean.ds_w6_sleep_mode','on') %}\n\n\
      \  {% set ov_mode = states('input_select.ds_w6_override_mode') %}\n  {% set\
      \ ov_pos = states('input_number.ds_w6_override_position_pct')|int(0) %}\n  {%\
      \ set hold_until = states('input_datetime.ds_w6_hold_until') %}\n\n  {% set\
      \ meteo_on = is_state('input_boolean.ds_w6_weather_protect_enabled','on') %}\n\
      \  {% set raining = is_state('binary_sensor.ds_w6_rain_detected_eff','on') %}\n\
      \  {% set wind_kmh = states('sensor.ds_w6_wind_eff')|float(none) %}\n  {% set\
      \ wind = states('sensor.ds_w6_wind_eff') %}\n  {% set t_in_c = states('sensor.ds_w6_t_in_eff')|float(none)\
      \ %}\n  {% set t_out_c = states('sensor.ds_w6_t_out_eff')|float(none) %}\n\n\
      \  {% set priv_en = is_state('input_boolean.ds_w6_privacy_enabled','on') %}\n\
      \  {% set priv_from = states('input_datetime.ds_w6_privacy_from') %}\n  {% set\
      \ priv_until = states('input_datetime.ds_w6_privacy_until') %}\n  {% set priv_active\
      \ = false %}\n  {% if priv_en\n        and priv_from not in ['unknown','unavailable','none','']\n\
      \        and priv_until not in ['unknown','unavailable','none',''] %}\n    {%\
      \ set pf = today_at(priv_from) %}\n    {% set pu = today_at(priv_until) %}\n\
      \    {% if pf is not none and pu is not none %}\n      {% if pu <= pf %}{% set\
      \ pu = pu + timedelta(days=1) %}{% endif %}\n      {% if now() >= pf and now()\
      \ < pu %}{% set priv_active = true %}{% endif %}\n    {% endif %}\n  {% endif\
      \ %}\n\n  {{ {\n    'pos': (j.pos|int(100)),\n    'reason': (j.reason|string),\n\
      \    'branch': (j.branch if j.branch is defined else 'n/a'),\n    'detail':\
      \ (j.detail if j.detail is defined else {}),\n    'hvac': hvac,\n    'impact':\
      \ impact,\n    't_in_c': t_in_c,\n    't_out_c': t_out_c,\n    'wind_kmh': wind_kmh,\n\
      \    'night': night,\n    'sleep': sleep,\n    'override_mode': ov_mode,\n \
      \   'override_pos': ov_pos,\n    'hold_until': hold_until,\n    'privacy_active':\
      \ priv_active,\n    'weather_protect': meteo_on,\n    'raining': raining,\n\
      \    'wind_safe': wind,\n    'health': states('sensor.ds_w6_health')\n  } |\
      \ to_json }}\n{% endif %}\n"
- sensor:
  - name: ds_w6_health
    unique_id: ds_w6_health
    icon: mdi:heart-pulse
    state: "{% set missing_critical = [] %} {% set missing_optional = [] %}\n{% set\
      \ cover = state_attr('sensor.ds_w6_hw_map','cover_entity') %} {% set cover_ok\
      \ = cover and states(cover) not in ['unknown','unavailable','none',''] %} {%\
      \ if not cover_ok %}\n  {% set missing_critical = missing_critical + ['cover_entity']\
      \ %}\n{% endif %}\n{# Opcionales (solo si enabled) #} {% set climate_en = state_attr('sensor.ds_w6_hw_map','climate_enabled')\
      \ %} {% set climate = state_attr('sensor.ds_w6_hw_map','climate_entity') %}\
      \ {% set climate_ok = (not climate_en) or (climate and states(climate) not in\
      \ ['unknown','unavailable','none','']) %} {% if climate_en and not climate_ok\
      \ %}\n  {% set missing_optional = missing_optional + ['climate_entity'] %}\n\
      {% endif %}\n{% set t_in_en = state_attr('sensor.ds_w6_hw_map','t_in_enabled')\
      \ %} {% set t_in = state_attr('sensor.ds_w6_hw_map','t_in_entity') %} {% set\
      \ t_in_ok = (not t_in_en) or (t_in and states(t_in) not in ['unknown','unavailable','none',''])\
      \ %} {% if t_in_en and not t_in_ok %}\n  {% set missing_optional = missing_optional\
      \ + ['t_in_entity'] %}\n{% endif %}\n{% set t_out_en = state_attr('sensor.ds_w6_hw_map','t_out_enabled')\
      \ %} {% set t_out = state_attr('sensor.ds_w6_hw_map','t_out_entity') %} {% set\
      \ t_out_ok = (not t_out_en) or (t_out and states(t_out) not in ['unknown','unavailable','none',''])\
      \ %} {% if t_out_en and not t_out_ok %}\n  {% set missing_optional = missing_optional\
      \ + ['t_out_entity'] %}\n{% endif %}\n{% set lux_en = state_attr('sensor.ds_w6_hw_map','lux_out_enabled')\
      \ %} {% set lux = state_attr('sensor.ds_w6_hw_map','lux_out_entity') %} {% set\
      \ lux_ok = (not lux_en) or (lux and states(lux) not in ['unknown','unavailable','none',''])\
      \ %} {% if lux_en and not lux_ok %}\n  {% set missing_optional = missing_optional\
      \ + ['lux_out_entity'] %}\n{% endif %}\n{% set rain_en = state_attr('sensor.ds_w6_hw_map','rain_enabled')\
      \ %} {% set rain = state_attr('sensor.ds_w6_hw_map','rain_entity') %} {% set\
      \ rain_ok = (not rain_en) or (rain and states(rain) not in ['unknown','unavailable','none',''])\
      \ %} {% if rain_en and not rain_ok %}\n  {% set missing_optional = missing_optional\
      \ + ['rain_entity'] %}\n{% endif %}\n{% set wind_en = state_attr('sensor.ds_w6_hw_map','wind_enabled')\
      \ %} {% set wind = state_attr('sensor.ds_w6_hw_map','wind_entity') %} {% set\
      \ wind_ok = (not wind_en) or (wind and states(wind) not in ['unknown','unavailable','none',''])\
      \ %} {% if wind_en and not wind_ok %}\n  {% set missing_optional = missing_optional\
      \ + ['wind_entity'] %}\n{% endif %}\n{% if missing_critical | length > 0 %}\n\
      \  error\n{% elif missing_optional | length > 0 %}\n  degraded\n{% else %}\n\
      \  ok\n{% endif %}\n"
    attributes:
      golden_last_result: '{{ states(''input_text.ds_w6_golden_last_result'') }}'
      cover_ok: '{% set cover = state_attr(''sensor.ds_w6_hw_map'',''cover_entity'')
        %} {{ cover and states(cover) not in [''unknown'',''unavailable'',''none'','''']
        }}

        '
      climate_ok: '{% set en = state_attr(''sensor.ds_w6_hw_map'',''climate_enabled'')
        %} {% set e = state_attr(''sensor.ds_w6_hw_map'',''climate_entity'') %} {{
        (not en) or (e and states(e) not in [''unknown'',''unavailable'',''none'',''''])
        }}

        '
      t_in_ok: '{% set en = state_attr(''sensor.ds_w6_hw_map'',''t_in_enabled'') %}
        {% set e = state_attr(''sensor.ds_w6_hw_map'',''t_in_entity'') %} {{ (not
        en) or (e and states(e) not in [''unknown'',''unavailable'',''none'',''''])
        }}

        '
      t_out_ok: '{% set en = state_attr(''sensor.ds_w6_hw_map'',''t_out_enabled'')
        %} {% set e = state_attr(''sensor.ds_w6_hw_map'',''t_out_entity'') %} {{ (not
        en) or (e and states(e) not in [''unknown'',''unavailable'',''none'',''''])
        }}

        '
      lux_out_ok: '{% set en = state_attr(''sensor.ds_w6_hw_map'',''lux_out_enabled'')
        %} {% set e = state_attr(''sensor.ds_w6_hw_map'',''lux_out_entity'') %} {{
        (not en) or (e and states(e) not in [''unknown'',''unavailable'',''none'',''''])
        }}

        '
      rain_ok: '{% set en = state_attr(''sensor.ds_w6_hw_map'',''rain_enabled'') %}
        {% set e = state_attr(''sensor.ds_w6_hw_map'',''rain_entity'') %} {{ (not
        en) or (e and states(e) not in [''unknown'',''unavailable'',''none'',''''])
        }}

        '
      wind_ok: '{% set en = state_attr(''sensor.ds_w6_hw_map'',''wind_enabled'') %}
        {% set e = state_attr(''sensor.ds_w6_hw_map'',''wind_entity'') %} {{ (not
        en) or (e and states(e) not in [''unknown'',''unavailable'',''none'',''''])
        }}

        '
      missing_critical: "{% set miss = [] %} {% set cover = state_attr('sensor.ds_w6_hw_map','cover_entity')\
        \ %} {% if not (cover and states(cover) not in ['unknown','unavailable','none',''])\
        \ %}\n  {% set miss = miss + ['cover_entity'] %}\n{% endif %} {{ miss | to_json\
        \ }}\n"
      missing_optional: "{% set miss = [] %}\n{% set climate_en = state_attr('sensor.ds_w6_hw_map','climate_enabled')\
        \ %} {% set climate = state_attr('sensor.ds_w6_hw_map','climate_entity') %}\
        \ {% if climate_en and not (climate and states(climate) not in ['unknown','unavailable','none',''])\
        \ %}\n  {% set miss = miss + ['climate_entity'] %}\n{% endif %}\n{% set t_in_en\
        \ = state_attr('sensor.ds_w6_hw_map','t_in_enabled') %} {% set t_in = state_attr('sensor.ds_w6_hw_map','t_in_entity')\
        \ %} {% if t_in_en and not (t_in and states(t_in) not in ['unknown','unavailable','none',''])\
        \ %}\n  {% set miss = miss + ['t_in_entity'] %}\n{% endif %}\n{% set t_out_en\
        \ = state_attr('sensor.ds_w6_hw_map','t_out_enabled') %} {% set t_out = state_attr('sensor.ds_w6_hw_map','t_out_entity')\
        \ %} {% if t_out_en and not (t_out and states(t_out) not in ['unknown','unavailable','none',''])\
        \ %}\n  {% set miss = miss + ['t_out_entity'] %}\n{% endif %}\n{% set lux_en\
        \ = state_attr('sensor.ds_w6_hw_map','lux_out_enabled') %} {% set lux = state_attr('sensor.ds_w6_hw_map','lux_out_entity')\
        \ %} {% if lux_en and not (lux and states(lux) not in ['unknown','unavailable','none',''])\
        \ %}\n  {% set miss = miss + ['lux_out_entity'] %}\n{% endif %}\n{% set rain_en\
        \ = state_attr('sensor.ds_w6_hw_map','rain_enabled') %} {% set rain = state_attr('sensor.ds_w6_hw_map','rain_entity')\
        \ %} {% if rain_en and not (rain and states(rain) not in ['unknown','unavailable','none',''])\
        \ %}\n  {% set miss = miss + ['rain_entity'] %}\n{% endif %}\n{% set wind_en\
        \ = state_attr('sensor.ds_w6_hw_map','wind_enabled') %} {% set wind = state_attr('sensor.ds_w6_hw_map','wind_entity')\
        \ %} {% if wind_en and not (wind and states(wind) not in ['unknown','unavailable','none',''])\
        \ %}\n  {% set miss = miss + ['wind_entity'] %}\n{% endif %}\n{{ miss | to_json\
        \ }}\n"
  - name: ds_w6_stage2_inputs_version
    unique_id: ds_w6_stage2_inputs_version
    state: '4.2'
- sensor:
  - name: ds_w6_stage2_observability_version
    unique_id: ds_w6_stage2_observability_version
    state: '4.2'
  - name: ds_w6_modules_loaded_json
    unique_id: ds_w6_modules_loaded_json
    state: "{% set m = {\n  'template_logic': states('sensor.ds_w6_template_logic_version'),\n\
      \  'inputs': states('sensor.ds_w6_inputs_version'),\n  'automations': states('sensor.ds_w6_main_automations_version'),\n\
      \  'scripts': states('sensor.ds_w6_scripts_version'),\n  'safe_sensors': states('sensor.ds_w6_safe_sensors_version'),\n\
      \  'stage2': states('sensor.ds_w6_stage2_observability_version'),\n  'stage3':\
      \ states('sensor.ds_w6_stage3_tests_version'),\n  'stage4': states('sensor.ds_w6_stage4_sdhb_version'),\n\
      \  'stage5_sim': states('sensor.ds_w6_stage5_sim_version'),\n  'stage5_golden':\
      \ states('sensor.ds_w6_stage5_golden_version')\n} %} {{ m | to_json }}\n"
- binary_sensor:
  - name: ds_w6_modules_loaded_ok
    unique_id: ds_w6_modules_loaded_ok
    state: "{% set raw = states('sensor.ds_w6_modules_loaded_json') %} {% if raw in\
      \ ['unknown','unavailable','none',''] %}\n  false\n{% else %}\n  {% set m =\
      \ raw | from_json %}\n  {% set vals = m.values() | list %}\n  {% set bad = vals\
      \ | select('in',['unknown','unavailable','none','']) | list | length %}\n  {%\
      \ set uniq = vals | unique | list | length %}\n  {{ (bad == 0) and (uniq ==\
      \ 1) and (vals | length > 0) }}\n{% endif %}\n"
    attributes:
      version: "{% set raw = states('sensor.ds_w6_modules_loaded_json') %} {% if raw\
        \ in ['unknown','unavailable','none',''] %}\n  {{ none }}\n{% else %}\n  {%\
        \ set m = raw | from_json %}\n  {% set vals = m.values() | list %}\n  {{ (vals\
        \ | unique | list | first) if (vals|length>0) else none }}\n{% endif %}\n"
      bad_count: "{% set raw = states('sensor.ds_w6_modules_loaded_json') %} {% if\
        \ raw in ['unknown','unavailable','none',''] %}\n  {{ none }}\n{% else %}\n\
        \  {% set m = raw | from_json %}\n  {% set vals = m.values() | list %}\n \
        \ {{ (vals | select('in',['unknown','unavailable','none','']) | list | length)\
        \ }}\n{% endif %}\n"
      unique_versions: "{% set raw = states('sensor.ds_w6_modules_loaded_json') %}\
        \ {% if raw in ['unknown','unavailable','none',''] %}\n  {{ none }}\n{% else\
        \ %}\n  {% set m = raw | from_json %}\n  {% set vals = m.values() | list %}\n\
        \  {{ vals | unique | list }}\n{% endif %}\n"
- sensor:
  - name: ds_w6_addon_forecast_version
    unique_id: ds_w6_addon_forecast_version
    state: '4.2'
  - name: ds_w6_forecast_entity
    unique_id: ds_w6_forecast_entity
    state: '{% set en = state_attr(''sensor.ds_w6_hw_map'',''forecast_enabled'') %}
      {% set e  = state_attr(''sensor.ds_w6_hw_map'',''forecast_entity'') %} {% if
      en and e %}{{ e }}{% else %}none{% endif %}'
  - name: ds_w6_forecast_tmax_tomorrow_validation_reason
    unique_id: ds_w6_forecast_tmax_tomorrow_validation_reason
    icon: mdi:alert-circle-outline
    state: "{% set en = is_state('input_boolean.ds_w6_forecast_enabled','on') %} {%\
      \ if not en %}forecast_disabled{% else %}\n  {% set e = state_attr('sensor.ds_w6_hw_map','forecast_entity')\
      \ %}\n  {% if not e %}forecast_entity_missing{% else %}\n    {% set daily =\
      \ state_attr(e,'daily') %}\n    {% if daily is none %}daily_missing{% elif daily\
      \ is not sequence %}daily_not_sequence\n    {% elif (daily|count) <= 1 %}daily_too_short{%\
      \ elif daily[1] is not mapping %}daily_1_not_mapping\n    {% elif daily[1].temp\
      \ is not mapping %}temp_not_mapping{% elif daily[1].temp.max is none %}tmax_missing\n\
      \    {% else %}ok{% endif %}\n  {% endif %}\n{% endif %}"
  - name: ds_w6_forecast_tmin_tonight_validation_reason
    unique_id: ds_w6_forecast_tmin_tonight_validation_reason
    icon: mdi:alert-circle-outline
    state: "{% set en = is_state('input_boolean.ds_w6_forecast_enabled','on') %} {%\
      \ if not en %}forecast_disabled{% else %}\n  {% set e = state_attr('sensor.ds_w6_hw_map','forecast_entity')\
      \ %}\n  {% if not e %}forecast_entity_missing{% else %}\n    {% set daily =\
      \ state_attr(e,'daily') %}\n    {% if daily is none %}daily_missing{% elif daily\
      \ is not sequence %}daily_not_sequence\n    {% elif (daily|count) <= 0 %}daily_too_short{%\
      \ elif daily[0] is not mapping %}daily_0_not_mapping\n    {% elif daily[0].temp\
      \ is not mapping %}temp_not_mapping{% elif daily[0].temp.min is none %}tmin_missing\n\
      \    {% else %}ok{% endif %}\n  {% endif %}\n{% endif %}"
  - name: ds_w6_forecast_tmax_tomorrow
    unique_id: ds_w6_forecast_tmax_tomorrow
    unit_of_measurement: °C
    availability: "{{ is_state('input_boolean.ds_w6_forecast_enabled','on')\n   and\
      \ is_state('sensor.ds_w6_forecast_tmax_tomorrow_validation_reason','ok') }}"
    state: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''forecast_entity'') %}
      {% set daily = state_attr(e,''daily'') if e else none %} {{ daily[1].temp.max
      | float }}'
    attributes:
      validation_reason: '{{ states(''sensor.ds_w6_forecast_tmax_tomorrow_validation_reason'')
        }}'
      forecast_entity: '{{ state_attr(''sensor.ds_w6_hw_map'',''forecast_entity'')
        }}'
  - name: ds_w6_forecast_tmin_tonight
    unique_id: ds_w6_forecast_tmin_tonight
    unit_of_measurement: °C
    availability: "{{ is_state('input_boolean.ds_w6_forecast_enabled','on')\n   and\
      \ is_state('sensor.ds_w6_forecast_tmin_tonight_validation_reason','ok') }}"
    state: '{% set e = state_attr(''sensor.ds_w6_hw_map'',''forecast_entity'') %}
      {% set daily = state_attr(e,''daily'') if e else none %} {{ daily[0].temp.min
      | float }}'
    attributes:
      validation_reason: '{{ states(''sensor.ds_w6_forecast_tmin_tonight_validation_reason'')
        }}'
      forecast_entity: '{{ state_attr(''sensor.ds_w6_hw_map'',''forecast_entity'')
        }}'
  - name: ds_w6_addon_modules_loaded_version
    unique_id: ds_w6_addon_modules_loaded_version
    state: '4.2'
  - name: ds_w6_modules_loaded
    unique_id: ds_w6_modules_loaded
    icon: mdi:package-variant-check
    state: "{% set sentinels = {\n  'core':          'sensor.ds_w6_hw_map_version',\n\
      \  'logic':         'sensor.ds_w6_template_logic_version',\n  'runtime':   \
      \    'sensor.ds_w6_main_automations_version',\n  'observability': 'sensor.ds_w6_stage2_observability_version',\n\
      \  'testing':       'sensor.ds_w6_stage3_tests_version',\n  'sdhb':        \
      \  'sensor.ds_w6_stage4_sdhb_version',\n  'forecast':      'sensor.ds_w6_addon_forecast_version'\n\
      } %} {% set bad = ['unknown','unavailable','none',''] %} {% set loaded = []\
      \ %} {% for name, ent in sentinels.items() %}\n  {% if states(ent) not in bad\
      \ %}\n    {% set loaded = loaded + [name] %}\n  {% endif %}\n{% endfor %} {{\
      \ loaded | count }} / {{ sentinels | count }}"
    attributes:
      loaded: "{% set sentinels = {\n  'core':          'sensor.ds_w6_hw_map_version',\n\
        \  'logic':         'sensor.ds_w6_template_logic_version',\n  'runtime': \
        \      'sensor.ds_w6_main_automations_version',\n  'observability': 'sensor.ds_w6_stage2_observability_version',\n\
        \  'testing':       'sensor.ds_w6_stage3_tests_version',\n  'sdhb':      \
        \    'sensor.ds_w6_stage4_sdhb_version',\n  'forecast':      'sensor.ds_w6_addon_forecast_version'\n\
        } %} {% set bad = ['unknown','unavailable','none',''] %} {% set loaded = []\
        \ %} {% for name, ent in sentinels.items() %}\n  {% if states(ent) not in\
        \ bad %}\n    {% set loaded = loaded + [name] %}\n  {% endif %}\n{% endfor\
        \ %} {{ loaded }}"
      missing: '{% set all = [''core'',''logic'',''runtime'',''observability'',''testing'',''sdhb'',''forecast'']
        %} {% set loaded = state_attr(''sensor.ds_w6_modules_loaded'',''loaded'')
        %} {% set loaded = loaded if loaded is sequence else [] %} {{ all | reject(''in'',
        loaded) | list }}'
      versions: "{% set sentinels = {\n  'core':          'sensor.ds_w6_hw_map_version',\n\
        \  'logic':         'sensor.ds_w6_template_logic_version',\n  'runtime': \
        \      'sensor.ds_w6_main_automations_version',\n  'observability': 'sensor.ds_w6_stage2_observability_version',\n\
        \  'testing':       'sensor.ds_w6_stage3_tests_version',\n  'sdhb':      \
        \    'sensor.ds_w6_stage4_sdhb_version',\n  'forecast':      'sensor.ds_w6_addon_forecast_version'\n\
        } %} {% set out = dict() %} {% for name, ent in sentinels.items() %}\n  {%\
        \ set _ = out.update({ name: states(ent) }) %}\n{% endfor %} {{ out }}"
- binary_sensor:
  - name: ds_w6_forecast_hot_tomorrow
    unique_id: ds_w6_forecast_hot_tomorrow
    availability: '{{ states(''sensor.ds_w6_forecast_tmax_tomorrow'') not in [''unknown'',''unavailable'',''none'','''']
      }}'
    state: '{% set t = states(''sensor.ds_w6_forecast_tmax_tomorrow'')|float(none)
      %} {% set thr = states(''input_number.ds_w6_forecast_hot_threshold'')|float(32)
      %} {{ t is not none and t >= thr }}'
  - name: ds_w6_forecast_cold_tonight
    unique_id: ds_w6_forecast_cold_tonight
    availability: '{{ states(''sensor.ds_w6_forecast_tmin_tonight'') not in [''unknown'',''unavailable'',''none'','''']
      }}'
    state: '{% set t = states(''sensor.ds_w6_forecast_tmin_tonight'')|float(none)
      %} {% set thr = states(''input_number.ds_w6_forecast_cold_threshold'')|float(6)
      %} {{ t is not none and t <= thr }}'
script:
  ds_w6_init_fabrica:
    alias: ds_w6_init_fabrica
    mode: single
    sequence:
    - variables:
        f: sensor.ds_w6_fabrica
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_orientacion_deg
      data:
        value: '{{ state_attr(f,''orientacion_deg'')|float(91) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_altura_cm
      data:
        value: '{{ state_attr(f,''altura_cm'')|float(220) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_voladizo_cm
      data:
        value: '{{ state_attr(f,''voladizo_cm'')|float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_offset_edificios_min
      data:
        value: '{{ state_attr(f,''offset_edificios_min'')|float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_angulo_fachada_deg
      data:
        value: '{{ state_attr(f,''angulo_fachada_deg'')|float(180) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_lux_day_min
      data:
        value: '{{ state_attr(f,''lux_day_min'')|float(2900) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_lux_cloudy_max
      data:
        value: '{{ state_attr(f,''lux_cloudy_max'')|float(2900) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_lux_night_max
      data:
        value: '{{ state_attr(f,''lux_night_max'')|float(30) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_summer_min_open_pct
      data:
        value: '{{ state_attr(f,''summer_min_open_pct'')|float(20) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_delta_hot_out
      data:
        value: '{{ state_attr(f,''delta_hot_out'')|float(0.8) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_delta_freecool
      data:
        value: '{{ state_attr(f,''delta_freecool'')|float(0.8) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_freecool_max_open_pct
      data:
        value: '{{ state_attr(f,''freecool_max_open_pct'')|float(60) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_winter_night_pct
      data:
        value: '{{ state_attr(f,''winter_night_pct'')|float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_wind_limit_kmh
      data:
        value: '{{ state_attr(f,''wind_limit_kmh'')|float(40) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_weather_max_open_pct
      data:
        value: '{{ state_attr(f,''weather_max_open_pct'')|float(30) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_rain_threshold
      data:
        value: '{{ state_attr(f,''rain_threshold'')|float(0.1) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_rain_close_pct
      data:
        value: '{{ state_attr(f,''rain_close_pct'')|float(0) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_privacy_position_pct
      data:
        value: '{{ state_attr(f,''privacy_position_pct'')|float(40) }}'
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ds_w6_privacy_from
      data:
        time: '{{ state_attr(f,''privacy_from_hhmm'') }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_min_change_pct
      data:
        value: '{{ state_attr(f,''min_change_pct'')|float(10) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_min_time_between_moves_min
      data:
        value: '{{ state_attr(f,''min_time_between_moves_min'')|float(15) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_forecast_hot_threshold
      data:
        value: '{{ state_attr(f,''forecast_hot_threshold'')|float(32) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_forecast_cold_threshold
      data:
        value: '{{ state_attr(f,''forecast_cold_threshold'')|float(6) }}'
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_forecast_preclose_time_hhmm
      data:
        value: '{{ state_attr(f,''forecast_preclose_time_hhmm'')|int(2200) }}'
  ds_w6_override_clear:
    alias: ds_w6_override_clear
    mode: single
    sequence:
    - service: input_select.select_option
      target:
        entity_id: input_select.ds_w6_override_mode
      data:
        option: auto
  ds_w6_override_lock:
    alias: ds_w6_override_lock
    mode: single
    fields:
      position:
        description: 0-100
        example: 30
    sequence:
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_override_position_pct
      data:
        value: '{{ position|int(0) }}'
    - service: input_select.select_option
      target:
        entity_id: input_select.ds_w6_override_mode
      data:
        option: lock
  ds_w6_override_hold_minutes:
    alias: ds_w6_override_hold_minutes
    mode: single
    fields:
      position:
        description: 0-100
        example: 40
      minutes:
        description: hold duration
        example: 120
    sequence:
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_override_position_pct
      data:
        value: '{{ position|int(0) }}'
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ds_w6_hold_until
      data:
        datetime: '{{ (now() + timedelta(minutes=minutes|int(60))).strftime(''%Y-%m-%d
          %H:%M:%S'') }}'
    - service: input_select.select_option
      target:
        entity_id: input_select.ds_w6_override_mode
      data:
        option: hold
  ds_w6_override_ttl_minutes:
    alias: ds_w6_override_ttl_minutes
    mode: single
    fields:
      position:
        description: 0-100
        example: 30
      minutes:
        description: duración en minutos
        example: 120
    sequence:
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_override_position_pct
      data:
        value: '{{ position|int(30) }}'
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ds_w6_override_until
      data:
        datetime: '{{ (now() + timedelta(minutes=minutes|int(60))).strftime(''%Y-%m-%d
          %H:%M:%S'') }}'
    - service: input_select.select_option
      target:
        entity_id: input_select.ds_w6_override_mode
      data:
        option: ttl
  ds_w6_override_ttl_until_sunrise:
    alias: ds_w6_override_ttl_until_sunrise
    mode: single
    fields:
      position:
        description: 0-100
        example: 30
      offset_min:
        description: minutos extra (puede ser negativo)
        example: 0
    sequence:
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_override_position_pct
      data:
        value: '{{ position|int(30) }}'
    - variables:
        ts: '{{ as_datetime(state_attr(''sun.sun'',''next_rising'')) }}'
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ds_w6_override_until
      data:
        datetime: "{% if ts is not none %}\n  {{ (ts + timedelta(minutes=offset_min|int(0))).strftime('%Y-%m-%d\
          \ %H:%M:%S') }}\n{% else %}\n  {{ (now() + timedelta(hours=6)).strftime('%Y-%m-%d\
          \ %H:%M:%S') }}\n{% endif %}"
    - service: input_select.select_option
      target:
        entity_id: input_select.ds_w6_override_mode
      data:
        option: ttl
  ds_w6_override_ttl_until_sunset:
    alias: ds_w6_override_ttl_until_sunset
    mode: single
    fields:
      position:
        description: 0-100
        example: 30
      offset_min:
        description: minutos extra (puede ser negativo)
        example: 0
    sequence:
    - service: input_number.set_value
      target:
        entity_id: input_number.ds_w6_override_position_pct
      data:
        value: '{{ position|int(30) }}'
    - variables:
        ts: '{{ as_datetime(state_attr(''sun.sun'',''next_setting'')) }}'
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ds_w6_override_until
      data:
        datetime: "{% if ts is not none %}\n  {{ (ts + timedelta(minutes=offset_min|int(0))).strftime('%Y-%m-%d\
          \ %H:%M:%S') }}\n{% else %}\n  {{ (now() + timedelta(hours=6)).strftime('%Y-%m-%d\
          \ %H:%M:%S') }}\n{% endif %}"
    - service: input_select.select_option
      target:
        entity_id: input_select.ds_w6_override_mode
      data:
        option: ttl
  ds_w6_apply_now:
    alias: ds_w6_apply_now
    mode: single
    sequence:
    - variables:
        cover_e: '{{ state_attr(''sensor.ds_w6_hw_map'',''cover_entity'') }}'
        cover_ok: '{{ cover_e is not none and states(cover_e) not in [''unknown'',''unavailable'',''none'','''']
          }}'
        pos: '{{ states(''sensor.ds_w6_target_position'')|int(100) }}'
        interlock_en: '{{ is_state(''input_boolean.ds_w6_interlock_enabled'',''on'')
          }}'
        interlock_notify_en: '{{ is_state(''input_boolean.ds_w6_interlock_notify_enabled'',''on'')
          }}'
        interlock_wait_s: '{{ states(''input_number.ds_w6_interlock_wait_s'')|int(30)
          }}'
        interlock_tol: '{{ states(''input_number.ds_w6_interlock_tol_pct'')|int(3)
          }}'
        expected_raw: '{% set v = pos|int(100) %}{% if is_state(''input_boolean.ds_w6_cover_inverted'',''on'')
          %}{{ 100 - v }}{% else %}{{ v }}{% endif %}'
    - choose:
      - conditions: '{{ cover_ok }}'
        sequence:
        - service: cover.set_cover_position
          target:
            entity_id: '{{ cover_e }}'
          data:
            position: '{{ expected_raw|int(0) }}'
        - service: input_datetime.set_datetime
          target:
            entity_id: input_datetime.ds_w6_last_move_ts
          data:
            datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
        - service: input_number.set_value
          target:
            entity_id: input_number.ds_w6_last_target_pct
          data:
            value: '{{ pos }}'
        - choose:
          - conditions: '{{ interlock_en == "True" and cover_ok }}'
            sequence:
            - delay: '{{ interlock_wait_s|int(30) }}'
            - variables:
                cur_raw_1: '{{ state_attr(cover_e,''current_position'')|int(-999)
                  }}'
                ok_1: '{{ (cur_raw_1 - (expected_raw|int(-999))) | abs <= (interlock_tol|int(3))
                  }}'
            - choose:
              - conditions: '{{ not ok_1 }}'
                sequence:
                - service: cover.set_cover_position
                  target:
                    entity_id: '{{ cover_e }}'
                  data:
                    position: '{{ expected_raw|int(0) }}'
                - delay: '{{ interlock_wait_s|int(30) }}'
                - variables:
                    cur_raw_2: '{{ state_attr(cover_e,''current_position'')|int(-999)
                      }}'
                    ok_2: '{{ (cur_raw_2 - (expected_raw|int(-999))) | abs <= (interlock_tol|int(3))
                      }}'
                - choose:
                  - conditions: '{{ not ok_2 }}'
                    sequence:
                    - service: system_log.write
                      data:
                        level: warning
                        logger: dynamic_shutter.ds_w6
                        message: 'ds_w6: interlock FAIL (apply_now): expected_raw={{
                          expected_raw }}, cur_raw={{ cur_raw_2 }}, tol={{ interlock_tol
                          }}, pos={{ pos }}'
                    - choose:
                      - conditions: '{{ interlock_notify_en == ''True'' and states(''input_text.ds_w6_notify_target_entity'')
                          not in [''unknown'',''unavailable'',''none'',''''] }}'
                        sequence:
                        - service: notify.send_message
                          target:
                            entity_id: '{{ states(''input_text.ds_w6_notify_target_entity'')
                              }}'
                          data:
                            message: 'ds_w6 interlock FAIL (apply_now): expected={{
                              expected_raw }}, got={{ cur_raw_2 }}, tol={{ interlock_tol
                              }}, pos={{ pos }}'
      default:
      - service: system_log.write
        data:
          level: warning
          logger: dynamic_shutter.ds_w6
          message: 'ds_w6_apply_now skipped: cover_entity unavailable (cover_e={{
            cover_e }}, state={{ states(cover_e) if cover_e else ''none'' }})'
  ds_w6_run_self_test:
    alias: ds_w6_run_self_test
    mode: single
    sequence:
    - service: system_log.write
      data:
        level: info
        logger: dynamic_shutter.ds_w6
        message: 'DS W6 self-test: start | health={{ states(''sensor.ds_w6_health'')
          }}

          '
    - service: system_log.write
      data:
        level: info
        logger: dynamic_shutter.ds_w6
        message: 'cover={{ state_attr(''sensor.ds_w6_hw_map'',''cover_entity'') }}
          state={{ states(state_attr(''sensor.ds_w6_hw_map'',''cover_entity'')) }}

          '
    - service: system_log.write
      data:
        level: info
        logger: dynamic_shutter.ds_w6
        message: 'decision={{ states(''sensor.ds_w6_target_decision_json'') }}

          '
    - service: system_log.write
      data:
        level: info
        logger: dynamic_shutter.ds_w6
        message: 'debug={{ states(''sensor.ds_w6_decision_debug_json'') }}

          '
    - service: system_log.write
      data:
        level: info
        logger: dynamic_shutter.ds_w6
        message: 'notify_enabled={{ states(''input_boolean.ds_w6_health_alert_notify_enabled'')
          }} target={{ states(''input_text.ds_w6_notify_target_entity'') }}

          '
    - service: system_log.write
      data:
        level: info
        logger: dynamic_shutter.ds_w6
        message: 'DS W6 self-test: end'
automation:
- id: ds_w6_apply_target_5m
  unique_id: ds_w6_apply_target_5m
  alias: ds_w6_apply_target_5m
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /5
  - platform: state
    entity_id:
    - sensor.ds_w6_target_position
    - input_select.ds_w6_override_mode
    - input_boolean.ds_w6_sleep_mode
    - input_boolean.ds_w6_privacy_enabled
    - input_boolean.ds_w6_weather_protect_enabled
  variables:
    cover_e: '{{ state_attr(''sensor.ds_w6_hw_map'',''cover_entity'') }}'
    cover_ok: '{{ cover_e is not none and states(cover_e) not in [''unknown'',''unavailable'',''none'','''']
      }}'
    target: '{{ states(''sensor.ds_w6_target_position'')|int(100) }}'
    reason: '{{ states(''sensor.ds_w6_target_reason'') }}'
    sdhb_en: '{{ is_state(''input_boolean.ds_w6_sdhb_enabled'',''on'') }}'
    quiet_req: '{{ is_state(''binary_sensor.ds_w6_sdhb_request_quiet'',''on'') }}'
    quiet_respect: '{{ is_state(''input_boolean.ds_w6_sdhb_quiet_respect_enabled'',''on'')
      }}'
    quiet_active: '{{ (sdhb_en == ''True'') and (quiet_respect == ''True'') and (quiet_req
      == ''True'') }}'
    critical_reason: '{{ reason in [''ov_lock'',''ov_hold'',''ov_ttl'',''meteo_rain'',''meteo_wind_cap'',''privacy_time'']
      }}'
    last_target: '{{ states(''input_number.ds_w6_last_target_pct'')|int(-999) }}'
    min_change: '{{ states(''input_number.ds_w6_min_change_pct'')|int(10) }}'
    slew_en: '{{ is_state(''input_boolean.ds_w6_slew_enabled'',''on'') }}'
    slew_step: '{{ states(''input_number.ds_w6_slew_step_pct'')|int(10) }}'
    cur_pos: "{% if cover_ok %}\n  {{ (state_attr(cover_e,'current_position')|int(-1))\
      \ }}\n{% else %}\n  {{ -1 }}\n{% endif %}\n"
    interlock_en: '{{ is_state(''input_boolean.ds_w6_interlock_enabled'',''on'') }}'
    interlock_notify_en: '{{ is_state(''input_boolean.ds_w6_interlock_notify_enabled'',''on'')
      }}'
    interlock_wait_s: '{{ states(''input_number.ds_w6_interlock_wait_s'')|int(30)
      }}'
    interlock_tol: '{{ states(''input_number.ds_w6_interlock_tol_pct'')|int(3) }}'
    min_dt_min: '{{ states(''input_number.ds_w6_min_time_between_moves_min'')|int(15)
      }}'
    last_ts: '{{ states(''input_datetime.ds_w6_last_move_ts'') }}'
    last_ts_dt: "{% if last_ts not in ['unknown','unavailable','none',''] %}\n  {{\
      \ as_datetime(last_ts) }}\n{% else %}\n  {{ none }}\n{% endif %}\n"
    dt_ok: "{% if last_ts_dt is none %}\n  true\n{% else %}\n  {{ (now() - last_ts_dt).total_seconds()\
      \ >= (min_dt_min * 60) }}\n{% endif %}\n"
    change_ok: '{{ (target - last_target) | abs >= min_change }}'
  condition:
  - condition: template
    value_template: '{{ cover_e is not none }}'
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ quiet_active and (not critical_reason) and cover_ok and
          dt_ok and change_ok }}'
      sequence:
      - service: system_log.write
        data:
          level: info
          logger: dynamic_shutter.ds_w6
          message: 'ds_w6: DS W6: quiet_active por SDHB, se omite movimiento no crítico
            (reason={{ reason }}, target={{ target }}).

            '
    - conditions:
      - condition: template
        value_template: '{{ (not cover_ok) and dt_ok and change_ok }}'
      sequence:
      - service: system_log.write
        data:
          level: warning
          logger: dynamic_shutter.ds_w6
          message: 'ds_w6: DS W6: No se puede aplicar target. cover={{ cover_e }}
            está {{ states(cover_e) }} (target={{ target }}).

            '
    - conditions:
      - condition: template
        value_template: '{{ cover_ok and dt_ok and change_ok }}'
      sequence:
      - variables:
          position_to_set: "{{ target | int(0) }}"
      - service: cover.set_cover_position
        target:
          entity_id: '{{ cover_e }}'
        data:
          position: "{% set v = position_to_set|int(target|int(100)) %} {% if is_state('input_boolean.ds_w6_cover_inverted','on')\
            \ %}\n  {{ 100 - v }}\n{% else %}\n  {{ v }}\n{% endif %}\n"
      - choose:
        - conditions: '{{ interlock_en == "True" and cover_ok }}'
          sequence:
          - variables:
              expected_raw: '{% set v = position_to_set|int(target|int(100)) %}{%
                if is_state(''input_boolean.ds_w6_cover_inverted'',''on'') %}{{ 100
                - v }}{% else %}{{ v }}{% endif %}'
          - delay: '{{ interlock_wait_s|int(30) }}'
          - variables:
              cur_raw_1: '{% if cover_ok %}{{ state_attr(cover_e,''current_position'')|int(-999)
                }}{% else %}{{ -999 }}{% endif %}'
              ok_1: '{{ (cur_raw_1 - (expected_raw|int(-999))) | abs <= (interlock_tol|int(3))
                }}'
          - choose:
            - conditions: '{{ not ok_1 }}'
              sequence:
              - service: cover.set_cover_position
                target:
                  entity_id: '{{ cover_e }}'
                data:
                  position: '{{ expected_raw|int(0) }}'
              - delay: '{{ interlock_wait_s|int(30) }}'
              - variables:
                  cur_raw_2: '{% if cover_ok %}{{ state_attr(cover_e,''current_position'')|int(-999)
                    }}{% else %}{{ -999 }}{% endif %}'
                  ok_2: '{{ (cur_raw_2 - (expected_raw|int(-999))) | abs <= (interlock_tol|int(3))
                    }}'
              - choose:
                - conditions: '{{ not ok_2 }}'
                  sequence:
                  - service: system_log.write
                    data:
                      level: warning
                      logger: dynamic_shutter.ds_w6
                      message: 'ds_w6: interlock FAIL (apply_target): expected_raw={{
                        expected_raw }}, cur_raw={{ cur_raw_2 }}, tol={{ interlock_tol
                        }}, reason={{ reason }}, target={{ target }}'
                  - choose:
                    - conditions: '{{ interlock_notify_en == ''True'' and states(''input_text.ds_w6_notify_target_entity'')
                        not in [''unknown'',''unavailable'',''none'',''''] }}'
                      sequence:
                      - service: notify.send_message
                        target:
                          entity_id: '{{ states(''input_text.ds_w6_notify_target_entity'')
                            }}'
                        data:
                          message: 'ds_w6 interlock FAIL (apply_target): expected={{
                            expected_raw }}, got={{ cur_raw_2 }}, tol={{ interlock_tol
                            }}, reason={{ reason }}, target={{ target }}'
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ds_w6_last_move_ts
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.ds_w6_last_target_pct
        data:
          value: '{{ target }}'
- id: ds_w6_forecast_preclose_daily
  unique_id: ds_w6_forecast_preclose_daily
  alias: ds_w6_forecast_preclose_daily
  mode: single
  trigger:
  - platform: time_pattern
    minutes: '0'
  condition:
  - condition: state
    entity_id: input_boolean.ds_w6_forecast_enabled
    state: 'on'
  - condition: template
    value_template: '{% set hhmm = states(''input_number.ds_w6_forecast_preclose_time_hhmm'')|int(2200)
      %} {% set h = (hhmm // 100) | int %} {% set m = (hhmm % 100) | int %} {{ now().hour
      == h and now().minute == m }}

      '
  - condition: state
    entity_id: binary_sensor.ds_w6_forecast_hot_tomorrow
    state: 'on'
  action:
  - service: cover.set_cover_position
    target:
      entity_id: '{{ state_attr(''sensor.ds_w6_hw_map'',''cover_entity'') }}'
    data:
      position: '{{ states(''input_number.ds_w6_summer_min_open_pct'')|int(20) }}'
- id: ds_w6_override_ttl_expiry_watch
  unique_id: ds_w6_override_ttl_expiry_watch
  alias: ds_w6_override_ttl_expiry_watch
  mode: single
  trigger:
  - platform: time_pattern
    minutes: /1
  - platform: state
    entity_id:
    - input_select.ds_w6_override_mode
    - input_datetime.ds_w6_override_until
  variables:
    ov_mode: '{{ states(''input_select.ds_w6_override_mode'') }}'
    until_s: '{{ states(''input_datetime.ds_w6_override_until'') }}'
    until_dt: "{% if until_s not in ['unknown','unavailable','none',''] %}\n  {{ as_datetime(until_s)\
      \ }}\n{% else %}\n  {{ none }}\n{% endif %}"
    expired: '{{ (until_dt is not none) and (now() >= until_dt) }}'
  condition:
  - condition: template
    value_template: '{{ ov_mode == ''ttl'' and expired }}'
  action:
  - service: input_select.select_option
    target:
      entity_id: input_select.ds_w6_override_mode
    data:
      option: auto
  - service: system_log.write
    data:
      level: info
      logger: dynamic_shutter.ds_w6
      message: 'DS W6: override TTL expirado -> vuelve a auto.'
- id: ds_w6_wind_cap_hold_latch
  unique_id: ds_w6_wind_cap_hold_latch
  alias: ds_w6_wind_cap_hold_latch
  mode: single
  trigger:
  - platform: state
    entity_id: binary_sensor.ds_w6_wind_cap_raw_active
    to: 'on'
  - platform: state
    entity_id: input_boolean.ds_w6_weather_protect_enabled
    to: 'off'
  action:
  - variables:
      hold_min: '{{ states(''input_number.ds_w6_wind_cap_hold_min'')|int(0) }}'
      ts_target: "{% if trigger.entity_id == 'binary_sensor.ds_w6_wind_cap_raw_active'\
        \ %}\n  {{ as_timestamp(now() + timedelta(minutes=hold_min)) }}\n{% else %}\n\
        \  {{ as_timestamp(now()) }}\n{% endif %}"
      dt: '{{ ts_target | timestamp_custom(''%Y-%m-%d %H:%M:%S'', true) }}'
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.ds_w6_wind_cap_hold_until
    data:
      datetime: '{{ dt }}'
- id: ds_w6_health_alert
  alias: ds_w6_health_alert
  mode: single
  trigger:
  - platform: state
    entity_id: sensor.ds_w6_health
  condition:
  - condition: template
    value_template: '{{ trigger.to_state is not none and trigger.to_state.state in
      [''degraded'',''error''] }}

      '
  - condition: template
    value_template: "{% set cd = states('input_number.ds_w6_health_alert_cooldown_min')\
      \ %} {% if cd in ['unknown','unavailable','none',''] %}\n  true\n{% else %}\n\
      \  {% set cooldown_s = (cd|float(0)) * 60 %}\n  {% set last = states('input_datetime.ds_w6_health_last_alert')\
      \ %}\n  {% if last in ['unknown','unavailable','none',''] %}\n    true\n  {%\
      \ else %}\n    {% set last_dt = as_datetime(last) %}\n    {% if last_dt is none\
      \ %}\n      true\n    {% else %}\n      {{ (as_timestamp(now()) - as_timestamp(last_dt))\
      \ >= cooldown_s }}\n    {% endif %}\n  {% endif %}\n{% endif %}\n"
  action:
  - service: system_log.write
    data:
      level: warning
      logger: dynamic_shutter.ds_w6
      message: 'DS W6 health={{ states(''sensor.ds_w6_health'') }} | missing_critical={{
        state_attr(''sensor.ds_w6_health'',''missing_critical'') }} | missing_optional={{
        state_attr(''sensor.ds_w6_health'',''missing_optional'') }}

        '
  - choose:
    - conditions:
      - condition: state
        entity_id: input_boolean.ds_w6_health_alert_notify_enabled
        state: 'on'
      - condition: template
        value_template: '{% set tgt = states(''input_text.ds_w6_notify_target_entity'')
          %} {{ tgt not in [''unknown'',''unavailable'',''none'',''''] and tgt.startswith(''notify.'')
          }}

          '
      sequence:
      - service: notify.send_message
        target:
          entity_id: '{{ states(''input_text.ds_w6_notify_target_entity'') }}'
        data:
          message: 'DS W6 health={{ states(''sensor.ds_w6_health'') }}\nmissing_critical={{
            state_attr(''sensor.ds_w6_health'',''missing_critical'') }}\nmissing_optional={{
            state_attr(''sensor.ds_w6_health'',''missing_optional'') }}

            '
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ states(''input_datetime.ds_w6_health_last_alert'') not
          in [''unknown'',''unavailable''] }}

          '
      sequence:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.ds_w6_health_last_alert
        data:
          datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
input_datetime:
  ds_w6_health_last_alert:
    name: ds_w6_health_last_alert
    has_date: true
    has_time: true
input_number:
  ds_w6_health_alert_cooldown_min:
    name: ds_w6_health_alert_cooldown_min
    min: 0
    max: 360
    step: 5
    mode: box
    unit_of_measurement: min
    icon: mdi:timer-outline
    initial: 30
input_boolean:
  ds_w6_health_alert_notify_enabled:
    name: ds_w6_health_alert_notify_enabled
    icon: mdi:message-alert-outline
    initial: false
input_text:
  ds_w6_notify_target_entity:
    name: ds_w6_notify_target_entity
    icon: mdi:send
    initial: notify.telegram_bot_8023650581_4609211440
