      \ in ['unknown','unavailable','none',''] %}\n  none\n{% else %}\n  {% set d\
      \ = raw | from_json %}\n  {{ d.reason if d.reason is defined else 'none' }}\n\
      {% endif %}"
  - name: ds_w6_target_position_pct
