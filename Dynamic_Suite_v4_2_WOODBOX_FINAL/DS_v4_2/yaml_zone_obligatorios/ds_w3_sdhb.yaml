# ============================================================================
# Dynamic Shutter · DS W3 · SDHB (helpers + publish/heartbeat)
# ----------------------------------------------------------------------------
# version: 4.2
# changelog: v4.2 (fix_final_r3: valid YAML + include per-window SDHB helpers)
# ============================================================================

input_boolean:
  ds_w3_sdhb_enabled:
    name: ds_w3_sdhb_enabled
    icon: mdi:transit-connection-variant
    initial: true
  ds_w3_sdhb_export_enabled:
    name: ds_w3_sdhb_export_enabled
    icon: mdi:export
    initial: true
  ds_w3_sdhb_quiet_respect_enabled:
    name: ds_w3_sdhb_quiet_respect_enabled
    icon: mdi:volume-mute
    initial: true

input_text:
  ds_w3_sdhb_target_dv:
    name: ds_w3_sdhb_target_dv
    icon: mdi:air-filter
    initial: dv_vmc

input_number:
  ds_w3_sdhb_priority:
    name: ds_w3_sdhb_priority
    icon: mdi:priority-high
    min: 0
    max: 100
    step: 1
    initial: 10
  ds_w3_sdhb_ttl_s:
    name: ds_w3_sdhb_ttl_s
    icon: mdi:timer-outline
    min: 0
    max: 86400
    step: 1
    initial: 600

automation:
  - id: ds_w3_sdhb_publish_intent_on_reason_change
    alias: ds_w3_sdhb_publish_intent_on_reason_change
    mode: queued
    trigger:
      - platform: state
        entity_id:
          - sensor.ds_w3_target_reason
          - input_select.ds_w3_zone
          - input_select.ds_w3_facade
          - input_boolean.ds_w3_sdhb_enabled
          - input_boolean.ds_w3_sdhb_export_enabled
          - input_boolean.sdhb_enabled
          - input_boolean.ds_sdhb_advanced_mode
          - input_number.ds_w3_sdhb_priority
          - input_number.ds_w3_sdhb_ttl_s
    condition:
      - condition: state
        entity_id: input_boolean.sdhb_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.ds_w3_sdhb_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.ds_w3_sdhb_export_enabled
        state: "on"
    action:
      - variables:
          reason: "{{ states('sensor.ds_w3_target_reason') }}"
          zone: "{{ states('input_select.ds_w3_zone') }}"
          facade: "{{ states('input_select.ds_w3_facade') }}"
          dv_target: "{{ states('input_text.ds_w3_sdhb_target_dv') }}"
          advanced: "{{ is_state('input_boolean.ds_sdhb_advanced_mode','on') }}"
          prio_default: "{{ 20 if reason == 'summer_solar_shield' else 15 if reason == 'winter_solar_gain' else 30 if reason == 'freecool_night' else 0 }}"
          ttl_default: "{{ 900 if reason in ['summer_solar_shield','winter_solar_gain'] else 600 if reason == 'freecool_night' else 0 }}"
          prio: "{{ (states('input_number.ds_w3_sdhb_priority')|int(10)) if advanced else (prio_default|int(0)) }}"
          ttl: "{{ (states('input_number.ds_w3_sdhb_ttl_s')|int(600)) if advanced else (ttl_default|int(0)) }}"
      - choose:
          - conditions: "{{ reason == 'summer_solar_shield' }}"
            sequence:
              - service: script.sdhb_publish_intent
                data:
                  source: ds_w3
                  target: "{{ zone }}"
                  intent: request_solar_shield
                  priority: "{{ prio | int(0) }}"
                  ttl_s: "{{ ttl | int(0) }}"
                  payload: "{{ {'module':'ds','window':'ds_w3','zone': zone,'facade': facade,'reason': reason} | tojson }}"
          - conditions: "{{ reason == 'winter_solar_gain' }}"
            sequence:
              - service: script.sdhb_publish_intent
                data:
                  source: ds_w3
                  target: "{{ zone }}"
                  intent: request_solar_gain
                  priority: "{{ prio | int(0) }}"
                  ttl_s: "{{ ttl | int(0) }}"
                  payload: "{{ {'module':'ds','window':'ds_w3','zone': zone,'facade': facade,'reason': reason} | tojson }}"
          - conditions: "{{ reason == 'freecool_night' }}"
            sequence:
              - service: script.sdhb_publish_intent
                data:
                  source: ds_w3
                  target: "{{ dv_target }}"
                  intent: request_freecool
                  priority: "{{ prio | int(0) }}"
                  ttl_s: "{{ ttl | int(0) }}"
                  payload: "{{ {'module':'ds','window':'ds_w3','zone': zone,'facade': facade,'reason': reason} | tojson }}"
        default:
          - service: script.sdhb_publish_intent
            data:
              source: ds_w3
              target: ""
              intent: none
              priority: 0
              ttl_s: 0
              payload: "{{ {'intent':'none','module':'ds','window':'ds_w3','zone': zone,'facade': facade,'reason': reason} | tojson }}"

  - id: ds_w3_sdhb_heartbeat_5m
    alias: ds_w3_sdhb_heartbeat_5m
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/5"
    condition:
      - condition: state
        entity_id: input_boolean.sdhb_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.ds_w3_sdhb_enabled
        state: "on"
      - condition: state
        entity_id: input_boolean.ds_w3_sdhb_export_enabled
        state: "on"
    action:
      - service: script.sdhb_heartbeat
        data:
          source: ds_w3
