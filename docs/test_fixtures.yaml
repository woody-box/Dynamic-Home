# ============================================================================
# Dynamic Home — entidades de PRUEBA (sin hardware)
# ----------------------------------------------------------------------------
# Copia este fichero a /config/packages/ (necesitas tener habilitado packages:
# en configuration.yaml ->  homeassistant:\n    packages: !include_dir_named packages )
# o pega su contenido dentro de configuration.yaml. Reinicia Home Assistant.
#
# Crea relés, sensores, persianas y un termostato FALSOS para probar la
# integración Dynamic Home sin tocar tu instalación real. Los input_* son
# mandos que puedes mover desde la UI para simular el entorno.
# ============================================================================

input_boolean:
  dh_test_sw_pwr:   { name: "DH Test · relé power" }
  dh_test_sw_v2:    { name: "DH Test · relé V2" }
  dh_test_sw_v3:    { name: "DH Test · relé V3" }
  dh_test_heater:   { name: "DH Test · relé caldera" }

input_number:
  dh_test_co2:
    name: "DH Test · CO2"
    min: 400
    max: 2000
    step: 10
    initial: 600
    unit_of_measurement: ppm
  dh_test_pm25:
    name: "DH Test · PM2.5"
    min: 0
    max: 100
    step: 1
    initial: 5
    unit_of_measurement: "µg/m³"
  dh_test_tint:
    name: "DH Test · Temp interior"
    min: 10
    max: 35
    step: 0.5
    initial: 21
    unit_of_measurement: "°C"
  dh_test_text:
    name: "DH Test · Temp exterior"
    min: -5
    max: 45
    step: 0.5
    initial: 5
    unit_of_measurement: "°C"
  dh_test_cover_sur:
    name: "DH Test · posición persiana sur"
    min: 0
    max: 100
    step: 1
    initial: 100
  dh_test_cover_norte:
    name: "DH Test · posición persiana norte"
    min: 0
    max: 100
    step: 1
    initial: 100

# --- Sensores con device_class (lo que el config flow espera) ---
template:
  - sensor:
      - name: "DH Test CO2"
        unique_id: dh_test_co2_sensor
        unit_of_measurement: ppm
        device_class: carbon_dioxide
        state: "{{ states('input_number.dh_test_co2') | float(0) }}"
      - name: "DH Test PM25"
        unique_id: dh_test_pm25_sensor
        unit_of_measurement: "µg/m³"
        device_class: pm25
        state: "{{ states('input_number.dh_test_pm25') | float(0) }}"
      - name: "DH Test Temp interior"
        unique_id: dh_test_tint_sensor
        unit_of_measurement: "°C"
        device_class: temperature
        state: "{{ states('input_number.dh_test_tint') | float(0) }}"
      - name: "DH Test Temp exterior"
        unique_id: dh_test_text_sensor
        unit_of_measurement: "°C"
        device_class: temperature
        state: "{{ states('input_number.dh_test_text') | float(0) }}"
  # --- Relés falsos como switches (espejo de los input_boolean) ---
  - switch:
      - name: "DH Test Relé PWR"
        unique_id: dh_test_relay_pwr
        state: "{{ is_state('input_boolean.dh_test_sw_pwr','on') }}"
        turn_on:
          - service: input_boolean.turn_on
            target: { entity_id: input_boolean.dh_test_sw_pwr }
        turn_off:
          - service: input_boolean.turn_off
            target: { entity_id: input_boolean.dh_test_sw_pwr }
      - name: "DH Test Relé V2"
        unique_id: dh_test_relay_v2
        state: "{{ is_state('input_boolean.dh_test_sw_v2','on') }}"
        turn_on:
          - service: input_boolean.turn_on
            target: { entity_id: input_boolean.dh_test_sw_v2 }
        turn_off:
          - service: input_boolean.turn_off
            target: { entity_id: input_boolean.dh_test_sw_v2 }
      - name: "DH Test Relé V3"
        unique_id: dh_test_relay_v3
        state: "{{ is_state('input_boolean.dh_test_sw_v3','on') }}"
        turn_on:
          - service: input_boolean.turn_on
            target: { entity_id: input_boolean.dh_test_sw_v3 }
        turn_off:
          - service: input_boolean.turn_off
            target: { entity_id: input_boolean.dh_test_sw_v3 }
      - name: "DH Test Relé Caldera"
        unique_id: dh_test_relay_heater
        state: "{{ is_state('input_boolean.dh_test_heater','on') }}"
        turn_on:
          - service: input_boolean.turn_on
            target: { entity_id: input_boolean.dh_test_heater }
        turn_off:
          - service: input_boolean.turn_off
            target: { entity_id: input_boolean.dh_test_heater }

# --- Persianas falsas (reflejan la posición en un input_number) ---
cover:
  - platform: template
    covers:
      dh_test_persiana_sur:
        friendly_name: "DH Test Persiana Sur"
        position_template: "{{ states('input_number.dh_test_cover_sur') | int(0) }}"
        open_cover:
          - service: input_number.set_value
            target: { entity_id: input_number.dh_test_cover_sur }
            data: { value: 100 }
        close_cover:
          - service: input_number.set_value
            target: { entity_id: input_number.dh_test_cover_sur }
            data: { value: 0 }
        set_cover_position:
          - service: input_number.set_value
            target: { entity_id: input_number.dh_test_cover_sur }
            data: { value: "{{ position }}" }
      dh_test_persiana_norte:
        friendly_name: "DH Test Persiana Norte"
        position_template: "{{ states('input_number.dh_test_cover_norte') | int(0) }}"
        open_cover:
          - service: input_number.set_value
            target: { entity_id: input_number.dh_test_cover_norte }
            data: { value: 100 }
        close_cover:
          - service: input_number.set_value
            target: { entity_id: input_number.dh_test_cover_norte }
            data: { value: 0 }
        set_cover_position:
          - service: input_number.set_value
            target: { entity_id: input_number.dh_test_cover_norte }
            data: { value: "{{ position }}" }

# --- Termostato falso (heat) que DC puede CONDUCIR como "dc_climate" ---
# generic_thermostat es heat-only: úsalo poniendo la zona DC en modo HEAT.
climate:
  - platform: generic_thermostat
    name: "DH Test Termostato"
    heater: switch.dh_test_rele_caldera
    target_sensor: sensor.dh_test_temp_interior
    min_temp: 15
    max_temp: 30
    ac_mode: false
    cold_tolerance: 0.3
    hot_tolerance: 0.3
